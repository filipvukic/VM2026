// ── TheSportsDB player cache ──────────────────────────────────────────────────
const _tsdbCache = {};
let _playerDbMerged = false;
function _mergePlayersDb() {
  if (_playerDbMerged) return;
  _playerDbMerged = true;
  const db = window.__PLAYERS_DB__;
  if (!db) return;
  for (const [name, info] of Object.entries(db)) {
    if (info && !info._notFound && !(name in _tsdbCache)) _tsdbCache[name] = info;
  }
}

const parseH = s => {
  if (!s) return null;
  let m = s.match(/(\d{2,3})\s*cm/i); if (m) return m[1] + ' cm';
  m = s.match(/(\d+)[.,](\d+)\s*m/); if (m) return Math.round(parseFloat(m[1]+'.'+m[2])*100) + ' cm';
  return null;
};
const parseW = s => {
  if (!s) return null;
  let m = s.match(/(\d+)\s*kg/i); if (m) return m[1] + ' kg';
  m = s.match(/(\d+)\s*lb/i); if (m) return Math.round(parseInt(m[1])*0.4536) + ' kg';
  return null;
};

// Applies team data from a lookupteam response onto an existing info object
async function applyTeamData(info) {
  const teamId = info._teamId;
  if (!teamId) return info;
  try {
    const td = await fetch(`https://www.thesportsdb.com/api/v1/json/3/lookupteam.php?id=${teamId}`).then(r=>r.json());
    const team = (td?.teams||[])[0] || null;
    if (!team || !team.strLeague || /^_/.test(team.strLeague)) return info;
    return {
      ...info,
      teamBadge:    team.strBadge     || null,
      teamLeague:   team.strLeague    || null,
      teamCountry:  team.strCountry   || null,
      teamStadium:  team.strStadium   || null,
      teamCapacity: team.intStadiumCapacity || null,
      teamCity:     team.strLocation  || null,
    };
  } catch { return info; }
}

// Lightweight: search only (1 request). Used for prefetch.
async function fetchTsdbPlayerBasic(name) {
  _mergePlayersDb();
  if (name in _tsdbCache) return _tsdbCache[name];
  _tsdbCache[name] = null;
  try {
    const q = encodeURIComponent(name);
    const sd = await fetch(`https://www.thesportsdb.com/api/v1/json/3/searchplayers.php?p=${q}`).then(r=>r.json());
    const players = sd.player || [];
    if (!players.length) return null;
    const basic = players.find(p => (p.strPlayer||'').toLowerCase() === name.toLowerCase()) || players[0];
    const info = {
      thumb:       basic.strThumb      || null,
      cutout:      basic.strCutout     || null,
      render:      null,
      team:        basic.strTeam       || null,
      position:    basic.strPosition   || null,
      nationality: basic.strNationality || null,
      born:        basic.dateBorn      || null,
      birthPlace:  null, height: null, weight: null, foot: null, natJersey: null,
      teamBadge: null, teamLeague: null, teamCountry: null,
      teamStadium: null, teamCapacity: null, teamCity: null,
      _teamId: basic.idTeam || null,
      _playerId: basic.idPlayer || null,
      _basic: true,
    };
    _tsdbCache[name] = info;
    return info;
  } catch { return null; }
}

// Full fetch: search + lookupplayer. Team is fetched separately via applyTeamData.
async function fetchTsdbPlayer(name) {
  _mergePlayersDb();
  const cached = _tsdbCache[name];
  // Already have full (non-basic) data
  if (cached && !cached._basic) return cached;
  // Start from basic if available, otherwise fetch basic first
  if (!(name in _tsdbCache)) { _tsdbCache[name] = null; }

  try {
    const q = encodeURIComponent(name);
    let basic;
    if (cached?._basic) {
      // Reuse basic data
      basic = { idPlayer: cached._playerId, idTeam: cached._teamId, strTeam: cached.team,
                strThumb: cached.thumb, strCutout: cached.cutout,
                strPosition: cached.position, strNationality: cached.nationality, dateBorn: cached.born };
    } else {
      const sd = await fetch(`https://www.thesportsdb.com/api/v1/json/3/searchplayers.php?p=${q}`).then(r=>r.json());
      const players = sd.player || [];
      if (!players.length) return null;
      basic = players.find(p => (p.strPlayer||'').toLowerCase() === name.toLowerCase()) || players[0];
    }

    const fullData = await fetch(`https://www.thesportsdb.com/api/v1/json/3/lookupplayer.php?id=${basic.idPlayer}`).then(r=>r.json()).catch(()=>null);
    const fp = (fullData?.players||[])[0] || basic;

    const info = {
      thumb:        fp.strThumb        || basic.strThumb  || null,
      cutout:       fp.strCutout       || basic.strCutout || null,
      render:       fp.strRender       || null,
      team:         fp.strTeam         || basic.strTeam   || null,
      position:     fp.strPosition     || basic.strPosition || null,
      nationality:  fp.strNationality  || basic.strNationality || null,
      born:         fp.dateBorn        || basic.dateBorn  || null,
      birthPlace:   fp.strBirthLocation || null,
      height:       parseH(fp.strHeight),
      weight:       parseW(fp.strWeight),
      foot:         fp.strSide         || null,
      natJersey:    fp.strNumber       || null,
      teamBadge:    null,
      teamLeague:   null,
      teamCountry:  null,
      teamStadium:  null,
      teamCapacity: null,
      teamCity:     null,
      _teamId:      fp.idTeam || basic.idTeam || null,
      _basic:       false,
    };
    _tsdbCache[name] = info;
    return info;
  } catch { return cached || null; }
}

// ── PitchView ────────────────────────────────────────────────────────────────
function PitchView({ m }) {
  const hl = m.homeLineup, al = m.awayLineup;
  const hasHome = !!(hl && hl.lineup && hl.lineup.length);
  const hasAway = !!(al && al.lineup && al.lineup.length);
  const [selectedPlayer, setSelectedPlayer] = React.useState(null);

  const [playerImages, setPlayerImages] = React.useState({});

  React.useEffect(() => {
    const allP = [
      ...(hl?.lineup || []), ...(hl?.bench || []),
      ...(al?.lineup || []), ...(al?.bench || []),
    ].filter(p => p.name);
    // Throttled lightweight prefetch for dot images only (1 request per player, 80ms apart)
    let i = 0;
    const tick = () => {
      if (i >= allP.length) return;
      const p = allP[i++];
      const cached = _tsdbCache[p.name];
      if (cached) {
        if (cached.cutout || cached.thumb)
          setPlayerImages(prev => ({ ...prev, [p.name]: cached.cutout || cached.thumb }));
      } else {
        fetchTsdbPlayerBasic(p.name).then(info => {
          if (info?.cutout || info?.thumb)
            setPlayerImages(prev => ({ ...prev, [p.name]: info.cutout || info.thumb }));
        });
      }
      setTimeout(tick, 80);
    };
    tick();
  }, []);

  if (!hasHome && !hasAway) return (
    <div style={{ padding:"30px 24px", textAlign:"center", color:"var(--ink-soft)", fontWeight:600 }}>
      Uppställning publiceras nära avspark.
    </div>
  );

  const homeColor = (window.VM.TEAMS[m.home] || {}).c1 || "#4CAF50";
  const awayColor = (window.VM.TEAMS[m.away] || {}).c1 || "#2980b9";

  const parseForm = lu => {
    const f = ((lu && lu.formation) || "4-4-2").split("-").map(Number);
    return [1, ...f];
  };
  const chunkRows = (players, counts) => {
    const rows = []; let i = 0;
    counts.forEach(n => { rows.push(players.slice(i, i + n)); i += n; });
    return rows;
  };
  const buildEvt = teamCode => {
    const goals = {}, assists = {}, cards = {}, subOut = {}, subIn = {}, subInFor = {}, subOutFor = {};
    (m.scorers || []).forEach(s => {
      if (s.team !== teamCode) return;
      (goals[s.name] = goals[s.name] || []).push(s.minute);
      if (s.assist) (assists[s.assist] = assists[s.assist] || []).push(s.minute);
    });
    (m.cards || []).forEach(c => { if (c.team === teamCode) cards[c.name] = c.type; });
    (m.subs || []).forEach(s => {
      if (s.team !== teamCode) return;
      subOut[s.playerOut] = s.minute;
      subIn[s.playerIn]   = s.minute;
      subInFor[s.playerIn]  = s.playerOut;
      subOutFor[s.playerOut] = s.playerIn;
    });
    return { goals, assists, cards, subOut, subIn, subInFor, subOutFor };
  };
  const lastName = name => {
    if (!name) return "";
    const p = name.split(" ");
    const last = p[p.length - 1];
    return last.length > 11 ? last.slice(0, 11) : last;
  };
  // Name shown under a player on the pitch: full name when short, else "F. Lastname".
  const dotName = name => {
    if (!name) return "";
    if (name.length <= 13) return name;
    const parts = name.split(" ");
    if (parts.length === 1) return name.length > 13 ? name.slice(0, 13) : name;
    const last = parts[parts.length - 1];
    return parts.slice(0, -1).map(s => (s[0] || "") + ".").join("") + " " + last;
  };
  const posLabel = pos => {
    if (!pos) return "";
    const p = pos.split("-")[0];
    return { G:"MV", GK:"MV", CB:"CB", CD:"CB", LB:"VB", RB:"HB", LWB:"VB", RWB:"HB",
      SW:"MV", DM:"DM", CM:"CM", LM:"VM", RM:"HM", AM:"AM", CAM:"AM",
      F:"FW", FW:"FW", ST:"FW", CF:"FW", LW:"VY", RW:"HY", SS:"SS", SUB:"BÄ" }[p] || pos.slice(0,3);
  };

  const calcPlayers = (lu, teamCode, isHome) => {
    if (!lu || !lu.lineup) return [];
    const counts = parseForm(lu);
    const rows = chunkRows(lu.lineup, counts);
    const evt = buildEvt(teamCode);
    const color = isHome ? homeColor : awayColor;
    const [yStart, yEnd] = isHome ? [92, 56] : [8.5, 44.5];
    const step = rows.length > 1 ? (yEnd - yStart) / (rows.length - 1) : 0;
    return rows.flatMap((row, ri) => {
      const y = yStart + step * ri;
      return row.map((p, ci) => ({
        p, color, teamCode, isHome,
        espnEventId: lu._espnEventId || null,
        x: (ci + 1) / (row.length + 1) * 100,
        y,
        goals: evt.goals[p.name] || [],
        assists: evt.assists[p.name] || [],
        card: evt.cards[p.name] || null,
        subOut: evt.subOut[p.name] || null,
      }));
    });
  };

  const allPlayers = [
    ...(hasHome ? calcPlayers(hl, m.home, true) : []),
    ...(hasAway ? calcPlayers(al, m.away, false) : []),
  ];

  const PlayerNode = ({ pd }) => {
    const { p, color, x, y, card, subOut, goals } = pd;
    const img  = playerImages[p.name];
    const num  = p.jersey ?? p.shirtNumber ?? "";
    const initials = (p.name || "").split(" ").map(x => x[0] || "").join("").slice(0, 2).toUpperCase();
    const scored = (goals || []).length > 0;
    const SIZE = 42;
    return (
      <div onClick={() => setSelectedPlayer(pd)}
        style={{ position:"absolute", left:x+"%", top:y+"%",
          transform:"translate(-50%,-50%)", zIndex:1, cursor:"pointer",
          width:74, display:"flex", flexDirection:"column", alignItems:"center" }}>
        <div style={{ position:"relative", width:SIZE, height:SIZE,
          transition:"transform .15s", willChange:"transform" }}
          onMouseEnter={e => e.currentTarget.style.transform="scale(1.12)"}
          onMouseLeave={e => e.currentTarget.style.transform="scale(1)"}>
          {/* Photo / fallback */}
          {img ? (
            <img src={img} alt={p.name}
              style={{ width:SIZE, height:SIZE, borderRadius:"50%", objectFit:"cover",
                objectPosition:"top center", background:color,
                border:"2px solid rgba(255,255,255,.92)",
                boxShadow:"0 3px 9px rgba(0,0,0,.5)" }} />
          ) : (
            <div style={{ width:SIZE, height:SIZE, borderRadius:"50%", background:color,
              border:"2px solid rgba(255,255,255,.92)", display:"flex", alignItems:"center",
              justifyContent:"center", fontSize:13, fontWeight:900, color:"#fff",
              boxShadow:"0 3px 9px rgba(0,0,0,.5)" }}>
              {initials || num}
            </div>
          )}
          {/* Sub-out arrow (top-left) */}
          {subOut && <span style={{ position:"absolute", top:-3, left:-3, width:15, height:15,
            borderRadius:"50%", background:"rgba(255,255,255,.95)",
            boxShadow:"0 1px 3px rgba(0,0,0,.5)", fontSize:9, color:"#D2453B", fontWeight:900,
            pointerEvents:"none", zIndex:3, display:"flex", alignItems:"center", justifyContent:"center",
            lineHeight:1 }}>↓</span>}
          {/* Card (top-right) */}
          {card && <span style={{ position:"absolute", top:-3, right:-1, width:9, height:12,
            borderRadius:2, transform:"rotate(8deg)", display:"block", pointerEvents:"none", zIndex:3,
            background:card==="red"?"#D2453B":"#E8B931",
            boxShadow:"0 1px 3px rgba(0,0,0,.6)" }} />}
          {/* Goal (bottom-right) */}
          {scored && <span style={{ position:"absolute", bottom:-3, right:-3, width:16, height:16,
            borderRadius:"50%", background:"rgba(255,255,255,.95)",
            boxShadow:"0 1px 3px rgba(0,0,0,.5)", fontSize:9, pointerEvents:"none", zIndex:3,
            display:"flex", alignItems:"center", justifyContent:"center", lineHeight:1 }}>⚽</span>}
        </div>
        {/* Name + number */}
        <div style={{ marginTop:4, maxWidth:74, fontSize:9.5, fontWeight:700, lineHeight:1.15,
          color:"#fff", textAlign:"center", textShadow:"0 1px 3px rgba(0,0,0,.95), 0 0 2px rgba(0,0,0,.8)",
          whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
          {num !== "" && <span style={{ opacity:.85, fontWeight:800 }}>{num} </span>}
          <span style={{ textTransform: scored ? "uppercase" : "none" }}>{dotName(p.name)}</span>
        </div>
      </div>
    );
  };

  // Player popup — useMemo gives a stable component-type reference so re-renders from
  // playerImages state updates don't unmount/remount the popup and re-trigger the animation.
  const PlayerPopup = React.useMemo(() => ({ pd }) => {
    const { p, color, teamCode, goals, assists, card, subOut } = pd;
    const teamName = (window.VM.TEAMS[teamCode] || {}).name || teamCode;
    const initials = (p.name || "").split(" ").map(x=>x[0]||"").join("").slice(0,2).toUpperCase();
    const [tsdb, setTsdb] = React.useState(null);
    const [loading, setLoading] = React.useState(true);
    const [imgOk, setImgOk] = React.useState(true);

    React.useEffect(() => {
      let alive = true;
      (async () => {
        // Step 1: get personal data (search + lookupplayer), show immediately
        let info = await fetchTsdbPlayer(p.name);
        if (!alive) return;
        setTsdb(info);
        setLoading(false);
        // Step 2: if no team league yet, fetch team data now (isolated request, not part of prefetch)
        if (info && !info.teamLeague) {
          const withTeam = await applyTeamData(info);
          if (!alive) return;
          if (withTeam !== info) {
            _tsdbCache[p.name] = withTeam;
            setTsdb(withTeam);
          }
        }
      })();
      return () => { alive = false; };
    }, [p.name]);

    const photoUrl = tsdb?.cutout || tsdb?.render || tsdb?.thumb || null;
    const age = tsdb?.born ? Math.floor((Date.now() - new Date(tsdb.born)) / (365.25*24*3600*1000)) : null;
    const fmtBorn = tsdb?.born ? new Date(tsdb.born).toLocaleDateString('sv-SE', {day:'numeric',month:'long',year:'numeric'}) : null;
    const footSv = { Right:"Höger", Left:"Vänster", Both:"Bägge" };

        borderBottom:"1px solid var(--line)" }}>

        <span style={{ fontSize:11.5, fontWeight:600, color:"var(--ink-soft)", flex:"0 0 90px" }}>{label}</span>
        <span style={{ fontSize:13, fontWeight:700, color: accent || "var(--ink)", flex:1, minWidth:0,

              </div>
            ) : (
              <div style={{ marginBottom:14, zIndex:1, position:"relative",
                width:80, height:80, borderRadius:"50%", background:"rgba(255,255,255,.15)",
                border:"2px solid rgba(255,255,255,.3)", display:"flex", alignItems:"center", justifyContent:"center" }}>
                <span style={{ fontSize:26, fontWeight:900, color:"#fff" }}>{initials}</span>
              </div>
            )}
            {/* Name bar */}
            <div style={{ position:"absolute", bottom:0, left:0, right:0, zIndex:2,
              background:"linear-gradient(to top,rgba(0,0,0,.8) 0%,transparent 100%)",
              padding:"30px 14px 10px" }}>
              <div style={{ fontSize:17, fontWeight:900, color:"#fff", lineHeight:1.2,
                textShadow:"0 1px 6px rgba(0,0,0,.6)" }}>{p.name}</div>
              <div style={{ display:"flex", alignItems:"center", gap:5, marginTop:3, flexWrap:"wrap" }}>
                <Flag code={teamCode} size={13} />
                <span style={{ fontSize:11, fontWeight:700, color:"rgba(255,255,255,.8)" }}>{teamName}</span>
                {(tsdb?.position || p.positionName) && (
                  <span style={{ fontSize:10.5, color:"rgba(255,255,255,.55)" }}>· {tsdb?.position || p.positionName}</span>
                )}
              </div>
            </div>
            {/* Jersey */}
            <div style={{ position:"absolute", top:11, right:13, zIndex:3, minWidth:32, height:32,
              borderRadius:9, background:"rgba(0,0,0,.5)", backdropFilter:"blur(6px)",
              border:"1.5px solid rgba(255,255,255,.3)", display:"flex", alignItems:"center",
              justifyContent:"center", padding:"0 7px" }}>
              <span style={{ fontSize:14, fontWeight:900, color:"#fff" }}>{p.jersey??p.shirtNumber??"·"}</span>
            </div>
            {/* Close */}
            <button onClick={()=>setSelectedPlayer(null)} style={{
              position:"absolute", top:11, left:13, zIndex:3, width:32, height:32, borderRadius:"50%",
              background:"rgba(0,0,0,.45)", backdropFilter:"blur(6px)",
              border:"1.5px solid rgba(255,255,255,.2)", color:"#fff", fontSize:17, fontWeight:700,
              display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer" }}>×</button>
          </div>

          {/* ── Scrollable body ── */}
          <div className="app-scroll" style={{ overflowY:"auto", flex:1, padding:"0 14px 16px" }}>

            {/* Personal facts */}
            <div style={{ marginTop:10, background:"var(--paper)", borderRadius:14,
              border:"1px solid var(--line)", padding:"0 12px", overflow:"hidden" }}>
              <div style={{ fontSize:9, fontWeight:800, letterSpacing:".12em", color:"var(--ink-soft)",
                textTransform:"uppercase", padding:"9px 0 2px" }}>Personuppgifter</div>
              <Row icon="🌍" label="Nationalitet"  value={tsdb?.nationality} />
              <Row icon="📅" label="Född"          value={fmtBorn ? `${fmtBorn}${age ? ` (${age} år)` : ''}` : null} />
              <Row icon="📍" label="Födelseort"    value={tsdb?.birthPlace} />
              <Row icon="⚽" label="Position"      value={tsdb?.position || p.positionName} />
              <Row icon="↕"  label="Längd"         value={tsdb?.height} />
              <Row icon="⚖"  label="Vikt"          value={tsdb?.weight} />
              <Row icon="👟" label="Dominant fot"  value={tsdb?.foot ? (footSv[tsdb.foot]||tsdb.foot) : null} />
              {/* Last row: no bottom border */}
              {tsdb?.natJersey && (
                <div style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 0" }}>
                  <span style={{ fontSize:15, width:22, textAlign:"center" }}>🔢</span>
                  <span style={{ fontSize:11.5, fontWeight:600, color:"var(--ink-soft)", flex:"0 0 90px" }}>Nationströja</span>
                  <span style={{ fontSize:13, fontWeight:700, color:"var(--ink)" }}>#{tsdb.natJersey}</span>
                </div>
              )}
            </div>

            {/* Club */}
            {tsdb?.team && (
              <div style={{ marginTop:10, background:"var(--paper)", borderRadius:14,
                border:"1px solid var(--line)", overflow:"hidden" }}>
                <div style={{ fontSize:9, fontWeight:800, letterSpacing:".12em", color:"var(--ink-soft)",
                  textTransform:"uppercase", padding:"9px 12px 0" }}>Klubblag</div>
                <div style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 12px 12px" }}>
                  {tsdb.teamBadge ? (
                    <img src={tsdb.teamBadge} alt={tsdb.team}
                      style={{ width:48, height:48, objectFit:"contain", flexShrink:0 }} />
                  ) : (
                    <div style={{ width:48, height:48, borderRadius:10, background:"var(--bg2)",
                      flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:22 }}>⚽</div>
                  )}
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:15, fontWeight:800, color:"var(--ink)" }}>{tsdb.team}</div>
                    {tsdb.teamLeague && (
                      <div style={{ fontSize:12, fontWeight:600, color:"var(--ink-soft)", marginTop:2 }}>
                        {tsdb.teamLeague}{tsdb.teamCountry ? ` · ${tsdb.teamCountry}` : ''}
                      </div>
                    )}
                    {tsdb.teamStadium && (
                      <div style={{ fontSize:11, color:"var(--ink-soft)", opacity:.7, marginTop:2 }}>
                        📍 {tsdb.teamStadium}{tsdb.teamCapacity ? ` · ${Number(tsdb.teamCapacity).toLocaleString('sv-SE')} platser` : ''}{tsdb.teamCity ? ` · ${tsdb.teamCity}` : ''}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}

            {/* Tournament stats */}
            <div style={{ marginTop:10 }}>
              <div style={{ fontSize:9, fontWeight:800, letterSpacing:".12em", color:"var(--ink-soft)",
                textTransform:"uppercase", marginBottom:7 }}>VM 2026</div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:7 }}>
                {[
                  { label:"Mål", val: goals.length||0, lo: goals.length>0, accent:"var(--hot)" },
                  { label:"Assists", val: assists.length||0, lo: assists.length>0, accent:"#F5C518" },
                  { label:"Kort", val: card==="red"?"🟥":card==="yellow"?"🟨":"–", lo:false, accent:null },
                ].map(s => (
                  <div key={s.label} style={{ background:"var(--paper)", borderRadius:12,
                    border:"1px solid var(--line)", padding:"12px 6px", textAlign:"center" }}>
                    <div style={{ fontSize:22, fontWeight:900,
                      color: s.lo && s.accent ? s.accent : "var(--ink)" }}>{s.val}</div>
                    <div style={{ fontSize:10, fontWeight:700, color:"var(--ink-soft)", marginTop:3 }}>{s.label}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Sub info */}
            {subOut && (
              <div style={{ marginTop:10, display:"flex", alignItems:"center", gap:8,
                padding:"9px 12px", borderRadius:10, background:"var(--paper)", border:"1px solid var(--line)" }}>
                <span style={{ fontSize:13, color:"#FF5A52", fontWeight:900 }}>▼</span>
                <span style={{ fontSize:12, fontWeight:700, color:"var(--ink)" }}>Byttes ut {subOut}'</span>
              </div>
            )}

          </div>
        </div>
      </div>
    );
    return ReactDOM.createPortal(content, document.body);
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  const renderTeamList = (lu, teamCode, col) => {
    if (!lu) return null;
    const evt       = buildEvt(teamCode);
    const starters  = lu.lineup  || [];
    const subsIn    = (lu.bench || []).filter(p => p.subbedIn);
    const benchOnly = (lu.bench || []).filter(p => !p.subbedIn);
    const teamName  = (window.VM.TEAMS[teamCode] || {}).name || teamCode;

    const renderRow = (p, isBench, idx) => {
      const img       = playerImages[p.name];
      const goals     = evt.goals[p.name]    || [];
      const assists   = evt.assists[p.name]   || [];
      const card      = evt.cards[p.name]    || null;
      const subOutMin = evt.subOut[p.name]   || null;
      const subInMin  = evt.subIn[p.name]    || null;
      const subInFor  = evt.subInFor[p.name] || null;
      return (
        <button key={p.name || idx}
          onClick={() => setSelectedPlayer({ p, color:col, teamCode,
            espnEventId: lu._espnEventId || null,
            goals, assists, card, subOut: subOutMin })}
          style={{ display:"flex", alignItems:"center", gap:6, padding:"6px 0",
            borderTop:"1px solid var(--line)", textAlign:"left", background:"transparent",
            width:"100%", cursor:"pointer", minWidth:0 }}>
          <span style={{ width:18, textAlign:"center", fontSize:10, fontWeight:900, flexShrink:0,
            color: isBench ? "var(--ink-soft)" : col }}>
            {p.jersey ?? p.shirtNumber ?? ""}
          </span>
          {img ? (
            <img src={img} alt="" style={{ width:26, height:26, borderRadius:"50%",
              objectFit:"cover", objectPosition:"top center", flexShrink:0,
              border:`2px solid ${isBench ? "var(--line)" : col}` }} />
          ) : (
            <span style={{ width:26, height:26, borderRadius:"50%",
              background: isBench ? "var(--bg2)" : col, flexShrink:0,
              display:"flex", alignItems:"center", justifyContent:"center",
              fontSize:9, fontWeight:900,
              color: isBench ? "var(--ink-soft)" : "#fff",
              border:`2px solid ${isBench ? "var(--line)" : "rgba(255,255,255,.3)"}` }}>
              {(p.name || "").split(" ").map(x => x[0] || "").join("").slice(0, 2)}
            </span>
          )}
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:11.5, fontWeight: isBench ? 500 : 700,
              color: isBench ? "var(--ink-soft)" : "var(--ink)",
              overflow:"hidden", whiteSpace:"nowrap", textOverflow:"ellipsis" }}>
              {lastName(p.name)}
            </div>
            {subInFor && (
              <div style={{ fontSize:9, color:"var(--ink-soft)", lineHeight:1.3,
                overflow:"hidden", whiteSpace:"nowrap", textOverflow:"ellipsis" }}>
                för {lastName(subInFor)}
              </div>
            )}
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:2, flexShrink:0 }}>
            {goals.map((_, gi) => <span key={gi} style={{ fontSize:10 }}>⚽</span>)}
            {assists.length > 0 && (
              <span style={{ width:13, height:13, borderRadius:"50%", background:"#F5C518",
                fontSize:7, fontWeight:900, color:"#000",
                display:"flex", alignItems:"center", justifyContent:"center" }}>A</span>
            )}
            {card && <span style={{ width:8, height:11, borderRadius:1.5, display:"inline-block",
              background:card==="red"?"#D2453B":"#E8B931",
              transform:"rotate(6deg)", flexShrink:0 }} />}
            {subOutMin && (
              <span style={{ fontSize:9, color:"#FF5A52", fontWeight:900,
                lineHeight:1, whiteSpace:"nowrap" }}>▼{subOutMin}'</span>
            )}
            {subInMin && (
              <span style={{ fontSize:9, color:"#2BD17E", fontWeight:900,
                lineHeight:1, whiteSpace:"nowrap" }}>▲{subInMin}'</span>
            )}
          </div>
        </button>
      );
    };

    return (
      <div>
        <div style={{ display:"flex", alignItems:"center", gap:6, padding:"10px 0 7px",
          borderBottom:`2px solid ${col}` }}>
          <Flag code={teamCode} size={16} />
          <div style={{ minWidth:0 }}>
            <div style={{ fontSize:12, fontWeight:800, color:"var(--ink)",
              overflow:"hidden", whiteSpace:"nowrap", textOverflow:"ellipsis" }}>{teamName}</div>
            {lu.formation && (
              <div style={{ fontSize:9.5, fontWeight:600, color:"var(--ink-soft)" }}>{lu.formation}</div>
            )}
          </div>
        </div>
        {starters.map((p, i) => renderRow(p, false, i))}
        {subsIn.length > 0 && (
          <React.Fragment>
            <div style={{ fontSize:8.5, fontWeight:800, letterSpacing:".12em", color:"var(--ink-soft)",
              textTransform:"uppercase", padding:"7px 0 2px" }}>Inbytta</div>
            {subsIn.map((p, i) => renderRow(p, false, 100 + i))}
          </React.Fragment>
        )}
        {benchOnly.length > 0 && (
          <React.Fragment>
            <div style={{ fontSize:8.5, fontWeight:800, letterSpacing:".12em", color:"var(--ink-soft)",
              textTransform:"uppercase", padding:"7px 0 2px" }}>Bänk</div>
            {benchOnly.map((p, i) => renderRow(p, true, 200 + i))}
          </React.Fragment>
        )}
      </div>
    );
  };

  // Team header / footer bar: flag + name on one side, formation pill on the other.
  const TeamBar = ({ teamCode, lu, edge }) => (
    <div style={{ position:"absolute", left:0, right:0, [edge]:0, zIndex:3,
      display:"flex", alignItems:"center", justifyContent:"space-between", gap:8,
      padding:"7px 11px", pointerEvents:"none",
      background: edge === "top"
        ? "linear-gradient(180deg,rgba(0,0,0,.5) 0%,rgba(0,0,0,0) 100%)"
        : "linear-gradient(0deg,rgba(0,0,0,.5) 0%,rgba(0,0,0,0) 100%)" }}>
      <div style={{ display:"flex", alignItems:"center", gap:7, minWidth:0 }}>
        <Flag code={teamCode} size={17} />
        <span style={{ fontSize:13.5, fontWeight:800, color:"#fff", letterSpacing:".01em",
          textShadow:"0 1px 4px rgba(0,0,0,.7)", overflow:"hidden", whiteSpace:"nowrap",
          textOverflow:"ellipsis" }}>
          {(window.VM.TEAMS[teamCode]||{}).name || teamCode}
        </span>
      </div>
      {lu && lu.formation && (
        <span style={{ flexShrink:0, fontSize:11, fontWeight:800, color:"#1d6b34",
          background:"rgba(255,255,255,.92)", borderRadius:7, padding:"3px 9px",
          letterSpacing:".02em" }}>{lu.formation}</span>
      )}
    </div>
  );

  return (
    <div style={{ padding:"2px 0 16px" }}>
      {/* Pitch */}
      <div style={{ position:"relative", width:"100%", paddingBottom:"172%", borderRadius:12,
        overflow:"hidden", boxShadow:"0 4px 20px rgba(0,0,0,.35)",
        background:"repeating-linear-gradient(180deg,rgba(0,0,0,.04) 0px,rgba(0,0,0,.04) 1px,transparent 1px,transparent 30px), linear-gradient(180deg,#2e8040 0%,#267038 50%,#2e8040 100%)" }}>
        <svg style={{ position:"absolute", top:0, left:0, width:"100%", height:"100%", zIndex:0 }}
          viewBox="0 0 68 105" preserveAspectRatio="none">
          <rect x="3" y="2" width="62" height="101" fill="none" stroke="rgba(255,255,255,.5)" strokeWidth=".55"/>
          <line x1="3" y1="52.5" x2="65" y2="52.5" stroke="rgba(255,255,255,.5)" strokeWidth=".55"/>
          <circle cx="34" cy="52.5" r="9.15" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.5)" strokeWidth=".55"/>
          <circle cx="34" cy="52.5" r=".9" fill="rgba(255,255,255,.6)"/>
          <rect x="13.84" y="88.5" width="40.32" height="16.5" fill="none" stroke="rgba(255,255,255,.5)" strokeWidth=".55"/>
          <rect x="24.84" y="96.5" width="18.32" height="6.5" fill="none" stroke="rgba(255,255,255,.5)" strokeWidth=".55"/>
          <circle cx="34" cy="93.66" r=".9" fill="rgba(255,255,255,.6)"/>
          <rect x="13.84" y="0" width="40.32" height="16.5" fill="none" stroke="rgba(255,255,255,.5)" strokeWidth=".55"/>
          <rect x="24.84" y="2" width="18.32" height="6.5" fill="none" stroke="rgba(255,255,255,.5)" strokeWidth=".55"/>
          <circle cx="34" cy="11.34" r=".9" fill="rgba(255,255,255,.6)"/>
          <rect x="28.16" y="102.2" width="11.68" height="2.8" fill="none" stroke="rgba(255,255,255,.45)" strokeWidth=".5"/>
          <rect x="28.16" y=".0" width="11.68" height="2.8" fill="none" stroke="rgba(255,255,255,.45)" strokeWidth=".5"/>
        </svg>
        {m.away && hasAway && <TeamBar teamCode={m.away} lu={al} edge="top" />}
        {m.home && hasHome && <TeamBar teamCode={m.home} lu={hl} edge="bottom" />}
        {allPlayers.map((pd, i) => <PlayerNode key={i} pd={pd} />)}
      </div>

      {/* Substitutes / bench – two columns */}
      <div style={{ display:"grid",
        gridTemplateColumns: hasHome && hasAway ? "1fr 1fr" : "1fr",
        marginTop:6 }}>
        {hasHome && (
          <div style={{ padding:"0 8px 12px 14px",
            borderRight: hasHome && hasAway ? "1px solid var(--line)" : "none" }}>
            {renderTeamList(hl, m.home, homeColor)}
          </div>
        )}
        {hasAway && (
          <div style={{ padding:"0 14px 12px 8px" }}>
            {renderTeamList(al, m.away, awayColor)}
          </div>
        )}
      </div>

      {selectedPlayer && <PlayerPopup pd={selectedPlayer} />}
    </div>
  );
}

// ── MatchDetail ───────────────────────────────────────────────────────────────
function MatchDetail({ data, match: _match, onClose, onTeam, zIndex, dimBackdrop }) {
  // Always reflect the latest polled data for this match
  const m = React.useMemo(
    () => data.allMatches.find(x => x.id === _match.id) || _match,
    [data, _match.id]
  );

  const live = m.status === "live", played = m.status === "played", tbd = !m.home || !m.away;
  const win = m.winner;

  const TABS = [
    { id:"events",  label: played || live ? "Händelser" : "Info" },
    { id:"stats",   label:"Statistik" },
    { id:"lineup",  label:"Uppställning" },
    { id:"tips",    label:"Tips" },
  ];
  const [tab, setTab] = React.useState("events");
  // Reset to events tab when a different match is opened
  React.useEffect(() => { setTab("events"); }, [_match.id]);

  const teamCol = (code, label) => (
    <button onClick={() => code && onTeam && onTeam(code)} style={{ flex: 1, display: "flex", flexDirection: "column",
      alignItems: "center", gap: 8, minWidth: 0, color: "#fff" }}>
      {code ? <Flag code={code} size={52} shape="rect" /> :
        <span style={{ width: 73, height: 52, borderRadius: 8, background: "rgba(255,255,255,.18)" }} />}
      <span style={{ fontWeight: 800, fontSize: 14, textAlign: "center", textShadow: "0 1px 3px rgba(0,0,0,.3)",
        opacity: played && win && win !== code ? .6 : 1 }}>{code ? window.VM.TEAMS[code].name : (label || "Vinnare")}</span>
    </button>
  );

  const header = (
    <div style={{ background: "var(--grad)", padding: "14px 18px 18px", position: "relative", flex: "0 0 auto" }}>
      <button onClick={onClose} aria-label="Stäng" style={{ position: "absolute", top: 14, right: 16, color: "#fff",
        fontSize: 24, fontWeight: 700, lineHeight: 1, opacity: .9 }}>×</button>
      <div style={{ textAlign: "center", marginBottom: 14 }}>
        <div style={{ fontSize: 11.5, fontWeight: 800, letterSpacing: ".1em", color: "rgba(255,255,255,.9)", textTransform: "uppercase" }}>
          {roundLabel(m)}{m.group ? "" : ""}</div>
        <div style={{ fontSize: 11.5, fontWeight: 600, color: "rgba(255,255,255,.85)", marginTop: 3 }}>
          {svDayLabel(m.kickoff)} · {svTime(m.kickoff)}
        </div>
        {m.venue && m.venue.stadium && (() => {
          const v = m.venue;
          const iso = v.cc === "USA" ? "us" : v.cc === "MEX" ? "mx" : v.cc === "CAN" ? "ca" : null;
          return (
            <div style={{ marginTop: 8, display: "inline-flex", alignItems: "center", gap: 7,
              padding: "5px 11px 5px 7px", borderRadius: 999, background: "rgba(255,255,255,.14)",
              border: "1px solid rgba(255,255,255,.18)",
              fontSize: 11.5, fontWeight: 600, color: "rgba(255,255,255,.95)" }}>
              {iso ? (
                <img src={`https://flagcdn.com/w40/${iso}.png`} alt=""
                  style={{ width: 18, height: 12, borderRadius: 2, objectFit: "cover",
                    boxShadow: "inset 0 0 0 1px rgba(255,255,255,.25)" }} />
              ) : <span>📍</span>}
              <span style={{ fontWeight: 700 }}>{v.stadium}</span>
              {v.city && <span style={{ opacity: .85 }}>· {v.city}</span>}
              {v.country && <span style={{ opacity: .7 }}>· {v.country}</span>}
            </div>
          );
        })()}
        {m.attendance && (
          <div style={{ marginTop: 5, fontSize: 11, fontWeight: 600, color: "rgba(255,255,255,.7)" }}>
            Publik · {m.attendance.toLocaleString("sv-SE")}
          </div>
        )}
        {m.referees && m.referees.length > 0 && (() => {
          const main = m.referees.find(r => /main|head|huvuddomare|referee/i.test(r.role || "")) || m.referees[0];
          if (!main || !main.name) return null;
          return (
            <div style={{ marginTop: 4, fontSize: 11, fontWeight: 600, color: "rgba(255,255,255,.7)" }}>
              Domare · {main.name}{main.nationality ? ` (${main.nationality})` : ""}
            </div>
          );
        })()}
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        {teamCol(m.home, m.fromA)}
        <div style={{ flex: "0 0 auto", textAlign: "center", minWidth: 86 }}>
          {(played || live) && !tbd ? (
            <>
              <div className="num" style={{ fontWeight: 800, fontSize: 36, color: "#fff", lineHeight: 1 }}>
                {m.ga}<span style={{ opacity: .55, margin: "0 6px", fontWeight: 600 }}>–</span>{m.gb}
              </div>
              {m.scoreDetail && m.scoreDetail.halfTime && (
                <div className="num" style={{ fontSize: 11, color: "rgba(255,255,255,.6)", fontWeight: 700, marginTop: 2 }}>
                  HT {m.scoreDetail.halfTime[0]}–{m.scoreDetail.halfTime[1]}
                </div>
              )}
            </>
          ) : (
            <div className="num display" style={{ fontWeight: 800, fontSize: 36, color: "#fff" }}>{svTime(m.kickoff)}</div>
          )}
          <div style={{ marginTop: 7, display: "flex", justifyContent: "center" }}>
            {live ? <LiveDot minute={m.minute} /> :
              played ? <span style={{ fontSize: 11, fontWeight: 800, color: "rgba(255,255,255,.85)", letterSpacing: ".05em" }}>
                SLUTSIGNAL{m.pen ? " · STR " + m.pen[0] + "–" + m.pen[1] : ""}</span> :
              <span style={{ fontSize: 11, fontWeight: 700, color: "rgba(255,255,255,.8)" }}>Avspark</span>}
          </div>
        </div>
        {teamCol(m.away, m.fromB)}
      </div>
    </div>
  );

  const TBDMsg = () => (
    <div style={{ textAlign:"center", color:"var(--ink-soft)", padding:"30px 24px", fontWeight:600 }}>
      Lagen avgörs när tidigare matcher är spelade.
    </div>
  );

  return (
    <Sheet onClose={onClose} header={header} zIndex={zIndex} dimBackdrop={dimBackdrop}>
      {/* Tab bar – sticky inside the scroll container */}
      <div style={{ display:"flex", background:"var(--panel)", borderBottom:"1px solid var(--line)",
        position:"sticky", top:0, zIndex:5 }}>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            flex:1, padding:"10px 4px", fontSize:11.5, fontWeight:700,
            color: tab === t.id ? "var(--hot)" : "var(--ink-soft)",
            borderBottom: tab === t.id ? "2px solid var(--hot)" : "2px solid transparent",
          }}>{t.label}</button>
        ))}
      </div>

      <div key={tab} style={{ paddingTop: 8, animation: "tabIn .22s cubic-bezier(.2,.7,.2,1) both" }}>

        {/* ── Händelser / Info ── */}
        {tab === "events" && (
          tbd ? <TBDMsg /> : (played || live) ? (
            <MiniBlock title={live ? "Händelser · pågår" : "Händelser"} pad={false}>
              <Timeline m={m} />
            </MiniBlock>
          ) : (
            <>
              <WinChanceBlock m={m} />
              <H2HBlock m={m} />
            </>
          )
        )}

        {/* ── Statistik ── */}
        {tab === "stats" && (
          tbd ? <TBDMsg /> : (
            <>
              {(played || live) && <StatsBlock m={m} full />}
              <FormBlock data={data} m={m} />
            </>
          )
        )}

        {/* ── Uppställning ── */}
        {tab === "lineup" && <PitchView m={m} />}

        {/* ── Tips ── */}
        {tab === "tips" && (
          tbd ? <TBDMsg /> : (
            <>
              {!played && <TipsDistribution data={data} m={m} />}
              <PoolResultBlock data={data} m={m} />
            </>
          )
        )}

        <div style={{ height: 24 }} />
      </div>
    </Sheet>
  );
}

/* ============================================================

function money(n) { return n.toLocaleString("sv-SE") + " kr"; }

function Crown({ size = 26 }) {
  return (
    <svg width={size} height={size * 0.72} viewBox="0 0 30 22" aria-hidden="true">
      <path d="M2.5 19 L4.4 7.5 L10 12.5 L15 3.5 L20 12.5 L25.6 7.5 L27.5 19 Z"
        fill="var(--gold)" stroke="color-mix(in oklab, var(--gold) 60%, #000 22%)" strokeWidth="1" strokeLinejoin="round" />
      <rect x="2.5" y="18.5" width="25" height="2.6" rx="1" fill="color-mix(in oklab, var(--gold) 70%, #000 14%)" />
    </svg>
  );
}

function Countdown() {
  // Öppningsmatch Mexico vs Sydafrika 11/6 kl 13:00 lokal tid på Estadio
  // Azteca = 19:00 UTC = 21:00 svensk sommartid (CEST).
  const target = Date.UTC(2026, 5, 11, 19, 0);
  const [now, setNow] = React.useState(Date.now());
  React.useEffect(() => { const t = setInterval(() => setNow(Date.now()), 1000); return () => clearInterval(t); }, []);
  let diff = Math.max(0, target - now);
  const d = Math.floor(diff / 86400000); diff -= d * 86400000;
  const h = Math.floor(diff / 3600000); diff -= h * 3600000;
  const mi = Math.floor(diff / 60000); diff -= mi * 60000;
  const s = Math.floor(diff / 1000);
  const cell = (v, l) => (
    <div style={{ textAlign: "center", minWidth: 52 }}>
      <div className="num display" style={{ fontSize: 34, color: "var(--ink)", lineHeight: 1, fontWeight: "var(--display-weight)" }}>{String(v).padStart(2, "0")}</div>
      <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: ".1em", color: "var(--ink-soft)", marginTop: 4 }}>{l}</div>
    </div>
  );
  const sep = <span className="num" style={{ color: "var(--line-strong)", fontSize: 26, fontWeight: 300, marginTop: -6 }}>:</span>;
  return (
    <div style={{ display: "flex", gap: 10, justifyContent: "center", alignItems: "center" }}>
      {cell(d, "DGR")}{sep}{cell(h, "TIM")}{sep}{cell(mi, "MIN")}{sep}{cell(s, "SEK")}
    </div>
  );
}

function PodiumStep({ p, place, prize, isPre, h }) {
  const tint = { 1: "var(--gold)", 2: "#AEB4BE", 3: "#C77F49" }[place];
  const pts = useCountUp(isPre ? 0 : p.total, 900 + place * 100);
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", flex: 1, animation: `riseIn .5s forwards` }}>
      <div style={{ height: 26, display: "flex", alignItems: "flex-end" }}>{place === 1 ? <Crown size={28} /> : null}</div>
      <Avatar p={p} size={place === 1 ? 62 : 50} ring={place} />
      <div style={{ fontWeight: 800, fontSize: place === 1 ? 15.5 : 13.5, marginTop: 10, color: "var(--ink)" }}>{p.name}</div>
      <div className="num display" style={{ fontSize: place === 1 ? 26 : 21, color: "var(--ink)", marginTop: 1, fontWeight: "var(--display-weight)" }}>
        {pts}<span style={{ fontSize: 11, color: "var(--ink-soft)", marginLeft: 2, fontWeight: 700, fontFamily: "var(--font-body)" }}>p</span>
      </div>
      <div style={{ marginTop: 10, width: "100%", height: h, borderRadius: "10px 10px 0 0", position: "relative",
        background: `linear-gradient(180deg, color-mix(in oklab, ${tint} 42%, var(--panel)), color-mix(in oklab, ${tint} 16%, var(--paper)))`,
        border: "1px solid " + `color-mix(in oklab, ${tint} 55%, var(--line))`, borderBottom: "none",
        boxShadow: place === 1 ? `0 0 30px -8px ${tint}, inset 0 1px 0 rgba(255,255,255,.18)` : "inset 0 1px 0 rgba(255,255,255,.12)",
        display: "flex", flexDirection: "column", alignItems: "center", paddingTop: 9 }}>
        <span className="num display" style={{ fontSize: place === 1 ? 30 : 24, color: tint, fontWeight: "var(--display-weight)" }}>{place}</span>
        <span className="num" style={{ position: "absolute", bottom: 9, fontWeight: 800, fontSize: place === 1 ? 14 : 12.5, color: "#fff" }}>{money(prize)}</span>
      </div>
    </div>
  );
}

                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 6 }}>

                      <div style={{ position: "absolute", inset: 0, width: barPct + "%", background: onPodium ? medal : "var(--cool)",
                        borderRadius: 99, animation: "barGrow 1s ease-out" }} />
                    </div>
                    <span style={{ fontSize: 11, color: "var(--ink-soft)", fontWeight: 700 }}>{p.exact} exakta</span>
                  </div>
                ) : (() => {
                  const winnerCode = p.bonus && p.bonus.winner;
                  const tipCount = Object.keys(p.tips).length;
                  return (
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 4, flexWrap: "wrap" }}>
                      <span style={{ fontSize: 12, color: "var(--ink-soft)", fontWeight: 600 }}>{tipCount} tips</span>
                      {winnerCode && data.teams[winnerCode] && (
                        <span style={{ display: "inline-flex", alignItems: "center", gap: 5,
                          padding: "2px 7px 2px 3px", borderRadius: 99,
                          background: "color-mix(in oklab, var(--gold) 18%, var(--bg2))",
                          border: "1px solid color-mix(in oklab, var(--gold) 40%, var(--line))" }}>
                          <Flag code={winnerCode} size={14} />
                          <span style={{ fontSize: 10.5, fontWeight: 800, letterSpacing: ".06em",
                            color: "color-mix(in oklab, var(--gold) 65%, var(--ink))", textTransform: "uppercase" }}>
                            tippar {data.teams[winnerCode].name}
                          </span>
                        </span>
                      )}
                    </div>
                  );
                })()}
              </div>
              <div style={{ textAlign: "right" }}>
                <div className="num display" style={{ fontSize: 22, color: "var(--ink)", fontWeight: "var(--display-weight)" }}>{isPre ? 0 : p.total}</div>
                <div style={{ fontSize: 9.5, fontWeight: 800, letterSpacing: ".08em", color: "var(--ink-soft)" }}>POÄNG</div>
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ---------- SPELARDETALJ ---------- */
function PlayerSheet({ data, playerId, onClose, onOpenMatch, zIndex, dimBackdrop }) {
  const p = data.players.find(x => x.id === playerId);
  const st = data.standings.find(x => x.id === playerId);
  const isPre = data.state === "pre";
  const [tab, setTab] = React.useState("tips");
  if (!p) return null;
  const matches = data.matches;
  const prize = st && st.rank <= 3 ? window.VM.PRIZES[st.rank - 1] : 0;
  const bonusRows = [
    ["Turneringsvinnare", "winner", "team"], ["Silver", "silver", "team"], ["Brons", "bronze", "team"],
    ["Skyttekung", "topscorer", "player"], ["Bästa spelare", "bestplayer", "player"],
    ["Bästa unga", "youngplayer", "player"], ["Bästa målvakt", "keeper", "player"]
  ];
  const header = (
    <div style={{ background: "var(--grad)", padding: "14px 18px 16px", position: "relative", flex: "0 0 auto" }}>
      <button onClick={onClose} aria-label="Stäng" style={{ position: "absolute", top: 14, right: 16, color: "#fff", fontSize: 24, fontWeight: 700 }}>×</button>
      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
        <Avatar p={p} size={60} rank={isPre ? null : st.rank} />
        <div style={{ flex: 1 }}>
          <div className="display" style={{ fontSize: 26, color: "#fff", fontWeight: "var(--display-weight)" }}>{p.name}</div>
          <div style={{ display: "flex", gap: 7, marginTop: 7, flexWrap: "wrap" }}>
            <Chip bg="rgba(255,255,255,.2)" color="#fff">{isPre ? "0" : st.total} poäng</Chip>
            {!isPre && <Chip bg="rgba(255,255,255,.2)" color="#fff">Plats {st.rank} av 9</Chip>}
            {prize > 0 && <Chip bg="var(--gold)" color="var(--deep)">{money(prize)}</Chip>}
          </div>
        </div>
      </div>
      {!isPre && (
        <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
          {[["Exakt", p.exact, "5p"], ["Rätt utgång", p.correct, "2p"], ["Övrigt", p.other, "1p"]].map((x, i) => (
            <div key={i} style={{ flex: 1, background: "rgba(255,255,255,.14)", borderRadius: 11, padding: "9px 6px", textAlign: "center" }}>
              <div className="num display" style={{ fontSize: 22, color: "#fff", fontWeight: "var(--display-weight)" }}>{x[1]}</div>
              <div style={{ fontSize: 10, fontWeight: 700, color: "rgba(255,255,255,.85)" }}>{x[0]} · {x[2]}</div>
            </div>
          ))}
        </div>
      )}
      <div style={{ display: "flex", gap: 6, marginTop: 14 }}>
        {[["tips", "Matchtips"], ["bonus", "Bonusval"]].map(t => (
          <button key={t[0]} onClick={() => setTab(t[0])} style={{ flex: 1, padding: "9px 0", borderRadius: 9, fontWeight: 800, fontSize: 13.5,
            background: tab === t[0] ? "#fff" : "rgba(255,255,255,.16)", color: tab === t[0] ? "var(--deep)" : "#fff" }}>{t[1]}</button>
        ))}
      </div>
    </div>
  );
  return (
    <Sheet onClose={onClose} header={header} zIndex={zIndex} dimBackdrop={dimBackdrop}>
      <div style={{ padding: "14px 14px 30px" }}>
        {tab === "tips" ? (
          <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
            {matches.map(m => {
              const tip = p.tips[m.id]; const played = m.status === "played";
              let pts = null, col = "var(--ink-soft)";
              if (played && tip) {
                if (tip[0] === m.ga && tip[1] === m.gb) { pts = 5; col = "var(--gold)"; }
                else { const o1 = tip[0] > tip[1] ? "H" : tip[0] < tip[1] ? "B" : "X"; const o2 = m.ga > m.gb ? "H" : m.ga < m.gb ? "B" : "X";
                  if (o1 === o2) { pts = 2; col = "var(--warm)"; } else { pts = 1; } }
              }
              return (
                <button key={m.id} onClick={() => onOpenMatch && onOpenMatch(m)} style={{ width: "100%", display: "grid",
                  gridTemplateColumns: "1fr auto 1fr 28px", alignItems: "center", gap: 8, background: "var(--paper)",
                  borderRadius: 11, padding: "9px 12px", border: "1px solid var(--line)", boxShadow: "var(--shadow)" }}>
                  <span style={{ display: "flex", alignItems: "center", gap: 7, justifyContent: "flex-end", minWidth: 0 }}>
                    <TeamName code={m.home} size={12.5} /><Flag code={m.home} size={20} /></span>
                  <span style={{ textAlign: "center", minWidth: 60 }}>
                    <span className="num" style={{ fontWeight: 800, fontSize: 14 }}>
                      <span style={{ color: "var(--cool)" }}>{tip ? tip[0] : "–"}</span>
                      <span style={{ opacity: .4, margin: "0 3px" }}>–</span>
                      <span style={{ color: "var(--cool)" }}>{tip ? tip[1] : "–"}</span></span>
                    <div className="num" style={{ fontSize: 10, color: "var(--ink-soft)", fontWeight: 700 }}>{played ? "blev " + m.ga + "–" + m.gb : svTime(m.kickoff)}</div>
                  </span>
                  <span style={{ display: "flex", alignItems: "center", gap: 7, minWidth: 0 }}>
                    <Flag code={m.away} size={20} /><TeamName code={m.away} size={12.5} /></span>
                  <span className="num display" style={{ fontSize: 17, color: col, textAlign: "right", fontWeight: "var(--display-weight)" }}>{pts != null ? pts : "·"}</span>
                </button>
              );
            })}
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {bonusRows.map(([label, key, kind]) => {
              const val = p.bonus[key];
              return (
                <div key={key} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10,
                  background: "var(--paper)", borderRadius: 12, padding: "11px 14px", border: "1px solid var(--line)", boxShadow: "var(--shadow)" }}>
                  <span style={{ fontWeight: 700, fontSize: 13, color: "var(--ink-soft)" }}>{label}</span>
                  {kind === "team" ? <TeamLabel code={val} size={22} /> :
                    <span style={{ display: "flex", alignItems: "center", gap: 9 }}>
                      <StarPhoto name={val[0]} countryCode={val[1]} size={28} />
                      <span style={{ fontWeight: 800, fontSize: 13.5 }}>{val[0]}</span>
                    </span>}
                </div>
              );
            })}
            <div style={{ textAlign: "center", color: "var(--ink-soft)", fontSize: 12, fontWeight: 600, marginTop: 6 }}>
              Bonuspoäng (3–10p) räknas in när turneringen avgörs.</div>
          </div>
        )}
      </div>
    </Sheet>
  );
}

Object.assign(window, { StandingsView, PlayerSheet, money });

  </script>

  <script type="text/babel">
/* ============================================================
   groups.jsx - Grupper A–L med live-tabeller
   ============================================================ */

function GroupBadge({ letter, size = 46 }) {
  return (
    <span style={{ width: size, height: size, borderRadius: 13, flex: "0 0 auto", display: "flex",
      alignItems: "center", justifyContent: "center", background: groupColor(letter),
      boxShadow: "inset 0 -2px 6px rgba(0,0,0,.15)" }}>
      <span className="display" style={{ fontSize: size * 0.56, color: "#15101F", fontWeight: "var(--display-weight)" }}>{letter}</span>
    </span>
  );
}

function GroupCard({ letter, table, isPre, onTeam, onOpenMatch, matches, index }) {
  const col = groupColor(letter);
  const [open, setOpen] = React.useState(false);
  const [tipsOpen, setTipsOpen] = React.useState(false);
  const groupRanking = React.useMemo(() => {
    const pts = {};
    (matches || []).forEach(m => {
      if (m.status !== "played") return;
      (m.tips || []).forEach(t => {
        pts[t.name] = (pts[t.name] || 0) + (t.points || 0);
      });
    });
    return Object.entries(pts).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
  }, [matches]);
  const playedCount = (matches || []).filter(m => m.status === "played").length;
  const totalCount = (matches || []).length;
  const liveMatches = (matches || []).filter(m => m.status === "live");
  const liveTeams = new Set();
  liveMatches.forEach(m => { if(m.home) liveTeams.add(m.home); if(m.away) liveTeams.add(m.away); });
  return (
    <div style={{ background: "var(--paper)", borderRadius: "var(--r-md)", overflow: "hidden",
      border: "1px solid var(--line)", boxShadow: "var(--shadow)" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px",
        borderBottom: "1px solid var(--line)" }}>
        <GroupBadge letter={letter} size={42} />
        <div className="display" style={{ fontSize: 21, color: "var(--ink)", fontWeight: "var(--display-weight)" }}>Grupp {letter}</div>
        {liveMatches.length > 0 && (
          <span style={{ marginLeft: "auto", display: "inline-flex", alignItems: "center", gap: 5,
            padding: "3px 9px", background: "var(--hot)", color: "#fff", borderRadius: 6,
            fontWeight: 800, fontSize: 10.5 }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#fff", animation: "blink 1.4s infinite" }} />
            LIVE
          </span>
        )}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "18px 1fr 24px 24px 24px 42px 28px", gap: 4,
        padding: "7px 14px", fontSize: 10, fontWeight: 800, color: "var(--ink-soft)", letterSpacing: ".03em",
        borderBottom: "1px solid var(--line)" }}>
        <span></span><span>LAG</span>
        <span style={{ textAlign: "center" }}>S</span><span style={{ textAlign: "center" }}>V</span>
        <span style={{ textAlign: "center" }}>F</span><span style={{ textAlign: "center" }}>MÅL</span>
        <span style={{ textAlign: "center" }}>P</span>
      </div>
      {table.map((r, i) => {
        const q = i < 2, third = i === 2;
        const playing = liveTeams.has(r.code);
        return (
          <button key={r.code} onClick={() => onTeam(r.code)} style={{ width: "100%", textAlign: "left", display: "grid",
            gridTemplateColumns: "18px 1fr 24px 24px 24px 42px 28px", gap: 4, alignItems: "center", padding: "9px 14px",
            borderBottom: i < 3 ? "1px solid var(--line)" : "none",
            borderLeft: q ? `3px solid ${col}` : third ? "3px solid var(--gold)" : "3px solid transparent",
            background: playing ? "color-mix(in oklab, var(--hot) 14%, transparent)" : "transparent" }}>
            <span className="num" style={{ fontSize: 13, fontWeight: 800, color: q ? col : third ? "var(--gold)" : "var(--ink-soft)", textAlign: "center" }}>{isPre ? "·" : r.pos}</span>
            <span style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 0 }}>
              <Flag code={r.code} size={21} /><TeamName code={r.code} size={13} />
              {playing && <span style={{ width: 6, height: 6, borderRadius: "50%", background: "var(--hot)", animation: "blink 1.4s infinite", flex: "0 0 auto" }} />}
            </span>
            <span className="num" style={{ textAlign: "center", fontSize: 12.5, color: "var(--ink-soft)" }}>{r.sp}</span>
            <span className="num" style={{ textAlign: "center", fontSize: 12.5, color: "var(--ink-soft)" }}>{r.v}</span>
            <span className="num" style={{ textAlign: "center", fontSize: 12.5, color: "var(--ink-soft)" }}>{r.f}</span>
            <span className="num" style={{ textAlign: "center", fontSize: 12, color: "var(--ink-soft)", fontWeight: 600 }}>{r.gm}-{r.im}</span>
            <span className="num display" style={{ textAlign: "center", fontSize: 16, color: "var(--ink)", fontWeight: "var(--display-weight)" }}>{r.p}</span>
          </button>
        );
      })}

      {/* Gruppens matcher - kollapsbara */}
      {(matches || []).length > 0 && (
        <div style={{ borderTop: "1px solid var(--line)" }}>
          <button onClick={() => setOpen(o => !o)} style={{ width: "100%", display: "flex",
            justifyContent: "space-between", alignItems: "center", padding: "10px 14px", textAlign: "left",
            background: "var(--bg2)" }}>
            <span style={{ fontSize: 10.5, fontWeight: 800, letterSpacing: ".08em",
              color: "var(--ink-soft)", textTransform: "uppercase" }}>
              {open ? "Dölj matcher" : `Visa matcher (${matches.length})`}
            </span>
            <span style={{ fontSize: 12, color: "var(--ink-soft)",
              transition: "transform .25s", transform: open ? "rotate(180deg)" : "rotate(0deg)",
              display: "inline-block" }}>▾</span>
          </button>
          <div style={{
            overflow:"hidden",
            maxHeight: open ? "600px" : "0",
            opacity: open ? 1 : 0,
            transition: "max-height .38s cubic-bezier(.4,0,.2,1), opacity .22s ease"
          }}>
            {matches.slice().sort((a,b) => a.kickoff - b.kickoff).map((m, i) => {
              const played = m.status === "played";
              const live = m.status === "live";
              return (
                <button key={m.id} onClick={() => onOpenMatch && onOpenMatch(m)} style={{ width: "100%",
                  textAlign: "left", display: "grid", gridTemplateColumns: "1fr auto 1fr", gap: 8,
                  alignItems: "center", padding: "8px 14px", borderTop: "1px solid var(--line)",
                  background: live ? "color-mix(in oklab, var(--hot) 10%, transparent)" : "transparent" }}>
                  <span style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end", fontSize: 11.5, fontWeight: 700 }}>
                    <TeamName code={m.home} size={11.5} bold={false} abbrev /><Flag code={m.home} size={16} />
                  </span>
                  <span style={{ textAlign: "center", minWidth: 56 }}>
                    {(played || live) ? (
                      <span className="num" style={{ fontWeight: 800, fontSize: 13, color: live ? "var(--hot)" : "var(--ink)" }}>
                        {m.ga}–{m.gb}
                      </span>
                    ) : (
                      <span className="num" style={{ fontWeight: 700, fontSize: 11.5, color: "var(--ink-soft)" }}>{svTime(m.kickoff)}</span>
                    )}
                    <div style={{ marginTop: 2, fontSize: 9, fontWeight: 800, color: "var(--ink-soft)" }}>
                      {live ? <LiveDot minute={m.minute} small /> : played ? "SLUT" : svDayLabel(m.kickoff)}
                    </div>
                  </span>
                  <span style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11.5, fontWeight: 700 }}>
                    <Flag code={m.away} size={16} /><TeamName code={m.away} size={11.5} bold={false} abbrev />
                  </span>
                </button>
              );
            })}
          </div>
        </div>
      )}

      {(
        <div style={{ borderTop: "1px solid var(--line)" }}>
          <button onClick={() => setTipsOpen(o => !o)}
            style={{ width: "100%", display: "flex", justifyContent: "space-between", alignItems: "center",
              padding: "10px 14px", textAlign: "left", background: "var(--bg2)" }}>
            <span style={{ display: "flex", alignItems: "center", gap: 7 }}>
              <span style={{ fontSize: 11, lineHeight: 1, display: "flex", alignItems: "center" }}>🏆</span>
              <span style={{ fontSize: 10.5, fontWeight: 800, letterSpacing: ".08em",
                color: "var(--ink-soft)", textTransform: "uppercase" }}>Tippningstoppen</span>
              <span style={{ fontSize: 10, fontWeight: 700, color: "var(--ink-soft)", opacity: .6 }}>
                {playedCount}/{totalCount} m
              </span>
            </span>
            <span style={{ fontSize: 12, color: "var(--ink-soft)", transition: "transform .25s",
              transform: tipsOpen ? "rotate(180deg)" : "rotate(0deg)", display: "inline-block" }}>▾</span>
          </button>
          <div style={{ overflow: "hidden", maxHeight: tipsOpen ? "600px" : 0,
            opacity: tipsOpen ? 1 : 0, transition: "max-height .38s cubic-bezier(.4,0,.2,1), opacity .22s ease" }}>
            {groupRanking.length === 0
              ? <div style={{ padding: "16px 14px", textAlign: "center", fontSize: 12, fontWeight: 600, color: "var(--ink-soft)" }}>
                  Inga matcher spelade ännu
                </div>
              : groupRanking.map(([name, pts], i) => {
                  const MEDAL = ["#F5C518", "#9BA3A5", "#CD7F32"];
                  const mc = MEDAL[i] || null;
                  return (
                    <div key={name} style={{ display: "flex", alignItems: "center", gap: 10,
                      padding: "8px 14px", borderTop: i > 0 ? "1px solid var(--line)" : "none",
                      background: mc ? `color-mix(in oklab, ${mc} 9%, transparent)` : "transparent" }}>
                      <span className="num display" style={{ fontSize: 15, fontWeight: 900, width: 20,
                        textAlign: "center", color: mc || "var(--ink-soft)", flex: "0 0 auto" }}>{i + 1}</span>
                      <span style={{ flex: 1, fontSize: 13, fontWeight: 700, color: "var(--ink)" }}>{name}</span>
                      <span className="num" style={{ fontSize: 13.5, fontWeight: 800,
                        color: mc || "var(--ink-soft)" }}>{pts}<span style={{ fontSize: 10, fontWeight: 700, marginLeft: 1 }}>p</span></span>
                    </div>
                  );
                })
            }
          </div>
        </div>
      )}

      <div style={{ padding: "9px 14px", borderTop: "1px solid var(--line)" }}>
        <div style={{ display: "flex", gap: 14, fontSize: 10.5, fontWeight: 700, color: "var(--ink-soft)" }}>
          <span style={{ display: "flex", alignItems: "center", gap: 5 }}><span style={{ width: 8, height: 8, borderRadius: 2, background: col }} />Vidare till R32</span>
          <span style={{ display: "flex", alignItems: "center", gap: 5 }}><span style={{ width: 8, height: 8, borderRadius: 2, background: "var(--gold)" }} />Bästa trea</span>
        </div>
      </div>
    </div>

  );
}

function GroupsView({ data, onTeam, onOpenMatch }) {
  const isPre = data.state === "pre";
  const [active, setActive] = React.useState("alla");
  const letters = data.groupLetters;
  const shown = active === "alla" ? letters : [active];
  const matchesByGroup = React.useMemo(() => {
    const map = {};
    (data.matches || []).forEach(m => {
      if(!m.group) return;
      (map[m.group] = map[m.group] || []).push(m);
    });
    return map;
  }, [data]);

  const liveCount = (data.allMatches || []).filter(m => m.status === "live" && m.stage === "group").length;
  return (
    <div style={{ animation: "riseIn .4s forwards" }}>
      <SectionTitle kicker="Gruppspel" title="Tabeller"
        right={liveCount > 0
          ? <Chip bg="var(--hot)" color="#fff">{liveCount} live nu</Chip>
          : <Chip>{isPre ? "Före avspark" : "Spelas nu"}</Chip>} />
      <div className="app-scroll" style={{ display: "flex", gap: 7, overflowX: "auto", paddingBottom: 10, marginBottom: 14 }}>
        <button onClick={() => setActive("alla")} style={{ flex: "0 0 auto", padding: "8px 16px", borderRadius: 10, fontWeight: 800, fontSize: 13,
          background: active === "alla" ? "var(--ink)" : "var(--paper)", color: active === "alla" ? "var(--bg)" : "var(--ink)", border: "1px solid var(--line)" }}>Alla</button>
        {letters.map(L => {
          const hasLive = (matchesByGroup[L] || []).some(m => m.status === "live");
          return (
            <button key={L} onClick={() => setActive(L)} style={{ flex: "0 0 auto", width: 38, height: 37, borderRadius: 10, fontWeight: 800,
              fontFamily: "var(--font-display)", fontSize: 16, border: "1px solid var(--line)", position: "relative",
              background: active === L ? groupColor(L) : "var(--paper)", color: active === L ? "#15101F" : groupColor(L) }}>
              {L}
              {hasLive && <span style={{ position: "absolute", top: 4, right: 4, width: 6, height: 6,
                borderRadius: "50%", background: "var(--hot)", animation: "blink 1.4s infinite" }} />}
            </button>
          );
        })}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 14 }}>
        {shown.map((L, i) => <GroupCard key={L} letter={L} table={data.groupTables[L]} isPre={isPre}
          onTeam={onTeam} onOpenMatch={onOpenMatch} matches={matchesByGroup[L]} index={i} />)}
      </div>
    </div>
  );
}

Object.assign(window, { GroupsView, GroupBadge });

function BracketCell({ m, champion, onOpen }) {
  // code = riktig lagkod (efter lottning), label = slot-label (Vinnare A), proj = projicerat lag just nu
  const row = (code, isWinner, label, proj) => {
    const projName = proj && window.VM.TEAMS[proj] ? window.VM.TEAMS[proj].name : null;
    return (
      <div style={{ display: "flex", alignItems: "center", gap: 7, padding: "5px 8px",
        background: isWinner ? "color-mix(in oklab, var(--gold) 18%, transparent)" : "transparent",
        borderRadius: 6 }}>
        {code ? <Flag code={code} size={17} />
          : proj ? <Flag code={proj} size={17} />
          : <span style={{ width: 17, height: 17, borderRadius: "50%", background: "var(--bg2)", flex: "0 0 auto" }} />}
        <span style={{ flex: 1, minWidth: 0, display: "flex", flexDirection: "column", lineHeight: 1.15 }}>
          <span style={{ fontSize: 11.5, fontWeight: isWinner ? 800 : 700,
            color: code ? "var(--ink)" : "var(--ink-soft)",
            overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
            {code ? window.VM.TEAMS[code].name : (label || "Vinnare")}
          </span>
          {!code && projName && (
            <span style={{ fontSize: 9.5, fontWeight: 700, color: "var(--ink)", opacity: .85,
              overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginTop: 1 }}>
              just nu: {projName}
            </span>
          )}
        </span>
        <span className="num" style={{ fontSize: 12, fontWeight: 800, color: isWinner ? "var(--ink)" : "var(--ink-soft)", minWidth: 9, textAlign: "right" }}>
          {m.status === "played" && code ? (code === m.home ? m.ga : m.gb) : ""}
        </span>
      </div>
    );
  };
  const live = m.status === "live";
  return (
    <button onClick={() => onOpen && onOpen(m)} style={{ width: 178, background: "var(--paper)", borderRadius: 10, padding: 4,
      border: "1px solid var(--line)", boxShadow: champion ? "0 0 0 2px var(--gold), var(--shadow)" : live ? "0 0 0 1.5px var(--hot)" : "var(--shadow)", textAlign: "left" }}>
      {m.fifa && (
        <div style={{ display: "flex", justifyContent: "space-between",
          padding: "2px 8px 0", fontSize: 9, fontWeight: 800, letterSpacing: ".06em", color: "var(--ink-soft)" }}>
          <span>M{m.fifa}</span>
          {m.status === "played" ? <span>SLUT</span> : m.status === "live" ? <span style={{ color: "var(--hot)" }}>LIVE</span> : <span>{svTime(m.kickoff)}</span>}
        </div>
      )}
      {row(m.home, m.winner && m.winner === m.home, m.fromA, m.projHome)}
      <div style={{ height: 1, background: "var(--line)", margin: "1px 6px" }} />
      {row(m.away, m.winner && m.winner === m.away, m.fromB, m.projAway)}
      {live ? <div style={{ textAlign: "center", padding: "3px 0 1px" }}><LiveDot minute={m.minute} small /></div> : null}
    </button>
  );
}

function BracketNode({ roundsArr, ri, mi, onOpen }) {
  const m = roundsArr[ri][mi];
  if (ri === 0) return <div className="bleaf"><div className="bcell"><BracketCell m={m} onOpen={onOpen} /></div></div>;
  return (
    <div className="bnode">
      <div className="bfeeders">
        <div className="bfeed bfeed-top"><BracketNode roundsArr={roundsArr} ri={ri - 1} mi={mi * 2} onOpen={onOpen} /></div>
        <div className="bfeed bfeed-bot"><BracketNode roundsArr={roundsArr} ri={ri - 1} mi={mi * 2 + 1} onOpen={onOpen} /></div>
      </div>
      <div className="bcell"><BracketCell m={m} champion={ri === roundsArr.length - 1 && !!m.winner} onOpen={onOpen} /></div>
    </div>
  );
}

function Bracket({ data, onOpen }) {
  const ko = data.knockout;
  const roundsArr = [ko.r32, ko.r16, ko.qf, ko.sf, ko.final];
  const labels = ["Åttondelar", "Sextondelar", "Kvarts", "Semi", "Final"];
  return (
    <div>
      <style>{BRACKET_CSS}</style>
      <div className="app-scroll" style={{ overflowX: "auto", paddingBottom: 12 }}>
        <div style={{ minWidth: 880 }}>
          <div style={{ display: "flex", marginBottom: 10 }}>
            {labels.map((l, i) => (
              <div key={l} style={{ flex: i === 0 ? "0 0 158px" : "1", textAlign: i === 0 ? "left" : "center",
                fontSize: 10.5, fontWeight: 800, letterSpacing: ".1em", color: "var(--hot)", textTransform: "uppercase" }}>{l}</div>
            ))}
          </div>
          <BracketNode roundsArr={roundsArr} ri={4} mi={0} onOpen={onOpen} />
        </div>
      </div>
      <div style={{ marginTop: 18, background: "var(--paper)", border: "1px solid " + "color-mix(in oklab, var(--gold) 40%, var(--line))",
        borderRadius: 14, padding: 14, boxShadow: "var(--shadow)", maxWidth: 340 }}>
        <div style={{ fontSize: 10.5, fontWeight: 800, letterSpacing: ".1em", color: "color-mix(in oklab, var(--gold) 70%, #000 12%)", marginBottom: 9 }}>BRONSMATCH</div>
        <BracketCell m={ko.third[0]} onOpen={onOpen} />
      </div>
    </div>
  );
}

function ScheduleView({ data, onOpenMatch }) {
  const isPre = data.state === "pre";
  const [mode, setMode] = React.useState("matcher");
  const [filter, setFilter] = React.useState("alla");

  const filtered = data.allMatches.filter(m => {
    if (filter === "live") return m.status === "live";
    if (filter === "kommande") return m.status === "upcoming";
    if (filter === "spelade") return m.status === "played";
    return true;
  });
  const days = []; const byDay = {};
  filtered.forEach(m => { const k = svDateKey(m.kickoff); if (!byDay[k]) { byDay[k] = []; days.push(k); } byDay[k].push(m); });

  const liveCount = data.allMatches.filter(m => m.status === "live").length;
  const filters = [["alla", "Alla", data.allMatches.length], ["live", "Live", liveCount],
    ["kommande", "Kommande", data.allMatches.filter(m => m.status === "upcoming").length],
    ["spelade", "Spelade", data.allMatches.filter(m => m.status === "played").length]];

  return (
    <div style={{ animation: "riseIn .4s forwards" }}>
      <SectionTitle kicker="104 matcher" title="Spelschema" right={<Chip>{isPre ? "11 jun – 19 jul" : "Pågår"}</Chip>} />

      <div style={{ display: "flex", gap: 4, marginBottom: 16, background: "var(--bg2)", padding: 3, borderRadius: 11 }}>
        {[["matcher", "Alla matcher"], ["slutspel", "Slutspelsträd"]].map(t => (
          <button key={t[0]} onClick={() => setMode(t[0])} style={{ flex: 1, padding: "9px 0", borderRadius: 8, fontWeight: 800, fontSize: 13.5,
            background: mode === t[0] ? "var(--paper)" : "transparent", color: mode === t[0] ? "var(--ink)" : "var(--ink-soft)",
            boxShadow: mode === t[0] ? "var(--shadow)" : "none" }}>{t[1]}</button>
        ))}
      </div>

      {mode === "slutspel" ? (
        <>
          {isPre && (
            <div style={{ marginBottom: 12, padding: "11px 14px", background: "var(--paper)",
              border: "1px solid var(--line)", borderRadius: 12, boxShadow: "var(--shadow)",
              display: "flex", gap: 11, alignItems: "center" }}>
              <span style={{ width: 26, height: 26, borderRadius: 7, background: "var(--cool)", flex: "0 0 auto",
                display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 800, fontSize: 13 }}>i</span>
              <span style={{ fontSize: 12.5, color: "var(--ink-soft)", fontWeight: 600, lineHeight: 1.4 }}>
                Slutspelsträdet visar projicerade matcher (Vinnare A, Tvåa B, Bästa 3:a osv) utifrån
                hur grupperna står just nu. Slutgiltig lottning sker efter gruppspelet.
              </span>
            </div>
          )}
          <Bracket data={data} onOpen={onOpenMatch} />
        </>
      ) : (
        <>
          <div className="app-scroll" style={{ display: "flex", gap: 7, overflowX: "auto", paddingBottom: 8, marginBottom: 8 }}>
            {filters.map(f => (
              <button key={f[0]} onClick={() => setFilter(f[0])} style={{ flex: "0 0 auto", display: "flex", alignItems: "center", gap: 6,
                padding: "8px 14px", borderRadius: 9, fontWeight: 800, fontSize: 13, border: "1px solid var(--line)",
                background: filter === f[0] ? "var(--ink)" : "var(--paper)", color: filter === f[0] ? "var(--bg)" : "var(--ink)" }}>
                {f[0] === "live" && f[2] > 0 ? <span style={{ width: 6, height: 6, borderRadius: "50%", background: "var(--hot)" }} /> : null}
                {f[1]} <span className="num" style={{ opacity: .5, fontWeight: 700 }}>{f[2]}</span>
              </button>
            ))}
          </div>

          {days.length === 0 ? (
            <div style={{ textAlign: "center", color: "var(--ink-soft)", padding: 40, fontWeight: 600 }}>Inga matcher här just nu.</div>
          ) : days.map(k => {
            const list = byDay[k];
            const today = svDateKey(data.now) === k;
            return (
              <div key={k} style={{ marginBottom: 20 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, margin: "4px 2px 11px" }}>
                  <span className="display" style={{ fontSize: 16, color: "var(--ink)", fontWeight: "var(--display-weight)" }}>{svDayLabel(list[0].kickoff)}</span>
                  {today ? <Chip bg="var(--hot)" color="#fff">IDAG</Chip> : null}
                  <span style={{ flex: 1, height: 1, background: "var(--line)" }} />
                  <span className="num" style={{ fontSize: 12, fontWeight: 700, color: "var(--ink-soft)" }}>{list.length} matcher</span>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px,1fr))", gap: 9 }}>
                  {list.map(m => <MatchCard key={m.id} m={m} onOpen={onOpenMatch} showRound />)}
                </div>
              </div>
            );
          })}
        </>
      )}
    </div>
  );
}

Object.assign(window, { ScheduleView, Bracket });

  </script>
