  <script type="text/babel">
/* ============================================================
   bonus.jsx - Bonus-tips + Info (regler & poäng)
   ============================================================ */

const BONUS_DEFS = [
  { key: "winner",      label: "Turneringsvinnare", pts: 10, kind: "team" },
  { key: "silver",      label: "Silver",            pts: 5,  kind: "team" },
  { key: "bronze",      label: "Brons",             pts: 3,  kind: "team" },
  { key: "topscorer",   label: "Bästa målskytt",    pts: 3,  kind: "player" },
  { key: "bestplayer",  label: "Bästa spelare",     pts: 3,  kind: "player" },
  { key: "youngplayer", label: "Bästa unga spelare",pts: 3,  kind: "player" },
  { key: "keeper",      label: "Bästa målvakt",     pts: 3,  kind: "player" }
];

function valKey(v) { return Array.isArray(v) ? v[0] : v; }

function BonusCard({ def, players, onTeam }) {
  const tally = {};
  players.forEach(p => { const v = p.bonus[def.key]; const k = valKey(v); if (!tally[k]) tally[k] = { v, who: [] }; tally[k].who.push(p); });
  const sorted = Object.values(tally).sort((a, b) => b.who.length - a.who.length);
  const fav = sorted[0];
  return (
    <div style={{ background: "var(--paper)", borderRadius: "var(--r-md)", border: "1px solid var(--line)", boxShadow: "var(--shadow)", overflow: "hidden" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 14px", borderBottom: "1px solid var(--line)" }}>
        <div className="display" style={{ fontSize: 17, color: "var(--ink)", fontWeight: "var(--display-weight)" }}>{def.label}</div>
        <Chip bg="color-mix(in oklab, var(--gold) 18%, var(--bg2))" color="color-mix(in oklab, var(--gold) 70%, #000 22%)">{def.pts}p</Chip>
      </div>
      <div style={{ padding: "13px 14px", display: "flex", alignItems: "center", gap: 11, borderBottom: "1px solid var(--line)" }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: ".08em", color: "var(--ink-soft)", marginBottom: 6 }}>FLEST TROR PÅ</div>
          {def.kind === "team"
            ? <button onClick={() => onTeam(fav.v)} style={{ display: "flex", alignItems: "center", gap: 9 }}>
                <Flag code={fav.v} size={28} /><span style={{ fontWeight: 800, fontSize: 16 }}>{window.VM.TEAMS[fav.v].name}</span></button>
            : <span style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <StarPhoto name={fav.v[0]} countryCode={fav.v[1]} size={34} />
                <span style={{ fontWeight: 800, fontSize: 15 }}>{fav.v[0]}</span>
              </span>}
        </div>
        <div style={{ textAlign: "center" }}>
          <div className="num display" style={{ fontSize: 24, color: "var(--hot)", fontWeight: "var(--display-weight)" }}>{fav.who.length}</div>
          <div className="num" style={{ fontSize: 10, fontWeight: 700, color: "var(--ink-soft)" }}>av {players.length}</div>
        </div>
      </div>
      <div style={{ padding: "11px 14px", display: "flex", flexDirection: "column", gap: 9 }}>
        {sorted.map((r, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, width: 158, flex: "0 0 auto" }}>
              {def.kind === "team"
                ? <Flag code={r.v} size={20} />
                : <StarPhoto name={r.v[0]} countryCode={r.v[1]} size={24} />}
              <span style={{ fontSize: 12.5, fontWeight: 700, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                {def.kind === "team" ? (window.VM.TEAMS[r.v] && window.VM.TEAMS[r.v].name) : r.v[0]}</span>
            </div>
            <div style={{ display: "flex", gap: -4, flex: 1 }}>
              {r.who.map((p, j) => <span key={p.id} title={p.name} style={{ marginLeft: j === 0 ? 0 : -6 }}><Avatar p={p} size={24} /></span>)}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function BonusView({ data, onTeam }) {
  return (
    <div style={{ animation: "riseIn .4s forwards" }}>
      <SectionTitle kicker="Extrapoäng" title="Bonus-tips" right={<Chip>3–10p</Chip>} />
      <div style={{ background: "var(--paper)", border: "1px solid var(--line)", borderRadius: 13, padding: "13px 15px", marginBottom: 16,
        fontSize: 13.5, fontWeight: 600, color: "var(--ink-soft)", boxShadow: "var(--shadow)", lineHeight: 1.45 }}>
        Allas bonusval lades före avspark. Poängen räknas in när turneringen avgörs - och kan vända hela ligan på upploppet.
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px,1fr))", gap: 14 }}>
        {BONUS_DEFS.map(def => <BonusCard key={def.key} def={def} players={data.players} onTeam={onTeam} />)}
      </div>
    </div>
  );
}

/* ---------- INFO ---------- */
function InfoView({ data }) {
  const playerCount = (data && data.standings && data.standings.length) || 9;
  const perPlayer = (data && data.pot && data.pot.perPlayer) || 300;
  const pot = playerCount * perPlayer;
  const tiers = [
    ["1:a", money(Math.round(pot * 0.5)), "var(--gold)"],
    ["2:a", money(Math.round(pot * 0.3)), "#D6DAE0"],
    ["3:a", money(Math.round(pot * 0.2)), "#E0A983"]
  ];
  const RuleRow = ({ pts, title, desc, color }) => (
    <div style={{ display: "flex", alignItems: "center", gap: 14, background: "var(--paper)", borderRadius: 13, padding: "13px 15px",
      border: "1px solid var(--line)", boxShadow: "var(--shadow)" }}>
      <div style={{ width: 50, height: 50, borderRadius: 12, flex: "0 0 auto", display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center", background: color, color: "#fff" }}>
        <span className="num display" style={{ fontSize: 23, lineHeight: 1, fontWeight: "var(--display-weight)" }}>{pts}</span>
        <span style={{ fontSize: 8.5, fontWeight: 800, letterSpacing: ".06em" }}>POÄNG</span>
      </div>
      <div><div style={{ fontWeight: 800, fontSize: 15 }}>{title}</div>
        <div style={{ fontSize: 13, color: "var(--ink-soft)", fontWeight: 600, marginTop: 2 }}>{desc}</div></div>
    </div>
  );
  return (
    <div style={{ animation: "riseIn .4s forwards", display: "flex", flexDirection: "column", gap: 22 }}>
      <SectionTitle kicker="Spelregler" title="Så funkar det" />

      <div style={{ position: "relative", overflow: "hidden", borderRadius: "var(--r-lg)", background: "var(--grad)", padding: "18px 18px 20px", boxShadow: "var(--shadow-lift)" }}>
        <div style={{ fontSize: 10.5, fontWeight: 800, letterSpacing: ".14em", color: "rgba(255,255,255,.85)" }}>SAMMANLAGD POTT</div>
        <div className="num display" style={{ fontSize: 36, color: "#fff", marginBottom: 4, fontWeight: "var(--display-weight)" }}>{money(pot)}</div>
        <div style={{ color: "rgba(255,255,255,.9)", fontWeight: 600, fontSize: 13, marginBottom: 14 }}>{playerCount} spelare lägger {perPlayer} kr var. Topp 3 delar potten.</div>
        <div style={{ display: "flex", gap: 8 }}>
          {tiers.map((x, i) => (
            <div key={i} style={{ flex: 1, background: "rgba(255,255,255,.14)", borderRadius: 11, padding: "10px 8px", textAlign: "center" }}>
              <div className="num display" style={{ fontSize: 17, color: x[2], fontWeight: "var(--display-weight)" }}>{x[0]}</div>
              <div className="num" style={{ fontWeight: 800, color: "#fff", fontSize: 14.5, marginTop: 2 }}>{x[1]}</div>
            </div>
          ))}
        </div>
      </div>

      <div>
        <h3 className="display" style={{ fontSize: 20, marginBottom: 11, fontWeight: "var(--display-weight)" }}>Poäng per match</h3>
        <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
          <RuleRow pts={2} title="Rätt utgång" desc="2 poäng om du har gissat rätt vinnare (eller oavgjort)." color="var(--warm)" />
          <RuleRow pts={3} title="Exakt resultat - extra" desc="3 poäng EXTRA om du också gissat rätt slutsiffror. Ex: Brasilien–Frankrike, du tippar 1–2 och det blir 1–2 = 2 + 3 = 5 poäng totalt." color="var(--gold)" />
          <RuleRow pts={1} title="Annars" desc="Fel utgång ger ändå en tröstpoäng per tippad match." color="var(--cool)" />
        </div>
        <div style={{ marginTop: 12, padding: "12px 15px", background: "var(--paper)",
          borderRadius: 13, border: "1px solid var(--line)", fontSize: 12.5, color: "var(--ink-soft)",
          fontWeight: 600, lineHeight: 1.5 }}>
          I slutspelet räknas <b style={{ color: "var(--ink)" }}>resultatet efter förlängning</b> för exakt poäng.
          Straffmål räknas inte med, men <b style={{ color: "var(--ink)" }}>straffvinnaren</b> räknas som rätt utgång.
        </div>
      </div>

      <div>
        <h3 className="display" style={{ fontSize: 20, marginBottom: 11, fontWeight: "var(--display-weight)" }}>Bonuspoäng (3–10p)</h3>
        <div style={{ background: "var(--paper)", borderRadius: 13, border: "1px solid var(--line)", boxShadow: "var(--shadow)", overflow: "hidden" }}>
          {BONUS_DEFS.map((b, i) => (
            <div key={b.key} style={{ display: "flex", alignItems: "center", gap: 11, padding: "11px 15px",
              borderBottom: i < BONUS_DEFS.length - 1 ? "1px solid var(--line)" : "none" }}>
              <span style={{ flex: 1, fontWeight: 700, fontSize: 14 }}>{b.label}</span>
              <Chip>{b.pts}p</Chip>
            </div>
          ))}
        </div>
      </div>

      <div>
        <h3 className="display" style={{ fontSize: 20, marginBottom: 11, fontWeight: "var(--display-weight)" }}>Turneringsformat</h3>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 9 }}>
          {[["48", "lag"], ["12", "grupper (A–L)"], ["104", "matcher"], ["32", "lag till slutspel"]].map((x, i) => (
            <div key={i} style={{ background: "var(--paper)", borderRadius: 13, padding: 14, border: "1px solid var(--line)", boxShadow: "var(--shadow)", textAlign: "center" }}>
              <div className="num display" style={{ fontSize: 30, color: "var(--hot)", fontWeight: "var(--display-weight)" }}>{x[0]}</div>
              <div style={{ fontSize: 12.5, fontWeight: 700, color: "var(--ink-soft)" }}>{x[1]}</div>
            </div>
          ))}
        </div>
        <div style={{ marginTop: 10, fontSize: 13, color: "var(--ink-soft)", fontWeight: 600, lineHeight: 1.5, background: "var(--paper)",
          borderRadius: 13, padding: "13px 15px", border: "1px solid var(--line)", boxShadow: "var(--shadow)" }}>
          Topp 2 i varje grupp plus de 8 bästa treorna går vidare. Sedan utslagning hela vägen: åttondelar → sextondelar →
          kvarts → semi → final. Spelas i USA, Mexiko och Kanada, 11 juni–19 juli 2026.
        </div>
      </div>

      <div style={{ textAlign: "center", color: "var(--ink-soft)", fontSize: 12, fontWeight: 600, paddingBottom: 8 }}>
        Resultat hämtas automatiskt och poängen räknas om varje dag under turneringen.
      </div>
    </div>
  );
}

Object.assign(window, { BonusView, InfoView, BONUS_DEFS });

  </script>

  <script type="text/babel">

  cal: (a) => <svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="currentColor" strokeWidth={a ? 2.3 : 1.9} strokeLinecap="round" strokeLinejoin="round"><rect x="3.5" y="5" width="17" height="15.5" rx="2.5" /><path d="M3.5 9.5h17M8 3v4M16 3v4" /></svg>,
  star: (a) => <svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="currentColor" strokeWidth={a ? 2.3 : 1.9} strokeLinecap="round" strokeLinejoin="round"><path d="M12 3.6l2.6 5.25 5.8.85-4.2 4.1 1 5.8L12 16.9l-5.2 2.75 1-5.8-4.2-4.1 5.8-.85Z" /></svg>,
  info: (a) => <svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="currentColor" strokeWidth={a ? 2.3 : 1.9} strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9" /><path d="M12 11v5M12 7.5h.01" /></svg>
};
const NAV = [
  { id: "standings", label: "Ställning", icon: "trophy" },
  { id: "groups", label: "Grupper", icon: "grid" },
  { id: "schedule", label: "Schema", icon: "cal" },
  { id: "bonus", label: "Bonus", icon: "star" },
  { id: "info", label: "Info", icon: "info" }
];

/* ---- lagdetalj ---- */
function TeamStatsBlock({ code, data }){
  const d = window.VM.TEAM_DETAILS[code];
  const rank = window.VM.FIFA_RANKING[code];
  if(!d && !rank) return null;
  // riktig senaste-5 från engine (team_forms.json), bygg V/O/F-rad
  const realForm = (data && data.forms && data.forms[code]) || [];
  const useRealForm = realForm.length > 0;
  return (
    <MiniBlock title="Landslags-statistik">
      {(rank || (d && d.fifaPts)) && (
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline",
          paddingBottom: 12, marginBottom: 12, borderBottom: "1px solid var(--line)" }}>
          <div>
            <div style={{ fontSize: 9.5, fontWeight: 800, color: "var(--ink-soft)", letterSpacing: ".10em", textTransform: "uppercase" }}>FIFA-ranking · {window.VM.FIFA_RANKING_DATE}</div>
            <div className="display" style={{ fontSize: 36, color: "var(--ink)", lineHeight: 1, marginTop: 4 }}>
              #{rank || "-"}
            </div>
          </div>
          {d && d.fifaPts && (
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 9.5, fontWeight: 800, color: "var(--ink-soft)", letterSpacing: ".10em", textTransform: "uppercase" }}>FIFA-poäng</div>
              <div className="num" style={{ fontSize: 22, fontWeight: 800, color: "var(--ink-soft)" }}>{d.fifaPts}</div>
            </div>
          )}
        </div>
      )}
      {d && d.coach && (
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", paddingBottom: 10, marginBottom: 10, borderBottom: "1px solid var(--line)" }}>
          <span style={{ fontSize: 11, fontWeight: 800, color: "var(--ink-soft)", letterSpacing: ".10em", textTransform: "uppercase" }}>Förbundskapten</span>
          <span style={{ fontWeight: 700, fontSize: 14, color: "var(--ink)" }}>{d.coach}</span>
        </div>
      )}
      {d && d.stars && d.stars.length > 0 && (
        <div style={{ paddingBottom: 10, marginBottom: 10, borderBottom: "1px solid var(--line)" }}>
          <div style={{ fontSize: 11, fontWeight: 800, color: "var(--ink-soft)", letterSpacing: ".10em", textTransform: "uppercase", marginBottom: 6 }}>Stjärnspelare</div>
          <ul style={{ margin: 0, paddingLeft: 18, color: "var(--ink)", fontSize: 13, lineHeight: 1.7 }}>
            {d.stars.map((n, i) => <li key={i}>{n}</li>)}
          </ul>
        </div>
      )}
      {useRealForm ? (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <span style={{ fontSize: 11, fontWeight: 800, color: "var(--ink-soft)", letterSpacing: ".10em", textTransform: "uppercase" }}>Senaste {realForm.length} matcher</span>
            <FormPills form={realForm} />
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            {realForm.slice().reverse().map((f, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between",
                fontSize: 11.5, fontWeight: 600, color: "var(--ink-soft)" }}>
                <span style={{ display: "inline-flex", alignItems: "center", gap: 6, minWidth: 0 }}>
                  <span style={{ width: 14, height: 14, borderRadius: 4,
                    background: f.r === "V" ? "#2BD17E" : f.r === "F" ? "#FF5A52" : "#D7B23E",
                    color: "#fff", fontSize: 9, fontWeight: 800,
                    display: "inline-flex", alignItems: "center", justifyContent: "center" }}>{f.r}</span>
                  <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{f.opp || f.vs}</span>
                </span>
                <span className="num" style={{ fontVariantNumeric: "tabular-nums", color: "var(--ink)", fontWeight: 700 }}>
                  {f.gf}–{f.ga}
                </span>
              </div>
            ))}
          </div>
        </div>
      ) : null}
    </MiniBlock>
  );
}

function TeamHistoryBlock({ code }){
  const h = window.VM.WC_HISTORY[code];
  if(!h) return null;
  const items = [];
  if(h.apps != null) items.push(["VM-slutspel", String(h.apps), "var(--ink)"]);
  if(h.titles)    items.push(["Guld", String(h.titles), "var(--gold)"]);
  if(h.runnerUp)  items.push(["Silver", String(h.runnerUp), "#AEB4BE"]);
  if(h.third)     items.push(["Brons", String(h.third), "#C77F49"]);
  if(h.semis)     items.push(["Semifinaler", String(h.semis), "var(--ink)"]);
  return (
    <MiniBlock title="VM-historik">
      <div style={{ display: "grid", gridTemplateColumns: `repeat(${items.length}, 1fr)`, gap: 6, marginBottom: h.best ? 10 : 0 }}>
        {items.map(([lab, val, col], i) => (
          <div key={i} style={{ textAlign: "center", padding: "2px 0" }}>
            <div className="display num" style={{ fontSize: 24, color: col, lineHeight: 1, fontWeight: "var(--display-weight)" }}>{val}</div>
            <div style={{ fontSize: 9, fontWeight: 800, letterSpacing: ".08em", color: "var(--ink-soft)", marginTop: 4, textTransform: "uppercase" }}>{lab}</div>
          </div>
        ))}
      </div>
      {h.best && (
        <div style={{ fontSize: 12, fontWeight: 600, color: "var(--ink-soft)", lineHeight: 1.5,
          borderTop: items.length ? "1px solid var(--line)" : "none", paddingTop: items.length ? 10 : 0 }}>
          {h.best}{h.lastTitle ? ` · Senast 1:a ${h.lastTitle}.` : ""}
        </div>
      )}
    </MiniBlock>
  );
}

function TeamSheet({ data, code, onClose, onOpenMatch, zIndex, dimBackdrop }) {
  const t = window.VM.TEAMS[code];
  if (!t) return null;
  const isPre = data.state === "pre";
  const row = data.groupTables[t.group].find(r => r.code === code);
  const matches = data.allMatches.filter(m => m.home === code || m.away === code);
  const fans = data.players.filter(p => Object.values(p.bonus).some(v => (Array.isArray(v) ? v[1] : v) === code));
  const header = (
    <div style={{ padding: "14px 18px 16px", position: "relative", background: `linear-gradient(135deg, ${t.c1}, color-mix(in oklab, ${t.c2} 80%, #000 12%))` }}>
      <button onClick={onClose} aria-label="Stäng" style={{ position: "absolute", top: 14, right: 16, color: "#fff", fontSize: 24, fontWeight: 700, textShadow: "0 1px 3px rgba(0,0,0,.4)" }}>×</button>
      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
        <Flag code={code} size={50} shape="rect" />
        <div>
          <div className="display" style={{ fontSize: 26, color: "#fff", textShadow: "0 1px 5px rgba(0,0,0,.35)", fontWeight: "var(--display-weight)" }}>{t.name}</div>
          <div style={{ display: "flex", gap: 7, marginTop: 7 }}>
            <Chip bg="rgba(255,255,255,.26)" color="#fff">Grupp {t.group}</Chip>
            {!isPre && row ? <Chip bg="rgba(255,255,255,.26)" color="#fff">{row.pos}:a · {row.p}p</Chip> : null}
            {code.indexOf("PO") === 0 ? <Chip bg="rgba(255,255,255,.26)" color="#fff">Playoff-plats</Chip> : null}
          </div>
        </div>
      </div>
    </div>
  );
  return (
    <Sheet onClose={onClose} header={header} zIndex={zIndex} dimBackdrop={dimBackdrop}>
      <div style={{ padding: "16px 0 28px" }}>
        <TeamStatsBlock code={code} data={data} />
        <TeamHistoryBlock code={code} />
        {fans.length > 0 && (
          <MiniBlock title={`${fans.length} har laget i sina bonustips`}>
            <div style={{ fontSize: 12, color: "var(--ink-soft)", fontWeight: 600, marginBottom: 9, lineHeight: 1.45 }}>
              Spelare i poolen som tror på {window.VM.TEAMS[code] && window.VM.TEAMS[code].name} som vinnare, silver eller brons.
            </div>
            <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
              {fans.map((p, j) => <span key={p.id} title={p.name} style={{ marginLeft: j === 0 ? 0 : -6 }}><Avatar p={p} size={30} /></span>)}
            </div>
          </MiniBlock>
        )}
        <MiniBlock title="Matcher" pad={false}>
          <div style={{ display: "flex", flexDirection: "column" }}>
            {matches.map((m, i) => (
              <div key={m.id} style={{ borderBottom: i < matches.length - 1 ? "1px solid var(--line)" : "none" }}>
                <MatchCard m={m} onOpen={onOpenMatch} showRound />
              </div>
            ))}
          </div>
        </MiniBlock>
      </div>
    </Sheet>
  );
}

function App() {
  const [view, setView] = React.useState("standings");
  const [player, setPlayer] = React.useState(null);
  const [team, setTeam] = React.useState(null);
  const [match, setMatch] = React.useState(null);
  const [tick, setTick] = React.useState(0);

  React.useEffect(() => { applyTheme("sunset", "stadion"); }, []);
  React.useEffect(() => {
    const h = () => setTick(n => n + 1);
    window.addEventListener("vm-data-updated", h);
    return () => window.removeEventListener("vm-data-updated", h);
  }, []);
  const data = React.useMemo(() => window.VM.build(), [tick]);
  React.useEffect(() => { window.scrollTo({ top: 0 }); }, [view]);

  // Modaler kan staplas (team -> match -> team). openOrder håller koll på
  // vilken som är topp. Stäng en modal -> den tas ur stacken och den under
  // blir aktiv igen utan att också stängas.
  const [openOrder, setOpenOrder] = React.useState([]);
  const bringToTop = (kind) =>
    setOpenOrder(o => [...o.filter(x => x !== kind), kind]);
  const removeFromStack = (kind) =>
    setOpenOrder(o => o.filter(x => x !== kind));

  const openMatch  = (m)    => { setMatch(m);    bringToTop("match"); };
  const openTeam   = (code) => { setTeam(code);  bringToTop("team"); };
  const openPlayer = (id)   => { setPlayer(id);  bringToTop("player"); };
  const closeMatch  = () => { setMatch(null);  removeFromStack("match"); };
  const closeTeam   = () => { setTeam(null);   removeFromStack("team"); };
  const closePlayer = () => { setPlayer(null); removeFromStack("player"); };
  const zOf = (kind) => 70 + openOrder.indexOf(kind) * 10;
  const isTop = (kind) => openOrder[openOrder.length - 1] === kind;

  return (
    <div style={{ minHeight: "100vh" }}>
      <header style={{ position: "sticky", top: 0, zIndex: 40, background: "color-mix(in oklab, var(--bg) 80%, transparent)",
        backdropFilter: "blur(14px) saturate(1.3)", borderBottom: "1px solid var(--line)" }}>
        <div style={{ height: 3, background: "var(--grad)" }} />
        <div style={{ maxWidth: "var(--maxw)", margin: "0 auto", padding: "10px 16px", display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 11, flex: 1, minWidth: 0 }}>
            <div style={{ width: 40, height: 40, flex: "0 0 auto", display: "flex", alignItems: "center", justifyContent: "center" }}>
              <img src="images/wc2026-logo.svg" style={{ width: 40, height: 40, objectFit: "contain" }} alt="FIFA VM 2026" />
            </div>
            <div style={{ minWidth: 0 }}>
              <div className="display" style={{ fontSize: 19, lineHeight: .95, color: "var(--ink)", fontWeight: "var(--display-weight)" }}>VM&nbsp;2026</div>
              <div style={{ display: "flex", alignItems: "center", gap: 5, marginTop: 3 }}>
                <Flag code="USA" size={12} /><Flag code="MEX" size={12} /><Flag code="CAN" size={12} />
                <span style={{ fontSize: 10.5, fontWeight: 700, color: "var(--ink-soft)", marginLeft: 2 }}>Tippningsligan</span>
              </div>
            </div>
          </div>
        </div>
      </header>

      <main>
        <div key={view} style={{ maxWidth: "var(--maxw)", margin: "0 auto", padding: "18px 16px calc(var(--nav-h) + 30px)", animation: "pageIn .32s cubic-bezier(.2,.7,.2,1) both" }}>
          {view === "standings" && <StandingsView data={data} onOpenPlayer={openPlayer} onOpenMatch={openMatch} />}
          {view === "groups" && <GroupsView data={data} onTeam={openTeam} onOpenMatch={openMatch} />}
          {view === "schedule" && <ScheduleView data={data} onOpenMatch={openMatch} />}
          {view === "bonus" && <BonusView data={data} onTeam={openTeam} />}
          {view === "info" && <InfoView data={data} />}
        </div>
      </main>

      <nav style={{ position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 45, pointerEvents: "none" }}>
        <div style={{ maxWidth: 540, margin: "0 auto", padding: "0 12px 12px" }}>
          <div style={{ pointerEvents: "auto", display: "flex", justifyContent: "space-around", alignItems: "center",
            background: "color-mix(in oklab, var(--panel) 86%, transparent)", backdropFilter: "blur(14px) saturate(1.3)", borderRadius: 17, padding: "7px 6px", border: "1px solid var(--line-strong)",
            boxShadow: "0 12px 34px -10px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.06)" }}>
            {NAV.map(n => {
              const active = view === n.id;
              return (
                <button key={n.id} onClick={() => setView(n.id)} style={{ display: "flex", flexDirection: "column", alignItems: "center",
                  gap: 3, padding: "6px 8px", flex: 1, color: active ? "var(--hot)" : "var(--ink-soft)", position: "relative",
                  filter: active ? "drop-shadow(0 0 8px var(--hot))" : "none" }}>
                  {active ? <span style={{ position: "absolute", top: -7, width: 22, height: 3, borderRadius: 99, background: "var(--hot)", boxShadow: "0 0 8px var(--hot)" }} /> : null}
                  <span style={{ display: "flex" }}>{Icon[n.icon](active)}</span>
                  <span style={{ fontSize: 10.5, fontWeight: active ? 800 : 600 }}>{n.label}</span>
                </button>
              );
            })}
          </div>
        </div>
      </nav>

      {player && <PlayerSheet data={data} playerId={player} onClose={closePlayer} onOpenMatch={openMatch} zIndex={zOf("player")} dimBackdrop={isTop("player") && openOrder.length === 1} />}
      {team && <TeamSheet data={data} code={team} onClose={closeTeam} onOpenMatch={openMatch} zIndex={zOf("team")} dimBackdrop={openOrder[0] === "team"} />}
      {match && <MatchDetail data={data} match={match} onClose={closeMatch} onTeam={openTeam} zIndex={zOf("match")} dimBackdrop={openOrder[0] === "match"} />}

    </div>
  );
}

/* ============================================================
   Boot: fetcha vår riktiga data.json + fixtures.json innan vi
   monterar React. Adaptiv polling: 15 sek om live-matcher pågår,
   annars 60 sek.
   ============================================================ */
async function loadRealData() {
  const bust = "?t=" + Math.floor(Date.now() / 5000);
  const [dr, fr, pr, or_] = await Promise.allSettled([
    fetch("data.json" + bust, { cache: "no-store" }),
    fetch("fixtures.json" + bust, { cache: "no-store" }),
    fetch("players.json", { cache: "no-store" }),
    fetch("odds.json" + bust, { cache: "no-store" }),
  ]);
  const data = (dr.status === "fulfilled" && dr.value.ok) ? await dr.value.json() : null;
  const fixtures = (fr.status === "fulfilled" && fr.value.ok) ? await fr.value.json() : [];
  if (!data) throw new Error("data.json saknas");
  const oddsRaw = (or_.status === "fulfilled" && or_.value.ok) ? await or_.value.json() : null;
  const oddsDb = oddsRaw ? (oddsRaw.odds || {}) : {};
  for (const m of fixtures) { const o = oddsDb[String(m.id)]; if (o) m._odds = o; }
  window.__REAL_DATA__ = { data, fixtures };
  window.__PLAYERS_DB__ = (pr.status === "fulfilled" && pr.value.ok) ? await pr.value.json() : null;
}

function hasLiveFixtures() {
  const f = (window.__REAL_DATA__ && window.__REAL_DATA__.fixtures) || [];
  return f.some(x => x.status === "IN_PLAY" || x.status === "PAUSED" || x.status === "LIVE");
}

function hasRecentFinishedWithoutEvents() {
  const f = (window.__REAL_DATA__ && window.__REAL_DATA__.fixtures) || [];
  const cutoff = Date.now() - 48 * 3600 * 1000;
  return f.some(x =>
    x.status === "FINISHED" &&
    !(x.goals && x.goals.length) &&
    new Date(x.utcDate).getTime() > cutoff
  );
}

(async () => {
  const root = document.getElementById("root");
  root.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:60vh;color:var(--ink-soft);font-weight:700;font-size:14px">Hämtar data…</div>';
  try {
    await loadRealData();
  } catch (e) {
    root.innerHTML = '<div style="padding:40px 20px;text-align:center;color:var(--ink-soft);font-weight:700">Kunde inte ladda data. Försöker igen…</div>';
    setTimeout(() => location.reload(), 5000);
    return;
  }
  ReactDOM.createRoot(root).render(<App />);

  // Adaptiv polling: 15s live · 30s nyss spelade utan händelsedata · annars 60s
  let pollTimer = null;
  function schedulePoll() {
    const interval = hasLiveFixtures() ? 15000
      : hasRecentFinishedWithoutEvents() ? 30000
      : 60000;
    pollTimer = setTimeout(() => {
      loadRealData().then(() => {
        window.dispatchEvent(new CustomEvent("vm-data-updated"));
      }).catch(() => {}).finally(() => schedulePoll());
    }, interval);
  }
  schedulePoll();
})();

  </script>
