<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>VM 2026 · Tippningsligan</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Expanded:wght@600;700;800;900&family=Big+Shoulders+Display:wght@500;700;800;900&family=Spline+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
<style>
  /* ====== STADIONNATT · PALETT & TYPSNITT (styrs av Tweaks) ====== */
  :root {
    /* Solnedgång (default) - vibrerande mot mörker */
    --hot:   #FF2E6E;
    --warm:  #FF8A3D;
    --gold:  #FFC53D;
    --cool:  #8A6BFF;
    --deep:  #1A1026;
    --grad: linear-gradient(120deg,#7A2BFF 0%,#FF2E6E 52%,#FF8A3D 100%);
    --grad-soft: linear-gradient(120deg,#7A2BFF,#FF2E6E);

    --font-display: 'Anton', sans-serif;
    --font-body: 'Archivo', system-ui, sans-serif;
    --display-tracking: 0.006em;
    --display-transform: uppercase;
    --display-weight: 400;

    /* djup, varm midnattsbas - inte svart */
    --bg:    #14101F;
    --bg2:   #221A34;
    --paper: #201930;
    --panel: #2A2140;
    --ink:   #F7F3FF;
    --ink-soft: #A89EC4;
    --line:  rgba(255,255,255,.085);
    --line-strong: rgba(255,255,255,.20);

    --r-lg: 20px; --r-md: 14px; --r-sm: 10px;
    --shadow: 0 10px 26px -18px rgba(0,0,0,.85), 0 0 0 1px rgba(255,255,255,.03) inset;
    --shadow-lift: 0 30px 64px -30px rgba(0,0,0,.9), 0 0 0 1px rgba(255,255,255,.04) inset;
    --glow: 0 0 24px -6px;
    --nav-h: 68px;
    --maxw: 1080px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }
  /* dekorativ bakgrund: stadionglöd i hörnen + fint prickmönster (textur) */
  body::before {
    content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(60vw 44vw at 88% -8%, color-mix(in oklab, var(--hot) 30%, transparent), transparent 60%),
      radial-gradient(56vw 46vw at -10% 4%, color-mix(in oklab, var(--cool) 30%, transparent), transparent 62%),
      radial-gradient(70vw 56vw at 50% 116%, color-mix(in oklab, var(--warm) 16%, transparent), transparent 60%);
    opacity: .85;
  }
  body::after {
    content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px);
    background-size: 24px 24px;
    -webkit-mask-image: linear-gradient(180deg, #000, transparent 70%);
    mask-image: linear-gradient(180deg, #000, transparent 70%);
  }
  #root { position: relative; z-index: 1; }
  .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
  ::selection { background: var(--hot); color: #fff; }

  h1,h2,h3 { margin: 0; }
  .display {
    font-family: var(--font-display);
    text-transform: var(--display-transform);
    letter-spacing: var(--display-tracking);
    line-height: .96;
    font-weight: var(--display-weight, 800);
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  img { display: block; max-width: 100%; }

  /* skydd mot horisontell scroll */
  .app-scroll::-webkit-scrollbar { width: 0; height: 0; }

  /* fokus-tillgänglighet */
  :focus-visible { outline: 3px solid var(--cool); outline-offset: 2px; }

  @keyframes pop { 0%{transform:scale(.6);opacity:0} 60%{transform:scale(1.08)} 100%{transform:scale(1);opacity:1} }
  @keyframes riseIn { from{transform:translateY(16px)} to{transform:translateY(0)} }
  @keyframes sheetFade { from{opacity:0} to{opacity:1} }
  @keyframes sheetPop  { from{opacity:0;transform:scale(.96) translateY(8px)} to{opacity:1;transform:none} }
  @keyframes stadiumFade { from{opacity:0;transform:scale(1.04)} 15%,85%{opacity:1;transform:scale(1)} to{opacity:0;transform:scale(1.04)} }
  @keyframes tileFade { from{opacity:0} 15%{opacity:1} 85%{opacity:1} to{opacity:.85} }
  @keyframes kenBurns { from{opacity:0;transform:scale(1.0) translate(0,0)} 12%{opacity:1} 100%{opacity:1;transform:scale(1.12) translate(-2%,-1%)} }
  @keyframes shardFade { 0%{opacity:0;transform:translateX(-3%)} 18%{opacity:1;transform:translateX(0)} 85%{opacity:1} 100%{opacity:.65;transform:translateX(2%)} }
  @keyframes shardKenBurns { 0%{opacity:0;transform:scale(1.0) translate(0,0)} 12%{opacity:1} 100%{opacity:1;transform:scale(1.14) translate(-3%,-1%)} }
  @keyframes fadeRise { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  @media (prefers-reduced-motion: no-preference) {
    .can-fade { animation-name: fadeRise !important; }
  }
  @keyframes livePulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,46,110,.55)} 50%{box-shadow:0 0 0 7px rgba(255,46,110,0)} }
  @keyframes confettiFall { to { transform: translateY(115vh) rotate(720deg); } }
  @keyframes shine { from{background-position:-200% 0} to{background-position:200% 0} }
  @keyframes barGrow { from { width: 0 !important; } }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
  @keyframes pageIn { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  @keyframes tabIn  { from{opacity:0;transform:translateY(8px)}  to{opacity:1;transform:translateY(0)} }
  @keyframes popIn  { from{opacity:0;transform:scale(.88)}        to{opacity:1;transform:scale(1)} }
  html { scroll-behavior: smooth; }
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: .001ms !important; animation-iteration-count: 1 !important; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- ╔══════════════════════════════════════════════════════════════════╗ -->
  <!-- ║  DATALAGER - adapter som mappar vår riktiga data.json +          ║ -->
  <!-- ║  fixtures.json till samma window.VM-objekt-form som designens    ║ -->
  <!-- ║  mock. Data hämtas runtime via window.__REAL_DATA__.             ║ -->
  <!-- ╚══════════════════════════════════════════════════════════════════╝ -->
  <script>
/* ============================================================
   VM 2026 - Data-adapter (vanilla JS)
   window.__REAL_DATA__ sätts av boot-koden innan React renderas.
   window.VM.build()  ->  fullständig dataset i designens form.
   ============================================================ */
(function () {
  "use strict";

  // ---- prispengar (50/30/20 av 2700) ----
  const PRIZES = [1350, 810, 540];
  const GROUP_LETTERS = ["A","B","C","D","E","F","G","H","I","J","K","L"];

  // ---- TLA → ISO alpha-2 (flagcdn.com) ----
  const TLA_TO_ISO = {
    USA:"us", MEX:"mx", CAN:"ca",
    BRA:"br", ARG:"ar", URU:"uy", COL:"co", ECU:"ec", PAR:"py", CHI:"cl", PER:"pe", VEN:"ve", BOL:"bo",
    ENG:"gb-eng", SCO:"gb-sct", WAL:"gb-wls", NIR:"gb-nir", IRL:"ie",
    FRA:"fr", GER:"de", ITA:"it", ESP:"es", POR:"pt", NED:"nl", BEL:"be",
    CRO:"hr", SUI:"ch", AUT:"at", POL:"pl", DEN:"dk", SWE:"se", NOR:"no",
    FIN:"fi", ISL:"is", HUN:"hu", CZE:"cz", SVK:"sk", SVN:"si", ROU:"ro",
    GRE:"gr", BUL:"bg", SRB:"rs", UKR:"ua", BIH:"ba", ALB:"al", KOS:"xk",
    MKD:"mk", MNE:"me", TUR:"tr", LUX:"lu",
    MAR:"ma", TUN:"tn", ALG:"dz", EGY:"eg", SEN:"sn", CIV:"ci", NGA:"ng",
    CMR:"cm", GHA:"gh", RSA:"za", COD:"cd", CGO:"cg", CPV:"cv", MLI:"ml", BFA:"bf",
    ANG:"ao", ZAM:"zm", GUI:"gn", GAB:"ga", LBY:"ly", BEN:"bj", TOG:"tg",
    JPN:"jp", KOR:"kr", KSA:"sa", IRN:"ir", IRQ:"iq", QAT:"qa", UAE:"ae",
    UZB:"uz", JOR:"jo", AUS:"au", CHN:"cn", THA:"th", VIE:"vn", IDN:"id",
    CRC:"cr", PAN:"pa", JAM:"jm", HAI:"ht", HON:"hn", SLV:"sv", GUA:"gt",
    TRI:"tt", CUW:"cw", CUR:"cw", SUR:"sr", NZL:"nz",
    PO1:null, PO2:null, PO3:null
  };
  const NAME_TO_ISO = {
    "united states":"us","mexico":"mx","canada":"ca",
    "brazil":"br","argentina":"ar","uruguay":"uy","colombia":"co","ecuador":"ec",
    "paraguay":"py","chile":"cl","peru":"pe","venezuela":"ve","bolivia":"bo",
    "england":"gb-eng","scotland":"gb-sct","wales":"gb-wls","northern ireland":"gb-nir",
    "ireland":"ie","republic of ireland":"ie",
    "france":"fr","germany":"de","italy":"it","spain":"es","portugal":"pt",
    "netherlands":"nl","belgium":"be","croatia":"hr","switzerland":"ch","austria":"at",
    "poland":"pl","denmark":"dk","sweden":"se","norway":"no",
    "hungary":"hu","czech republic":"cz","czechia":"cz",
    "romania":"ro","greece":"gr","serbia":"rs","ukraine":"ua",
    "bosnia and herzegovina":"ba","bosnia-herzegovina":"ba","albania":"al",
    "north macedonia":"mk","montenegro":"me","turkey":"tr","türkiye":"tr",
    "morocco":"ma","tunisia":"tn","algeria":"dz","egypt":"eg","senegal":"sn",
    "ivory coast":"ci","côte d'ivoire":"ci","nigeria":"ng",
    "cameroon":"cm","ghana":"gh","south africa":"za","dr congo":"cd","congo dr":"cd",
    "cape verde":"cv","mali":"ml",
    "japan":"jp","south korea":"kr","korea republic":"kr","saudi arabia":"sa",
    "iran":"ir","iraq":"iq","qatar":"qa","united arab emirates":"ae",
    "uzbekistan":"uz","jordan":"jo","australia":"au",
    "costa rica":"cr","panama":"pa","jamaica":"jm","haiti":"ht","honduras":"hn",
    "el salvador":"sv","guatemala":"gt","trinidad and tobago":"tt",
    "curaçao":"cw","curacao":"cw","new zealand":"nz"
  };
  const SV_TO_TLA = {
    "argentina":"ARG","frankrike":"FRA","spanien":"ESP","england":"ENG",
    "brasilien":"BRA","portugal":"POR","nederländerna":"NED","usa":"USA",
    "mexico":"MEX","mexiko":"MEX","kanada":"CAN","tyskland":"GER","belgien":"BEL",
    "kroatien":"CRO","uruguay":"URU","colombia":"COL","japan":"JPN",
    "marocko":"MAR","senegal":"SEN","schweiz":"SUI","danmark":"DEN",
    "sydkorea":"KOR","ecuador":"ECU","österrike":"AUT","australien":"AUS",
    "norge":"NOR","sverige":"SWE","polen":"POL","serbien":"SRB",
    "turkiet":"TUR","egypten":"EGY","nigeria":"NGA","elfenbenskusten":"CIV",
    "iran":"IRN","panama":"PAN","paraguay":"PAR","ungern":"HUN",
    "nya zeeland":"NZL","saudiarabien":"KSA","ghana":"GHA","kamerun":"CMR",
    "uzbekistan":"UZB","jordanien":"JOR","sydafrika":"RSA","algeriet":"ALG",
    "honduras":"HON","peru":"PER","chile":"CHI",
    "tjeckien":"CZE","bosnien":"BIH","qatar":"QAT","irak":"IRQ",
    "haiti":"HAI","skottland":"SCO","kap verde":"CPV","tunisien":"TUN",
    "dr kongo":"COD","curacao":"CUR"
  };
  const EN_TO_SV = {
    "United States":"USA","Mexico":"Mexico","Canada":"Kanada","Brazil":"Brasilien",
    "Argentina":"Argentina","Uruguay":"Uruguay","Colombia":"Colombia","Ecuador":"Ecuador",
    "Paraguay":"Paraguay","Chile":"Chile","Peru":"Peru","Venezuela":"Venezuela",
    "England":"England","Scotland":"Skottland","Wales":"Wales",
    "France":"Frankrike","Germany":"Tyskland","Italy":"Italien","Spain":"Spanien",
    "Portugal":"Portugal","Netherlands":"Nederländerna","Belgium":"Belgien",
    "Croatia":"Kroatien","Switzerland":"Schweiz","Austria":"Österrike",
    "Poland":"Polen","Denmark":"Danmark","Sweden":"Sverige","Norway":"Norge",
    "Czech Republic":"Tjeckien","Czechia":"Tjeckien",
    "Serbia":"Serbien","Ukraine":"Ukraina",
    "Bosnia and Herzegovina":"Bosnien","Bosnia-Herzegovina":"Bosnien",
    "Turkey":"Turkiet","Türkiye":"Turkiet",
    "Morocco":"Marocko","Tunisia":"Tunisien","Algeria":"Algeriet","Egypt":"Egypten",
    "Senegal":"Senegal","Ivory Coast":"Elfenbenskusten","Côte d'Ivoire":"Elfenbenskusten",
    "Nigeria":"Nigeria","Cameroon":"Kamerun","Ghana":"Ghana","South Africa":"Sydafrika",
    "DR Congo":"DR Kongo","Congo DR":"DR Kongo","Cape Verde":"Kap Verde",
    "Japan":"Japan","South Korea":"Sydkorea","Korea Republic":"Sydkorea",
    "Saudi Arabia":"Saudiarabien","Iran":"Iran","Iraq":"Irak","Qatar":"Qatar",
    "Uzbekistan":"Uzbekistan","Jordan":"Jordanien","Australia":"Australien",
    "Costa Rica":"Costa Rica","Panama":"Panama","Jamaica":"Jamaica","Haiti":"Haiti",
    "Honduras":"Honduras","Curaçao":"Curaçao","Curacao":"Curaçao",
    "New Zealand":"Nya Zeeland"
  };

  // 9 spelare med deterministisk färg
  // Grupp -> primär värdarena (för matcher där engine saknar venue)
  // Baserat på FIFA:s publicerade gruppvis-fördelning för VM 2026.
  const GROUP_HOST = {
    A: { stadium:"Estadio Azteca",                city:"Mexico City",          country:"Mexiko",  cc:"MEX" },
    B: { stadium:"BMO Field",                     city:"Toronto",              country:"Kanada",  cc:"CAN" },
    C: { stadium:"BC Place",                      city:"Vancouver",            country:"Kanada",  cc:"CAN" },
    D: { stadium:"Gillette Stadium",              city:"Boston",               country:"USA",     cc:"USA" },
    E: { stadium:"Arrowhead Stadium",             city:"Kansas City",          country:"USA",     cc:"USA" },
    F: { stadium:"Mercedes-Benz Stadium",         city:"Atlanta",              country:"USA",     cc:"USA" },
    G: { stadium:"MetLife Stadium",               city:"New York/New Jersey",  country:"USA",     cc:"USA" },
    H: { stadium:"Hard Rock Stadium",             city:"Miami",                country:"USA",     cc:"USA" },
    I: { stadium:"AT&T Stadium",                  city:"Dallas",               country:"USA",     cc:"USA" },
    J: { stadium:"SoFi Stadium",                  city:"Los Angeles",          country:"USA",     cc:"USA" },
    K: { stadium:"NRG Stadium",                   city:"Houston",              country:"USA",     cc:"USA" },
    L: { stadium:"Estadio BBVA",                  city:"Monterrey",            country:"Mexiko",  cc:"MEX" }
  };

  // Stadium-namn -> land/landskod (för matcher där engine.py extraherat venue
  // direkt från API:et men inte gett oss land). Används av MatchDetail-headern.
  const STADIUM_COUNTRY = {
    "Estadio Azteca":          { country:"Mexiko", cc:"MEX" },
    "Estadio Akron":           { country:"Mexiko", cc:"MEX" },
    "Estadio BBVA":            { country:"Mexiko", cc:"MEX" },
    "BMO Field":               { country:"Kanada", cc:"CAN" },
    "BC Place":                { country:"Kanada", cc:"CAN" },
    "MetLife Stadium":         { country:"USA",    cc:"USA" },
    "SoFi Stadium":            { country:"USA",    cc:"USA" },
    "AT&T Stadium":            { country:"USA",    cc:"USA" },
    "Mercedes-Benz Stadium":   { country:"USA",    cc:"USA" },
    "NRG Stadium":             { country:"USA",    cc:"USA" },
    "Lincoln Financial Field": { country:"USA",    cc:"USA" },
    "Levi's Stadium":          { country:"USA",    cc:"USA" },
    "Lumen Field":             { country:"USA",    cc:"USA" },
    "Arrowhead Stadium":       { country:"USA",    cc:"USA" },
    "Gillette Stadium":        { country:"USA",    cc:"USA" },
    "Hard Rock Stadium":       { country:"USA",    cc:"USA" }
  };

  const PLAYER_COLORS = {
    "Albin":"#FF2E6E","Alexander":"#FF8A3D","Björn":"#1FA37A","Casper":"#7A3CF0",
    "Filip":"#0E8FE0","Isac":"#F5B301","Johan":"#E63946","Martin":"#16A0A0","Oskar":"#9B5DE5",
    "Vilgot":"#EC4899","Hampus":"#65A30D"
  };
  const PLAYER_SLUGS = {
    "Albin":"albin","Alexander":"alexander","Björn":"bjorn","Casper":"casper",
    "Filip":"filip","Isac":"isac","Johan":"johan","Martin":"martin","Oskar":"oskar",
    "Vilgot":"vilgot","Hampus":"hampus"
  };
  function playerPhoto(name){
    const slug = PLAYER_SLUGS[name];
    return slug ? ("images/players/" + slug + ".webp") : null;
  }

  function isoFor(name, tla){
    if(tla && TLA_TO_ISO[String(tla).toUpperCase()]) return TLA_TO_ISO[String(tla).toUpperCase()];
    if(name){
      const key = String(name).toLowerCase().trim();
      if(NAME_TO_ISO[key]) return NAME_TO_ISO[key];
      const simple = key.normalize("NFD").replace(/[̀-ͯ]/g,"");
      if(NAME_TO_ISO[simple]) return NAME_TO_ISO[simple];
    }
    return null;
  }
  function brandFromName(name){
    let h = 0;
    for(let i=0;i<(name||"").length;i++) h = (h*31 + name.charCodeAt(i)) | 0;
    const hue1 = ((h % 360) + 360) % 360;
    const hue2 = (hue1 + 28) % 360;
    return [`hsl(${hue1} 55% 45%)`, `hsl(${hue2} 65% 38%)`];
  }
  function codeFromName(name){
    if(!name) return "TBD";
    const lc = String(name).toLowerCase();
    if(SV_TO_TLA[lc]) return SV_TO_TLA[lc];
    const cleaned = String(name).replace(/[^a-zA-ZåäöÅÄÖ ]/g,"").trim().toUpperCase();
    return cleaned.slice(0,3) || "TBD";
  }
  function teamCodeFromPick(pick, teams){
    if(!pick) return null;
    const lc = String(pick).toLowerCase().trim();
    if(SV_TO_TLA[lc]) return SV_TO_TLA[lc];
    for(const code in teams){
      if(teams[code].name && teams[code].name.toLowerCase() === lc) return code;
    }
    if(NAME_TO_ISO[lc]){
      const iso = NAME_TO_ISO[lc];
      for(const code in teams){ if(teams[code].iso === iso) return code; }
    }
    return null;
  }

  // ---- core builder ----
  function build(){
    const real = window.__REAL_DATA__ || {};
    const D = real.data || {};
    const F = (real.fixtures || []);

    // ============= TEAMS + GROUPS =============
    const TEAMS = {};
    const GROUPS = {};
    GROUP_LETTERS.forEach(L => { GROUPS[L] = []; });

    (D.groups || []).forEach(g => {
      const L = g.code;
      (g.table || []).forEach(row => {
        const code = (row.tla && String(row.tla).toUpperCase()) || codeFromName(row.team);
        if(TEAMS[code]) return;
        const display = EN_TO_SV[row.team] || row.team;
        const brand = brandFromName(row.team || code);
        TEAMS[code] = {
          code, name: display, c1: brand[0], c2: brand[1],
          rating: 75, group: L, pot: 0, iso: isoFor(row.team, row.tla)
        };
        if(GROUPS[L] && GROUPS[L].length < 4) GROUPS[L].push(code);
      });
    });
    F.forEach(f => {
      [[f.home, f.homeTla], [f.away, f.awayTla]].forEach(([n, t]) => {
        if(!n) return;
        const code = (t && String(t).toUpperCase()) || codeFromName(n);
        if(!TEAMS[code]){
          const display = EN_TO_SV[n] || n;
          const brand = brandFromName(n);
          TEAMS[code] = { code, name: display, c1: brand[0], c2: brand[1],
            rating: 75, group: f.group || null, pot: 0, iso: isoFor(n, t) };
        }
        if(f.group && f.stage === "GROUP_STAGE" && GROUPS[f.group] && !GROUPS[f.group].includes(code) && GROUPS[f.group].length < 4){
          GROUPS[f.group].push(code);
          if(!TEAMS[code].group) TEAMS[code].group = f.group;
        }
      });
    });

    function codeOf(name, tla){
      if(!name) return null;
      if(tla){
        const t = String(tla).toUpperCase();
        if(TEAMS[t]) return t;
      }
      for(const c in TEAMS){
        if(TEAMS[c].name === (EN_TO_SV[name] || name)) return c;
      }
      const fallback = codeFromName(name);
      if(TEAMS[fallback]) return fallback;
      const brand = brandFromName(name);
      TEAMS[fallback] = { code:fallback, name: EN_TO_SV[name]||name, c1:brand[0], c2:brand[1],
        rating:75, group:null, pot:0, iso: isoFor(name, tla) };
      return fallback;
    }

    // ============= MATCHES =============
    const STAGE_MAP = {
      GROUP_STAGE:"group",
      LAST_32:"ko", LAST_16:"ko", QUARTER_FINALS:"ko",
      SEMI_FINALS:"ko", THIRD_PLACE:"ko", FINAL:"ko"
    };
    const KO_PREFIX = {
      LAST_32:"r32_", LAST_16:"r16_", QUARTER_FINALS:"qf_",
      SEMI_FINALS:"sf_", THIRD_PLACE:"third_", FINAL:"final_"
    };

    const tipsByMatchId = {};
    (D.matches || []).forEach(m => { tipsByMatchId[m.id] = m; });

    const koCounters = {};
    const allMatches = (F || []).map(f => {
      const stage = STAGE_MAP[f.stage] || "ko";
      const isGroup = stage === "group";
      let id;
      if(isGroup){
        id = "G" + f.id;
      } else {
        const pfx = KO_PREFIX[f.stage] || "ko_";
        koCounters[pfx] = koCounters[pfx] || 0;
        id = pfx + (koCounters[pfx]++);
      }
      const homeCode = f.home ? codeOf(f.home, f.homeTla) : null;
      const awayCode = f.away ? codeOf(f.away, f.awayTla) : null;
      const kickoff = new Date(f.utcDate);
      const finished = f.status === "FINISHED" || f.status === "AWARDED";
      const live = f.status === "IN_PLAY" || f.status === "PAUSED" || f.status === "LIVE" || f.status === "SUSPENDED";
      const ga = (f.score && f.score[0] != null) ? f.score[0] : null;
      const gb = (f.score && f.score[1] != null) ? f.score[1] : null;
      let winner = null;
      if(finished && ga != null && gb != null){
        if(ga > gb) winner = homeCode;
        else if(gb > ga) winner = awayCode;
        else {
          const sd = f.scoreDetail;
          const pens = sd && sd.penalties && sd.penalties[0] != null ? sd.penalties : null;
          if (pens && pens[0] !== pens[1]) winner = pens[0] > pens[1] ? homeCode : awayCode;
          else if (sd && sd.winnerSide === "HOME_TEAM") winner = homeCode;
          else if (sd && sd.winnerSide === "AWAY_TEAM") winner = awayCode;
        }
      }
      const tipped = tipsByMatchId[f.id];
      const tippas = !!(tipped && tipped.tips && tipped.tips.length > 0);

      // mappa engine-goals/bookings/subs till designens scorers/cards/subs
      function refCode(ref){
        if(!ref) return null;
        const upper = String(ref).toUpperCase();
        return TEAMS[upper] ? upper : codeOf(ref, null);
      }
      const goalsSrc = (f.goals && f.goals.length) ? f.goals
        : (tipped && tipped.goals) ? tipped.goals : [];
      const bookingsSrc = (f.bookings && f.bookings.length) ? f.bookings
        : (tipped && tipped.bookings) ? tipped.bookings : [];
      const subsSrc = (f.subs && f.subs.length) ? f.subs : [];
      const scorers = goalsSrc.map(g => ({
        team: refCode(g.team),
        name: g.scorer,
        minute: g.minute,
        injuryTime: g.injuryTime,
        pen: (String(g.type||"").toUpperCase() === "PENALTY"),
        header: (String(g.type||"").toUpperCase() === "HEADER"),
        assist: g.assist || null,
        score: g.score || null
      })).filter(x => x.team && x.name);
      const cards = bookingsSrc.map(b => {
        const c = String(b.card||"").toUpperCase();
        return {
          team: refCode(b.team), name: b.player, minute: b.minute,
          type: (c === "RED" || c === "YELLOW_RED") ? "red" : "yellow"
        };
      }).filter(x => x.team && x.name);
      const subs = subsSrc.map(s => ({
        team: refCode(s.team), minute: s.minute,
        playerIn: s.playerIn, playerOut: s.playerOut
      })).filter(x => x.team);

      // Beräkna matchstatistik från homeStats/awayStats (ESPN, med fallback till football-data)
      const hs = f.homeStats || {}, as_ = f.awayStats || {};
      function getStat(obj, ...keys){
        for(const k of keys){
          if(obj[k] != null) return Number(obj[k]);
          if(obj[k.toUpperCase()] != null) return Number(obj[k.toUpperCase()]);
        }
        return null;
      }
      const _poss = [getStat(hs,"possessionPct","ball_possession"), getStat(as_,"possessionPct","ball_possession")];
      const _shots = [getStat(hs,"totalShots","total_shots"), getStat(as_,"totalShots","total_shots")];
      const _sot   = [getStat(hs,"shotsOnTarget","shots_on_goal"), getStat(as_,"shotsOnTarget","shots_on_goal")];
      const _corn  = [getStat(hs,"wonCorners","corner_kicks"), getStat(as_,"wonCorners","corner_kicks")];
      const _fouls = [getStat(hs,"foulsCommitted","fouls"), getStat(as_,"foulsCommitted","fouls")];
      const hPassPct = getStat(hs,"passPct"), aPassPct = getStat(as_,"passPct");
      const hP=getStat(hs,"totalPasses","passes"), hA=getStat(hs,"accuratePasses","accurate_passes");
      const aP=getStat(as_,"totalPasses","passes"), aA=getStat(as_,"accuratePasses","accurate_passes");
      const _pass = [
        hPassPct!=null ? Math.round(hPassPct*100) : (hP&&hA!=null)?Math.round(hA/hP*100):null,
        aPassPct!=null ? Math.round(aPassPct*100) : (aP&&aA!=null)?Math.round(aA/aP*100):null
      ];
      const _tack  = [getStat(hs,"effectiveTackles"), getStat(as_,"effectiveTackles")];
      const _inter = [getStat(hs,"interceptions"), getStat(as_,"interceptions")];
      const _clear = [getStat(hs,"effectiveClearance","totalClearance"), getStat(as_,"effectiveClearance","totalClearance")];
      const _blk   = [getStat(hs,"blockedShots"), getStat(as_,"blockedShots")];
      const _long  = [getStat(hs,"totalLongBalls"), getStat(as_,"totalLongBalls")];
      const hCrossAcc=getStat(hs,"accurateCrosses"), hCrossTot=getStat(hs,"totalCrosses");
      const aCrossAcc=getStat(as_,"accurateCrosses"), aCrossTot=getStat(as_,"totalCrosses");
      const _crossPct = [
        (hCrossTot&&hCrossAcc!=null)?Math.round(hCrossAcc/hCrossTot*100):null,
        (aCrossTot&&aCrossAcc!=null)?Math.round(aCrossAcc/aCrossTot*100):null
      ];
      let hy=0,hr=0,ay=0,ar=0;
      cards.forEach(b=>{
        if(b.team===homeCode){if(b.type==="red")hr++;else hy++;}
        else if(b.team===awayCode){if(b.type==="red")ar++;else ay++;}
      });
      const _statsHasData = _poss[0]!=null || _shots[0]!=null || _sot[0]!=null;
      const matchStats = _statsHasData ? {
        poss:[_poss[0]??50,_poss[1]??50], xg:[null,null],
        shots:[_shots[0]??0,_shots[1]??0], sot:[_sot[0]??0,_sot[1]??0],
        corners:[_corn[0]??0,_corn[1]??0], pass:[_pass[0]??0,_pass[1]??0],
        fouls:[_fouls[0]??0,_fouls[1]??0], yellow:[hy,ay], red:[hr,ar],
        tackles:_tack, interceptions:_inter,
        clearances:_clear, blockedShots:_blk,
        longBalls:_long, crossPct:_crossPct
      } : null;

      const sd = f.scoreDetail || null;
      const penScore = sd && sd.penalties && sd.penalties[0] != null ? sd.penalties : null;

      return {
        id, stage, group: f.group || null,
        round: isGroup ? ("Grupp " + (f.group||"")) : "Slutspel",
        matchday: null,
        home: homeCode, away: awayCode,
        kickoff,
        ga, gb,
        status: finished ? "played" : (live ? "live" : "upcoming"),
        winner, pen: penScore,
        minute: (live && (f.minute != null)) ? f.minute : (live ? null : undefined),
        venue: (function(){
          let v = (f.venue && f.venue.stadium) ? Object.assign({}, f.venue)
                : (f.group && GROUP_HOST[f.group]) ? Object.assign({}, GROUP_HOST[f.group])
                : null;
          if(v && v.stadium && !v.country){
            const ext = STADIUM_COUNTRY[v.stadium];
            if(ext){ v.country = ext.country; v.cc = ext.cc; }
          }
          return v;
        })(),
        officialOdds: f.odds || null,
        referees: f.referees || [],
        tippas,
        tips: tipped ? (tipped.tips || []) : [],
        scorers, cards, subs,
        scoreDetail: sd,
        homeLineup: f.homeLineup || null,
        awayLineup: f.awayLineup || null,
        stats: matchStats,
        attendance: f.attendance || null,
        espnOdds: f.espnOdds || null,
        homeForm: f.homeForm || [],
        awayForm: f.awayForm || [],
        _realId: f.id
      };
    });

    allMatches.sort((a,b) => a.kickoff - b.kickoff);
    const matches = allMatches.filter(m => m.stage === "group");

    // ============= groupTables =============
    const groupTables = {};
    GROUP_LETTERS.forEach(L => {
      const g = (D.groups || []).find(x => x.code === L);
      if(g && g.table && g.table.length){
        const sorted = [...g.table].sort((a,b) =>
          (b.points - a.points) || ((b.gd||(b.gf-b.ga)) - (a.gd||(a.gf-a.ga))) || (b.gf - a.gf));
        groupTables[L] = sorted.map((row, i) => {
          const code = (row.tla && String(row.tla).toUpperCase()) || codeFromName(row.team);
          return {
            code,
            sp: row.played || 0, v: row.won || 0, o: row.draw || 0, f: row.lost || 0,
            gm: row.gf || 0, im: row.ga || 0,
            ms: (row.gd != null ? row.gd : ((row.gf||0) - (row.ga||0))),
            p:  row.points || 0,
            pos: i + 1
          };
        });
      } else {
        groupTables[L] = (GROUPS[L] || []).map((code, i) => ({
          code, sp:0, v:0, o:0, f:0, gm:0, im:0, ms:0, p:0, pos: i+1
        }));
        while(groupTables[L].length < 4){
          const tag = "TBD" + L + (groupTables[L].length+1);
          TEAMS[tag] = TEAMS[tag] || { code:tag, name:"Att lottas", c1:"#888", c2:"#666",
            rating:70, group:L, pot:0, iso:null };
          groupTables[L].push({ code:tag, sp:0,v:0,o:0,f:0,gm:0,im:0,ms:0,p:0, pos: groupTables[L].length+1 });
        }
      }
    });

    // ============= knockout struct (FIFA 2026 officiell bracket) =============
    function bestThirdFromGroups(letters){
      const cands = [];
      letters.split("").forEach(L => {
        const r = groupTables[L] && groupTables[L][2];
        if(r && r.code && r.code.indexOf("TBD") !== 0) cands.push(Object.assign({}, r, {group:L}));
      });
      cands.sort((a,b) => (b.p - a.p) || (b.ms - a.ms) || (b.gm - a.gm) || a.group.localeCompare(b.group));
      return cands[0] ? cands[0].code : null;
    }
    // Unique assignment of the 8 best thirds to the 8 R32 third-slots (bipartite
    // matching over each slot's allowed groups) — so no third-placed team lands in two
    // matches. THIRD_ASSIGN is filled in just before the R32 tree is built.
    var THIRD_ASSIGN = {};
    function assignThirds(specs){
      const thirds = [];
      "ABCDEFGHIJKL".split("").forEach(L => {
        const r = groupTables[L] && groupTables[L][2];
        if(r && r.code && r.code.indexOf("TBD") !== 0) thirds.push({ g:L, p:r.p, ms:r.ms, gm:r.gm });
      });
      thirds.sort((a,b) => (b.p - a.p) || (b.ms - a.ms) || (b.gm - a.gm) || a.g.localeCompare(b.g));
      const qual = {}; thirds.slice(0,8).forEach(t => qual[t.g] = 1);
      const gsList = specs.map(s => (s.a.gs || s.b.gs)).filter(Boolean);
      const matchGroup = {}; // group -> gs-slot
      function augment(gs, seen){
        for(const g of gs.split("")){
          if(!qual[g] || seen[g]) continue;
          seen[g] = 1;
          if(matchGroup[g] === undefined || augment(matchGroup[g], seen)){ matchGroup[g] = gs; return true; }
        }
        return false;
      }
      gsList.forEach(gs => augment(gs, {}));
      const assign = {}; Object.keys(matchGroup).forEach(g => { assign[matchGroup[g]] = g; });
      return assign;
    }
    function slotResolve(spec){
      // { p:1|2, g:"A" } | { p:3, gs:"ABCDF" } | { winM:N } | { loseM:N }
      if(spec.winM)   return { code:null, projCode:null, label:"Vinnare M" + spec.winM };
      if(spec.loseM)  return { code:null, projCode:null, label:"Förlorare M" + spec.loseM };
      if(spec.p === 1 || spec.p === 2){
        const row = groupTables[spec.g] && groupTables[spec.g][spec.p - 1];
        const proj = row && row.code && row.code.indexOf("TBD") !== 0 ? row.code : null;
        return { code:null, projCode:proj, label:(spec.p === 1 ? "Vinnare " : "Tvåa ") + spec.g };
      }
      if(spec.p === 3 && spec.gs){
        const g = THIRD_ASSIGN[spec.gs];
        const row = g ? (groupTables[g] && groupTables[g][2]) : null;
        const proj = row && row.code && row.code.indexOf("TBD") !== 0 ? row.code : null;
        return { code:null, projCode:proj, label:"Bästa 3:a (" + spec.gs.split("").join("/") + ")" };
      }
      return { code:null, projCode:null, label:"TBD" };
    }
    // R32: officiell FIFA 2026-lottning (tree-ordning för designens recursive feed)
    const R32_SPECS = [
      { fifa:73, a:{p:2,g:"A"}, b:{p:2,g:"B"} },
      { fifa:75, a:{p:1,g:"E"}, b:{p:3,gs:"ABCDF"} },
      { fifa:74, a:{p:1,g:"C"}, b:{p:2,g:"F"} },
      { fifa:77, a:{p:2,g:"E"}, b:{p:2,g:"I"} },
      { fifa:83, a:{p:1,g:"H"}, b:{p:2,g:"J"} },
      { fifa:84, a:{p:2,g:"K"}, b:{p:2,g:"L"} },
      { fifa:81, a:{p:1,g:"G"}, b:{p:3,gs:"AEHIJ"} },
      { fifa:82, a:{p:1,g:"D"}, b:{p:3,gs:"BEFIJ"} },
      { fifa:76, a:{p:1,g:"F"}, b:{p:2,g:"C"} },
      { fifa:78, a:{p:1,g:"I"}, b:{p:3,gs:"CDFGH"} },
      { fifa:79, a:{p:1,g:"A"}, b:{p:3,gs:"CEFHI"} },
      { fifa:80, a:{p:1,g:"L"}, b:{p:3,gs:"EHIJK"} },
      { fifa:86, a:{p:2,g:"D"}, b:{p:2,g:"G"} },
      { fifa:88, a:{p:1,g:"K"}, b:{p:3,gs:"DEIJL"} },
      { fifa:85, a:{p:1,g:"B"}, b:{p:3,gs:"EFGIJ"} },
      { fifa:87, a:{p:1,g:"J"}, b:{p:2,g:"H"} }
    ];
    const R16_FIFA = [89, 90, 93, 94, 91, 92, 95, 96];
    const QF_FIFA  = [97, 98, 99, 100];
    const SF_FIFA  = [101, 102];

    function makeKoMatch(prefix, idx, slotA, slotB, fifa){
      return {
        id: prefix + idx, stage: "ko", group: null, round: "Slutspel",
        fifa: fifa || null,
        home: slotA.code, away: slotB.code,
        projHome: slotA.projCode || null, projAway: slotB.projCode || null,
        fromA: slotA.label, fromB: slotB.label,
        kickoff: new Date(Date.UTC(2026, 6, 19, 19, 0)),
        ga: null, gb: null, status: "upcoming",
        winner: null, pen: null,
        venue: (fifa && window.VM && window.VM.KO_VENUES && window.VM.KO_VENUES[fifa]) || null,
        tippas: true
      };
    }

    THIRD_ASSIGN = assignThirds(R32_SPECS);
    const r32_built = R32_SPECS.map((spec, i) =>
      makeKoMatch("r32_", i, slotResolve(spec.a), slotResolve(spec.b), spec.fifa));
    const r16_built = []; for(let i=0;i<8;i++){
      r16_built.push(makeKoMatch("r16_", i,
        slotResolve({winM:R32_SPECS[i*2].fifa}),
        slotResolve({winM:R32_SPECS[i*2+1].fifa}),
        R16_FIFA[i]));
    }
    const qf_built = []; for(let i=0;i<4;i++){
      qf_built.push(makeKoMatch("qf_", i,
        slotResolve({winM:R16_FIFA[i*2]}),
        slotResolve({winM:R16_FIFA[i*2+1]}),
        QF_FIFA[i]));
    }
    const sf_built = []; for(let i=0;i<2;i++){
      sf_built.push(makeKoMatch("sf_", i,
        slotResolve({winM:QF_FIFA[i*2]}),
        slotResolve({winM:QF_FIFA[i*2+1]}),
        SF_FIFA[i]));
    }
    const final_built = [ makeKoMatch("final_", 0,
      slotResolve({winM:SF_FIFA[0]}), slotResolve({winM:SF_FIFA[1]}), 104) ];
    const third_built = [ makeKoMatch("third_", 0,
      slotResolve({loseM:SF_FIFA[0]}), slotResolve({loseM:SF_FIFA[1]}), 103) ];

    // Overlay verkliga KO-fixtures: behåll FIFA-num/labels men ta kickoff/team/score
    function overlayKO(structural, stagePrefix, baseFifa){
      const real = allMatches.filter(m => m.id.indexOf(stagePrefix) === 0)
        .sort((a,b) => a.kickoff - b.kickoff);
      real.forEach((rm, i) => {
        const s = structural.find(x => x.fifa === baseFifa + i);
        if(!s) return;
        s.id = rm.id;
        s.kickoff = rm.kickoff;
        s.status = rm.status;
        if(rm.home){ s.home = rm.home; s.fromA = null; }
        if(rm.away){ s.away = rm.away; s.fromB = null; }
        s.ga = rm.ga; s.gb = rm.gb;
        s.winner = rm.winner;
        s.scorers = rm.scorers || [];
        s.cards = rm.cards || [];
        s._realId = rm._realId;
        if(rm.venue && rm.venue.stadium) s.venue = rm.venue;
      });
    }
    overlayKO(r32_built, "r32_", 73);
    overlayKO(r16_built, "r16_", 89);
    overlayKO(qf_built, "qf_", 97);
    overlayKO(sf_built, "sf_", 101);
    overlayKO(third_built, "third_", 103);
    overlayKO(final_built, "final_", 104);

    // Fyll i nästa omgång när den nuvarande avgörs (Vinnare/Förlorare MX -> faktiskt lag).
    const _allKo = [].concat(r32_built, r16_built, qf_built, sf_built, third_built, final_built);
    const _byFifa = {};
    _allKo.forEach(function(m){ if(m.fifa != null) _byFifa[m.fifa] = m; });
    function _fromResult(label){
      if(!label) return null;
      var win = /^Vinnare M(\d+)$/.exec(label);
      if(win){ var f = _byFifa[+win[1]]; return (f && f.status === "played" && f.winner) ? f.winner : null; }
      var lose = /^Förlorare M(\d+)$/.exec(label);
      if(lose){ var g = _byFifa[+lose[1]]; if(g && g.status === "played" && g.winner) return g.home === g.winner ? g.away : g.home; }
      return null;
    }
    _allKo.forEach(function(m){
      if(!m.home && !m.projHome){ var w = _fromResult(m.fromA); if(w) m.projHome = w; }
      if(!m.away && !m.projAway){ var x = _fromResult(m.fromB); if(x) m.projAway = x; }
    });

    const knockout = {
      r32: r32_built, r16: r16_built, qf: qf_built, sf: sf_built,
      third: third_built, final: final_built
    };

    // Ersätt KO-entries i allMatches med structural-versionerna
    const koIds = new Set();
    [r32_built, r16_built, qf_built, sf_built, third_built, final_built]
      .forEach(arr => arr.forEach(m => koIds.add(m.id)));
    const groupMatches = allMatches.filter(m => m.stage === "group");
    const allMatchesNew = groupMatches.concat(r32_built, r16_built, qf_built, sf_built, third_built, final_built);
    allMatchesNew.sort((a,b) => a.kickoff - b.kickoff);
    allMatches.length = 0;
    allMatchesNew.forEach(m => allMatches.push(m));

    const koRounds = [
      { key:"r32", label:"Sextondelsfinal", count:16 },
      { key:"r16", label:"Åttondelsfinal", count:8 },
      { key:"qf",  label:"Kvartsfinal", count:4 },
      { key:"sf",  label:"Semifinal", count:2 },
      { key:"final", label:"Final", count:1 }
    ];

    // ============= forms =============
    // 1) seed med riktiga senaste-5 från engine (team_forms.json via daglig job)
    const forms = {};
    Object.keys(TEAMS).forEach(c => { forms[c] = []; });
    const realForms = D.team_forms || {};
    Object.keys(realForms).forEach(tla => {
      const code = TEAMS[tla] ? tla : null;
      if(!code) return;
      (realForms[tla] || []).forEach(e => {
        forms[code].push({
          vs: e.oppTla || e.opp,
          opp: e.opp,
          gf: e.gf, ga: e.ga,
          r: e.r,
          date: e.date,
          comp: e.competition
        });
      });
    });
    // 2) lägg till VM-matcher som spelats (har högre prio = senaste).
    allMatches.forEach(m => {
      if(m.status !== "played" || !m.home || !m.away) return;
      const r = (g,o) => g > o ? "V" : g < o ? "F" : "O";
      forms[m.home].push({ vs:m.away, opp:m.away, gf:m.ga, ga:m.gb, r:r(m.ga, m.gb), id:m.id, comp:"WC" });
      forms[m.away].push({ vs:m.home, opp:m.home, gf:m.gb, ga:m.ga, r:r(m.gb, m.ga), id:m.id, comp:"WC" });
    });
    // Klipp till de 5 senaste (eftersom team_forms redan är begränsat till 5
    // gör concat med VM-matcher max 10 → vi behåller bara de 5 senaste).
    Object.keys(forms).forEach(c => { forms[c] = forms[c].slice(-5); });

    // ============= PLAYERS / STANDINGS / TIPS / BONUS =============
    const BONUS_KEY_MAP = {
      winner:"winner", silver:"silver", bronze:"bronze",
      top_scorer:"topscorer", best_player:"bestplayer",
      best_young:"youngplayer", best_keeper:"keeper"
    };
    const TEAM_BONUS = new Set(["winner","silver","bronze"]);

    const realIdToMatchId = {};
    allMatches.forEach(m => { if(m._realId != null) realIdToMatchId[m._realId] = m.id; });

    function buildPlayerTips(playerName){
      const out = {};
      (D.matches || []).forEach(rm => {
        const t = (rm.tips || []).find(x => x.name === playerName);
        if(t){
          const designId = realIdToMatchId[rm.id];
          if(designId) out[designId] = [t.tip[0], t.tip[1]];
        }
      });
      return out;
    }
    function buildBonus(detail){
      const out = {};
      Object.keys(BONUS_KEY_MAP).forEach(srcKey => {
        const dstKey = BONUS_KEY_MAP[srcKey];
        const v = detail && detail[srcKey];
        if(!v){ out[dstKey] = TEAM_BONUS.has(dstKey) ? null : ["-", null]; return; }
        if(TEAM_BONUS.has(dstKey)){
          out[dstKey] = teamCodeFromPick(v.pick, TEAMS);
        } else {
          out[dstKey] = [v.pick || "-", null];
        }
      });
      return out;
    }

    const leaderboard = D.leaderboard || [];
    const players = leaderboard.map(p => {
      const tips = buildPlayerTips(p.name);
      let exact = p.exact_count || 0;
      let correct = 0, other = 0;
      let pts = 0;
      allMatches.forEach(m => {
        if(m.status !== "played" || !m.home || !m.away) return;
        const tip = tips[m.id];
        if(!tip) return;
        if(tip[0] === m.ga && tip[1] === m.gb){ pts += 5; }
        else {
          const o1 = tip[0] > tip[1] ? "H" : tip[0] < tip[1] ? "B" : "X";
          const o2 = m.ga    > m.gb    ? "H" : m.ga    < m.gb    ? "B" : "X";
          if(o1 === o2){ pts += 2; correct++; }
          else { pts += 1; other++; }
        }
      });
      const pid = p.name.toLowerCase().replace(/[åä]/g,"a").replace(/ö/g,"o").replace(/[^a-z0-9]/g,"");
      return {
        id: pid, name: p.name,
        color: PLAYER_COLORS[p.name] || "#7A3CF0",
        photo: playerPhoto(p.name),
        tips,
        points: p.match_points || 0,
        exact, correct, other,
        bonus: buildBonus(p.bonus_detail),
        bonusPts: p.bonus_points || 0,
        rank: p.rank || 0,
        total: (p.match_points || 0) + (p.bonus_points || 0)
      };
    });

    const standings = players.slice().sort((a,b) =>
      (b.total - a.total) || (b.exact - a.exact) || a.name.localeCompare(b.name));
    let prevTot = null, rank = 0;
    standings.forEach((p, i) => {
      if(p.total !== prevTot){ rank = i + 1; prevTot = p.total; }
      p.rank = rank;
    });
    standings.forEach(s => { const p = players.find(x => x.id === s.id); if(p) p.rank = s.rank; });

    const TOURNAMENT_START_MS = Date.UTC(2026, 5, 11, 19, 0); // 11 jun 2026 19:00 UTC
    const anyLive = allMatches.some(m => m.status === "live");
    const anyPlayed = allMatches.some(m => m.status === "played");
    const state = (anyPlayed || anyLive || Date.now() >= TOURNAMENT_START_MS) ? "mid" : "pre";

    const podiumPicks = { p1:[], p2:[] };
    return {
      state, now: new Date(),
      teams: TEAMS, groups: GROUPS, groupLetters: GROUP_LETTERS,
      matches, allMatches, groupTables,
      knockout, koRounds, qualifiers: [],
      players, standings, forms,
      pot: {
        ...podiumPicks,
        perPlayer: (D.pot && D.pot.per_player) || 300,
        total: (D.pot && D.pot.total) || (players.length * 300),
        currency: (D.pot && D.pot.currency) || "kr"
      },
      stars: []
    };
  }

  function h2h(){ return null; }

  const TEAMS_INIT = {};
  const GROUPS_INIT = {};
  GROUP_LETTERS.forEach(L => { GROUPS_INIT[L] = []; });

  window.VM = {
    build, PLAYERS: [], PRIZES, TEAMS: TEAMS_INIT, GROUPS: GROUPS_INIT,
    GROUP_LETTERS, STARS: [], KEEPERS: [], YOUNG: [], POT: PRIZES,
    h2h, VENUES: []
  };

  const _origBuild = build;
  window.VM.build = function(){
    const data = _origBuild();
    window.VM.TEAMS = data.teams;
    window.VM.GROUPS = data.groups;
    return data;
  };
})();

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react - the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability - if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag - ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char - so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings - map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick - checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor - curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts - a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

const SV_MON = ["jan", "feb", "mar", "apr", "maj", "jun", "jul", "aug", "sep", "okt", "nov", "dec"];
function svTime(d) {
  const dt = new Date(d);
  const h = (dt.getUTCHours() + 2) % 24, m = dt.getUTCMinutes();
  return String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0");
}
function svDateKey(d) {
  const sv = new Date(new Date(d).getTime() + 2 * 3600000);
  return sv.getUTCFullYear() + "-" + (sv.getUTCMonth() + 1) + "-" + sv.getUTCDate();
}
function svDayLabel(d) {

/* ---------- räkna upp siffror ---------- */
function useCountUp(target, dur = 800) {
  const [v, setV] = React.useState(target);
  React.useEffect(() => {
    const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) { setV(target); return; }
    let raf, start, done = false;
    setV(0);
    const step = (ts) => {
      if (!start) start = ts;
      const p = Math.min(1, (ts - start) / dur);
      setV(Math.round(target * (1 - Math.pow(1 - p, 3))));
      if (p < 1) raf = requestAnimationFrame(step); else done = true;
    };
    raf = requestAnimationFrame(step);
    const safety = setTimeout(() => { if (!done) setV(target); }, dur + 400);
    return () => { cancelAnimationFrame(raf); clearTimeout(safety); };
  }, [target, dur]);
  return v;
}

      ))}

  );
}

/* Team-rating för odds-beräkning */
function teamRating(code){
  const h = WC_HISTORY[code];
  let r = 70;
  if(h){
    if(h.titles)   r += 4 + h.titles * 2;
    if(h.runnerUp) r += h.runnerUp * 1.2;
    if(h.third)    r += h.third * 0.8;
    if(h.semis)    r += Math.min(8, h.semis * 0.6);
    if(h.apps)     r += Math.min(4, h.apps * 0.15);
  }
  const bumps = { ARG: 4, FRA: 4, ESP: 3, ENG: 3, BRA: 3, POR: 3, NED: 2, GER: 2, MAR: 2, CRO: 2, BEL: 1, USA: 1 };
  if(bumps[code]) r += bumps[code];
  // FIFA-ranking bonus (lägre rank = bättre)
  const fr = FIFA_RANKING[code];
  if(fr && fr <= 15) r += (16 - fr) * 0.4;
  return Math.min(95, Math.round(r));
}

/* H/D/A% från lagrating + hemmaplansbonus */
function matchOdds(homeCode, awayCode){
  if(!homeCode || !awayCode) return null;
  const rH = teamRating(homeCode) + 3;
  const rA = teamRating(awayCode);
  const diff = rH - rA;
  const pHwin = 1 / (1 + Math.exp(-diff / 7));
  const pAwin = 1 / (1 + Math.exp(diff / 7));
  const closeness = 1 - Math.abs(pHwin - pAwin);
  const pD = Math.max(0.10, Math.min(0.34, 0.18 + closeness * 0.20));
  const raw = pHwin + pAwin + pD;
  const h = pHwin / raw, d = pD / raw, a = pAwin / raw;
  const round = (x) => Math.round(x * 100);
  let H = round(h), D = round(d), A = round(a);
  const delta = 100 - (H + D + A);
  if(delta !== 0) H += delta;
  return { H, D, A };
}

function resolveWikiCandidates(name){
  if(!name) return [];
  const key = String(name).toLowerCase().trim();
  return WIKI_TITLE_MAP[key] || [name];
}
function useWikiPhoto(name, size = 400){
  const candidates = React.useMemo(() => resolveWikiCandidates(name), [name]);
  const cacheKey = candidates.join("|") + "@" + size;
  const [url, setUrl] = React.useState(() => (cacheKey in _wikiCache) ? _wikiCache[cacheKey] : null);
  React.useEffect(() => {
    if(!candidates.length) return;
    if(cacheKey in _wikiCache){ setUrl(_wikiCache[cacheKey]); return; }
    if(_wikiInflight[cacheKey]){
      _wikiInflight[cacheKey].then(u => setUrl(u));
      return;
    }
    const tryNext = async (i) => {
      if(i >= candidates.length) return null;
      try {
        const api = "https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&prop=pageimages"
                  + "&pithumbsize=" + size + "&redirects=1&titles=" + encodeURIComponent(candidates[i]);
        const res = await fetch(api);
        if(!res.ok) return tryNext(i + 1);
        const json = await res.json();
        const pages = (json && json.query && json.query.pages) || {};
        const first = Object.values(pages)[0];
        const thumb = (first && first.thumbnail && first.thumbnail.source) || null;
        if(thumb) return thumb;
        return tryNext(i + 1);
      } catch (e) { return tryNext(i + 1); }
    };
    _wikiInflight[cacheKey] = tryNext(0)
      .then(thumb => { _wikiCache[cacheKey] = thumb; _saveWikiCache(); return thumb; })
      .finally(() => { delete _wikiInflight[cacheKey]; });
    _wikiInflight[cacheKey].then(u => setUrl(u));
  }, [cacheKey]);
  return url;
}

function slugifyName(name) {
  return String(name || "").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "")
    .replace(/å|ä/g, "a").replace(/ö/g, "o").replace(/[^a-z0-9 ]/g, "")
    .trim().replace(/\s+/g, "-");
}
function StarPhoto({ name, countryCode, size = 32, showFlag = true }) {
  const wikiUrl = useWikiPhoto(name);
  const [err, setErr] = React.useState(false);
  const initials = String(name || "?").split(/\s+/).slice(0,2).map(w => (w[0]||"")).join("").toUpperCase();

      background: "linear-gradient(140deg, var(--cool), color-mix(in oklab, var(--cool) 60%, #000 18%))",

        color: "#fff", fontWeight: 800, fontSize: size * 0.36 }}>{initials}</span>
      {!err && wikiUrl && (
        <img src={wikiUrl} alt="" loading="lazy" onError={() => setErr(true)}
          style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover" }} />
      )}
      {showFlag && countryCode && (

    </span>
  );
}

}

function Timeline({ m }) {
  const ev = [];
  (m.scorers || []).forEach(s => ev.push({ minute: s.minute, injuryTime: s.injuryTime, team: s.team, name: s.name, kind: "goal", pen: s.pen, header: s.header, assist: s.assist, score: s.score }));
  (m.cards || []).forEach(c => ev.push({ minute: c.minute, team: c.team, name: c.name, kind: c.type }));
  (m.subs || []).forEach(s => ev.push({ minute: s.minute, team: s.team, kind: "sub", playerIn: s.playerIn, playerOut: s.playerOut }));
  const KIND_PRI = { goal: 0, yellow: 1, red: 2, "yellow-red": 3, sub: 4 };
  const parseMinute = s => { const ns = String(s||0).match(/\d+/g)||['0']; return { min: parseInt(ns[0])||0, inj: ns[1] ? parseInt(ns[1]) : 0 }; };
  ev.sort((a, b) => {
    const pa = parseMinute(a.minute), pb = parseMinute(b.minute);
    const ta = pa.min * 100 + (a.injuryTime != null ? a.injuryTime : pa.inj);
    const tb = pb.min * 100 + (b.injuryTime != null ? b.injuryTime : pb.inj);
    return ta - tb || (KIND_PRI[a.kind]||5) - (KIND_PRI[b.kind]||5);
  });
  if (!ev.length) {
    const played = m.status === "played";
    const msg = played
      ? "Detaljerad händelsedata hämtas från API…"
      : "Inga händelser ännu – 0–0.";
    return (
      <div style={{ padding: "18px", textAlign: "center", color: "var(--ink-soft)", fontWeight: 600, fontSize: 13 }}>{msg}</div>
    );
  }
  let sh = 0, sa = 0;
  const minLabel = (e) => {
    let s = (e.minute || "?") + "'";
    if (e.injuryTime) s = (e.minute || "?") + "+" + e.injuryTime + "'";
    return s;
  };
  const side = (e, home) => {
    if (e.kind === "sub") {
      return (
        <div style={{ display:"flex", alignItems:"center", gap:6, flexDirection: home ? "row-reverse" : "row",
          textAlign: home ? "right" : "left" }}>
          <EventIcon kind="sub" />
          <div style={{ minWidth:0 }}>
            <div style={{ fontWeight:700, fontSize:12.5, color:"#2BD17E", lineHeight:1.15 }}>▲ {e.playerIn}</div>
            <div style={{ fontWeight:600, fontSize:11.5, color:"#FF5A52", lineHeight:1.3 }}>▼ {e.playerOut}</div>
          </div>
        </div>
      );
    }
    const label = { goal: "MÅL", yellow: "Gult kort", red: "Rött kort" }[e.kind];
    const goalScore = e.score ? e.score[0] + "–" + e.score[1] : sh + "–" + sa;
    return (
      <div style={{ display: "flex", alignItems: "center", gap: 8, flexDirection: home ? "row-reverse" : "row",
        textAlign: home ? "right" : "left" }}>
        <EventIcon kind={e.kind} />
        <div style={{ minWidth: 0 }}>
          <div style={{ fontWeight: 700, fontSize: 13, lineHeight: 1.15 }}>
            {e.name}
            {e.pen ? <span style={{ color: "var(--ink-soft)", fontWeight: 600, fontSize: 11 }}> (str)</span> : ""}
            {e.header && !e.pen ? <span style={{ color: "var(--ink-soft)", fontWeight: 600, fontSize: 11 }}> (hd)</span> : ""}
          </div>
          {e.assist && e.kind === "goal" && (
            <div style={{ fontSize: 10.5, fontWeight: 600, color: "var(--ink-soft)", lineHeight: 1.3 }}>Assist: {e.assist}</div>
          )}
          <div style={{ fontSize: 10.5, fontWeight: 700, color: e.kind === "goal" ? "var(--hot)" : "var(--ink-soft)", letterSpacing: ".03em" }}>
            {e.kind === "goal" ? "MÅL · " + goalScore : label}</div>
        </div>
      </div>
    );
  };
  return (
    <div style={{ position: "relative", padding: "6px 14px 12px" }}>
      <div style={{ position: "absolute", left: "50%", top: 6, bottom: 12, width: 2, marginLeft: -1, background: "var(--line)" }} />
      {ev.map((e, i) => {
        const home = e.team === m.home;
        if (e.kind === "goal") { if (home) sh++; else sa++; }
        return (
          <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 40px 1fr", alignItems: "center",
            gap: 6, position: "relative", padding: "6px 0" }}>
            <div style={{ display: "flex", justifyContent: "flex-end" }}>{home ? side(e, true) : null}</div>
            <div style={{ display: "flex", justifyContent: "center" }}>
              <span className="num" style={{ background: e.kind === "goal" ? "var(--ink)" : (e.kind === "sub" ? "var(--panel)" : "var(--bg2)"),
                color: e.kind === "goal" ? "var(--bg)" : "var(--ink-soft)", border: "1px solid " + (e.kind === "goal" ? "var(--ink)" : "var(--line)"),
                borderRadius: 7, padding: "2px 6px", fontSize: 11, fontWeight: 800, minWidth: 30, textAlign: "center" }}>{minLabel(e)}</span>
            </div>
            <div style={{ display: "flex", justifyContent: "flex-start" }}>{!home ? side(e, false) : null}</div>
          </div>
        );
      })}
    </div>
  );

function TipsDistribution({ data, m }) {
  const tips = data.players.map(p => p.tips[m.id]).filter(Boolean);
  if (!tips.length) return null;
  let h = 0, d = 0, a = 0;
  const scoreCount = {};
  tips.forEach(([th, ta]) => {
    if (th > ta) h++; else if (th < ta) a++; else d++;
    const k = th + "-" + ta; scoreCount[k] = (scoreCount[k] || 0) + 1;
  });
  const fav = Object.entries(scoreCount).sort((x, y) => y[1] - x[1])[0];
  const tot = tips.length;
  const seg = (n, color, label) => (
    <div style={{ flex: Math.max(n, 0.15), display: "flex", flexDirection: "column", alignItems: "center" }}>
      <div style={{ width: "100%", height: 8, background: color, borderRadius: 3 }} />
      <span className="num" style={{ fontSize: 13, fontWeight: 800, marginTop: 6 }}>{n}</span>
      <span style={{ fontSize: 10.5, fontWeight: 700, color: "var(--ink-soft)" }}>{label}</span>
    </div>
  );
  return (
    <MiniBlock title={"Poolen tippar · " + tot + " tips"}>
      <div style={{ display: "flex", gap: 8, alignItems: "flex-start" }}>
        {seg(h, "var(--hot)", window.VM.TEAMS[m.home].name)}
        {seg(d, "var(--line-strong)", "Oavgjort")}
        {seg(a, "var(--cool)", window.VM.TEAMS[m.away].name)}
      </div>
      <div style={{ marginTop: 12, paddingTop: 11, borderTop: "1px solid var(--line)", display: "flex",
        justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontSize: 12.5, fontWeight: 600, color: "var(--ink-soft)" }}>Vanligaste tipset</span>
        <span className="num" style={{ fontWeight: 800, fontSize: 15 }}>{fav[0].replace("-", "–")} <span style={{ color: "var(--ink-soft)", fontSize: 12, fontWeight: 700 }}>×{fav[1]}</span></span>
      </div>

  );
}

function PoolResultBlock({ data, m }) {
  // Visar ALLA spelares tippningar - poäng om matchen är spelad, annars bara tippet.
  // Under live: visa preliminary poäng baserat på aktuellt ställning.
  const played = m.status === "played" && m.ga != null && m.gb != null;
  const live = m.status === "live" && m.ga != null && m.gb != null;
  const scored = played || live;
  const calcPts = (tip, ga, gb) => {
    let pts = 1;
    if (tip[0] === ga && tip[1] === gb) return 5;
    const o1 = tip[0] > tip[1] ? "H" : tip[0] < tip[1] ? "B" : "X";
    const o2 = ga > gb ? "H" : ga < gb ? "B" : "X";
    if (o1 === o2) pts = 2;
    return pts;
  };
  const rows = data.players.map(p => {
    const tip = p.tips[m.id];
    if (!tip) return null;
    const pts = scored ? calcPts(tip, m.ga, m.gb) : null;
    return { p, tip, pts };
  }).filter(Boolean);
  if (!rows.length) return null;
  rows.sort((a, b) => (scored ? (b.pts - a.pts) : 0) || a.p.name.localeCompare(b.p.name));
  const col = { 5: "var(--gold)", 2: "var(--warm)", 1: "var(--ink-soft)" };
  const title = played ? "Så tippade poolen" : live ? "Tippet just nu (pågår)" : "Vad alla har tippat";
  return (
    <MiniBlock title={title} pad={false}>
      {rows.map((r, i) => (
        <div key={r.p.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 14px",
          borderBottom: i < rows.length - 1 ? "1px solid var(--line)" : "none" }}>
          <Avatar p={r.p} size={28} />
          <span style={{ fontWeight: 700, fontSize: 13.5, flex: 1 }}>{r.p.name}</span>
          <span className="num" style={{ fontWeight: 800, fontSize: 14, color: "var(--ink-soft)" }}>{r.tip[0]}–{r.tip[1]}</span>
          {r.pts != null && (
            <span className="num display" style={{ fontWeight: 800, fontSize: 17, color: col[r.pts], width: 34, textAlign: "right",
              opacity: live ? 0.85 : 1 }}>
              +{r.pts}{live ? <span style={{ fontSize: 9, verticalAlign: "super", opacity: .7 }}>~</span> : null}
            </span>
          )}
        </div>
      ))}
    </MiniBlock>
  );
}

function WinChanceBlock({ m }){
  if(!m.home || !m.away) return null;
  const mlFmt = v => v > 0 ? "+" + v : String(v);
  const mlToDecimal = v => v < 0 ? (100/(-v) + 1) : (v/100 + 1);
  const mlToImpl = v => v < 0 ? (-v)/(-v+100) : 100/(v+100);

  let o, oddsSource = null, eo = m.espnOdds;

  // Priority 1: ESPN/DraftKings moneyline  (compute implied 1X2 with ~27% draw prior)
  if(eo && eo.homeML != null && eo.awayML != null){
    const pHraw = mlToImpl(eo.homeML);
    const pAraw = mlToImpl(eo.awayML);
    const sum2  = pHraw + pAraw;
    // Remove vig, scale to 2-way; then allocate ~27% draw (historical WC rate)
    const DRAW_PRIOR = 0.27;
    const pHadj = pHraw / sum2 * (1 - DRAW_PRIOR);
    const pAadj = pAraw / sum2 * (1 - DRAW_PRIOR);
    const pD    = DRAW_PRIOR;
    const tot   = pHadj + pD + pAadj;
    const round = x => Math.round(x/tot*100);
    let H = round(pHadj), D = round(pD), A = round(pAadj);
    H += 100 - (H+D+A);
    o = { H, D, A,
          decH: mlToDecimal(eo.homeML).toFixed(2),
          decA: mlToDecimal(eo.awayML).toFixed(2),
          decD: null };
    oddsSource = "ESPN · " + (eo.provider || "DraftKings");
  }
  // Priority 2: football-data decimal odds
  else if(m.officialOdds && m.officialOdds.H != null){
    const decH=m.officialOdds.H, decD=m.officialOdds.D, decA=m.officialOdds.A;
    const pH=1/decH, pD=1/decD, pA=1/decA, tot=pH+pD+pA;
    const round=x=>Math.round(x/tot*100);
    let H=round(pH), D=round(pD), A=round(pA); H+=100-(H+D+A);
    o = { H, D, A, decH: decH.toFixed(2), decD: decD.toFixed(2), decA: decA.toFixed(2) };
    oddsSource = "football-data.org";
  }
  // Priority 3: model calculation
  else {
    o = window.VM.matchOdds(m.home, m.away);
  }
  if(!o) return null;

  const isModel = !oddsSource;
  return (
    <MiniBlock title={isModel ? "Vinstchans inför avspark" : "Odds inför avspark"}>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12, marginBottom:12, alignItems:"end" }}>
        <div style={{ textAlign:"center", paddingBottom:6, borderBottom:"2px solid var(--hot)" }}>
          <div style={{ fontSize:10, fontWeight:800, letterSpacing:".12em", color:"var(--ink-soft)", textTransform:"uppercase" }}>1 · Hemma</div>
          <div className="display" style={{ fontSize:36, color:"var(--hot)", marginTop:2, lineHeight:1 }}>{o.H}<span style={{ fontSize:16, color:"var(--ink-soft)" }}>%</span></div>
          {o.decH && <div className="num" style={{ fontSize:11, fontWeight:700, color:"var(--ink-soft)", marginTop:4 }}>dec {o.decH}</div>}
          {eo && eo.homeML != null && <div className="num" style={{ fontSize:12, fontWeight:800, color:"var(--hot)", marginTop:2 }}>{mlFmt(eo.homeML)}</div>}
        </div>
        <div style={{ textAlign:"center", paddingBottom:6, borderBottom:"2px solid var(--ink-soft)" }}>
          <div style={{ fontSize:10, fontWeight:800, letterSpacing:".12em", color:"var(--ink-soft)", textTransform:"uppercase" }}>X · Lika</div>
          <div className="display" style={{ fontSize:36, color:"var(--ink)", marginTop:2, lineHeight:1 }}>{o.D}<span style={{ fontSize:16, color:"var(--ink-soft)" }}>%</span></div>
          {o.decD && <div className="num" style={{ fontSize:11, fontWeight:700, color:"var(--ink-soft)", marginTop:4 }}>dec {o.decD}</div>}
          {eo && <div style={{ fontSize:10, color:"var(--ink-soft)", marginTop:2, fontStyle:"italic" }}>ca 27% hist.</div>}
        </div>
        <div style={{ textAlign:"center", paddingBottom:6, borderBottom:"2px solid var(--cool)" }}>
          <div style={{ fontSize:10, fontWeight:800, letterSpacing:".12em", color:"var(--ink-soft)", textTransform:"uppercase" }}>2 · Borta</div>
          <div className="display" style={{ fontSize:36, color:"var(--cool)", marginTop:2, lineHeight:1 }}>{o.A}<span style={{ fontSize:16, color:"var(--ink-soft)" }}>%</span></div>
          {o.decA && <div className="num" style={{ fontSize:11, fontWeight:700, color:"var(--ink-soft)", marginTop:4 }}>dec {o.decA}</div>}
          {eo && eo.awayML != null && <div className="num" style={{ fontSize:12, fontWeight:800, color:"var(--cool)", marginTop:2 }}>{mlFmt(eo.awayML)}</div>}
        </div>
      </div>
      <div style={{ display:"flex", gap:2, height:8, borderRadius:4, overflow:"hidden", marginBottom:12 }}>
        <span style={{ flex:o.H, background:"var(--hot)", transition:"flex .4s ease" }} />
        <span style={{ flex:o.D, background:"var(--ink-soft)", transition:"flex .4s ease" }} />
        <span style={{ flex:o.A, background:"var(--cool)", transition:"flex .4s ease" }} />
      </div>
      {eo && (eo.spread || eo.overUnder != null) && (
        <div style={{ display:"flex", gap:8, marginBottom:12 }}>
          {eo.spread && (
            <div style={{ flex:1, background:"var(--bg2)", borderRadius:8, padding:"8px 10px", textAlign:"center" }}>
              <div style={{ fontSize:9.5, fontWeight:800, color:"var(--ink-soft)", letterSpacing:".06em", textTransform:"uppercase", marginBottom:3 }}>Handikapp</div>
              <div className="num" style={{ fontWeight:800, fontSize:15 }}>{eo.spread}</div>
            </div>
          )}
          {eo.overUnder != null && (
            <div style={{ flex:1, background:"var(--bg2)", borderRadius:8, padding:"8px 10px", textAlign:"center" }}>
              <div style={{ fontSize:9.5, fontWeight:800, color:"var(--ink-soft)", letterSpacing:".06em", textTransform:"uppercase", marginBottom:3 }}>Över/Under</div>
              <div className="num" style={{ fontWeight:800, fontSize:15 }}>{eo.overUnder}
                {eo.overOdds != null && (

        <strong style={{ color:"var(--ink)", fontStyle:"normal" }}>Källa:</strong>{" "}
        {oddsSource
