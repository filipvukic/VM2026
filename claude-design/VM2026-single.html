<style>
  /* ====== PALETT & TYPSNITT (styrs av Tweaks) ====== */
  :root {
    /* Solnedgång (default, förfinad) */
    --hot:   #D81E5B;
    --warm:  #F06543;
    --gold:  #E8A630;
    --cool:  #6C3FB5;
    --deep:  #2A0E3F;
    --grad: linear-gradient(120deg,#3A1452 0%,#7A1E5A 48%,#C23A55 100%);
    --grad-soft: linear-gradient(120deg,#7A1E5A,#C23A55);

    --font-display: 'Archivo Expanded','Archivo',sans-serif;
    --font-body: 'Archivo', system-ui, sans-serif;
    --display-tracking: -0.01em;
    --display-transform: none;
    --display-weight: 800;

    /* ljus, varm men sofistikerad bas */
    --bg:    #F4F1EA;
    --bg2:   #ECE6DA;
    --paper: #FFFFFF;
    --ink:   #1C1B1A;
    --ink-soft: #6E6A62;
    --line:  #E7E1D5;
    --line-strong: #D6CDBC;

    --r-lg: 20px; --r-md: 14px; --r-sm: 10px;
    --shadow: 0 1px 2px rgba(40,30,15,.05), 0 6px 18px -12px rgba(40,30,15,.18);
    --shadow-lift: 0 2px 6px rgba(40,20,40,.08), 0 24px 48px -24px rgba(40,20,40,.30);
    --nav-h: 68px;
    --maxw: 1080px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }
  /* dekorativ bakgrund: mycket subtil varm vinjett */
  body::before {
    content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(70vw 50vw at 90% -10%, color-mix(in oklab, var(--gold) 12%, transparent), transparent 60%),
      radial-gradient(60vw 50vw at -10% 0%, color-mix(in oklab, var(--hot) 8%, transparent), transparent 60%);
  }
  #root { position: relative; z-index: 1; }
  .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

  h1,h2,h3 { margin: 0; }
  .display {
    font-family: var(--font-display);
    text-transform: var(--display-transform);
    letter-spacing: var(--display-tracking);
    line-height: .98;
    font-weight: var(--display-weight, 800);
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  img { display: block; max-width: 100%; }

  /* skydd mot horisontell scroll */
  .app-scroll::-webkit-scrollbar { width: 0; height: 0; }

  /* fokus-tillgänglighet */
  :focus-visible { outline: 3px solid var(--cool); outline-offset: 2px; }

  @keyframes pop { 0%{transform:scale(.6);opacity:0} 60%{transform:scale(1.08)} 100%{transform:scale(1);opacity:1} }
  @keyframes riseIn { from{transform:translateY(16px)} to{transform:translateY(0)} }
  @keyframes fadeRise { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  @media (prefers-reduced-motion: no-preference) {
    .can-fade { animation-name: fadeRise !important; }
  }
  @keyframes livePulse { 0%,100%{box-shadow:0 0 0 0 rgba(229,38,126,.55)} 50%{box-shadow:0 0 0 7px rgba(229,38,126,0)} }
  @keyframes confettiFall { to { transform: translateY(115vh) rotate(720deg); } }
  @keyframes shine { from{background-position:-200% 0} to{background-position:200% 0} }
  @keyframes barGrow { from { width: 0 !important; } }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: .001ms !important; animation-iteration-count: 1 !important; }
  }
</style>

<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- ============ image-slot.js ============ -->
  <script>
// @ds-adherence-ignore -- omelette starter scaffold (raw elements/hex/px by design)
/* BEGIN USAGE */
/**
 * <image-slot> — user-fillable image placeholder.
 *
 * Drop this into a deck, mockup, or page wherever you want the user to
 * supply an image. You control the slot's shape and size; the user fills it
 * by dragging an image file onto it (or clicking to browse). The dropped
 * image persists across reloads via a .image-slots.state.json sidecar —
 * same read-via-fetch / write-via-window.omelette pattern as
 * design_canvas.jsx, so the filled slot shows on share links, downloaded
 * zips, and PPTX export. Outside the omelette runtime the slot is read-only.
 *
 * The host bridge only allows sidecar writes at the project root, so the
 * HTML that uses this component is assumed to live at the project root too
 * (same constraint as design_canvas.jsx).
 *
 * Attributes:
 *   id           Persistence key. REQUIRED for the drop to survive reload —
 *                every slot on the page needs a distinct id.
 *   shape        'rect' | 'rounded' | 'circle' | 'pill'   (default 'rounded')
 *                'circle' applies 50% border-radius; on a non-square slot
 *                that's an ellipse — set equal width and height for a true
 *                circle.
 *   radius       Corner radius in px for 'rounded'.       (default 12)
 *   mask         Any CSS clip-path value. Overrides `shape` — use this for
 *                hexagons, blobs, arbitrary polygons.
 *   fit          object-fit: cover | contain | fill.       (default 'cover')
 *                With cover (the default) double-clicking the filled slot
 *                enters a reframe mode: the whole image spills past the mask
 *                (translucent outside, opaque inside), drag to reposition,
 *                corner-drag to scale. The crop persists alongside the image
 *                in the sidecar. contain/fill stay static.
 *   position     object-position for fit=contain|fill.     (default '50% 50%')
 *   placeholder  Empty-state caption.                      (default 'Drop an image')
 *   src          Optional initial/fallback image URL. A user drop overrides
 *                it; clearing the drop reveals src again.
 *
 * Size and layout come from ordinary CSS on the element — width/height
 * inline or from a parent grid — so it composes with any layout.
 *
 * Usage:
 *   <image-slot id="hero"   style="width:800px;height:450px" shape="rounded" radius="20"
 *               placeholder="Drop a hero image"></image-slot>
 *   <image-slot id="avatar" style="width:120px;height:120px" shape="circle"></image-slot>
 *   <image-slot id="kite"   style="width:300px;height:300px"
 *               mask="polygon(50% 0, 100% 50%, 50% 100%, 0 50%)"></image-slot>
 */
/* END USAGE */

(() => {
  const STATE_FILE = '.image-slots.state.json';
  // 2× a ~600px slot in a 1920-wide deck — retina-sharp without making the
  // sidecar enormous. A 1200px WebP at q=0.85 is ~150-300KB.
  const MAX_DIM = 1200;
  // Raster formats only. SVG is excluded (can carry script; createImageBitmap
  // on SVG blobs is inconsistent). GIF is excluded because the canvas
  // re-encode keeps only the first frame, so an animated GIF would silently
  // go still — better to reject than surprise.
  const ACCEPT = ['image/png', 'image/jpeg', 'image/webp', 'image/avif'];

  // ── Shared sidecar store ────────────────────────────────────────────────
  // One fetch + immediate write-on-change for every <image-slot> on the
  // page. Reads via fetch() so viewing works anywhere the HTML and sidecar
  // are served together; writes go through window.omelette.writeFile, which
  // the host allowlists to *.state.json basenames only.
  const subs = new Set();
  let slots = {};
  // ids explicitly cleared before the sidecar fetch resolved — otherwise
  // the merge below can't tell "never set" from "just deleted" and would
  // resurrect the sidecar's stale value.
  const tombstones = new Set();
  let loaded = false;
  let loadP = null;

  function load() {
    if (loadP) return loadP;
    loadP = fetch(STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((j) => {
        // Merge: sidecar loses to any in-memory change that raced ahead of
        // the fetch (drop or clear) so neither is clobbered by hydration.
        if (j && typeof j === 'object') {
          const merged = Object.assign({}, j, slots);
          // A framing-only write that raced ahead of hydration must not
          // drop a user image that's only on disk — inherit u from the
          // sidecar for any in-memory entry that lacks one.
          for (const k in slots) {
            if (merged[k] && !merged[k].u && j[k]) {
              merged[k].u = typeof j[k] === 'string' ? j[k] : j[k].u;
            }
          }
          for (const id of tombstones) delete merged[id];
          slots = merged;
        }
        tombstones.clear();
      })
      .catch(() => {})
      .then(() => { loaded = true; subs.forEach((fn) => fn()); });
    return loadP;
  }

  // Serialize writes so two near-simultaneous drops on different slots
  // can't reorder at the backend and leave the sidecar with only the
  // first. A save requested mid-flight just marks dirty and re-fires on
  // completion with the then-current slots.
  let saving = false;
  let saveDirty = false;
  function save() {
    if (saving) { saveDirty = true; return; }
    const w = window.omelette && window.omelette.writeFile;
    if (!w) return;
    saving = true;
    Promise.resolve(w(STATE_FILE, JSON.stringify(slots)))
      .catch(() => {})
      .then(() => { saving = false; if (saveDirty) { saveDirty = false; save(); } });
  }

  const S_MAX = 5;
  const clampS = (s) => Math.max(1, Math.min(S_MAX, s));

  // Normalize a stored slot value. Pre-reframe sidecars stored a bare
  // data-URL string; newer ones store {u, s, x, y}. Either shape is valid.
  function getSlot(id) {
    const v = slots[id];
    if (!v) return null;
    return typeof v === 'string' ? { u: v, s: 1, x: 0, y: 0 } : v;
  }

  function setSlot(id, val) {
    if (!id) return;
    if (val) { slots[id] = val; tombstones.delete(id); }
    else { delete slots[id]; if (!loaded) tombstones.add(id); }
    subs.forEach((fn) => fn());
    // A drop is rare + high-value — write immediately so nav-away can't lose
    // it. Gate on the initial read so we don't overwrite a sidecar we haven't
    // merged yet; the merge in load() keeps this change once the read lands.
    if (loaded) save(); else load().then(save);
  }

  // ── Image downscale ─────────────────────────────────────────────────────
  // Encode through a canvas so the sidecar carries resized bytes, not the
  // raw upload. Longest side is capped at 2× the slot's rendered width
  // (retina) and at MAX_DIM. WebP keeps alpha and is ~10× smaller than PNG
  // for photos, so there's no need for per-image format picking.
  async function toDataUrl(file, targetW) {
    const bitmap = await createImageBitmap(file);
    try {
      const cap = Math.min(MAX_DIM, Math.max(1, Math.round(targetW * 2)) || MAX_DIM);
      const scale = Math.min(1, cap / Math.max(bitmap.width, bitmap.height));
      const w = Math.max(1, Math.round(bitmap.width * scale));
      const h = Math.max(1, Math.round(bitmap.height * scale));
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
      return canvas.toDataURL('image/webp', 0.85);
    } finally {
      bitmap.close && bitmap.close();
    }
  }

  // ── Custom element ──────────────────────────────────────────────────────
  const stylesheet =
    ':host{display:inline-block;position:relative;vertical-align:top;' +
    '  font:13px/1.3 system-ui,-apple-system,sans-serif;color:rgba(0,0,0,.55);width:240px;height:160px}' +
    '.frame{position:absolute;inset:0;overflow:hidden;background:rgba(0,0,0,.04)}' +
    // .frame img (clipped) and .spill (unclipped ghost + handles) share the
    // same left/top/width/height in frame-%, computed by _applyView(), so the
    // inside-mask crop and the outside-mask spill stay pixel-aligned.
    '.frame img{position:absolute;max-width:none;transform:translate(-50%,-50%);' +
    '  -webkit-user-drag:none;user-select:none;touch-action:none}' +
    // Reframe mode (double-click): the full image spills past the mask. The
    // spill layer is sized to the IMAGE bounds so its corners are where the
    // resize handles belong. The ghost <img> inside is translucent; the real
    // clipped <img> underneath shows the opaque in-mask crop.
    '.spill{position:absolute;transform:translate(-50%,-50%);display:none;z-index:1;' +
    '  cursor:grab;touch-action:none}' +
    ':host([data-panning]) .spill{cursor:grabbing}' +
    '.spill .ghost{position:absolute;inset:0;width:100%;height:100%;opacity:.35;' +
    '  pointer-events:none;-webkit-user-drag:none;user-select:none;' +
    '  box-shadow:0 0 0 1px rgba(0,0,0,.2),0 12px 32px rgba(0,0,0,.2)}' +
    '.spill .handle{position:absolute;width:12px;height:12px;border-radius:50%;' +
    '  background:#fff;box-shadow:0 0 0 1.5px #c96442,0 1px 3px rgba(0,0,0,.3);' +
    '  transform:translate(-50%,-50%)}' +
    '.spill .handle[data-c=nw]{left:0;top:0;cursor:nwse-resize}' +
    '.spill .handle[data-c=ne]{left:100%;top:0;cursor:nesw-resize}' +
    '.spill .handle[data-c=sw]{left:0;top:100%;cursor:nesw-resize}' +
    '.spill .handle[data-c=se]{left:100%;top:100%;cursor:nwse-resize}' +
    ':host([data-reframe]){z-index:10}' +
    ':host([data-reframe]) .spill{display:block}' +
    ':host([data-reframe]) .frame{box-shadow:0 0 0 2px #c96442}' +
    '.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;' +
    '  justify-content:center;gap:6px;text-align:center;padding:12px;box-sizing:border-box;' +
    '  cursor:pointer;user-select:none}' +
    '.empty svg{opacity:.45}' +
    '.empty .cap{max-width:90%;font-weight:500;letter-spacing:.01em}' +
    '.empty .sub{font-size:11px}' +
    '.empty .sub u{text-underline-offset:2px;text-decoration-color:rgba(0,0,0,.25)}' +
    '.empty:hover .sub u{color:rgba(0,0,0,.75);text-decoration-color:currentColor}' +
    ':host([data-over]) .frame{outline:2px solid #c96442;outline-offset:-2px;' +
    '  background:rgba(201,100,66,.10)}' +
    '.ring{position:absolute;inset:0;pointer-events:none;border:1.5px dashed rgba(0,0,0,.25);' +
    '  transition:border-color .12s}' +
    ':host([data-over]) .ring{border-color:#c96442}' +
    ':host([data-filled]) .ring{display:none}' +
    // Controls sit BELOW the mask (top:100%), absolutely positioned so the
    // author-declared slot height is unaffected. The gap is padding, not a
    // top offset, so the hover target stays contiguous with the frame.
    '.ctl{position:absolute;top:100%;left:50%;transform:translateX(-50%);padding-top:8px;' +
    '  display:flex;gap:6px;opacity:0;pointer-events:none;transition:opacity .12s;z-index:2;' +
    '  white-space:nowrap}' +
    ':host([data-filled][data-editable]:hover) .ctl,:host([data-reframe]) .ctl' +
    '  {opacity:1;pointer-events:auto}' +
    '.ctl button{appearance:none;border:0;border-radius:6px;padding:5px 10px;cursor:pointer;' +
    '  background:rgba(0,0,0,.65);color:#fff;font:11px/1 system-ui,-apple-system,sans-serif;' +
    '  backdrop-filter:blur(6px)}' +
    '.ctl button:hover{background:rgba(0,0,0,.8)}' +
    '.err{position:absolute;left:8px;bottom:8px;right:8px;color:#b3261e;font-size:11px;' +
    '  background:rgba(255,255,255,.85);padding:4px 6px;border-radius:5px;pointer-events:none}';

  const icon =
    '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
    'stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">' +
    '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>' +
    '<path d="m21 15-5-5L5 21"/></svg>';

  class ImageSlot extends HTMLElement {
    static get observedAttributes() {
      return ['shape', 'radius', 'mask', 'fit', 'position', 'placeholder', 'src', 'id'];
    }

    constructor() {
      super();
      const root = this.attachShadow({ mode: 'open' });
      // .spill and .ctl sit OUTSIDE .frame so overflow:hidden + border-radius
      // on the frame (circle, pill, rounded) can't clip them.
      root.innerHTML =
        '<style>' + stylesheet + '</style>' +
        '<div class="frame" part="frame">' +
        '  <img part="image" alt="" draggable="false" style="display:none">' +
        '  <div class="empty" part="empty">' + icon +
        '    <div class="cap"></div>' +
        '    <div class="sub">or <u>browse files</u></div></div>' +
        '  <div class="ring" part="ring"></div>' +
        '</div>' +
        '<div class="spill">' +
        '  <img class="ghost" alt="" draggable="false">' +
        '  <div class="handle" data-c="nw"></div><div class="handle" data-c="ne"></div>' +
        '  <div class="handle" data-c="sw"></div><div class="handle" data-c="se"></div>' +
        '</div>' +
        '<div class="ctl"><button data-act="replace" title="Replace image">Replace</button>' +
        '  <button data-act="clear" title="Remove image">Remove</button></div>' +
        '<input type="file" accept="' + ACCEPT.join(',') + '" hidden>';
      this._frame = root.querySelector('.frame');
      this._ring = root.querySelector('.ring');
      this._img = root.querySelector('.frame img');
      this._empty = root.querySelector('.empty');
      this._cap = root.querySelector('.cap');
      this._sub = root.querySelector('.sub');
      this._spill = root.querySelector('.spill');
      this._ghost = root.querySelector('.ghost');
      this._err = null;
      this._input = root.querySelector('input');
      this._depth = 0;
      this._gen = 0;
      this._view = { s: 1, x: 0, y: 0 };
      this._subFn = () => this._render();
      // Shadow-DOM listeners live with the shadow DOM — bound once here so
      // disconnect/reconnect (e.g. React remount) doesn't stack handlers.
      this._empty.addEventListener('click', () => this._input.click());
      root.addEventListener('click', (e) => {
        const act = e.target && e.target.getAttribute && e.target.getAttribute('data-act');
        if (act === 'replace') { this._exitReframe(true); this._input.click(); }
        if (act === 'clear') {
          this._exitReframe(false);
          this._gen++;
          this._local = null;
          if (this.id) setSlot(this.id, null); else this._render();
        }
      });
      this._input.addEventListener('change', () => {
        const f = this._input.files && this._input.files[0];
        if (f) this._ingest(f);
        this._input.value = '';
      });
      // naturalWidth/Height aren't known until load — re-apply so the cover
      // baseline is computed from real dimensions, not the 100%×100% fallback.
      this._img.addEventListener('load', () => this._applyView());
      // Gated on editable + fit=cover so share links and contain/fill slots
      // stay static.
      this.addEventListener('dblclick', (e) => {
        if (!this.hasAttribute('data-editable') || !this._reframes()) return;
        e.preventDefault();
        if (this.hasAttribute('data-reframe')) this._exitReframe(true);
        else this._enterReframe();
      });
      // Pan + resize both originate on the spill layer. A handle pointerdown
      // drives an aspect-locked resize anchored at the opposite corner; any
      // other pointerdown on the spill pans. Offsets are frame-% so a
      // reframed slot survives responsive resize / PPTX export.
      this._spill.addEventListener('pointerdown', (e) => {
        if (e.button !== 0 || !this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        e.stopPropagation();
        this._spill.setPointerCapture(e.pointerId);
        const rect = this.getBoundingClientRect();
        const fw = rect.width || 1, fh = rect.height || 1;
        const corner = e.target.getAttribute && e.target.getAttribute('data-c');
        let move;
        if (corner) {
          // Resize about the OPPOSITE corner. Viewport-px throughout (rect
          // fw/fh, not clientWidth) so the math survives a transform:scale()
          // ancestor — deck_stage renders slides scaled-to-fit.
          const iw = this._img.naturalWidth || 1, ih = this._img.naturalHeight || 1;
          const base = Math.max(fw / iw, fh / ih);
          const sx = corner.includes('e') ? 1 : -1;
          const sy = corner.includes('s') ? 1 : -1;
          const s0 = this._view.s;
          const w0 = iw * base * s0, h0 = ih * base * s0;
          const cx0 = (50 + this._view.x) / 100 * fw;
          const cy0 = (50 + this._view.y) / 100 * fh;
          const ox = cx0 - sx * w0 / 2, oy = cy0 - sy * h0 / 2;
          const diag0 = Math.hypot(w0, h0);
          const ux = sx * w0 / diag0, uy = sy * h0 / diag0;
          move = (ev) => {
            const proj = (ev.clientX - rect.left - ox) * ux +
                         (ev.clientY - rect.top - oy) * uy;
            const s = clampS(s0 * proj / diag0);
            const d = diag0 * s / s0;
            this._view.s = s;
            this._view.x = (ox + ux * d / 2) / fw * 100 - 50;
            this._view.y = (oy + uy * d / 2) / fh * 100 - 50;
            this._clampView();
            this._applyView();
          };
        } else {
          this.setAttribute('data-panning', '');
          const start = { px: e.clientX, py: e.clientY, x: this._view.x, y: this._view.y };
          move = (ev) => {
            this._view.x = start.x + (ev.clientX - start.px) / fw * 100;
            this._view.y = start.y + (ev.clientY - start.py) / fh * 100;
            this._clampView();
            this._applyView();
          };
        }
        const up = () => {
          try { this._spill.releasePointerCapture(e.pointerId); } catch {}
          this._spill.removeEventListener('pointermove', move);
          this._spill.removeEventListener('pointerup', up);
          this._spill.removeEventListener('pointercancel', up);
          this.removeAttribute('data-panning');
          this._dragUp = null;
        };
        // Stashed so _exitReframe (Escape / outside-click mid-drag) can
        // tear the capture + listeners down synchronously.
        this._dragUp = up;
        this._spill.addEventListener('pointermove', move);
        this._spill.addEventListener('pointerup', up);
        this._spill.addEventListener('pointercancel', up);
      });
      // Wheel zoom stays available inside reframe mode as a trackpad nicety —
      // zooms toward the cursor (offset' = cursor·(1-k) + offset·k).
      this.addEventListener('wheel', (e) => {
        if (!this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        const r = this.getBoundingClientRect();
        const cx = (e.clientX - r.left) / r.width * 100 - 50;
        const cy = (e.clientY - r.top) / r.height * 100 - 50;
        const prev = this._view.s;
        const next = clampS(prev * Math.pow(1.0015, -e.deltaY));
        if (next === prev) return;
        const k = next / prev;
        this._view.s = next;
        this._view.x = cx * (1 - k) + this._view.x * k;
        this._view.y = cy * (1 - k) + this._view.y * k;
        this._clampView();
        this._applyView();
      }, { passive: false });
    }

    connectedCallback() {
      // Warn once per page — an id-less slot works for the session but
      // cannot persist, and two id-less slots would share nothing.
      if (!this.id && !ImageSlot._warned) {
        ImageSlot._warned = true;
        console.warn('<image-slot> without an id will not persist its dropped image.');
      }
      this.addEventListener('dragenter', this);
      this.addEventListener('dragover', this);
      this.addEventListener('dragleave', this);
      this.addEventListener('drop', this);
      subs.add(this._subFn);
      // width%/height% in _applyView encode the frame aspect at call time —
      // a host resize (responsive grid, pane divider) would stretch the
      // image until the next _render. Re-render on size change: _render()
      // re-seeds _view from stored before clamp/apply, so a shrink→grow
      // cycle round-trips instead of ratcheting x/y toward the narrower
      // frame's clamp range.
      this._ro = new ResizeObserver(() => this._render());
      this._ro.observe(this);
      load();
      this._render();
    }

    disconnectedCallback() {
      subs.delete(this._subFn);
      this.removeEventListener('dragenter', this);
      this.removeEventListener('dragover', this);
      this.removeEventListener('dragleave', this);
      this.removeEventListener('drop', this);
      if (this._ro) { this._ro.disconnect(); this._ro = null; }
      this._exitReframe(false);
    }

    _enterReframe() {
      if (this.hasAttribute('data-reframe')) return;
      this.setAttribute('data-reframe', '');
      this._applyView();
      // Close on click outside (the spill handler stopPropagation()s so
      // in-image drags don't reach this) and on Escape. Listeners are held
      // on the instance so _exitReframe / disconnectedCallback can detach
      // exactly what was attached.
      this._outside = (e) => {
        if (e.composedPath && e.composedPath().includes(this)) return;
        this._exitReframe(true);
      };
      this._esc = (e) => { if (e.key === 'Escape') this._exitReframe(true); };
      document.addEventListener('pointerdown', this._outside, true);
      document.addEventListener('keydown', this._esc, true);

    _exitReframe(commit) {
      if (!this.hasAttribute('data-reframe')) return;
      if (this._dragUp) this._dragUp();
      this.removeAttribute('data-reframe');
      this.removeAttribute('data-panning');
      if (this._outside) document.removeEventListener('pointerdown', this._outside, true);
      if (this._esc) document.removeEventListener('keydown', this._esc, true);
      this._outside = this._esc = null;
      if (commit) this._commitView();
    }

    attributeChangedCallback() { if (this.shadowRoot) this._render(); }

    // handleEvent — one listener object for all four drag events keeps the
    // add/remove symmetric and the depth counter correct.
    handleEvent(e) {
      if (e.type === 'dragenter' || e.type === 'dragover') {
        // Without preventDefault the browser never fires 'drop'.
        e.preventDefault();
        e.stopPropagation();
        if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
        if (e.type === 'dragenter') this._depth++;
        this.setAttribute('data-over', '');
      } else if (e.type === 'dragleave') {
        // dragenter/leave fire for every descendant crossing — count depth
        // so hovering the icon inside the empty state doesn't flicker.
        if (--this._depth <= 0) { this._depth = 0; this.removeAttribute('data-over'); }
      } else if (e.type === 'drop') {
        e.preventDefault();
        e.stopPropagation();
        this._depth = 0;
        this.removeAttribute('data-over');
        const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
        if (f) this._ingest(f);
      }

    async _ingest(file) {
      this._setError(null);
      if (!file || ACCEPT.indexOf(file.type) < 0) {
        this._setError('Drop a PNG, JPEG, WebP, or AVIF image.');
        return;
      }
      // toDataUrl can take hundreds of ms on a large photo. A Clear or a
      // newer drop during that window would be clobbered when this await
      // resumes — bump + capture a generation so stale encodes bail.
      const gen = ++this._gen;
      try {
        const w = this.clientWidth || this.offsetWidth || MAX_DIM;
        const url = await toDataUrl(file, w);
        if (gen !== this._gen) return;
        // Only exit reframe once the new image is in hand — a rejected type
        // or decode failure leaves the in-progress crop untouched.
        this._exitReframe(false);
        const val = { u: url, s: 1, x: 0, y: 0 };
        setSlot(this.id || '', val);
        // Keep a session-local copy for id-less slots so the drop still
        // shows, even though it cannot persist.
        if (!this.id) { this._local = val; this._render(); }
      } catch (err) {
        if (gen !== this._gen) return;
        this._setError('Could not read that image.');
        console.warn('<image-slot> ingest failed:', err);
      }
    }

    _setError(msg) {
      if (this._err) { this._err.remove(); this._err = null; }
      if (!msg) return;
      const d = document.createElement('div');
      d.className = 'err'; d.textContent = msg;
      this.shadowRoot.appendChild(d);
      this._err = d;
      setTimeout(() => { if (this._err === d) { d.remove(); this._err = null; } }, 3000);
    }

    // Reframing (pan/resize) is only meaningful for fit=cover — contain/fill
    // keep the old object-fit path and double-click is a no-op.
    _reframes() {
      return this.hasAttribute('data-filled') &&
        (this.getAttribute('fit') || 'cover') === 'cover';
    }

    // Cover-baseline geometry, shared by clamp/apply/resize. Null until the
    // img has loaded (naturalWidth is 0 before that) or when the slot has no
    // layout box — ResizeObserver fires with a 0×0 rect under display:none,
    // and clamping against a degenerate 1×1 frame would silently pull the
    // stored pan toward zero.
    _geom() {
      const iw = this._img.naturalWidth, ih = this._img.naturalHeight;
      const fw = this.clientWidth, fh = this.clientHeight;
      if (!iw || !ih || !fw || !fh) return null;
      return { iw, ih, fw, fh, base: Math.max(fw / iw, fh / ih) };
    }

    _clampView() {
      // Pan range on each axis is half the overflow past the frame edge.
      const g = this._geom();
      if (!g) return;
      const mx = Math.max(0, (g.iw * g.base * this._view.s / g.fw - 1) * 50);
      const my = Math.max(0, (g.ih * g.base * this._view.s / g.fh - 1) * 50);
      this._view.x = Math.max(-mx, Math.min(mx, this._view.x));
      this._view.y = Math.max(-my, Math.min(my, this._view.y));
    }

    _applyView() {
      const g = this._geom();
      const fit = this.getAttribute('fit') || 'cover';
      if (fit !== 'cover' || !g) {
        // Non-cover, or dimensions not known yet (before img load).
        this._img.style.width = '100%';
        this._img.style.height = '100%';
        this._img.style.left = '50%';
        this._img.style.top = '50%';
        this._img.style.objectFit = fit;
        this._img.style.objectPosition = this.getAttribute('position') || '50% 50%';
        return;
      }
      // Cover baseline: img fills the frame on its tighter axis at s=1, so
      // pan works immediately on the overflowing axis without zooming first.
      // Width/height and left/top are all frame-% — depends only on the
      // frame aspect ratio, so a responsive resize keeps the same crop. The
      // spill layer mirrors the same box so its corners = image corners.
      const k = g.base * this._view.s;
      const w = (g.iw * k / g.fw * 100) + '%';
      const h = (g.ih * k / g.fh * 100) + '%';
      const l = (50 + this._view.x) + '%';
      const t = (50 + this._view.y) + '%';
      this._img.style.width = w; this._img.style.height = h;
      this._img.style.left = l; this._img.style.top = t;
      this._img.style.objectFit = '';
      this._spill.style.width = w; this._spill.style.height = h;
      this._spill.style.left = l; this._spill.style.top = t;
    }

    _commitView() {
      const v = { s: this._view.s, x: this._view.x, y: this._view.y };
      if (this._userUrl) v.u = this._userUrl;
      // Framing-only (no u) persists too so an author-src slot remembers its
      // crop; clearing the sidecar still falls through to src=.
      if (this.id) setSlot(this.id, v);
      else { this._local = v; }
    }

    _render() {
      // Shape / mask. Presets use border-radius so the dashed ring can
      // follow the rounded outline; clip-path is only applied for an
      // explicit `mask` (the ring is hidden there since a rectangle
      // dashed border chopped by an arbitrary polygon looks broken).
      const mask = this.getAttribute('mask');
      const shape = (this.getAttribute('shape') || 'rounded').toLowerCase();
      let radius = '';
      if (shape === 'circle') radius = '50%';
      else if (shape === 'pill') radius = '9999px';
      else if (shape === 'rounded') {
        const n = parseFloat(this.getAttribute('radius'));
        radius = (Number.isFinite(n) ? n : 12) + 'px';
      }
      this._frame.style.borderRadius = mask ? '' : radius;
      this._frame.style.clipPath = mask || '';
      this._ring.style.borderRadius = mask ? '' : radius;
      this._ring.style.display = mask ? 'none' : '';

      // Controls and reframe entry gate on this so share links stay read-only.
      const editable = !!(window.omelette && window.omelette.writeFile);
      this.toggleAttribute('data-editable', editable);
      this._sub.style.display = editable ? '' : 'none';

      // Content. The sidecar is also writable by the agent's write_file
      // tool, so its value isn't guaranteed canvas-originated — only accept
      // data:image/ URLs from it. The `src` attribute is author-controlled
      // (Claude wrote it into the HTML) so it passes through unchanged.
      let stored = this.id ? getSlot(this.id) : this._local;
      if (stored && stored.u && !/^data:image\//i.test(stored.u)) stored = null;
      const srcAttr = this.getAttribute('src') || '';
      this._userUrl = (stored && stored.u) || null;
      const url = this._userUrl || srcAttr;
      // Don't clobber an in-flight reframe with a store-triggered re-render.
      if (!this.hasAttribute('data-reframe')) {
        this._view = {
          s: stored && Number.isFinite(stored.s) ? clampS(stored.s) : 1,
          x: stored && Number.isFinite(stored.x) ? stored.x : 0,
          y: stored && Number.isFinite(stored.y) ? stored.y : 0,
        };
      }
      this._cap.textContent = this.getAttribute('placeholder') || 'Drop an image';
      // Toggle via style.display — the [hidden] attribute alone loses to
      // the display:flex / display:block rules in the stylesheet above.
      if (url) {
        if (this._img.getAttribute('src') !== url) {
          this._img.src = url;
          this._ghost.src = url;
        }
        this._img.style.display = 'block';
        this._empty.style.display = 'none';
        this.setAttribute('data-filled', '');
        this._clampView();
        this._applyView();
      } else {
        this._img.style.display = 'none';
        this._img.removeAttribute('src');
        this._ghost.removeAttribute('src');
        this._empty.style.display = 'flex';
        this.removeAttribute('data-filled');
      }
    }
  }

  if (!customElements.get('image-slot')) {
    customElements.define('image-slot', ImageSlot);
  }
})();

    const out = [];
    const sqH = squadFor(m.home), sqA = squadFor(m.away);
    const r = rng(hash(m.id + "scorers"));
    const maxMin = m.status === "live" ? Math.max(2, (m.minute || 60) - 1) : 93;
    function add(team, sq, n) {
      const mins = [];
      for (let i = 0; i < n; i++) mins.push(1 + Math.floor(r() * maxMin));
      mins.sort(function (a, b) { return a - b; });
      mins.forEach(function (mn) { out.push({ team: team, name: sq[Math.floor(r() * 3)], minute: mn, pen: r() > 0.86 }); });
    }
    add(m.home, sqH, m.ga || 0);
    add(m.away, sqA, m.gb || 0);
    out.sort(function (a, b) { return a.minute - b.minute; });
    return out;
  }
  function genCards(m, s) {
    const out = [];
    const sqH = squadFor(m.home), sqA = squadFor(m.away);
    const r = rng(hash(m.id + "cards"));
    const maxMin = m.status === "live" ? Math.max(2, (m.minute || 60) - 1) : 93;
    function add(team, sq, n, type) {
      for (let i = 0; i < n; i++) out.push({ team: team, name: sq[3 + Math.floor(r() * 3)], minute: 1 + Math.floor(r() * maxMin), type: type });
    }
    add(m.home, sqH, s.yellow[0], "yellow"); add(m.away, sqA, s.yellow[1], "yellow");
    add(m.home, sqH, s.red[0], "red"); add(m.away, sqA, s.red[1], "red");
    out.sort(function (a, b) { return a.minute - b.minute; });
    return out;
  }
  function h2h(a, b) {
    if (!a || !b || a.indexOf("PO") === 0 || b.indexOf("PO") === 0) return null;
    const key = [a, b].slice().sort().join("");
    const r = rng(hash(key + "h2h"));
    const n = 2 + Math.floor(r() * 4);
    const ms = []; let wa = 0, d = 0, wb = 0;
    for (let i = 0; i < n; i++) {
      const ga = Math.floor(r() * 4), gb = Math.floor(r() * 4);
      ms.push({ a: ga, b: gb, year: 2024 - i * 2 });
      if (ga > gb) wa++; else if (ga < gb) wb++; else d++;
    }
    return { a: a, b: b, wa: wa, d: d, wb: wb, matches: ms };
  }

  // ---- turneringskalender ------------------------------------
  // Avspark 11 juni 2026. Gruppspel ~11–27 juni. Slutspel följer.
  function dateAt(dayOffset, hourSv) {
    // bas: 2026-06-11 (UTC), svensk tid ~ UTC+2
    const base = Date.UTC(2026, 5, 11, 0, 0, 0);
    return new Date(base + dayOffset * 86400000 + (hourSv - 2) * 3600000);
  }
  const KICK_HOURS = [18, 21, 24, 3]; // svenska kvällar + sena USA-matcher

  function scoreMatch(seed, ra, rb) {
    const r = rng(seed);
    const diff = (ra - rb) / 10;
    function goals(bias) {
      const base = 1.25 + Math.max(-0.9, Math.min(1.4, bias));
      let g = 0; const lam = Math.max(0.2, base);
      // enkel Poisson-approx via summering
      let p = Math.exp(-lam), c = p, u = r();
      while (u > c && g < 6) { g++; p = p * lam / g; c += p; }
      return g;
    }
    return [goals(diff * 0.6), goals(-diff * 0.6)];
  }

  function outcome(ga, gb) { return ga > gb ? "H" : ga < gb ? "B" : "X"; }

  function build(state) {
    const isPre = state === "pre";
    // simulerat "nu": pre = 5 juni (före avspark), mid = mitt i slutspel
    const NOW = isPre ? new Date(Date.UTC(2026, 5, 5, 12, 0)) : new Date(Date.UTC(2026, 6, 3, 12, 0));

    // ---- gruppmatcher: round robin per grupp ----
    const matches = [];
    let mid = 0;
    let dayCursor = 0, slot = 0;
    // matchdag 1,2,3 enligt standard round-robin par
    const RR = [[0, 1], [2, 3], [0, 2], [1, 3], [0, 3], [1, 2]];
    for (let md = 0; md < 3; md++) {
      GROUP_LETTERS.forEach(function (L) {
        const m = GROUPS[L];
        [RR[md * 2], RR[md * 2 + 1]].forEach(function (pair) {
          const home = m[pair[0]], away = m[pair[1]];
          const kickoff = dateAt(md * 5 + Math.floor(slot / 4), KICK_HOURS[slot % 4]);
          slot++;
          const match = {
            id: "G" + (mid++), stage: "group", group: L, round: "Grupp " + L,
            matchday: md + 1, home: home, away: away, kickoff: kickoff,
            ga: null, gb: null, status: "upcoming"
          };
          matches.push(match);
        });
      });
    }
    // sortera gruppmatcher kronologiskt
    matches.sort(function (a, b) { return a.kickoff - b.kickoff; });

    // spela gruppmatcher (mid: alla spelade; pre: inga)
    matches.forEach(function (m) {
      if (!isPre) {
        const s = scoreMatch(hash(m.id), TEAMS[m.home].rating, TEAMS[m.away].rating);
        m.ga = s[0]; m.gb = s[1]; m.status = "played";
      }
    });

    // ---- grupptabeller ----
    const groupTables = {};
    GROUP_LETTERS.forEach(function (L) {
      const rows = {};
      GROUPS[L].forEach(function (code) {
        rows[code] = { code: code, sp: 0, v: 0, o: 0, f: 0, gm: 0, im: 0, ms: 0, p: 0 };
      });
      matches.filter(function (m) { return m.stage === "group" && m.group === L && m.status === "played"; })
        .forEach(function (m) {
          const h = rows[m.home], a = rows[m.away];
          h.sp++; a.sp++; h.gm += m.ga; h.im += m.gb; a.gm += m.gb; a.im += m.ga;
          if (m.ga > m.gb) { h.v++; a.f++; h.p += 3; }
          else if (m.ga < m.gb) { a.v++; h.f++; a.p += 3; }
          else { h.o++; a.o++; h.p++; a.p++; }
        });
      const arr = Object.values(rows).map(function (r) { r.ms = r.gm - r.im; return r; });
      arr.sort(function (x, y) {
        return y.p - x.p || y.ms - x.ms || y.gm - x.gm || TEAMS[y.code].rating - TEAMS[x.code].rating;
      });
      arr.forEach(function (r, i) { r.pos = i + 1; });
      groupTables[L] = arr;
    });

    // ---- kvalificerade: topp2 + 8 bästa treor ----
    let qualifiers = [];
    if (!isPre) {
      const thirds = [];
      GROUP_LETTERS.forEach(function (L) {
        const t = groupTables[L];
        qualifiers.push({ code: t[0].code, group: L, pos: 1, row: t[0] });
        qualifiers.push({ code: t[1].code, group: L, pos: 2, row: t[1] });
        thirds.push({ code: t[2].code, group: L, pos: 3, row: t[2] });
      });
      thirds.sort(function (x, y) {
        return y.row.p - x.row.p || y.row.ms - x.row.ms || y.row.gm - x.row.gm;
      });
      qualifiers = qualifiers.concat(thirds.slice(0, 8));
      // ranka 1..32 för seedning
      qualifiers.sort(function (x, y) {
        return y.row.p - x.row.p || y.row.ms - x.row.ms || TEAMS[y.code].rating - TEAMS[x.code].rating;
      });
      qualifiers.forEach(function (q, i) { q.seed = i + 1; });
    }

    // ---- slutspelsträd ----
    // Struktur byggs alltid (för 'pre' med TBD-slots).
    const rounds = [
      { key: "r32", label: "Åttondelar", count: 16 },
      { key: "r16", label: "Sextondelar", count: 8 },
      { key: "qf",  label: "Kvartsfinal", count: 4 },
      { key: "sf",  label: "Semifinal", count: 2 },
      { key: "final", label: "Final", count: 1 }
    ];
    const knockout = {};
    let koDay = 19; // efter gruppspel
    // R32-par: seed i vs seed 33-i
    function koMatch(idPrefix, i, home, away, ratingH, ratingA, dayOff) {
      const kickoff = dateAt(dayOff, KICK_HOURS[i % 3]);
      const m = {
        id: idPrefix + i, stage: "ko", round: idPrefix,
        home: home, away: away, kickoff: kickoff,
        ga: null, gb: null, status: "upcoming", winner: null, pen: null
      };
      if (!isPre && home && away) {
        let s = scoreMatch(hash(m.id), ratingH, ratingA);
        let ga = s[0], gb = s[1], pen = null, w;
        if (ga === gb) { // straffar
          const r2 = rng(hash(m.id + "pen"));
          const pa = 3 + Math.floor(r2() * 3), pb = (r2() < (ratingH >= ratingA ? 0.45 : 0.55)) ? pa + 1 : pa - 1;
          pen = [pa, Math.max(0, pb)]; w = pa > pen[1] ? home : away;
        } else { w = ga > gb ? home : away; }
        m.ga = ga; m.gb = gb; m.pen = pen; m.winner = w; m.status = "played";
      }
      return m;
    }

    if (!isPre) {
      // R32
      const r32 = [];
      for (let i = 0; i < 16; i++) {
        const h = qualifiers[i], a = qualifiers[31 - i];
        r32.push(koMatch("r32_", i, h.code, a.code, TEAMS[h.code].rating, TEAMS[a.code].rating, koDay + Math.floor(i / 4)));
      }
      knockout.r32 = r32;
      // R16
      const r16 = [];
      for (let i = 0; i < 8; i++) {
        const h = r32[i * 2].winner, a = r32[i * 2 + 1].winner;
        r16.push(koMatch("r16_", i, h, a, TEAMS[h].rating, TEAMS[a].rating, koDay + 5 + Math.floor(i / 2)));
      }
      knockout.r16 = r16;
      // QF onward = kommande (mid "nu" ligger mellan R16 och QF)
      const qf = [];
      for (let i = 0; i < 4; i++) {
        const m = koMatch("qf_", i, r16[i * 2].winner, r16[i * 2 + 1].winner, 0, 0, koDay + 10 + i);
        m.ga = null; m.gb = null; m.winner = null; m.status = "upcoming";
        qf.push(m);
      }
      knockout.qf = qf;
      knockout.sf = [
        Object.assign(koMatch("sf_", 0, null, null, 0, 0, koDay + 15), { home: null, away: null }),
        Object.assign(koMatch("sf_", 1, null, null, 0, 0, koDay + 15), { home: null, away: null })
      ];
      knockout.final = [Object.assign(koMatch("final_", 0, null, null, 0, 0, koDay + 19), { home: null, away: null })];
      knockout.third = [Object.assign(koMatch("third_", 0, null, null, 0, 0, koDay + 18), { home: null, away: null })];
    } else {
      ["r32", "r16", "qf", "sf", "final"].forEach(function (k, idx) {
        const cnt = [16, 8, 4, 2, 1][idx];
        knockout[k] = [];
        for (let i = 0; i < cnt; i++) {
          knockout[k].push({ id: k + "_" + i, stage: "ko", round: k, home: null, away: null,
            kickoff: dateAt(koDay + idx * 4 + i, 21), ga: null, gb: null, status: "upcoming", winner: null });
        }
      });
      knockout.third = [{ id: "third_0", stage: "ko", round: "third", home: null, away: null,
        kickoff: dateAt(koDay + 18, 18), ga: null, gb: null, status: "upcoming", winner: null }];
    }

    // sätt status relativt NOW (LIVE-fönster ~2h)
    function setLiveStatus(m) {
      if (m.status === "played") return;
      const k = m.kickoff.getTime();
      if (k <= NOW.getTime() && NOW.getTime() < k + 2 * 3600000 && m.home && m.away && !isPre) {
        m.status = "live";
        // delresultat
        const s = scoreMatch(hash(m.id + "live"), TEAMS[m.home].rating, TEAMS[m.away].rating);
        m.ga = s[0]; m.gb = s[1]; m.minute = 58;
      } else {
        m.status = "upcoming";
      }
    }
    // i mid: gör några QF "live"/snart men håll det enkelt — låt första QF vara LIVE
    if (!isPre && knockout.qf && knockout.qf[0]) {
      const m = knockout.qf[0];
      m.status = "live"; m.minute = 63;
      const s = scoreMatch(hash(m.id + "live"), TEAMS[m.home].rating, TEAMS[m.away].rating);
      m.ga = s[0]; m.gb = s[1];
    }

    // ---- alla matcher i en lista (för schema) ----
    const allMatches = matches.slice();
    ["r32", "r16", "qf", "sf", "third", "final"].forEach(function (k) {
      (knockout[k] || []).forEach(function (m) { allMatches.push(m); });
    });
    allMatches.sort(function (a, b) { return a.kickoff - b.kickoff; });

    // ---- arena, statistik & målskyttar per match ----
    allMatches.forEach(function (m) {
      const vr = rng(hash(m.id + "venue"));
      m.venue = VENUES[Math.floor(vr() * VENUES.length)];
      m.tippas = m.stage === "group";
      if ((m.status === "played" || m.status === "live") && m.home && m.away) {
        m.stats = genStats(m);
        m.scorers = genScorers(m);
        m.cards = genCards(m, m.stats);
      }
    });

    // ---- form (senaste resultat) per lag ----
    const forms = {};
    Object.keys(TEAMS).forEach(function (c) { forms[c] = []; });
    allMatches.forEach(function (m) {
      if (m.status !== "played" || !m.home || !m.away) return;
      forms[m.home].push({ vs: m.away, gf: m.ga, ga: m.gb, r: m.ga > m.gb ? "V" : m.ga < m.gb ? "F" : "O", id: m.id });
      forms[m.away].push({ vs: m.home, gf: m.gb, ga: m.ga, r: m.gb > m.ga ? "V" : m.gb < m.ga ? "F" : "O", id: m.id });
    });

    // ---- spelartips & poäng ----
    // Varje spelare tippar varje gruppmatch (exakt resultat).
    const players = PLAYERS.map(function (p) {
      const tips = {};
      let pts = 0, exact = 0, correct = 0, other = 0;
      matches.forEach(function (m) {
        const r = rng(hash(p.id + m.id));
        // tippa nära förväntat men med spelarbrus
        const er = TEAMS[m.home].rating - TEAMS[m.away].rating;
        function tg(bias) { const v = Math.max(0, Math.round(1.2 + bias + (r() - 0.5) * 2.2)); return v; }
        const th = tg(er / 25 * 0.6), ta = tg(-er / 25 * 0.6);
        tips[m.id] = [th, ta];
        if (m.status === "played") {
          if (th === m.ga && ta === m.gb) { pts += 5; exact++; }
          else if (outcome(th, ta) === outcome(m.ga, m.gb)) { pts += 2; correct++; }
          else { pts += 1; other++; }
        }
      });
      // bonusval (seedat)
      const br = rng(hash(p.id + "bonus"));
      function pick(arr) { return arr[Math.floor(br() * arr.length)]; }
      const pot1codes = POT1.map(function (x) { return x[0]; });
      const bonus = {
        winner: pick(pot1codes), silver: pick(pot1codes), bronze: pick(POT2.map(function (x) { return x[0]; })),
        topscorer: pick(STARS), bestplayer: pick(STARS), youngplayer: pick(YOUNG), keeper: pick(KEEPERS)
      };
      return { id: p.id, name: p.name, color: p.color, photo: p.photo, tips: tips, points: pts,
        exact: exact, correct: correct, other: other, bonus: bonus, bonusPts: 0 };
    });

    // standings
    const standings = players.slice().sort(function (a, b) {
      return (b.points + b.bonusPts) - (a.points + a.bonusPts) || b.exact - a.exact;
    });
    let prevTot = null, rank = 0;
    standings.forEach(function (p, i) {
      const tot = p.points + p.bonusPts;
      if (tot !== prevTot) { rank = i + 1; prevTot = tot; }
      p.rank = rank; p.total = tot;
    });

    return {
      state: state, now: NOW, teams: TEAMS, groups: GROUPS, groupLetters: GROUP_LETTERS,
      matches: matches, allMatches: allMatches, groupTables: groupTables,
      knockout: knockout, koRounds: rounds, qualifiers: qualifiers,
      players: players, standings: standings, forms: forms,
      pot: { p1: POT1, p2: POT2 }, stars: STARS
    };
  }

  // prispengar
  const PRIZES = [1350, 810, 540];

  window.VM = {
    build: build, PLAYERS: PLAYERS, PRIZES: PRIZES, TEAMS: TEAMS, GROUPS: GROUPS,
    GROUP_LETTERS: GROUP_LETTERS, STARS: STARS, KEEPERS: KEEPERS, YOUNG: YOUNG, POT: PRIZES,
    h2h: h2h, VENUES: VENUES
  };
})();

  </script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

  </script>

/* ---------- datum/tid på svenska ---------- */
const SV_DAYS = ["sön", "mån", "tis", "ons", "tor", "fre", "lör"];
const SV_MON = ["jan", "feb", "mar", "apr", "maj", "jun", "jul", "aug", "sep", "okt", "nov", "dec"];
function svTime(d) {
  const dt = new Date(d);
  const h = (dt.getUTCHours() + 2) % 24, m = dt.getUTCMinutes();
  return String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0");
}
function svDateKey(d) {
  const sv = new Date(new Date(d).getTime() + 2 * 3600000);
  return sv.getUTCFullYear() + "-" + (sv.getUTCMonth() + 1) + "-" + sv.getUTCDate();
}
function svDayLabel(d) {
  const sv = new Date(new Date(d).getTime() + 2 * 3600000);
  return SV_DAYS[sv.getUTCDay()] + " " + sv.getUTCDate() + " " + SV_MON[sv.getUTCMonth()];
}

/* ---------- räkna upp siffror ---------- */
function useCountUp(target, dur = 800) {
  const [v, setV] = React.useState(target);
  React.useEffect(() => {
    const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) { setV(target); return; }
    let raf, start, done = false;
    setV(0);
    const step = (ts) => {
      if (!start) start = ts;
      const p = Math.min(1, (ts - start) / dur);
      setV(Math.round(target * (1 - Math.pow(1 - p, 3))));
      if (p < 1) raf = requestAnimationFrame(step); else done = true;
    };
    raf = requestAnimationFrame(step);
    const safety = setTimeout(() => { if (!done) setV(target); }, dur + 400);
    return () => { cancelAnimationFrame(raf); clearTimeout(safety); };
  }, [target, dur]);
  return v;
}

        <Flag code={code} size={22} /><TeamName code={code} size={13.5} /></span>
      <FormPills form={form} />
    </div>
  );
  return (
    <MiniBlock title="Form (senaste matcherna)">
      {row(m.home, hf)}
      <div style={{ height: 1, background: "var(--line)" }} />
      {row(m.away, af)}
    </MiniBlock>
  );
}

function H2HBlock({ m }) {
  const h = window.VM.h2h(m.home, m.away);
  if (!h) return null;
  return (
    <MiniBlock title="Inbördes möten">
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
        <span style={{ display: "flex", alignItems: "center", gap: 7 }}><Flag code={m.home} size={22} />
          <span className="num" style={{ fontWeight: 800, fontSize: 20 }}>{h.wa}</span></span>
        <span style={{ fontSize: 12, fontWeight: 700, color: "var(--ink-soft)" }}>{h.d} oavgjorda</span>
        <span style={{ display: "flex", alignItems: "center", gap: 7 }}>
          <span className="num" style={{ fontWeight: 800, fontSize: 20 }}>{h.wb}</span><Flag code={m.away} size={22} /></span>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
        {h.matches.map((g, i) => (
          <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
            padding: "7px 0", borderTop: "1px solid var(--line)", fontSize: 13 }}>
            <span style={{ color: "var(--ink-soft)", fontWeight: 600 }}>{g.year}</span>
            <span className="num" style={{ fontWeight: 800 }}>{g.a}–{g.b}</span>
          </div>
        ))}
      </div>
    </MiniBlock>
  );
}

function PoolResultBlock({ data, m }) {
  const rows = data.players.map(p => {
    const tip = p.tips[m.id];
    if (!tip) return null;
    let pts = 1;
    if (tip[0] === m.ga && tip[1] === m.gb) pts = 5;
    else { const o1 = tip[0] > tip[1] ? "H" : tip[0] < tip[1] ? "B" : "X"; const o2 = m.ga > m.gb ? "H" : m.ga < m.gb ? "B" : "X"; if (o1 === o2) pts = 2; }
    return { p, tip, pts };
  }).filter(Boolean).sort((a, b) => b.pts - a.pts);
  if (!rows.length) return null;
  const col = { 5: "var(--gold)", 2: "var(--warm)", 1: "var(--ink-soft)" };
  return (
    <MiniBlock title="Så tippade poolen" pad={false}>
      {rows.map((r, i) => (
        <div key={r.p.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 14px",
          borderBottom: i < rows.length - 1 ? "1px solid var(--line)" : "none" }}>
          <Avatar p={r.p} size={28} />
          <span style={{ fontWeight: 700, fontSize: 13.5, flex: 1 }}>{r.p.name}</span>
          <span className="num" style={{ fontWeight: 800, fontSize: 14, color: "var(--ink-soft)" }}>{r.tip[0]}–{r.tip[1]}</span>
          <span className="num display" style={{ fontWeight: 800, fontSize: 17, color: col[r.pts], width: 30, textAlign: "right" }}>+{r.pts}</span>
        </div>
      ))}
    </MiniBlock>
  );
}

function MatchDetail({ data, match, onClose, onTeam }) {
  const m = match;
  const live = m.status === "live", played = m.status === "played", tbd = !m.home || !m.away;
  const win = m.winner;
  const teamCol = (code, label) => (
    <button onClick={() => code && onTeam && onTeam(code)} style={{ flex: 1, display: "flex", flexDirection: "column",
      alignItems: "center", gap: 8, minWidth: 0, color: "#fff" }}>
      {code ? <Flag code={code} size={52} shape="rect" /> :
        <span style={{ width: 73, height: 52, borderRadius: 8, background: "rgba(255,255,255,.18)" }} />}
      <span style={{ fontWeight: 800, fontSize: 14, textAlign: "center", textShadow: "0 1px 3px rgba(0,0,0,.3)",
        opacity: played && win && win !== code ? .6 : 1 }}>{code ? window.VM.TEAMS[code].name : (label || "Vinnare")}</span>
    </button>
  );
  const header = (
    <div style={{ background: "var(--grad)", padding: "14px 18px 18px", position: "relative", flex: "0 0 auto" }}>
      <div style={{ width: 40, height: 5, borderRadius: 99, background: "rgba(255,255,255,.5)", margin: "0 auto 12px" }} />
      <button onClick={onClose} aria-label="Stäng" style={{ position: "absolute", top: 14, right: 16, color: "#fff",
        fontSize: 24, fontWeight: 700, lineHeight: 1, opacity: .9 }}>×</button>
      <div style={{ textAlign: "center", marginBottom: 14 }}>
        <div style={{ fontSize: 11.5, fontWeight: 800, letterSpacing: ".1em", color: "rgba(255,255,255,.9)", textTransform: "uppercase" }}>
          {roundLabel(m)}{m.group ? "" : ""}</div>
        <div style={{ fontSize: 11.5, fontWeight: 600, color: "rgba(255,255,255,.7)", marginTop: 3 }}>
          {svDayLabel(m.kickoff)} · {svTime(m.kickoff)}{m.venue ? " · " + m.venue[1] : ""}</div>
        <div style={{ marginTop: 8, display: "flex", justifyContent: "center" }}>
          <span style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "3px 10px", borderRadius: 7,
            background: "rgba(255,255,255,.16)", color: "#fff", fontWeight: 800, fontSize: 10.5, letterSpacing: ".04em" }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: m.tippas ? "#5BE0A0" : "rgba(255,255,255,.5)" }} />
            {m.tippas ? "TIPPNINGSMATCH" : "SLUTSPEL · INGEN TIPPNING"}</span>
        </div>
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        {teamCol(m.home, m.fromA)}
        <div style={{ flex: "0 0 auto", textAlign: "center", minWidth: 86 }}>
          {(played || live) && !tbd ? (
            <div className="num" style={{ fontWeight: 800, fontSize: 40, color: "#fff", lineHeight: 1 }}>
              {m.ga}<span style={{ opacity: .55, margin: "0 6px", fontWeight: 600 }}>–</span>{m.gb}</div>
          ) : (
            <div className="num display" style={{ fontWeight: 800, fontSize: 30, color: "#fff" }}>{svTime(m.kickoff)}</div>
          )}
          <div style={{ marginTop: 7, display: "flex", justifyContent: "center" }}>
            {live ? <LiveDot minute={m.minute} /> :
              played ? <span style={{ fontSize: 11, fontWeight: 800, color: "rgba(255,255,255,.85)", letterSpacing: ".05em" }}>
                SLUTSIGNAL{m.pen ? " · STR " + m.pen[0] + "–" + m.pen[1] : ""}</span> :
              <span style={{ fontSize: 11, fontWeight: 700, color: "rgba(255,255,255,.8)" }}>Avspark</span>}
          </div>
        </div>
        {teamCol(m.away, m.fromB)}
      </div>
    </div>
  );

  return (
    <Sheet onClose={onClose} header={header}>
      <div style={{ paddingTop: 16 }}>
        {(played || live) && !tbd && (
          <MiniBlock title={live ? "Matchförlopp · pågår" : "Matchförlopp"} pad={false}><Timeline m={m} /></MiniBlock>
        )}
        {(played || live) && !tbd && <StatsBlock m={m} full={played} />}
        {!played && !live && !tbd && <FormBlock data={data} m={m} />}
        {!played && !live && !tbd && <H2HBlock m={m} />}
        {!tbd && m.tippas && (live || (!played && !live)) && <TipsDistribution data={data} m={m} />}
        {!tbd && m.tippas && played && <PoolResultBlock data={data} m={m} />}
        {!tbd && !m.tippas && (
          <div style={{ margin: "0 16px 14px", background: "var(--bg2)", borderRadius: 13, padding: "13px 15px",
            display: "flex", alignItems: "center", gap: 11 }}>
            <span style={{ width: 30, height: 30, borderRadius: 8, background: "var(--cool)", flex: "0 0 auto",
              display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 800, fontSize: 15 }}>i</span>
            <span style={{ fontSize: 12.5, fontWeight: 600, color: "var(--ink-soft)", lineHeight: 1.4 }}>
              Slutspelsmatch — inga matchtips här. Slutspelet avgörs i poolen via bonuspoängen (vinnare, silver, brons …).</span>
          </div>
        )}
        {tbd && (
          <div style={{ textAlign: "center", color: "var(--ink-soft)", padding: "30px 24px", fontWeight: 600 }}>
            Lagen avgörs när tidigare matcher är spelade.
          </div>
        )}
        <div style={{ height: 24 }} />
      </div>
    </Sheet>
  );
}

Object.assign(window, { MatchDetail, Sheet, MiniBlock });

  </script>
  <!-- ============ standings.jsx ============ -->
  <script type="text/babel">
/* ============================================================
   standings.jsx — Ställning: pall + prispengar + spelardetalj
   ============================================================ */

function money(n) { return n.toLocaleString("sv-SE") + " kr"; }

function Crown({ size = 26 }) {
  return (
    <svg width={size} height={size * 0.72} viewBox="0 0 30 22" aria-hidden="true">
      <path d="M2.5 19 L4.4 7.5 L10 12.5 L15 3.5 L20 12.5 L25.6 7.5 L27.5 19 Z"
        fill="var(--gold)" stroke="color-mix(in oklab, var(--gold) 60%, #000 22%)" strokeWidth="1" strokeLinejoin="round" />
      <rect x="2.5" y="18.5" width="25" height="2.6" rx="1" fill="color-mix(in oklab, var(--gold) 70%, #000 14%)" />
    </svg>
  );
}

function Countdown() {
  const target = Date.UTC(2026, 5, 11, 16, 0);
  const [now, setNow] = React.useState(Date.now());
  React.useEffect(() => { const t = setInterval(() => setNow(Date.now()), 1000); return () => clearInterval(t); }, []);
  let diff = Math.max(0, target - now);
  const d = Math.floor(diff / 86400000); diff -= d * 86400000;
  const h = Math.floor(diff / 3600000); diff -= h * 3600000;
  const mi = Math.floor(diff / 60000); diff -= mi * 60000;
  const s = Math.floor(diff / 1000);
  const cell = (v, l) => (
    <div style={{ textAlign: "center", minWidth: 52 }}>
      <div className="num display" style={{ fontSize: 34, color: "var(--ink)", lineHeight: 1, fontWeight: "var(--display-weight)" }}>{String(v).padStart(2, "0")}</div>
      <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: ".1em", color: "var(--ink-soft)", marginTop: 4 }}>{l}</div>
    </div>
  );
  const sep = <span className="num" style={{ color: "var(--line-strong)", fontSize: 26, fontWeight: 300, marginTop: -6 }}>:</span>;
  return (
    <div style={{ display: "flex", gap: 10, justifyContent: "center", alignItems: "center" }}>
      {cell(d, "DGR")}{sep}{cell(h, "TIM")}{sep}{cell(mi, "MIN")}{sep}{cell(s, "SEK")}
    </div>
  );
}

function PodiumStep({ p, place, prize, isPre, h }) {
  const tint = { 1: "var(--gold)", 2: "#AEB4BE", 3: "#C77F49" }[place];
  const pts = useCountUp(isPre ? 0 : p.total, 900 + place * 100);
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", flex: 1, animation: `riseIn .5s forwards` }}>
      <div style={{ height: 26, display: "flex", alignItems: "flex-end" }}>{place === 1 ? <Crown size={28} /> : null}</div>
      <Avatar p={p} size={place === 1 ? 62 : 50} ring={place} />
      <div style={{ fontWeight: 800, fontSize: place === 1 ? 15.5 : 13.5, marginTop: 10, color: "var(--ink)" }}>{p.name}</div>
      <div className="num display" style={{ fontSize: place === 1 ? 26 : 21, color: "var(--ink)", marginTop: 1, fontWeight: "var(--display-weight)" }}>
        {pts}<span style={{ fontSize: 11, color: "var(--ink-soft)", marginLeft: 2, fontWeight: 700, fontFamily: "var(--font-body)" }}>p</span>
      </div>
      <div style={{ marginTop: 10, width: "100%", height: h, borderRadius: "10px 10px 0 0", position: "relative",
        background: `color-mix(in oklab, ${tint} 20%, var(--paper))`, border: "1px solid " + `color-mix(in oklab, ${tint} 45%, var(--line))`,
        borderBottom: "none", display: "flex", flexDirection: "column", alignItems: "center", paddingTop: 9 }}>
        <span className="num display" style={{ fontSize: place === 1 ? 30 : 24, color: `color-mix(in oklab, ${tint} 70%, #000 12%)`, fontWeight: "var(--display-weight)" }}>{place}</span>
        <span style={{ position: "absolute", bottom: 9, fontWeight: 800, fontSize: place === 1 ? 14 : 12.5, color: "var(--ink)" }}>{money(prize)}</span>
      </div>
    </div>
  );
}

function StandingsView({ data, onOpenPlayer }) {
  const isPre = data.state === "pre";
  const s = data.standings;
  const prizes = window.VM.PRIZES;
  const pot = 2700;
  const top3 = s.slice(0, 3);
  const leaderTotal = Math.max(1, s[0].total);

  return (
    <div style={{ animation: "riseIn .4s forwards" }}>
      {/* VM-banner med vimplar + bild-slot */}
