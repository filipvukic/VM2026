        boxShadow: "var(--shadow-lift)", background: "var(--deep)" }}>
        <image-slot id="vm-hero" shape="rect" placeholder="Släpp en bild på gänget eller en VM-arena"
          style={{ display: "block", width: "100%", height: "158px" }}></image-slot>
        <div style={{ position: "absolute", inset: 0, pointerEvents: "none",
          background: "linear-gradient(to top, rgba(18,8,24,.74), rgba(18,8,24,.04) 48%, rgba(18,8,24,.18))" }} />
        <div style={{ position: "absolute", top: 0, left: 0, right: 0, pointerEvents: "none" }}><Bunting n={20} height={15} /></div>
        <div style={{ position: "absolute", left: 16, bottom: 12, right: 16, pointerEvents: "none" }}>
          <div className="display" style={{ color: "#fff", fontSize: 21, fontWeight: "var(--display-weight)", textShadow: "0 2px 8px rgba(0,0,0,.45)" }}>Hela världen, en pott</div>
          <div style={{ color: "rgba(255,255,255,.88)", fontWeight: 700, fontSize: 12, textShadow: "0 1px 4px rgba(0,0,0,.5)" }}>USA · Mexiko · Kanada — sommaren 2026</div>
        </div>
      </div>

      {/* POTT + PALL kort */}
      <div style={{ position: "relative", background: "var(--paper)", border: "1px solid var(--line)",
        borderRadius: "var(--r-lg)", boxShadow: "var(--shadow-lift)", overflow: "hidden", marginBottom: 20 }}>
        <div style={{ height: 4, background: "var(--grad)" }} />
        {!isPre && <Confetti count={36} />}
        {/* pott-rad */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "15px 18px 6px", position: "relative", zIndex: 2 }}>
          <div>
            <div style={{ fontSize: 10.5, fontWeight: 800, letterSpacing: ".14em", color: "var(--ink-soft)" }}>SAMMANLAGD POTT</div>
            <div className="num display" style={{ fontSize: 30, color: "var(--ink)", whiteSpace: "nowrap", fontWeight: "var(--display-weight)" }}>{money(pot)}</div>
          </div>
          <Chip bg="var(--bg2)">9 spelare · 300 kr/st</Chip>
        </div>

        {isPre ? (
          <div style={{ padding: "16px 18px 22px", textAlign: "center", position: "relative", zIndex: 2 }}>
            <div style={{ fontSize: 11.5, fontWeight: 800, letterSpacing: ".12em", color: "var(--hot)", marginBottom: 14 }}>AVSPARK OM</div>
            <Countdown />
            <div style={{ marginTop: 16, fontWeight: 600, fontSize: 13.5, color: "var(--ink-soft)" }}>Alla står på noll — vem tar första pallplatsen?</div>
          </div>
        ) : (
          <div style={{ display: "flex", alignItems: "flex-end", gap: 10, padding: "12px 16px 0", position: "relative", zIndex: 2 }}>
            <PodiumStep p={top3[1]} place={2} prize={prizes[1]} isPre={isPre} h={70} />
            <PodiumStep p={top3[0]} place={1} prize={prizes[0]} isPre={isPre} h={96} />
            <PodiumStep p={top3[2]} place={3} prize={prizes[2]} isPre={isPre} h={54} />
          </div>
        )}
      </div>

      {isPre && (
        <div style={{ display: "flex", gap: 9, marginBottom: 20 }}>
          {[0, 1, 2].map(i => {
            const tint = ["var(--gold)", "#AEB4BE", "#C77F49"][i];
            return (
              <div key={i} style={{ flex: 1, background: "var(--paper)", borderRadius: 12, padding: "12px 10px", textAlign: "center",
                border: "1px solid " + `color-mix(in oklab, ${tint} 40%, var(--line))`, boxShadow: "var(--shadow)" }}>
                <div className="num display" style={{ fontSize: 22, color: `color-mix(in oklab, ${tint} 70%, #000 10%)`, fontWeight: "var(--display-weight)" }}>{i + 1}:a</div>
                <div className="num" style={{ fontWeight: 800, fontSize: 14.5, marginTop: 2 }}>{money(prizes[i])}</div>
              </div>
            );
          })}
        </div>
      )}

      <SectionTitle kicker={isPre ? "Innan avspark" : "Tabell"} title="Hela ligan"
        right={<Chip color={isPre ? "var(--ink-soft)" : "#fff"} bg={isPre ? "var(--bg2)" : "var(--hot)"}>{isPre ? "Tippa nu" : "Live"}</Chip>} />

      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {s.map((p, i) => {
          const onPodium = !isPre && p.rank <= 3;
          const medal = { 1: "var(--gold)", 2: "#AEB4BE", 3: "#C77F49" }[p.rank];
          const barPct = isPre ? 0 : Math.round((p.total / leaderTotal) * 100);
          return (
            <button key={p.id} onClick={() => onOpenPlayer(p.id)} style={{ width: "100%", textAlign: "left", display: "grid",
              gridTemplateColumns: "26px auto 1fr auto", alignItems: "center", gap: 12, background: "var(--paper)",
              borderRadius: 13, padding: "11px 14px", border: "1px solid var(--line)",
              borderLeft: onPodium ? `3px solid ${medal}` : "1px solid var(--line)", boxShadow: "var(--shadow)" }}>
              <span className="num display" style={{ fontSize: 18, color: onPodium ? medal : "var(--ink-soft)", textAlign: "center", fontWeight: "var(--display-weight)" }}>
                {isPre ? "–" : p.rank}</span>
              <Avatar p={p} size={42} rank={!isPre && onPodium ? p.rank : null} />
              <div style={{ minWidth: 0 }}>
                <div style={{ fontWeight: 800, fontSize: 15.5 }}>{p.name}</div>
                {!isPre ? (
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 6 }}>
                    <div style={{ position: "relative", flex: 1, maxWidth: 150, height: 5, background: "var(--bg2)", borderRadius: 99, overflow: "hidden" }}>
                      <div style={{ position: "absolute", inset: 0, width: barPct + "%", background: onPodium ? medal : "var(--cool)",

                    <span style={{ fontSize: 11, color: "var(--ink-soft)", fontWeight: 700 }}>{p.exact} exakta</span>

                  <div style={{ fontSize: 12, color: "var(--ink-soft)", fontWeight: 600, marginTop: 3 }}>{Object.keys(p.tips).length} tips inlagda</div>

                <div style={{ fontSize: 9.5, fontWeight: 800, letterSpacing: ".08em", color: "var(--ink-soft)" }}>POÄNG</div>
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ---------- SPELARDETALJ ---------- */
function PlayerSheet({ data, playerId, onClose, onOpenMatch }) {
  const p = data.players.find(x => x.id === playerId);
  const st = data.standings.find(x => x.id === playerId);
  const isPre = data.state === "pre";
  const [tab, setTab] = React.useState("tips");
  if (!p) return null;
  const matches = data.matches;
  const prize = st && st.rank <= 3 ? window.VM.PRIZES[st.rank - 1] : 0;
  const bonusRows = [
    ["Turneringsvinnare", "winner", "team"], ["Silver", "silver", "team"], ["Brons", "bronze", "team"],
    ["Skyttekung", "topscorer", "player"], ["Bästa spelare", "bestplayer", "player"],
    ["Bästa unga", "youngplayer", "player"], ["Bästa målvakt", "keeper", "player"]
  ];
  const header = (
    <div style={{ background: "var(--grad)", padding: "14px 18px 16px", position: "relative", flex: "0 0 auto" }}>
      <div style={{ width: 40, height: 5, borderRadius: 99, background: "rgba(255,255,255,.5)", margin: "0 auto 14px" }} />
      <button onClick={onClose} aria-label="Stäng" style={{ position: "absolute", top: 14, right: 16, color: "#fff", fontSize: 24, fontWeight: 700 }}>×</button>
      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
        <Avatar p={p} size={60} rank={isPre ? null : st.rank} />
        <div style={{ flex: 1 }}>
          <div className="display" style={{ fontSize: 26, color: "#fff", fontWeight: "var(--display-weight)" }}>{p.name}</div>
          <div style={{ display: "flex", gap: 7, marginTop: 7, flexWrap: "wrap" }}>
            <Chip bg="rgba(255,255,255,.2)" color="#fff">{isPre ? "0" : st.total} poäng</Chip>
            {!isPre && <Chip bg="rgba(255,255,255,.2)" color="#fff">Plats {st.rank} av 9</Chip>}
            {prize > 0 && <Chip bg="var(--gold)" color="var(--deep)">{money(prize)}</Chip>}
          </div>
        </div>
      </div>
      {!isPre && (
        <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
          {[["Exakt", p.exact, "5p"], ["Rätt utgång", p.correct, "2p"], ["Övrigt", p.other, "1p"]].map((x, i) => (
            <div key={i} style={{ flex: 1, background: "rgba(255,255,255,.14)", borderRadius: 11, padding: "9px 6px", textAlign: "center" }}>
              <div className="num display" style={{ fontSize: 22, color: "#fff", fontWeight: "var(--display-weight)" }}>{x[1]}</div>
              <div style={{ fontSize: 10, fontWeight: 700, color: "rgba(255,255,255,.85)" }}>{x[0]} · {x[2]}</div>
            </div>
          ))}
        </div>
      )}
      <div style={{ display: "flex", gap: 6, marginTop: 14 }}>
        {[["tips", "Matchtips"], ["bonus", "Bonusval"]].map(t => (
          <button key={t[0]} onClick={() => setTab(t[0])} style={{ flex: 1, padding: "9px 0", borderRadius: 9, fontWeight: 800, fontSize: 13.5,
            background: tab === t[0] ? "#fff" : "rgba(255,255,255,.16)", color: tab === t[0] ? "var(--ink)" : "#fff" }}>{t[1]}</button>
        ))}
      </div>
    </div>
  );
  return (
    <Sheet onClose={onClose} header={header}>
      <div style={{ padding: "14px 14px 30px" }}>
        {tab === "tips" ? (
          <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
            {matches.map(m => {
              const tip = p.tips[m.id]; const played = m.status === "played";
              let pts = null, col = "var(--ink-soft)";
              if (played && tip) {
                if (tip[0] === m.ga && tip[1] === m.gb) { pts = 5; col = "var(--gold)"; }
                else { const o1 = tip[0] > tip[1] ? "H" : tip[0] < tip[1] ? "B" : "X"; const o2 = m.ga > m.gb ? "H" : m.ga < m.gb ? "B" : "X";
                  if (o1 === o2) { pts = 2; col = "var(--warm)"; } else { pts = 1; } }
              }
              return (
                <button key={m.id} onClick={() => onOpenMatch && onOpenMatch(m)} style={{ width: "100%", display: "grid",
                  gridTemplateColumns: "1fr auto 1fr 28px", alignItems: "center", gap: 8, background: "var(--paper)",
                  borderRadius: 11, padding: "9px 12px", border: "1px solid var(--line)", boxShadow: "var(--shadow)" }}>
                  <span style={{ display: "flex", alignItems: "center", gap: 7, justifyContent: "flex-end", minWidth: 0 }}>
                    <TeamName code={m.home} size={12.5} /><Flag code={m.home} size={20} /></span>
                  <span style={{ textAlign: "center", minWidth: 60 }}>
                    <span className="num" style={{ fontWeight: 800, fontSize: 14 }}>
                      <span style={{ color: "var(--cool)" }}>{tip ? tip[0] : "–"}</span>
                      <span style={{ opacity: .4, margin: "0 3px" }}>–</span>
                      <span style={{ color: "var(--cool)" }}>{tip ? tip[1] : "–"}</span></span>
                    <div className="num" style={{ fontSize: 10, color: "var(--ink-soft)", fontWeight: 700 }}>{played ? "blev " + m.ga + "–" + m.gb : svTime(m.kickoff)}</div>
                  </span>
                  <span style={{ display: "flex", alignItems: "center", gap: 7, minWidth: 0 }}>
                    <Flag code={m.away} size={20} /><TeamName code={m.away} size={12.5} /></span>
                  <span className="num display" style={{ fontSize: 17, color: col, textAlign: "right", fontWeight: "var(--display-weight)" }}>{pts != null ? pts : "·"}</span>
                </button>
              );
            })}
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {bonusRows.map(([label, key, kind]) => {
              const val = p.bonus[key];
              return (
                <div key={key} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10,
                  background: "var(--paper)", borderRadius: 12, padding: "11px 14px", border: "1px solid var(--line)", boxShadow: "var(--shadow)" }}>
                  <span style={{ fontWeight: 700, fontSize: 13, color: "var(--ink-soft)" }}>{label}</span>
                  {kind === "team" ? <TeamLabel code={val} size={22} /> :
                    <span style={{ display: "flex", alignItems: "center", gap: 8 }}><Flag code={val[1]} size={20} /><span style={{ fontWeight: 800, fontSize: 13.5 }}>{val[0]}</span></span>}
                </div>
              );
            })}
            <div style={{ textAlign: "center", color: "var(--ink-soft)", fontSize: 12, fontWeight: 600, marginTop: 6 }}>
              Bonuspoäng (3–10p) räknas in när turneringen avgörs.</div>
          </div>
        )}
      </div>
    </Sheet>
  );
}

Object.assign(window, { StandingsView, PlayerSheet, money });

  </script>

  <script type="text/babel">
/* ============================================================
   schedule.jsx — Spelschema per dag + slutspelsträd
   ============================================================ */

const BRACKET_CSS = `
.bnode { display:flex; align-items:center; }
.bfeeders { display:flex; flex-direction:column; }
.bfeed { display:flex; align-items:center; position:relative; flex:1; }
.bfeed::after { content:''; position:absolute; right:-20px; top:50%; width:20px; height:2px; background:var(--line-strong); }
.bfeed-top::before { content:''; position:absolute; right:-20px; top:50%; bottom:-1px; width:2px; background:var(--line-strong); }
.bfeed-bot::before { content:''; position:absolute; right:-20px; top:-1px; bottom:50%; width:2px; background:var(--line-strong); }
.bcell { position:relative; margin-left:40px; }
.bcell::before { content:''; position:absolute; left:-20px; top:50%; width:20px; height:2px; background:var(--line-strong); }
.bleaf .bcell { margin-left:0; }
.bleaf .bcell::before { display:none; }
`;

function BracketCell({ m, champion, onOpen }) {
  const row = (code, isWinner, label) => (
    <div style={{ display: "flex", alignItems: "center", gap: 7, padding: "5px 8px",
      background: isWinner ? "color-mix(in oklab, var(--gold) 18%, transparent)" : "transparent",
      borderRadius: 6, opacity: code ? 1 : .55 }}>
      {code ? <Flag code={code} size={17} /> : <span style={{ width: 17, height: 17, borderRadius: "50%", background: "var(--bg2)", flex: "0 0 auto" }} />}
      <span style={{ fontSize: 11.5, fontWeight: isWinner ? 800 : 600, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
        {code ? window.VM.TEAMS[code].name : (label || "Vinnare")}</span>
      <span className="num" style={{ fontSize: 12, fontWeight: 800, color: isWinner ? "var(--ink)" : "var(--ink-soft)", minWidth: 9, textAlign: "right" }}>
        {m.status === "played" && code ? (code === m.home ? m.ga : m.gb) : ""}</span>
    </div>
  );
  const live = m.status === "live";
  return (
    <button onClick={() => onOpen && (m.home && m.away) && onOpen(m)} style={{ width: 158, background: "var(--paper)", borderRadius: 10, padding: 4,
      border: "1px solid var(--line)", boxShadow: champion ? "0 0 0 2px var(--gold), var(--shadow)" : live ? "0 0 0 1.5px var(--hot)" : "var(--shadow)", textAlign: "left" }}>
      {row(m.home, m.winner && m.winner === m.home, m.fromA)}
      <div style={{ height: 1, background: "var(--line)", margin: "1px 6px" }} />
      {row(m.away, m.winner && m.winner === m.away, m.fromB)}
      {live ? <div style={{ textAlign: "center", padding: "3px 0 1px" }}><LiveDot minute={m.minute} small /></div> : null}
    </button>
  );
}

function BracketNode({ roundsArr, ri, mi, onOpen }) {
  const m = roundsArr[ri][mi];
  if (ri === 0) return <div className="bleaf"><div className="bcell"><BracketCell m={m} onOpen={onOpen} /></div></div>;
  return (
    <div className="bnode">
      <div className="bfeeders">
        <div className="bfeed bfeed-top"><BracketNode roundsArr={roundsArr} ri={ri - 1} mi={mi * 2} onOpen={onOpen} /></div>
        <div className="bfeed bfeed-bot"><BracketNode roundsArr={roundsArr} ri={ri - 1} mi={mi * 2 + 1} onOpen={onOpen} /></div>
      </div>
      <div className="bcell"><BracketCell m={m} champion={ri === roundsArr.length - 1 && !!m.winner} onOpen={onOpen} /></div>
    </div>
  );
}

function Bracket({ data, onOpen }) {
  const ko = data.knockout;
  const roundsArr = [ko.r32, ko.r16, ko.qf, ko.sf, ko.final];
  const labels = ["Åttondelar", "Sextondelar", "Kvarts", "Semi", "Final"];
  return (
    <div>
      <style>{BRACKET_CSS}</style>
      <div className="app-scroll" style={{ overflowX: "auto", paddingBottom: 12 }}>
        <div style={{ minWidth: 880 }}>
          <div style={{ display: "flex", marginBottom: 10 }}>
            {labels.map((l, i) => (
              <div key={l} style={{ flex: i === 0 ? "0 0 158px" : "1", textAlign: i === 0 ? "left" : "center",
                fontSize: 10.5, fontWeight: 800, letterSpacing: ".1em", color: "var(--hot)", textTransform: "uppercase" }}>{l}</div>
            ))}
          </div>
          <BracketNode roundsArr={roundsArr} ri={4} mi={0} onOpen={onOpen} />
        </div>
      </div>
      <div style={{ marginTop: 18, background: "var(--paper)", border: "1px solid " + "color-mix(in oklab, var(--gold) 40%, var(--line))",
        borderRadius: 14, padding: 14, boxShadow: "var(--shadow)", maxWidth: 340 }}>
        <div style={{ fontSize: 10.5, fontWeight: 800, letterSpacing: ".1em", color: "color-mix(in oklab, var(--gold) 70%, #000 12%)", marginBottom: 9 }}>BRONSMATCH</div>
        <BracketCell m={ko.third[0]} onOpen={onOpen} />
      </div>
    </div>
  );
}

function ScheduleView({ data, onOpenMatch }) {
  const isPre = data.state === "pre";
  const [mode, setMode] = React.useState("matcher");
  const [filter, setFilter] = React.useState("alla");

  const filtered = data.allMatches.filter(m => {
    if (filter === "live") return m.status === "live";
    if (filter === "tippas") return m.tippas;
    if (filter === "kommande") return m.status === "upcoming";
    if (filter === "spelade") return m.status === "played";
    return true;
  });
  const days = []; const byDay = {};
  filtered.forEach(m => { const k = svDateKey(m.kickoff); if (!byDay[k]) { byDay[k] = []; days.push(k); } byDay[k].push(m); });

  const liveCount = data.allMatches.filter(m => m.status === "live").length;
  const filters = [["alla", "Alla", data.allMatches.length], ["live", "Live", liveCount],
    ["tippas", "Tippas", data.allMatches.filter(m => m.tippas).length],
    ["kommande", "Kommande", data.allMatches.filter(m => m.status === "upcoming").length],
    ["spelade", "Spelade", data.allMatches.filter(m => m.status === "played").length]];

  return (
    <div style={{ animation: "riseIn .4s forwards" }}>
      <SectionTitle kicker="104 matcher" title="Spelschema" right={<Chip>{isPre ? "11 jun – 19 jul" : "Pågår"}</Chip>} />

      <div style={{ display: "flex", gap: 4, marginBottom: 16, background: "var(--bg2)", padding: 3, borderRadius: 11 }}>
        {[["matcher", "Alla matcher"], ["slutspel", "Slutspelsträd"]].map(t => (
          <button key={t[0]} onClick={() => setMode(t[0])} style={{ flex: 1, padding: "9px 0", borderRadius: 8, fontWeight: 800, fontSize: 13.5,
            background: mode === t[0] ? "var(--paper)" : "transparent", color: mode === t[0] ? "var(--ink)" : "var(--ink-soft)",
            boxShadow: mode === t[0] ? "var(--shadow)" : "none" }}>{t[1]}</button>
        ))}
      </div>

      {mode === "slutspel" ? (
        isPre ? (
          <div style={{ textAlign: "center", padding: "44px 22px", background: "var(--paper)", borderRadius: 16, border: "1px solid var(--line)", boxShadow: "var(--shadow)" }}>
            <div className="display" style={{ fontSize: 22, marginBottom: 8, fontWeight: "var(--display-weight)" }}>Trädet växer fram</div>
            <div style={{ color: "var(--ink-soft)", fontWeight: 600, fontSize: 14, maxWidth: 340, margin: "0 auto", lineHeight: 1.5 }}>
              Slutspelsträdet fylls i när gruppspelet är avgjort. 32 lag går vidare — topp 2 ur varje grupp plus de 8 bästa treorna.</div>
          </div>
        ) : <Bracket data={data} onOpen={onOpenMatch} />
      ) : (
        <>
          <div className="app-scroll" style={{ display: "flex", gap: 7, overflowX: "auto", paddingBottom: 8, marginBottom: 8 }}>
            {filters.map(f => (
              <button key={f[0]} onClick={() => setFilter(f[0])} style={{ flex: "0 0 auto", display: "flex", alignItems: "center", gap: 6,
                padding: "8px 14px", borderRadius: 9, fontWeight: 800, fontSize: 13, border: "1px solid var(--line)",
                background: filter === f[0] ? "var(--ink)" : "var(--paper)", color: filter === f[0] ? "#fff" : "var(--ink)" }}>
                {f[0] === "live" && f[2] > 0 ? <span style={{ width: 6, height: 6, borderRadius: "50%", background: "var(--hot)" }} /> : null}
                {f[1]} <span className="num" style={{ opacity: .5, fontWeight: 700 }}>{f[2]}</span>
              </button>
            ))}
          </div>

          {days.length === 0 ? (
            <div style={{ textAlign: "center", color: "var(--ink-soft)", padding: 40, fontWeight: 600 }}>Inga matcher här just nu.</div>
          ) : days.map(k => {
            const list = byDay[k];
            const today = svDateKey(data.now) === k;
            return (
              <div key={k} style={{ marginBottom: 20 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, margin: "4px 2px 11px" }}>
                  <span className="display" style={{ fontSize: 16, color: "var(--ink)", fontWeight: "var(--display-weight)" }}>{svDayLabel(list[0].kickoff)}</span>
                  {today ? <Chip bg="var(--hot)" color="#fff">IDAG</Chip> : null}
                  <span style={{ flex: 1, height: 1, background: "var(--line)" }} />
                  <span className="num" style={{ fontSize: 12, fontWeight: 700, color: "var(--ink-soft)" }}>{list.length} matcher</span>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px,1fr))", gap: 9 }}>
                  {list.map(m => <MatchCard key={m.id} m={m} onOpen={onOpenMatch} showRound />)}
                </div>
              </div>
            );
          })}
        </>
      )}
    </div>
  );
}

Object.assign(window, { ScheduleView, Bracket });

  </script>

  <script type="text/babel">

   bonus.jsx — Bonus-tips + Info (regler & poäng)

const BONUS_DEFS = [
  { key: "winner",      label: "Turneringsvinnare", pts: 10, kind: "team" },
  { key: "silver",      label: "Silver",            pts: 6,  kind: "team" },

];

function valKey(v) { return Array.isArray(v) ? v[0] : v; }

function BonusCard({ def, players, onTeam }) {
  const tally = {};
  players.forEach(p => { const v = p.bonus[def.key]; const k = valKey(v); if (!tally[k]) tally[k] = { v, who: [] }; tally[k].who.push(p); });

  const fav = sorted[0];

        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: ".08em", color: "var(--ink-soft)", marginBottom: 6 }}>FLEST TROR PÅ</div>
          {def.kind === "team"
            ? <button onClick={() => onTeam(fav.v)} style={{ display: "flex", alignItems: "center", gap: 9 }}>
                <Flag code={fav.v} size={28} /><span style={{ fontWeight: 800, fontSize: 16 }}>{window.VM.TEAMS[fav.v].name}</span></button>
            : <span style={{ display: "flex", alignItems: "center", gap: 9 }}>
                <Flag code={fav.v[1]} size={24} /><span style={{ fontWeight: 800, fontSize: 15 }}>{fav.v[0]}</span></span>}
        </div>
        <div style={{ textAlign: "center" }}>
          <div className="num display" style={{ fontSize: 24, color: "var(--hot)", fontWeight: "var(--display-weight)" }}>{fav.who.length}</div>
          <div className="num" style={{ fontSize: 10, fontWeight: 700, color: "var(--ink-soft)" }}>av {players.length}</div>
        </div>
      </div>
      <div style={{ padding: "11px 14px", display: "flex", flexDirection: "column", gap: 9 }}>
        {sorted.map((r, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 7, width: 138, flex: "0 0 auto" }}>
              <Flag code={def.kind === "team" ? r.v : r.v[1]} size={17} />
              <span style={{ fontSize: 12.5, fontWeight: 700, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>

            </div>
            <div style={{ display: "flex", gap: -4, flex: 1 }}>
              {r.who.map((p, j) => <span key={p.id} title={p.name} style={{ marginLeft: j === 0 ? 0 : -6 }}><Avatar p={p} size={24} /></span>)}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function BonusView({ data, onTeam }) {
  return (
    <div style={{ animation: "riseIn .4s forwards" }}>
      <SectionTitle kicker="Extrapoäng" title="Bonus-tips" right={<Chip>3–10p</Chip>} />
      <div style={{ background: "var(--paper)", border: "1px solid var(--line)", borderRadius: 13, padding: "13px 15px", marginBottom: 16,
        fontSize: 13.5, fontWeight: 600, color: "var(--ink-soft)", boxShadow: "var(--shadow)", lineHeight: 1.45 }}>
        Allas bonusval lades före avspark. Poängen räknas in när turneringen avgörs — och kan vända hela ligan på upploppet.
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px,1fr))", gap: 14 }}>
        {BONUS_DEFS.map(def => <BonusCard key={def.key} def={def} players={data.players} onTeam={onTeam} />)}
      </div>
    </div>

}

/* ---------- INFO ---------- */
function InfoView() {
  const RuleRow = ({ pts, title, desc, color }) => (
    <div style={{ display: "flex", alignItems: "center", gap: 14, background: "var(--paper)", borderRadius: 13, padding: "13px 15px",
      border: "1px solid var(--line)", boxShadow: "var(--shadow)" }}>
      <div style={{ width: 50, height: 50, borderRadius: 12, flex: "0 0 auto", display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center", background: color, color: "#fff" }}>
        <span className="num display" style={{ fontSize: 23, lineHeight: 1, fontWeight: "var(--display-weight)" }}>{pts}</span>
        <span style={{ fontSize: 8.5, fontWeight: 800, letterSpacing: ".06em" }}>POÄNG</span>
      </div>
      <div><div style={{ fontWeight: 800, fontSize: 15 }}>{title}</div>
        <div style={{ fontSize: 13, color: "var(--ink-soft)", fontWeight: 600, marginTop: 2 }}>{desc}</div></div>
    </div>
  );
  return (
    <div style={{ animation: "riseIn .4s forwards", display: "flex", flexDirection: "column", gap: 22 }}>
      <SectionTitle kicker="Spelregler" title="Så funkar det" />

      <div style={{ position: "relative", overflow: "hidden", borderRadius: "var(--r-lg)", background: "var(--grad)", padding: "18px 18px 20px", boxShadow: "var(--shadow-lift)" }}>
        <div style={{ fontSize: 10.5, fontWeight: 800, letterSpacing: ".14em", color: "rgba(255,255,255,.85)" }}>SAMMANLAGD POTT</div>
        <div className="num display" style={{ fontSize: 36, color: "#fff", marginBottom: 4, fontWeight: "var(--display-weight)" }}>2 700 kr</div>
        <div style={{ color: "rgba(255,255,255,.9)", fontWeight: 600, fontSize: 13, marginBottom: 14 }}>9 spelare lägger 300 kr var. Topp 3 delar potten.</div>
        <div style={{ display: "flex", gap: 8 }}>
          {[["1:a", "1 350 kr", "var(--gold)"], ["2:a", "810 kr", "#D6DAE0"], ["3:a", "540 kr", "#E0A983"]].map((x, i) => (
            <div key={i} style={{ flex: 1, background: "rgba(255,255,255,.14)", borderRadius: 11, padding: "10px 8px", textAlign: "center" }}>
              <div className="num display" style={{ fontSize: 17, color: x[2], fontWeight: "var(--display-weight)" }}>{x[0]}</div>
              <div className="num" style={{ fontWeight: 800, color: "#fff", fontSize: 14.5, marginTop: 2 }}>{x[1]}</div>
            </div>
          ))}
        </div>
      </div>

      <div>
        <h3 className="display" style={{ fontSize: 20, marginBottom: 11, fontWeight: "var(--display-weight)" }}>Poäng per match</h3>
        <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
          <RuleRow pts={5} title="Exakt resultat" desc="Rätt slutsiffror, t.ex. 2–1 blir 2–1." color="var(--gold)" />
          <RuleRow pts={2} title="Rätt utgång" desc="Rätt vinnare eller oavgjort, men fel siffror." color="var(--warm)" />
          <RuleRow pts={1} title="Annars" desc="Fel utgång ger ändå en tröstpoäng per tippad match." color="var(--cool)" />
        </div>
      </div>

      <div>
        <h3 className="display" style={{ fontSize: 20, marginBottom: 11, fontWeight: "var(--display-weight)" }}>Bonuspoäng (3–10p)</h3>
        <div style={{ background: "var(--paper)", borderRadius: 13, border: "1px solid var(--line)", boxShadow: "var(--shadow)", overflow: "hidden" }}>
          {BONUS_DEFS.map((b, i) => (
            <div key={b.key} style={{ display: "flex", alignItems: "center", gap: 11, padding: "11px 15px",
              borderBottom: i < BONUS_DEFS.length - 1 ? "1px solid var(--line)" : "none" }}>
              <span style={{ flex: 1, fontWeight: 700, fontSize: 14 }}>{b.label}</span>
              <Chip>{b.pts}p</Chip>
            </div>
          ))}
        </div>
      </div>

      <div>
        <h3 className="display" style={{ fontSize: 20, marginBottom: 11, fontWeight: "var(--display-weight)" }}>Turneringsformat</h3>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 9 }}>
          {[["48", "lag"], ["12", "grupper (A–L)"], ["104", "matcher"], ["32", "lag till slutspel"]].map((x, i) => (
            <div key={i} style={{ background: "var(--paper)", borderRadius: 13, padding: 14, border: "1px solid var(--line)", boxShadow: "var(--shadow)", textAlign: "center" }}>
              <div className="num display" style={{ fontSize: 30, color: "var(--hot)", fontWeight: "var(--display-weight)" }}>{x[0]}</div>
              <div style={{ fontSize: 12.5, fontWeight: 700, color: "var(--ink-soft)" }}>{x[1]}</div>
            </div>
          ))}
        </div>
        <div style={{ marginTop: 10, fontSize: 13, color: "var(--ink-soft)", fontWeight: 600, lineHeight: 1.5, background: "var(--paper)",
          borderRadius: 13, padding: "13px 15px", border: "1px solid var(--line)", boxShadow: "var(--shadow)" }}>
          Topp 2 i varje grupp plus de 8 bästa treorna går vidare. Sedan utslagning hela vägen: åttondelar → sextondelar →
          kvarts → semi → final. Spelas i USA, Mexiko och Kanada, 11 juni–19 juli 2026.
        </div>
      </div>

      <div style={{ textAlign: "center", color: "var(--ink-soft)", fontSize: 12, fontWeight: 600, paddingBottom: 8 }}>
        Resultat hämtas automatiskt och poängen räknas om varje dag under turneringen.
      </div>
    </div>
  );
}

Object.assign(window, { BonusView, InfoView, BONUS_DEFS });

  </script>
  <!-- ============ app.jsx ============ -->
  <script type="text/babel">
/* ============================================================
   app.jsx — skal: navigering, växel pre/mid, sheets, Tweaks
   ============================================================ */

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "sunset",
  "font": "modern"
}/*EDITMODE-END*/;

const Icon = {
  trophy: (a) => <svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="currentColor" strokeWidth={a ? 2.3 : 1.9} strokeLinecap="round" strokeLinejoin="round"><path d="M6 4h12v3a6 6 0 0 1-12 0V4Z" /><path d="M6 5H3v2a3 3 0 0 0 3 3M18 5h3v2a3 3 0 0 1-3 3M9 18h6M10 14v4M14 14v4M8 21h8" /></svg>,
  grid: (a) => <svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="currentColor" strokeWidth={a ? 2.3 : 1.9} strokeLinecap="round" strokeLinejoin="round"><rect x="3.5" y="3.5" width="7" height="7" rx="1.5" /><rect x="13.5" y="3.5" width="7" height="7" rx="1.5" /><rect x="3.5" y="13.5" width="7" height="7" rx="1.5" /><rect x="13.5" y="13.5" width="7" height="7" rx="1.5" /></svg>,
  cal: (a) => <svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="currentColor" strokeWidth={a ? 2.3 : 1.9} strokeLinecap="round" strokeLinejoin="round"><rect x="3.5" y="5" width="17" height="15.5" rx="2.5" /><path d="M3.5 9.5h17M8 3v4M16 3v4" /></svg>,
  star: (a) => <svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="currentColor" strokeWidth={a ? 2.3 : 1.9} strokeLinecap="round" strokeLinejoin="round"><path d="M12 3.6l2.6 5.25 5.8.85-4.2 4.1 1 5.8L12 16.9l-5.2 2.75 1-5.8-4.2-4.1 5.8-.85Z" /></svg>,
  info: (a) => <svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="currentColor" strokeWidth={a ? 2.3 : 1.9} strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9" /><path d="M12 11v5M12 7.5h.01" /></svg>
};
const NAV = [
  { id: "standings", label: "Ställning", icon: "trophy" },
  { id: "groups", label: "Grupper", icon: "grid" },
  { id: "schedule", label: "Schema", icon: "cal" },
  { id: "bonus", label: "Bonus", icon: "star" },
  { id: "info", label: "Info", icon: "info" }
];

/* ---- lagdetalj ---- */
function TeamSheet({ data, code, onClose, onOpenMatch }) {
  const t = window.VM.TEAMS[code];
  if (!t) return null;
  const isPre = data.state === "pre";
  const row = data.groupTables[t.group].find(r => r.code === code);
  const matches = data.allMatches.filter(m => m.home === code || m.away === code);
  const fans = data.players.filter(p => Object.values(p.bonus).some(v => (Array.isArray(v) ? v[1] : v) === code));
  const header = (
    <div style={{ padding: "14px 18px 16px", position: "relative", background: `linear-gradient(135deg, ${t.c1}, color-mix(in oklab, ${t.c2} 80%, #000 12%))` }}>
      <div style={{ width: 40, height: 5, borderRadius: 99, background: "rgba(255,255,255,.6)", margin: "0 auto 14px" }} />
      <button onClick={onClose} aria-label="Stäng" style={{ position: "absolute", top: 14, right: 16, color: "#fff", fontSize: 24, fontWeight: 700, textShadow: "0 1px 3px rgba(0,0,0,.4)" }}>×</button>
      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
        <Flag code={code} size={50} shape="rect" />
        <div>
          <div className="display" style={{ fontSize: 26, color: "#fff", textShadow: "0 1px 5px rgba(0,0,0,.35)", fontWeight: "var(--display-weight)" }}>{t.name}</div>
          <div style={{ display: "flex", gap: 7, marginTop: 7 }}>
            <Chip bg="rgba(255,255,255,.26)" color="#fff">Grupp {t.group}</Chip>
            {!isPre && row ? <Chip bg="rgba(255,255,255,.26)" color="#fff">{row.pos}:a · {row.p}p</Chip> : null}
            {code.indexOf("PO") === 0 ? <Chip bg="rgba(255,255,255,.26)" color="#fff">Playoff-plats</Chip> : null}
          </div>
        </div>
      </div>
    </div>
  );
  return (
    <Sheet onClose={onClose} header={header}>
      <div style={{ padding: "16px 0 28px" }}>
        {!isPre && data.forms[code] && data.forms[code].length > 0 && (
          <MiniBlock title="Form">
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <span style={{ fontSize: 13, fontWeight: 700, color: "var(--ink-soft)" }}>Senaste matcherna</span>
              <FormPills form={data.forms[code]} />
            </div>
          </MiniBlock>
        )}
        {fans.length > 0 && (
          <MiniBlock title="Bonustro från poolen">
            <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
              {fans.map((p, j) => <span key={p.id} title={p.name} style={{ marginLeft: j === 0 ? 0 : -6 }}><Avatar p={p} size={30} /></span>)}
            </div>
          </MiniBlock>
        )}
        <MiniBlock title="Matcher" pad={false}>
          <div style={{ display: "flex", flexDirection: "column" }}>
            {matches.map((m, i) => (
              <div key={m.id} style={{ borderBottom: i < matches.length - 1 ? "1px solid var(--line)" : "none" }}>
                <MatchCard m={m} onOpen={onOpenMatch} showRound />
              </div>
            ))}
          </div>
        </MiniBlock>
      </div>
    </Sheet>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [view, setView] = React.useState("standings");
  const [dataState, setDataState] = React.useState("mid");
  const [player, setPlayer] = React.useState(null);
  const [team, setTeam] = React.useState(null);
  const [match, setMatch] = React.useState(null);

  React.useEffect(() => { applyTheme(t.palette, t.font); }, [t.palette, t.font]);
  const data = React.useMemo(() => window.VM.build(dataState), [dataState]);
  React.useEffect(() => { window.scrollTo({ top: 0 }); }, [view]);

  const openMatch = (m) => setMatch(m);
  const openTeam = (code) => setTeam(code);

  return (
    <div style={{ minHeight: "100vh" }}>
      <header style={{ position: "sticky", top: 0, zIndex: 40, background: "color-mix(in oklab, var(--bg) 88%, transparent)",
        backdropFilter: "blur(12px)", borderBottom: "1px solid var(--line)" }}>
        <div style={{ maxWidth: "var(--maxw)", margin: "0 auto", padding: "11px 16px", display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 11, flex: 1, minWidth: 0 }}>
            <div style={{ width: 40, height: 40, borderRadius: 11, background: "var(--grad)", display: "flex", alignItems: "center",
              justifyContent: "center", flex: "0 0 auto", boxShadow: "var(--shadow)" }}>
              <span className="num display" style={{ fontSize: 17, color: "#fff", fontWeight: "var(--display-weight)" }}>26</span>
            </div>
            <div style={{ minWidth: 0 }}>
              <div className="display" style={{ fontSize: 19, lineHeight: .95, color: "var(--ink)", fontWeight: "var(--display-weight)" }}>VM&nbsp;2026</div>
              <div style={{ display: "flex", alignItems: "center", gap: 5, marginTop: 3 }}>
                <Flag code="USA" size={12} /><Flag code="MEX" size={12} /><Flag code="CAN" size={12} />
                <span style={{ fontSize: 10.5, fontWeight: 700, color: "var(--ink-soft)", marginLeft: 2 }}>Tippningsligan</span>
              </div>
            </div>
          </div>
          <div style={{ display: "flex", background: "var(--bg2)", borderRadius: 10, padding: 3, flex: "0 0 auto" }}>
            {[["pre", "Före"], ["mid", "Mitt i VM"]].map(s => (
              <button key={s[0]} onClick={() => setDataState(s[0])} style={{ padding: "7px 11px", borderRadius: 8, fontWeight: 800, fontSize: 12, whiteSpace: "nowrap",
                background: dataState === s[0] ? "var(--paper)" : "transparent", color: dataState === s[0] ? "var(--ink)" : "var(--ink-soft)",
                boxShadow: dataState === s[0] ? "var(--shadow)" : "none" }}>{s[1]}</button>
            ))}
          </div>
        </div>
      </header>

      <main>
        <div style={{ maxWidth: "var(--maxw)", margin: "0 auto", padding: "18px 16px calc(var(--nav-h) + 30px)" }}>
          {view === "standings" && <StandingsView data={data} onOpenPlayer={setPlayer} />}
          {view === "groups" && <GroupsView data={data} onTeam={openTeam} />}
          {view === "schedule" && <ScheduleView data={data} onOpenMatch={openMatch} />}
          {view === "bonus" && <BonusView data={data} onTeam={openTeam} />}
          {view === "info" && <InfoView />}
        </div>
      </main>

      <nav style={{ position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 45, pointerEvents: "none" }}>
        <div style={{ maxWidth: 540, margin: "0 auto", padding: "0 12px 12px" }}>
          <div style={{ pointerEvents: "auto", display: "flex", justifyContent: "space-around", alignItems: "center",
            background: "var(--paper)", borderRadius: 16, padding: "7px 6px", border: "1px solid var(--line)",
            boxShadow: "0 6px 24px -8px rgba(40,20,30,.28)" }}>
            {NAV.map(n => {
              const active = view === n.id;
              return (
                <button key={n.id} onClick={() => setView(n.id)} style={{ display: "flex", flexDirection: "column", alignItems: "center",
                  gap: 3, padding: "6px 8px", flex: 1, color: active ? "var(--hot)" : "var(--ink-soft)", position: "relative" }}>
                  {active ? <span style={{ position: "absolute", top: -7, width: 22, height: 3, borderRadius: 99, background: "var(--hot)" }} /> : null}
                  <span style={{ display: "flex" }}>{Icon[n.icon](active)}</span>
                  <span style={{ fontSize: 10.5, fontWeight: active ? 800 : 600 }}>{n.label}</span>
                </button>
              );
            })}
          </div>
        </div>
      </nav>

      {player && <PlayerSheet data={data} playerId={player} onClose={() => setPlayer(null)} onOpenMatch={openMatch} />}
      {team && <TeamSheet data={data} code={team} onClose={() => setTeam(null)} onOpenMatch={openMatch} />}
      {match && <MatchDetail data={data} match={match} onClose={() => setMatch(null)} onTeam={openTeam} />}

      <TweaksPanel>
        <TweakSection label="Färgvärld" />
        <TweakRadio label="Palett" value={t.palette}
          options={[{ value: "sunset", label: "Solnedgång" }, { value: "prisma", label: "Prisma" }, { value: "stadium", label: "Stadion" }]}
          onChange={v => setTweak("palette", v)} />
        <div style={{ display: "flex", gap: 8, padding: "2px 2px 6px" }}>
          {Object.entries(VM_PALETTES).map(([k, p]) => (
            <button key={k} onClick={() => setTweak("palette", k)} style={{ flex: 1, display: "flex", borderRadius: 8, overflow: "hidden", height: 26,
              outline: t.palette === k ? "2px solid var(--ink)" : "1px solid rgba(0,0,0,.12)", outlineOffset: 1 }}>
              {p.swatch.map((c, i) => <span key={i} style={{ flex: 1, background: c }} />)}
            </button>
          ))}
        </div>
        <TweakSection label="Typografi" />
        <TweakRadio label="Typsnitt" value={t.font}
          options={[{ value: "modern", label: "Modern" }, { value: "stadion", label: "Stadion" }, { value: "affisch", label: "Affisch" }]}
          onChange={v => setTweak("font", v)} />
        <TweakSection label="Data" />
        <TweakRadio label="Tillstånd" value={dataState}
          options={[{ value: "pre", label: "Före avspark" }, { value: "mid", label: "Mitt i VM" }]}
          onChange={v => setDataState(v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
