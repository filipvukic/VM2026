<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>VM 2026 · Tippningsligan</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     VM 2026 - OLED-dark · Pitch-grön · Data-dense
     Inspirerat av UI/UX Pro Max: Real-Time Monitoring +
     Data-Dense Dashboard + Vibrant/Block-based för sport-energi.
     ============================================================ */
  :root {
    /* Bakgrund: djup lila-svart - gaming/betting */
    --bg-0: #07051A;
    --bg-1: #0E0A24;
    --bg-2: #15102E;
    --bg-3: #1F1842;
    --bg-4: #2A2256;

    /* Borders */
    --border:        rgba(255,255,255,.08);
    --border-strong: rgba(255,255,255,.16);
    --border-pitch:  rgba(0,255,135,.40);

    /* Text */
    --fg:   #FFFFFF;
    --fg-2: #D5D9EB;
    --fg-3: #8E94B5;
    --fg-4: #5A5F7E;

    /* Brand: electric neon green */
    --pitch:       #00FF87;
    --pitch-dim:   #00D973;
    --pitch-deep:  #00A057;
    --pitch-glow:  rgba(0,255,135,.42);

    /* Live: hot pink */
    --live:        #FF1F77;
    --live-glow:   rgba(255,31,119,.40);

    /* Medaljer */
    --gold:        #FFB800;
    --gold-glow:   rgba(255,184,0,.40);
    --silver:      #C8D0E0;
    --bronze:      #E08545;

    /* Stöd-accenter */
    --blue:        #00D4FF;
    --blue-glow:   rgba(0,212,255,.40);
    --purple:      #B57BFF;
    --purple-glow: rgba(181,123,255,.36);
    --orange:      #FF8C2A;
    --yellow:      #FFD600;

    /* Pts-färger */
    --pts-5: var(--gold);   /* exakt */
    --pts-2: var(--pitch);  /* rätt utgång */
    --pts-1: var(--fg-3);   /* annars */

    /* Bakåt-kompat alias (gamla komponenter använder dessa) */
    --bg:           var(--bg-1);
    --bg2:          var(--bg-2);
    --paper:        var(--bg-2);
    --ink:          var(--fg);
    --ink-soft:     var(--fg-3);
    --line:         var(--border);
    --line-strong:  var(--border-strong);
    --hot:          var(--live);
    --warm:         var(--orange);
    --cool:         var(--pitch);
    --deep:         var(--bg-0);
    --grad:       linear-gradient(120deg, #0D2520 0%, #082019 50%, #0F0F1A 100%);
    --grad-soft:  linear-gradient(120deg, #102320, #0E1A28);

    /* Typografi */
    --font-display: 'Bricolage Grotesque', 'Inter', system-ui, sans-serif;
    --font-body:    'Inter', system-ui, -apple-system, sans-serif;
    --font-mono:    'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
    --display-tracking: -0.025em;
    --display-transform: none;
    --display-weight: 800;

    /* Radius */
    --r-sm: 6px;
    --r-md: 10px;
    --r-lg: 16px;

    /* Shadow + lift */
    --shadow:       0 1px 0 rgba(255,255,255,.02) inset, 0 8px 24px -16px rgba(0,0,0,.55);
    --shadow-lift:  0 1px 0 rgba(255,255,255,.04) inset, 0 18px 40px -18px rgba(0,0,0,.6);

    /* Geometri */
    --nav-h: 64px;
    --maxw: 1180px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  html { background: var(--bg-0); }
  body {
    font-family: var(--font-body);
    color: var(--fg);
    background: var(--bg-0);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overscroll-behavior-y: none;
    font-feature-settings: "ss01", "cv11";
  }
  /* Mesh-gradient bakgrund med neon-glow */
  body::before {
    content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(60vw 50vw at 15% 0%, rgba(255,31,119,.13), transparent 55%),
      radial-gradient(70vw 50vw at 100% 30%, rgba(0,255,135,.10), transparent 55%),
      radial-gradient(50vw 40vw at 50% 100%, rgba(0,212,255,.10), transparent 55%),
      radial-gradient(60vw 40vw at 0% 80%, rgba(181,123,255,.10), transparent 55%);
  }
  body::after {
    content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(80% 60% at 50% 0%, #000, transparent 80%);
  }
  #root { position: relative; z-index: 1; }
  .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
  .mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

  h1,h2,h3 { margin: 0; }
  .display {
    font-family: var(--font-display);
    text-transform: var(--display-transform);
    letter-spacing: var(--display-tracking);
    line-height: .98;
    font-weight: var(--display-weight, 800);
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
  img { display: block; max-width: 100%; }

  .app-scroll::-webkit-scrollbar { width: 0; height: 0; }

  ::selection { background: var(--pitch); color: #08120F; }
  :focus-visible { outline: 2px solid var(--pitch); outline-offset: 2px; }

  @keyframes pop { 0%{transform:scale(.6);opacity:0} 60%{transform:scale(1.08)} 100%{transform:scale(1);opacity:1} }
  @keyframes riseIn { from{transform:translateY(16px)} to{transform:translateY(0)} }
  @keyframes fadeRise { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  @keyframes sheetFade { from{opacity:0} to{opacity:1} }
  @keyframes sheetPop  { from{opacity:0;transform:scale(.96) translateY(8px)} to{opacity:1;transform:none} }
  @media (prefers-reduced-motion: no-preference) {
    .can-fade { animation-name: fadeRise !important; }
  }
  @keyframes livePulse { 0%,100%{box-shadow:0 0 0 0 rgba(229,38,126,.55)} 50%{box-shadow:0 0 0 7px rgba(229,38,126,0)} }
  @keyframes confettiFall { to { transform: translateY(115vh) rotate(720deg); } }
  @keyframes shine { from{background-position:-200% 0} to{background-position:200% 0} }
  @keyframes barGrow { from { width: 0 !important; } }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
  @keyframes viewIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  @keyframes tickerScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @keyframes neonPulse {
    0%, 100% { text-shadow: 0 0 18px var(--pitch-glow), 0 0 36px var(--pitch-glow); }
    50%      { text-shadow: 0 0 32px var(--pitch), 0 0 64px var(--pitch-glow); }
  }
  @keyframes goldPulse {
    0%, 100% { box-shadow: 0 0 0 0 var(--gold-glow), 0 12px 36px -12px var(--gold-glow); }
    50%      { box-shadow: 0 0 0 8px transparent, 0 16px 48px -8px var(--gold-glow); }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }
  @keyframes sparkle {
    0%, 100% { opacity: 0; transform: scale(0); }
    50% { opacity: 1; transform: scale(1); }
  }
  @keyframes spin360 { from { transform: rotate(0deg) } to { transform: rotate(360deg) } }

  /* Hover-glow utility */
  .glow-hover { transition: transform .2s cubic-bezier(.3,.7,.4,1), box-shadow .25s ease; }
  .glow-hover:hover { transform: translateY(-2px); }
  .glow-hover.glow-green:hover { box-shadow: 0 12px 32px -12px var(--pitch-glow), 0 0 0 1px var(--border-pitch); }
  .glow-hover.glow-gold:hover  { box-shadow: 0 12px 32px -12px var(--gold-glow); }
  .glow-hover.glow-pink:hover  { box-shadow: 0 12px 32px -12px var(--live-glow); }

  /* Neon-text klass */
  .neon-green { color: var(--pitch); text-shadow: 0 0 18px var(--pitch-glow), 0 0 36px var(--pitch-glow); }
  .neon-gold  { color: var(--gold); text-shadow: 0 0 18px var(--gold-glow), 0 0 36px var(--gold-glow); }
  .neon-pink  { color: var(--live); text-shadow: 0 0 18px var(--live-glow), 0 0 36px var(--live-glow); }

  /* Mjuk expand/collapse via grid-rows hack (1fr -> 0fr) */
  .smooth-collapse { display: grid; grid-template-rows: 0fr;
    transition: grid-template-rows .3s cubic-bezier(.3,.7,.4,1), opacity .25s; opacity: 0; }
  .smooth-collapse.open { grid-template-rows: 1fr; opacity: 1; }
  .smooth-collapse > div { overflow: hidden; min-height: 0; }
  /* Hover-lyft */
  .lift { transition: transform .15s cubic-bezier(.3,.7,.4,1), box-shadow .15s; }
  .lift:hover { transform: translateY(-1px); }
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: .001ms !important; animation-iteration-count: 1 !important; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <!-- ╔══════════════════════════════════════════════════════════════════╗ -->
  <!-- ║  DATALAGER - adapter mot vår riktiga data.json + fixtures.json   ║ -->
  <!-- ║  Exponerar samma window.VM.{build,TEAMS,GROUPS,...} som mock-    ║ -->
  <!-- ║  datalagret, men byggt från verklig pool-data hämtad i runtime.  ║ -->
  <!-- ╚══════════════════════════════════════════════════════════════════╝ -->
  <script>
/* ============================================================
   VM 2026 - Tippningsliga · Data-adapter
   window.__REAL_DATA__ sätts av boot-koden innan React renderas.
   window.VM.build()  ->  fullständig dataset i designens form.
   ============================================================ */
(function () {
  "use strict";

  // ---- prispengar (samma 50/30/20 av 2700) ----
  const PRIZES = [1350, 810, 540];

  // ---- 12 grupper ----
  const GROUP_LETTERS = ["A","B","C","D","E","F","G","H","I","J","K","L"];

  // ---- TLA → ISO alpha-2 (för flagcdn) ----
  const TLA_TO_ISO = {
    USA:"us", MEX:"mx", CAN:"ca",
    BRA:"br", ARG:"ar", URU:"uy", COL:"co", ECU:"ec", PAR:"py", CHI:"cl", PER:"pe", VEN:"ve", BOL:"bo",
    ENG:"gb-eng", SCO:"gb-sct", WAL:"gb-wls", NIR:"gb-nir", IRL:"ie",
    FRA:"fr", GER:"de", ITA:"it", ESP:"es", POR:"pt", NED:"nl", BEL:"be",
    CRO:"hr", SUI:"ch", AUT:"at", POL:"pl", DEN:"dk", SWE:"se", NOR:"no",
    FIN:"fi", ISL:"is", HUN:"hu", CZE:"cz", SVK:"sk", SVN:"si", ROU:"ro",
    GRE:"gr", BUL:"bg", SRB:"rs", UKR:"ua", BIH:"ba", ALB:"al", KOS:"xk",
    MKD:"mk", MNE:"me", TUR:"tr", LUX:"lu",
    MAR:"ma", TUN:"tn", ALG:"dz", EGY:"eg", SEN:"sn", CIV:"ci", NGA:"ng",
    CMR:"cm", GHA:"gh", RSA:"za", COD:"cd", CGO:"cg", CPV:"cv", MLI:"ml", BFA:"bf",
    ANG:"ao", ZAM:"zm", GUI:"gn", GAB:"ga", LBY:"ly", BEN:"bj", TOG:"tg",
    JPN:"jp", KOR:"kr", KSA:"sa", IRN:"ir", IRQ:"iq", QAT:"qa", UAE:"ae",
    UZB:"uz", JOR:"jo", AUS:"au", CHN:"cn", THA:"th", VIE:"vn", IDN:"id",
    CRC:"cr", PAN:"pa", JAM:"jm", HAI:"ht", HON:"hn", SLV:"sv", GUA:"gt",
    TRI:"tt", CUW:"cw", CUR:"cw", SUR:"sr", NZL:"nz"
  };

  // ---- engelska namn → ISO (om TLA saknas) ----
  const NAME_TO_ISO = {
    "united states":"us","mexico":"mx","canada":"ca",
    "brazil":"br","argentina":"ar","uruguay":"uy","colombia":"co","ecuador":"ec",
    "paraguay":"py","chile":"cl","peru":"pe","venezuela":"ve","bolivia":"bo",
    "england":"gb-eng","scotland":"gb-sct","wales":"gb-wls","northern ireland":"gb-nir",
    "ireland":"ie","republic of ireland":"ie",
    "france":"fr","germany":"de","italy":"it","spain":"es","portugal":"pt",
    "netherlands":"nl","belgium":"be","croatia":"hr","switzerland":"ch","austria":"at",
    "poland":"pl","denmark":"dk","sweden":"se","norway":"no","finland":"fi","iceland":"is",
    "hungary":"hu","czech republic":"cz","czechia":"cz","slovakia":"sk","slovenia":"si",
    "romania":"ro","greece":"gr","serbia":"rs","ukraine":"ua",
    "bosnia and herzegovina":"ba","bosnia-herzegovina":"ba","albania":"al",
    "north macedonia":"mk","montenegro":"me","turkey":"tr","türkiye":"tr",
    "morocco":"ma","tunisia":"tn","algeria":"dz","egypt":"eg","senegal":"sn",
    "ivory coast":"ci","côte d'ivoire":"ci","nigeria":"ng",
    "cameroon":"cm","ghana":"gh","south africa":"za","dr congo":"cd","congo dr":"cd",
    "cape verde":"cv","mali":"ml","burkina faso":"bf","angola":"ao",
    "japan":"jp","south korea":"kr","korea republic":"kr","saudi arabia":"sa",
    "iran":"ir","iraq":"iq","qatar":"qa","united arab emirates":"ae",
    "uzbekistan":"uz","jordan":"jo","australia":"au",
    "costa rica":"cr","panama":"pa","jamaica":"jm","haiti":"ht","honduras":"hn",
    "el salvador":"sv","guatemala":"gt","trinidad and tobago":"tt",
    "curaçao":"cw","curacao":"cw","new zealand":"nz"
  };

  // ---- svenska namn → TLA (från tips.json team_aliases) ----
  const SV_TO_TLA = {
    "argentina":"ARG","frankrike":"FRA","spanien":"ESP","england":"ENG",
    "brasilien":"BRA","portugal":"POR","nederländerna":"NED","usa":"USA",
    "mexico":"MEX","mexiko":"MEX","kanada":"CAN","tyskland":"GER","belgien":"BEL",
    "kroatien":"CRO","uruguay":"URU","colombia":"COL","japan":"JPN",
    "marocko":"MAR","senegal":"SEN","schweiz":"SUI","danmark":"DEN",
    "sydkorea":"KOR","ecuador":"ECU","österrike":"AUT","australien":"AUS",
    "norge":"NOR","sverige":"SWE","polen":"POL","serbien":"SRB",
    "turkiet":"TUR","egypten":"EGY","nigeria":"NGA","elfenbenskusten":"CIV",
    "iran":"IRN","panama":"PAN","paraguay":"PAR","ungern":"HUN",
    "nya zeeland":"NZL","saudiarabien":"KSA","ghana":"GHA","kamerun":"CMR",
    "uzbekistan":"UZB","jordanien":"JOR","sydafrika":"RSA","algeriet":"ALG",
    "honduras":"HON","peru":"PER","chile":"CHI","panama":"PAN",
    "tjeckien":"CZE","bosnien":"BIH","qatar":"QAT","irak":"IRQ",
    "haiti":"HAI","skottland":"SCO","kap verde":"CPV","tunisien":"TUN",
    "dr kongo":"COD","curacao":"CUR"
  };

  // ---- engelska namn → svensk display (för paddade lag) ----
  const EN_TO_SV = {
    "United States":"USA","Mexico":"Mexico","Canada":"Kanada","Brazil":"Brasilien",
    "Argentina":"Argentina","Uruguay":"Uruguay","Colombia":"Colombia","Ecuador":"Ecuador",
    "Paraguay":"Paraguay","Chile":"Chile","Peru":"Peru","Venezuela":"Venezuela",
    "England":"England","Scotland":"Skottland","Wales":"Wales",
    "France":"Frankrike","Germany":"Tyskland","Italy":"Italien","Spain":"Spanien",
    "Portugal":"Portugal","Netherlands":"Nederländerna","Belgium":"Belgien",
    "Croatia":"Kroatien","Switzerland":"Schweiz","Austria":"Österrike",
    "Poland":"Polen","Denmark":"Danmark","Sweden":"Sverige","Norway":"Norge",
    "Finland":"Finland","Iceland":"Island","Hungary":"Ungern",
    "Czech Republic":"Tjeckien","Czechia":"Tjeckien","Slovakia":"Slovakien",
    "Romania":"Rumänien","Greece":"Grekland","Serbia":"Serbien","Ukraine":"Ukraina",
    "Bosnia and Herzegovina":"Bosnien","Bosnia-Herzegovina":"Bosnien",
    "Albania":"Albanien","Turkey":"Turkiet","Türkiye":"Turkiet",
    "Morocco":"Marocko","Tunisia":"Tunisien","Algeria":"Algeriet","Egypt":"Egypten",
    "Senegal":"Senegal","Ivory Coast":"Elfenbenskusten","Côte d'Ivoire":"Elfenbenskusten",
    "Nigeria":"Nigeria","Cameroon":"Kamerun","Ghana":"Ghana","South Africa":"Sydafrika",
    "DR Congo":"DR Kongo","Congo DR":"DR Kongo","Cape Verde":"Kap Verde",
    "Japan":"Japan","South Korea":"Sydkorea","Korea Republic":"Sydkorea",
    "Saudi Arabia":"Saudiarabien","Iran":"Iran","Iraq":"Irak","Qatar":"Qatar",
    "United Arab Emirates":"Förenade Arabemiraten",
    "Uzbekistan":"Uzbekistan","Jordan":"Jordanien","Australia":"Australien",
    "Costa Rica":"Costa Rica","Panama":"Panama","Jamaica":"Jamaica","Haiti":"Haiti",
    "Honduras":"Honduras","Curaçao":"Curaçao","Curacao":"Curaçao",
    "New Zealand":"Nya Zeeland"
  };

  // ---- 9 spelare med deterministisk färg från designens palett ----
  const PLAYER_COLORS = {
    "Albin":     "#E5267E",
    "Alexander": "#FF6B35",
    "Björn":     "#1FA37A",
    "Casper":    "#7A3CF0",
    "Filip":     "#0E8FE0",
    "Isac":      "#F5B301",
    "Johan":     "#E63946",
    "Martin":    "#16A0A0",
    "Oskar":     "#9B5DE5"
  };
  // Placeholder-foton: lägg in images/players/{slug}.jpg så plockas de upp.
  // Saknas filen visas initial-brickan automatiskt (Avatar har onError-fallback).
  const PLAYER_SLUGS = {
    "Albin":"albin","Alexander":"alexander","Björn":"bjorn","Casper":"casper",
    "Filip":"filip","Isac":"isac","Johan":"johan","Martin":"martin","Oskar":"oskar"
  };
  function playerPhoto(name){
    const slug = PLAYER_SLUGS[name];
    return slug ? ("images/players/" + slug + ".jpg") : null;
  }

  function isoFromTla(tla){ return tla ? (TLA_TO_ISO[String(tla).toUpperCase()] || null) : null; }
  function isoFromName(name){
    if(!name) return null;
    const key = String(name).toLowerCase().trim();
    if(NAME_TO_ISO[key]) return NAME_TO_ISO[key];
    const stripped = key.normalize("NFD").replace(/[̀-ͯ]/g,"");
    return NAME_TO_ISO[stripped] || null;
  }
  function isoFor(name, tla){ return isoFromTla(tla) || isoFromName(name); }
  // Generate deterministic team brand colors (c1/c2) from name hash if we lack flag-derived data
  function brandFromName(name){
    let h = 0;
    for(let i=0;i<(name||"").length;i++) h = (h*31 + name.charCodeAt(i)) | 0;
    const hue1 = ((h % 360) + 360) % 360;
    const hue2 = (hue1 + 28) % 360;
    return [`hsl(${hue1} 55% 45%)`, `hsl(${hue2} 65% 38%)`];
  }
  // Build a 3-letter code from a team name when TLA is missing.
  function codeFromName(name){
    if(!name) return null;
    // Try a SV → TLA hit first.
    const lc = String(name).toLowerCase();
    if(SV_TO_TLA[lc]) return SV_TO_TLA[lc];
    if(NAME_TO_ISO[lc]){ /* fall through */ }
    // Otherwise pick first 3 chars from first word.
    const cleaned = String(name).replace(/[^a-zA-ZåäöÅÄÖ ]/g,"").trim().toUpperCase();
    return cleaned.slice(0,3) || "TBD";
  }

  // Map a bonus team-pick string (e.g. "Frankrike" or "France") to a team code.
  function teamCodeFromPick(pick, teams){
    if(!pick) return null;
    const lc = String(pick).toLowerCase().trim();
    if(SV_TO_TLA[lc]) return SV_TO_TLA[lc];
    // try match against built TEAMS by name (Swedish display)
    for(const code in teams){
      if(teams[code].name && teams[code].name.toLowerCase() === lc) return code;
    }
    // try English name lookup → ISO → code
    if(NAME_TO_ISO[lc]){
      const iso = NAME_TO_ISO[lc];
      for(const code in teams){ if(teams[code].iso === iso) return code; }
    }
    return null;
  }

  // ---- core builder ----
  function build(){
    const real = window.__REAL_DATA__ || {};
    const D = real.data || {};
    const F = (real.fixtures || []);

    // ============= TEAMS + GROUPS from data.groups + fixtures =============
    const TEAMS = {};
    const GROUPS = {};
    GROUP_LETTERS.forEach(L => { GROUPS[L] = []; });

    // 1) Seed TEAMS + GROUPS from data.groups (the authoritative group memberships)
    (D.groups || []).forEach(g => {
      const L = g.code;
      (g.table || []).forEach(row => {
        const code = (row.tla && String(row.tla).toUpperCase()) || codeFromName(row.team);
        if(TEAMS[code]) return;
        const display = EN_TO_SV[row.team] || row.team;
        const brand = brandFromName(row.team || code);
        TEAMS[code] = {
          code, name: display, c1: brand[0], c2: brand[1],
          rating: 75, group: L, pot: 0,
          iso: isoFor(row.team, row.tla)
        };
        if(GROUPS[L] && GROUPS[L].length < 4) GROUPS[L].push(code);
      });
    });

    // 2) Make sure every team that appears in fixtures.json exists in TEAMS too
    F.forEach(f => {
      [[f.home, f.homeTla], [f.away, f.awayTla]].forEach(([n, t]) => {
        if(!n) return;
        const code = (t && String(t).toUpperCase()) || codeFromName(n);
        if(!TEAMS[code]){
          const display = EN_TO_SV[n] || n;
          const brand = brandFromName(n);
          TEAMS[code] = { code, name: display, c1: brand[0], c2: brand[1],
            rating: 75, group: f.group || null, pot: 0, iso: isoFor(n, t) };
        }
        if(f.group && f.stage === "GROUP_STAGE" && GROUPS[f.group] && !GROUPS[f.group].includes(code) && GROUPS[f.group].length < 4){
          GROUPS[f.group].push(code);
          if(!TEAMS[code].group) TEAMS[code].group = f.group;
        }
      });
    });

    // ============= helper: find team code by name from a fixture =============
    function codeOf(name, tla){
      if(!name) return null;
      if(tla){
        const t = String(tla).toUpperCase();
        if(TEAMS[t]) return t;
      }
      // try name lookup
      for(const c in TEAMS){
        if(TEAMS[c].name === (EN_TO_SV[name] || name)) return c;
      }
      const fallback = codeFromName(name);
      if(TEAMS[fallback]) return fallback;
      // synthesize team if completely new (knockout TBD shouldn't hit this since home/away null)
      const brand = brandFromName(name);
      TEAMS[fallback] = { code:fallback, name: EN_TO_SV[name]||name, c1:brand[0], c2:brand[1],
        rating:75, group:null, pot:0, iso: isoFor(name, tla) };
      return fallback;
    }

    // ============= MATCHES (group + knockout) from fixtures =============
    const STAGE_MAP = {
      GROUP_STAGE:"group",
      LAST_32:"ko", LAST_16:"ko", QUARTER_FINALS:"ko",
      SEMI_FINALS:"ko", THIRD_PLACE:"ko", FINAL:"ko"
    };
    const KO_PREFIX = {
      LAST_32:"r32_", LAST_16:"r16_", QUARTER_FINALS:"qf_",
      SEMI_FINALS:"sf_", THIRD_PLACE:"third_", FINAL:"final_"
    };

    // Build a sidecar lookup of tips per match id (from data.matches)
    const tipsByMatchId = {};
    (D.matches || []).forEach(m => { tipsByMatchId[m.id] = m; });

    // Counters for KO ordering - index by stage so we get r32_0, r32_1, ...
    const koCounters = {};

    const allMatches = (F || []).map(f => {
      const stage = STAGE_MAP[f.stage] || "ko";
      const isGroup = stage === "group";
      let id;
      if(isGroup){
        id = "G" + f.id;
      } else {
        const pfx = KO_PREFIX[f.stage] || "ko_";
        koCounters[pfx] = koCounters[pfx] || 0;
        id = pfx + (koCounters[pfx]++);
      }
      const homeCode = f.home ? codeOf(f.home, f.homeTla) : null;
      const awayCode = f.away ? codeOf(f.away, f.awayTla) : null;
      const kickoff = new Date(f.utcDate);
      const finished = f.status === "FINISHED" || f.status === "AWARDED";
      const live = f.status === "IN_PLAY" || f.status === "PAUSED" || f.status === "LIVE" || f.status === "SUSPENDED";
      const ga = (f.score && f.score[0] != null) ? f.score[0] : null;
      const gb = (f.score && f.score[1] != null) ? f.score[1] : null;
      let winner = null;
      if(finished && ga != null && gb != null){
        if(ga > gb) winner = homeCode;
        else if(gb > ga) winner = awayCode;
      }
      const tipped = tipsByMatchId[f.id];
      const tippas = !!(tipped && tipped.tips && tipped.tips.length > 0);

      // Map engine's goals/bookings -> designens scorers/cards format.
      // codeOfTeamRef resolverar "tla"-strängar mot vår TEAMS-tabell.
      function codeOfTeamRef(ref){
        if(!ref) return null;
        const upper = String(ref).toUpperCase();
        if(TEAMS[upper]) return upper;
        return codeOf(ref, null);
      }
      const goalsSrc = (f.goals && f.goals.length) ? f.goals
        : (tipped && tipped.goals) ? tipped.goals : [];
      const bookingsSrc = (f.bookings && f.bookings.length) ? f.bookings
        : (tipped && tipped.bookings) ? tipped.bookings : [];
      const scorers = goalsSrc.map(g => ({
        team: codeOfTeamRef(g.team),
        name: g.scorer,
        minute: g.minute,
        pen: (String(g.type||"").toUpperCase() === "PENALTY")
      })).filter(x => x.team && x.name);
      const cards = bookingsSrc.map(b => {
        const c = String(b.card||"").toUpperCase();
        return {
          team: codeOfTeamRef(b.team),
          name: b.player,
          minute: b.minute,
          type: (c === "RED" || c === "YELLOW_RED") ? "red" : "yellow"
        };
      }).filter(x => x.team && x.name);
      // Vi får inte possession/xG/skott från gratisplanen, så stats förblir null;
      // designens StatsBlock returnerar null när stats saknas, men Timeline
      // (mål + kort) ritas ändå från m.scorers/m.cards.

      return {
        id, stage, group: f.group || null,
        round: isGroup ? ("Grupp " + (f.group||"")) : "Slutspel",
        matchday: null,
        home: homeCode, away: awayCode,
        kickoff,
        ga, gb,
        status: finished ? "played" : (live ? "live" : "upcoming"),
        winner, pen: null,
        minute: (live && (f.minute != null)) ? f.minute : (live ? null : undefined),
        venue: f.venue || null,
        referees: f.referees || [],
        subs: f.subs || [],
        scoreDetail: f.scoreDetail || null,
        tippas,
        scorers, cards,
        stats: null,
        _realId: f.id  // for cross-lookup with data.matches.tips
      };
    });

    allMatches.sort((a,b) => a.kickoff - b.kickoff);
    const matches = allMatches.filter(m => m.stage === "group");

    // ============= groupTables from data.groups =============
    const groupTables = {};
    GROUP_LETTERS.forEach(L => {
      const g = (D.groups || []).find(x => x.code === L);
      if(g && g.table && g.table.length){
        const sorted = [...g.table].sort((a,b) =>
          (b.points - a.points) || ((b.gd||(b.gf-b.ga)) - (a.gd||(a.gf-a.ga))) || (b.gf - a.gf));
        groupTables[L] = sorted.map((row, i) => {
          const code = (row.tla && String(row.tla).toUpperCase()) || codeFromName(row.team);
          return {
            code,
            sp: row.played || 0, v: row.won || 0, o: row.draw || 0, f: row.lost || 0,
            gm: row.gf || 0, im: row.ga || 0,
            ms: (row.gd != null ? row.gd : ((row.gf||0) - (row.ga||0))),
            p:  row.points || 0,
            pos: i + 1
          };
        });
      } else {
        // empty/placeholder - fill with placeholders for the design's "·" rendering
        groupTables[L] = (GROUPS[L] || []).map((code, i) => ({
          code, sp:0, v:0, o:0, f:0, gm:0, im:0, ms:0, p:0, pos: i+1
        }));
        // pad with synthetic codes if group has <4 known teams
        while(groupTables[L].length < 4){
          const tag = "TBD" + L + (groupTables[L].length+1);
          TEAMS[tag] = TEAMS[tag] || { code:tag, name:"Att lottas", c1:"#888", c2:"#666",
            rating:70, group:L, pot:0, iso:null };
          groupTables[L].push({ code:tag, sp:0,v:0,o:0,f:0,gm:0,im:0,ms:0,p:0, pos: groupTables[L].length+1 });
        }
      }
    });

    // ============= knockout struct =============
    // Bracket-strukturen byggs alltid (även pre-draw) med slot-etiketter.
    // Riktiga lag fylls i från groupTables (positionsbaserat) eller från
    // verkliga KO-fixtures (när FIFA satt teams + datum).

    // Compute "best 3rd from groups X" - picks the highest-ranked 3rd-placed
    // team from a list of groups (e.g. "ABCDF" picks best 3rd from A,B,C,D,F).
    function bestThirdFromGroups(letters){
      const cands = [];
      letters.split("").forEach(L => {
        const r = groupTables[L] && groupTables[L][2];
        if(r && r.code && r.code.indexOf("TBD") !== 0) cands.push(Object.assign({}, r, {group:L}));
      });
      cands.sort((a,b) => (b.p - a.p) || (b.ms - a.ms) || (b.gm - a.gm) || a.group.localeCompare(b.group));
      return cands[0] ? cands[0].code : null;
    }

    function slotTeamAndLabel(spec){
      // spec shapes:
      //  { p: 1|2, g: "A" }              — group winner / runner-up
      //  { p: 3, gs: "ABCDF" }           — best 3rd from listed groups
      //  { winM: 73 } / { loseM: 101 }   — winner/loser of FIFA match N (no projection)
      //  { fromLabel: "..." }            — raw label
      if(spec.fromLabel){
        return { code: null, projCode: null, label: spec.fromLabel };
      }
      if(spec.winM){
        return { code: null, projCode: null, label: "Vinnare M" + spec.winM };
      }
      if(spec.loseM){
        return { code: null, projCode: null, label: "Förlorare M" + spec.loseM };
      }
      if(spec.p === 1 || spec.p === 2){
        const row = groupTables[spec.g] && groupTables[spec.g][spec.p - 1];
        const proj = row && row.code && row.code.indexOf("TBD") !== 0 ? row.code : null;
        const label = (spec.p === 1 ? "Vinnare " : "Tvåa ") + spec.g;
        return { code: null, projCode: proj, label };
      }
      if(spec.p === 3 && spec.gs){
        return { code: null, projCode: bestThirdFromGroups(spec.gs),
          label: "Bästa 3:a (" + spec.gs.split("").join("/") + ")" };
      }
      return { code: null, projCode: null, label: "TBD" };
    }

    // Round-of-32 bracket — officiella FIFA 2026 pairings, ordnade så att
    // designens recursive tree (R32[2i],R32[2i+1] → R16[i]) ger rätt par.
    // FIFA-match-nummer (M73..M88) inkluderas för forward-labels.
    const R32_SPECS = [
      // tree index : FIFA num : home spec, away spec
      { fifa: 73, a: {p:2,g:"A"}, b: {p:2,g:"B"} },        // r32_0
      { fifa: 75, a: {p:1,g:"E"}, b: {p:3,gs:"ABCDF"} },   // r32_1  → R16_0 = M89 (W73+W75)
      { fifa: 74, a: {p:1,g:"C"}, b: {p:2,g:"F"} },        // r32_2
      { fifa: 77, a: {p:2,g:"E"}, b: {p:2,g:"I"} },        // r32_3  → R16_1 = M90 (W74+W77)
      { fifa: 83, a: {p:1,g:"H"}, b: {p:2,g:"J"} },        // r32_4
      { fifa: 84, a: {p:2,g:"K"}, b: {p:2,g:"L"} },        // r32_5  → R16_2 = M93 (W83+W84)
      { fifa: 81, a: {p:1,g:"G"}, b: {p:3,gs:"AEHIJ"} },   // r32_6
      { fifa: 82, a: {p:1,g:"D"}, b: {p:3,gs:"BEFIJ"} },   // r32_7  → R16_3 = M94 (W81+W82)
      { fifa: 76, a: {p:1,g:"F"}, b: {p:2,g:"C"} },        // r32_8
      { fifa: 78, a: {p:1,g:"I"}, b: {p:3,gs:"CDFGH"} },   // r32_9  → R16_4 = M91 (W76+W78)
      { fifa: 79, a: {p:1,g:"A"}, b: {p:3,gs:"CEFHI"} },   // r32_10
      { fifa: 80, a: {p:1,g:"L"}, b: {p:3,gs:"EHIJK"} },   // r32_11 → R16_5 = M92 (W79+W80)
      { fifa: 86, a: {p:2,g:"D"}, b: {p:2,g:"G"} },        // r32_12
      { fifa: 88, a: {p:1,g:"K"}, b: {p:3,gs:"DEIJL"} },   // r32_13 → R16_6 = M95 (W86+W88)
      { fifa: 85, a: {p:1,g:"B"}, b: {p:3,gs:"EFGIJ"} },   // r32_14
      { fifa: 87, a: {p:1,g:"J"}, b: {p:2,g:"H"} }         // r32_15 → R16_7 = M96 (W85+W87)
    ];
    // R16 (tree order): each fed by R32[2i] and R32[2i+1].
    // FIFA nums: R16_0=89, R16_1=90, R16_2=93, R16_3=94, R16_4=91, R16_5=92, R16_6=95, R16_7=96
    const R16_FIFA = [89, 90, 93, 94, 91, 92, 95, 96];
    // QF: each fed by R16[2i]+R16[2i+1]. FIFA: QF0=M97, QF1=M98, QF2=M99, QF3=M100.
    const QF_FIFA = [97, 98, 99, 100];
    // SF: SF0=M101, SF1=M102.
    const SF_FIFA = [101, 102];

    // KO venues per FIFA match number (officiell FIFA 2026-lottning).
    const KO_VENUES = {
      73:  { stadium: "Los Angeles Stadium",         city: "Los Angeles" },
      74:  { stadium: "Houston Stadium",             city: "Houston" },
      75:  { stadium: "Boston Stadium",              city: "Boston" },
      76:  { stadium: "Monterrey Stadium",           city: "Monterrey" },
      77:  { stadium: "Dallas Stadium",              city: "Dallas" },
      78:  { stadium: "New York/New Jersey Stadium", city: "New Jersey" },
      79:  { stadium: "Mexico City Stadium",         city: "Mexico City" },
      80:  { stadium: "Atlanta Stadium",             city: "Atlanta" },
      81:  { stadium: "Seattle Stadium",             city: "Seattle" },
      82:  { stadium: "San Francisco Bay Area Stadium", city: "San Francisco Bay Area" },
      83:  { stadium: "Los Angeles Stadium",         city: "Los Angeles" },
      84:  { stadium: "Toronto Stadium",             city: "Toronto" },
      85:  { stadium: "BC Place Vancouver",          city: "Vancouver" },
      86:  { stadium: "Dallas Stadium",              city: "Dallas" },
      87:  { stadium: "Miami Stadium",               city: "Miami" },
      88:  { stadium: "Kansas City Stadium",         city: "Kansas City" },
      89:  { stadium: "Houston Stadium",             city: "Houston" },
      90:  { stadium: "Philadelphia Stadium",        city: "Philadelphia" },
      91:  { stadium: "New York/New Jersey Stadium", city: "New Jersey" },
      92:  { stadium: "Mexico City Stadium",         city: "Mexico City" },
      93:  { stadium: "Dallas Stadium",              city: "Dallas" },
      94:  { stadium: "Seattle Stadium",             city: "Seattle" },
      95:  { stadium: "Atlanta Stadium",             city: "Atlanta" },
      96:  { stadium: "BC Place Vancouver",          city: "Vancouver" },
      97:  { stadium: "Boston Stadium",              city: "Boston" },
      98:  { stadium: "Los Angeles Stadium",         city: "Los Angeles" },
      99:  { stadium: "Miami Stadium",               city: "Miami" },
      100: { stadium: "Kansas City Stadium",         city: "Kansas City" },
      101: { stadium: "Dallas Stadium",              city: "Dallas" },
      102: { stadium: "Atlanta Stadium",             city: "Atlanta" },
      103: { stadium: "Miami Stadium",               city: "Miami" },
      104: { stadium: "New York/New Jersey Stadium", city: "New Jersey" }
    };

    function makeBracketMatch(prefix, idx, slotA, slotB, fifa){
      return {
        id: prefix + idx, stage: "ko", group: null, round: "Slutspel",
        fifa: fifa || null,
        home: slotA.code, away: slotB.code,
        projHome: slotA.projCode || null, projAway: slotB.projCode || null,
        fromA: slotA.label, fromB: slotB.label,
        kickoff: new Date(Date.UTC(2026, 6, 19, 19, 0)),
        ga: null, gb: null, status: "upcoming",
        winner: null, pen: null, venue: (fifa && KO_VENUES[fifa]) || null, tippas: true
      };
    }

    // Build structural rounds
    const r32 = R32_SPECS.map((spec, i) =>
      makeBracketMatch("r32_", i, slotTeamAndLabel(spec.a), slotTeamAndLabel(spec.b), spec.fifa));
    const r16 = []; for(let i=0;i<8;i++){
      r16.push(makeBracketMatch("r16_", i,
        slotTeamAndLabel({winM: R32_SPECS[i*2].fifa}),
        slotTeamAndLabel({winM: R32_SPECS[i*2+1].fifa}),
        R16_FIFA[i]));
    }
    const qf = []; for(let i=0;i<4;i++){
      qf.push(makeBracketMatch("qf_", i,
        slotTeamAndLabel({winM: R16_FIFA[i*2]}),
        slotTeamAndLabel({winM: R16_FIFA[i*2+1]}),
        QF_FIFA[i]));
    }
    const sf = []; for(let i=0;i<2;i++){
      sf.push(makeBracketMatch("sf_", i,
        slotTeamAndLabel({winM: QF_FIFA[i*2]}),
        slotTeamAndLabel({winM: QF_FIFA[i*2+1]}),
        SF_FIFA[i]));
    }
    const finalArr = [ makeBracketMatch("final_", 0,
      slotTeamAndLabel({winM: SF_FIFA[0]}),
      slotTeamAndLabel({winM: SF_FIFA[1]}),
      104) ];
    const thirdArr = [ makeBracketMatch("third_", 0,
      slotTeamAndLabel({loseM: SF_FIFA[0]}),
      slotTeamAndLabel({loseM: SF_FIFA[1]}),
      103) ];

    // Overlay any real KO fixtures (by stage, sorted by date) into the structural matches.
    // This brings in real kickoff times AND populates teams once the draw is done.
    function overlayKO(structural, stagePrefix){
      const real = allMatches.filter(m => m.id.indexOf(stagePrefix) === 0)
        .sort((a,b) => a.kickoff - b.kickoff);
      real.forEach((rm, i) => {
        const s = structural[i];
        if(!s) return;
        s.id = rm.id; // keep real id so tip-lookups work
        s.kickoff = rm.kickoff;
        s.status = rm.status;
        if(rm.home){ s.home = rm.home; s.fromA = null; }
        if(rm.away){ s.away = rm.away; s.fromB = null; }
        s.ga = rm.ga; s.gb = rm.gb;
        s.winner = rm.winner;
        s.tippas = rm.tippas;
        s._realId = rm._realId;
        s.scorers = rm.scorers || [];
        s.cards = rm.cards || [];
        s.subs = rm.subs || [];
        s.minute = rm.minute;
        s.scoreDetail = rm.scoreDetail || null;
        s.referees = rm.referees || [];
        // Behåll hårdkodade FIFA-venue om engine inte gav nåt.
        if(rm.venue && rm.venue.stadium) s.venue = rm.venue;
      });
    }
    overlayKO(r32, "r32_");
    overlayKO(r16, "r16_");
    overlayKO(qf, "qf_");
    overlayKO(sf, "sf_");
    overlayKO(thirdArr, "third_");
    overlayKO(finalArr, "final_");

    const knockout = { r32, r16, qf, sf, third: thirdArr, final: finalArr };

    // Replace allMatches' KO entries with the structural ones so schedule view shows fromA/fromB too.
    const koIds = new Set();
    [r32, r16, qf, sf, thirdArr, finalArr].forEach(arr => arr.forEach(m => koIds.add(m.id)));
    const allMatchesGroupOnly = allMatches.filter(m => m.stage === "group");
    const allMatchesNew = allMatchesGroupOnly.concat(r32, r16, qf, sf, thirdArr, finalArr);
    allMatchesNew.sort((a,b) => a.kickoff - b.kickoff);
    // mutate allMatches reference
    allMatches.length = 0;
    allMatchesNew.forEach(m => allMatches.push(m));
    const koRounds = [
      { key:"r32", label:"Sextondelsfinal", count:16 },
      { key:"r16", label:"Åttondelsfinal", count:8 },
      { key:"qf",  label:"Kvartsfinal", count:4 },
      { key:"sf",  label:"Semifinal", count:2 },
      { key:"final", label:"Final", count:1 }
    ];

    // ============= forms (last 5 results per team) =============
    const forms = {};
    Object.keys(TEAMS).forEach(c => { forms[c] = []; });
    allMatches.forEach(m => {
      if(m.status !== "played" || !m.home || !m.away) return;
      const r = (g,o) => g > o ? "V" : g < o ? "F" : "O";
      forms[m.home].push({ vs:m.away, gf:m.ga, ga:m.gb, r:r(m.ga, m.gb), id:m.id });
      forms[m.away].push({ vs:m.home, gf:m.gb, ga:m.ga, r:r(m.gb, m.ga), id:m.id });
    });

    // ============= PLAYERS / STANDINGS / TIPS / BONUS =============
    // Convert engine bonus_detail (with our snake_case keys) to design keys
    const BONUS_KEY_MAP = {
      winner:"winner", silver:"silver", bronze:"bronze",
      top_scorer:"topscorer", best_player:"bestplayer",
      best_young:"youngplayer", best_keeper:"keeper"
    };
    const TEAM_BONUS = new Set(["winner","silver","bronze"]);

    // Build map: matchRealId -> tips array (with player name)
    const realIdToMatchId = {};
    allMatches.forEach(m => { if(m._realId != null) realIdToMatchId[m._realId] = m.id; });

    // Lookup of each player's tips by design match id
    function buildPlayerTips(playerName){
      const out = {};
      (D.matches || []).forEach(rm => {
        const t = (rm.tips || []).find(x => x.name === playerName);
        if(t){
          const designId = realIdToMatchId[rm.id];
          if(designId) out[designId] = [t.tip[0], t.tip[1]];
        }
      });
      return out;
    }

    function buildBonus(detail){
      const out = {};
      Object.keys(BONUS_KEY_MAP).forEach(srcKey => {
        const dstKey = BONUS_KEY_MAP[srcKey];
        const v = detail && detail[srcKey];
        if(!v){ out[dstKey] = TEAM_BONUS.has(dstKey) ? null : ["-", null]; return; }
        if(TEAM_BONUS.has(dstKey)){
          out[dstKey] = teamCodeFromPick(v.pick, TEAMS);
        } else {
          out[dstKey] = [v.pick || "-", null];
        }
      });
      return out;
    }

    const leaderboard = D.leaderboard || [];
    const players = leaderboard.map(p => {
      const tips = buildPlayerTips(p.name);
      // exact/correct/other if engine had them, else derive from tips against finished matches
      let exact = p.exact_count || 0;
      let correct = 0, other = 0;
      let pts = 0;
      allMatches.forEach(m => {
        if(m.status !== "played" || !m.home || !m.away) return;
        const tip = tips[m.id];
        if(!tip) return;
        if(tip[0] === m.ga && tip[1] === m.gb){ pts += 5; }
        else {
          const o1 = tip[0] > tip[1] ? "H" : tip[0] < tip[1] ? "B" : "X";
          const o2 = m.ga    > m.gb    ? "H" : m.ga    < m.gb    ? "B" : "X";
          if(o1 === o2){ pts += 2; correct++; }
          else { pts += 1; other++; }
        }
      });
      const pid = p.name.toLowerCase().replace(/[åä]/g,"a").replace(/ö/g,"o").replace(/[^a-z0-9]/g,"");
      return {
        id: pid, name: p.name,
        color: PLAYER_COLORS[p.name] || "#7A3CF0",
        photo: playerPhoto(p.name),
        tips,
        points: p.match_points || 0,
        exact, correct, other,
        bonus: buildBonus(p.bonus_detail),
        bonusPts: p.bonus_points || 0,
        rank: p.rank || 0,
        total: (p.match_points || 0) + (p.bonus_points || 0)
      };
    });

    // Standings (already ranked in D.leaderboard, but recompute for safety/tie-break)
    const standings = players.slice().sort((a,b) =>
      (b.total - a.total) || (b.exact - a.exact) || a.name.localeCompare(b.name));
    let prevTot = null, rank = 0;
    standings.forEach((p, i) => {
      if(p.total !== prevTot){ rank = i + 1; prevTot = p.total; }
      p.rank = rank;
    });
    // Echo rank back into players[] by id
    standings.forEach(s => { const p = players.find(x => x.id === s.id); if(p) p.rank = s.rank; });

    // ============= state: pre / mid =============
    const anyPlayed = allMatches.some(m => m.status === "played");
    const state = anyPlayed ? "mid" : "pre";

    return {
      state, now: new Date(),
      teams: TEAMS, groups: GROUPS, groupLetters: GROUP_LETTERS,
      matches, allMatches, groupTables,
      knockout, koRounds, qualifiers: [],
      players, standings, forms,
      pot: { p1:[], p2:[] },
      stars: []
    };
  }

  // h2h - we don't have head-to-head data; components handle null.
  function h2h(){ return null; }

  // Initialize empty stubs so React components don't crash before fetch completes.
  const TEAMS = {}, GROUPS = {};
  GROUP_LETTERS.forEach(L => { GROUPS[L] = []; });

  window.VM = {
    build, PLAYERS: [], PRIZES, TEAMS, GROUPS,
    GROUP_LETTERS, STARS: [], KEEPERS: [], YOUNG: [], POT: PRIZES,
    h2h, VENUES: []
  };

  // Keep TEAMS / GROUPS in sync after build() runs (so Flag lookups work).
  const _origBuild = build;
  window.VM.build = function(){
    const data = _origBuild();
    window.VM.TEAMS = data.teams;
    window.VM.GROUPS = data.groups;
    return data;
  };
})();

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react - the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability - if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag - ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char - so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings - map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick - checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor - curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts - a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

/* ---------- räkna upp siffror ---------- */
function useCountUp(target, dur = 800) {
  const [v, setV] = React.useState(target);
  React.useEffect(() => {
    const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) { setV(target); return; }
    let raf, start, done = false;
    setV(0);
    const step = (ts) => {
      if (!start) start = ts;
      const p = Math.min(1, (ts - start) / dur);
      setV(Math.round(target * (1 - Math.pow(1 - p, 3))));
      if (p < 1) raf = requestAnimationFrame(step); else done = true;
    };
    raf = requestAnimationFrame(step);
    const safety = setTimeout(() => { if (!done) setV(target); }, dur + 400);
    return () => { cancelAnimationFrame(raf); clearTimeout(safety); };
  }, [target, dur]);
  return v;
}

/* ---------- StarPhoto (för bonus: målskytt/spelare/unga/målvakt) ---------- */
function slugifyName(name) {
  return String(name || "")
    .toLowerCase()
    .normalize("NFD").replace(/[̀-ͯ]/g, "")
    .replace(/å|ä/g, "a").replace(/ö/g, "o")
    .replace(/ø/g, "o").replace(/æ/g, "ae")
    .replace(/[^a-z0-9 ]/g, "")
    .trim().replace(/\s+/g, "-");
}
// Wikipedia thumbnail-cache (persistent across page loads).
const _wikiCache = (() => {
  try { return JSON.parse(localStorage.getItem("wp_photo_cache_v2") || "{}"); }
  catch { return {}; }
})();
const _wikiInflight = {};
function _saveWikiCache(){
  try { localStorage.setItem("wp_photo_cache_v2", JSON.stringify(_wikiCache)); } catch {}
}
function useWikiPhoto(name){
  const [url, setUrl] = React.useState(() => name && (name in _wikiCache) ? _wikiCache[name] : null);
  React.useEffect(() => {
    if(!name) return;
    if(name in _wikiCache){ setUrl(_wikiCache[name]); return; }
    // Dedupe parallel lookups
    if(_wikiInflight[name]){
      _wikiInflight[name].then(u => setUrl(u));
      return;
    }
    const api = "https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&prop=pageimages"
              + "&pithumbsize=400&redirects=1&titles=" + encodeURIComponent(name);
    _wikiInflight[name] = fetch(api)
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        const pages = (data && data.query && data.query.pages) || {};
        const first = Object.values(pages)[0];
        const thumb = (first && first.thumbnail && first.thumbnail.source) || null;
        _wikiCache[name] = thumb;
        _saveWikiCache();
        return thumb;
      })
      .catch(() => { _wikiCache[name] = null; _saveWikiCache(); return null; })
      .finally(() => { delete _wikiInflight[name]; });
    _wikiInflight[name].then(u => setUrl(u));
  }, [name]);
  return url;
}

function StarPhoto({ name, countryCode, size = 28, showFlag = true }) {
  const wikiUrl = useWikiPhoto(name);
  const [localErr, setLocalErr] = React.useState(false);
  const [wikiErr, setWikiErr] = React.useState(false);
  const slug = slugifyName(name);
  const initials = String(name || "?").split(/\s+/).slice(0,2).map(w => (w[0]||"")).join("").toUpperCase();
  // Prioritera lokalt foto (om uppladdat), annars Wikipedia, annars initial.
  const localUrl = slug ? "images/stars/" + slug + ".jpg" : null;
  return (
    <span style={{ position: "relative", width: size, height: size, flex: "0 0 auto", display: "inline-block",
      borderRadius: "50%", overflow: "hidden",

function Sheet({ onClose, accent, children, header }) {
  // Centered modal - close button is in `header`, so we render header + scroll body inside one shell.
  // Mobile: nearly full-bleed with small inset, rounded corners.
  // Desktop: ~620px wide centered card.
  return (
    <div onClick={onClose} style={{
      position: "fixed", inset: 0, zIndex: 70, background: "rgba(20,12,20,.55)",

    }}>

        background: "var(--bg)", width: "100%", maxWidth: 620,
        maxHeight: "calc(100dvh - 24px)",

        display: "flex", flexDirection: "column",

}

function MiniBlock({ title, children, pad = true }) {
  return (
    <div style={{ margin: "0 16px 14px" }}>

        color: "var(--ink-soft)", margin: "0 2px 9px" }}>{title}</div>

        boxShadow: "var(--shadow)", padding: pad ? "14px 15px" : 0, overflow: "hidden" }}>{children}</div>
    </div>
  );
}

function BallIcon({ size = 17 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 20 20" aria-hidden="true">
      <circle cx="10" cy="10" r="8.6" fill="#fff" stroke="var(--ink)" strokeWidth="1.4" />
      <polygon points="10,5 14,8 12.4,12.8 7.6,12.8 6,8" fill="var(--ink)" />
    </svg>
  );
}
function EventIcon({ kind }) {
  if (kind === "goal") return <BallIcon />;
  const red = kind === "red";
  return <span style={{ width: 11, height: 15, borderRadius: 2, background: red ? "#D2453B" : "#E8B931",
    transform: "rotate(8deg)", display: "inline-block", boxShadow: "0 1px 2px rgba(0,0,0,.2)" }} />;
}

function Timeline({ m }) {
  const ev = [];
  (m.scorers || []).forEach(s => ev.push({ minute: s.minute, team: s.team, name: s.name, kind: "goal", pen: s.pen }));
  (m.cards || []).forEach(c => ev.push({ minute: c.minute, team: c.team, name: c.name, kind: c.type }));
  ev.sort((a, b) => a.minute - b.minute || (a.kind === "goal" ? -1 : 1));
  if (!ev.length) return (
    <div style={{ padding: "18px", textAlign: "center", color: "var(--ink-soft)", fontWeight: 600, fontSize: 13 }}>
      Inga händelser ännu - 0–0.</div>
  );
  let sh = 0, sa = 0;
  const side = (e, home) => {
    const label = { goal: "MÅL", yellow: "Gult kort", red: "Rött kort" }[e.kind];
    return (
      <div style={{ display: "flex", alignItems: "center", gap: 8, flexDirection: home ? "row-reverse" : "row",
        textAlign: home ? "right" : "left" }}>
        <EventIcon kind={e.kind} />
        <div style={{ minWidth: 0 }}>
          <div style={{ fontWeight: 700, fontSize: 13, lineHeight: 1.15 }}>
            {e.name}{e.pen ? <span style={{ color: "var(--ink-soft)", fontWeight: 600, fontSize: 11 }}> (str)</span> : ""}</div>
          <div style={{ fontSize: 10.5, fontWeight: 700, color: e.kind === "goal" ? "var(--hot)" : "var(--ink-soft)", letterSpacing: ".03em" }}>
            {e.kind === "goal" ? "MÅL · " : label} {e.kind === "goal" ? (e.team === m.home ? (sh) + "–" + sa : sh + "–" + (sa)) : ""}</div>
        </div>
      </div>
    );
  };
  return (
    <div style={{ position: "relative", padding: "6px 14px 12px" }}>
      <div style={{ position: "absolute", left: "50%", top: 6, bottom: 12, width: 2, marginLeft: -1, background: "var(--line)" }} />
      {ev.map((e, i) => {
        const home = e.team === m.home;
        if (e.kind === "goal") { if (home) sh++; else sa++; }
        return (
          <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 40px 1fr", alignItems: "center",
            gap: 6, position: "relative", padding: "6px 0" }}>
            <div style={{ display: "flex", justifyContent: "flex-end" }}>{home ? side(e, true) : null}</div>
            <div style={{ display: "flex", justifyContent: "center" }}>
              <span className="num" style={{ background: e.kind === "goal" ? "var(--ink)" : "var(--paper)",
                color: e.kind === "goal" ? "#fff" : "var(--ink-soft)", border: "1px solid " + (e.kind === "goal" ? "var(--ink)" : "var(--line)"),
                borderRadius: 7, padding: "2px 6px", fontSize: 11, fontWeight: 800, minWidth: 30, textAlign: "center" }}>{e.minute}'</span>
            </div>
            <div style={{ display: "flex", justifyContent: "flex-start" }}>{!home ? side(e, false) : null}</div>
          </div>
        );
      })}
    </div>
  );
}

function TipsDistribution({ data, m }) {
  const tips = data.players.map(p => p.tips[m.id]).filter(Boolean);
  if (!tips.length) return null;
  let h = 0, d = 0, a = 0;
  const scoreCount = {};
  tips.forEach(([th, ta]) => {
    if (th > ta) h++; else if (th < ta) a++; else d++;
    const k = th + "-" + ta; scoreCount[k] = (scoreCount[k] || 0) + 1;
  });
  const fav = Object.entries(scoreCount).sort((x, y) => y[1] - x[1])[0];
  const tot = tips.length;
  const seg = (n, color, label) => (
    <div style={{ flex: Math.max(n, 0.15), display: "flex", flexDirection: "column", alignItems: "center" }}>
      <div style={{ width: "100%", height: 8, background: color, borderRadius: 3 }} />
      <span className="num" style={{ fontSize: 13, fontWeight: 800, marginTop: 6 }}>{n}</span>
      <span style={{ fontSize: 10.5, fontWeight: 700, color: "var(--ink-soft)" }}>{label}</span>
    </div>
  );
  return (
    <MiniBlock title={"Poolen tippar · " + tot + " tips"}>
      <div style={{ display: "flex", gap: 8, alignItems: "flex-start" }}>
        {seg(h, "var(--hot)", window.VM.TEAMS[m.home].name)}
        {seg(d, "var(--line-strong)", "Oavgjort")}
        {seg(a, "var(--cool)", window.VM.TEAMS[m.away].name)}
      </div>
      <div style={{ marginTop: 12, paddingTop: 11, borderTop: "1px solid var(--line)", display: "flex",
        justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontSize: 12.5, fontWeight: 600, color: "var(--ink-soft)" }}>Vanligaste tipset</span>
        <span className="num" style={{ fontWeight: 800, fontSize: 15 }}>{fav[0].replace("-", "–")} <span style={{ color: "var(--ink-soft)", fontSize: 12, fontWeight: 700 }}>×{fav[1]}</span></span>
      </div>
    </MiniBlock>
  );
}

function VenueRefsBlock({ m }){
  // Visar var matchen spelas + funktionärer prominent.
  const hasVenue = !!(m.venue && m.venue.stadium);
  const refs = (m.referees || []).filter(r => r && r.name);
  if(!hasVenue && refs.length === 0) return null;
  const main = refs.find(r => /main|head|huvuddomare|referee/i.test(r.role||"")) || refs[0];
  const others = refs.filter(r => r !== main);
  return (
    <div style={{ margin: "0 16px 14px", background: "var(--bg-2)",
      border: "1px solid var(--border)", borderRadius: "var(--r-md)", padding: "14px 16px" }}>

          <div>
            <div style={{ fontSize: 10, fontWeight: 700, color: "var(--fg-3)", letterSpacing: ".06em", textTransform: "uppercase" }}>Arena</div>
            <div style={{ marginTop: 4, fontSize: 14, fontWeight: 700, color: "var(--fg)", display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ fontSize: 13 }}>📍</span>
              <span>{m.venue.stadium}</span>
            </div>
            {m.venue.city && (
              <div style={{ marginTop: 2, fontSize: 12.5, fontWeight: 500, color: "var(--fg-3)" }}>{m.venue.city}</div>

}

function MatchDetail({ data, match, onClose, onTeam }) {
  const m = match;
  const live = m.status === "live", played = m.status === "played", tbd = !m.home || !m.away;
  const win = m.winner;

      <span style={{ fontWeight: 700, fontSize: 14, textAlign: "center",

    <div style={{ padding: "16px 18px 18px", position: "relative", flex: "0 0 auto",

        fontSize: 16, fontWeight: 700, lineHeight: 1, display: "inline-flex", alignItems: "center", justifyContent: "center" }}>×</button>
      <div style={{ textAlign: "center", marginBottom: 16 }}>
        <div style={{ display: "inline-flex", alignItems: "center", gap: 8,
          padding: "4px 10px", borderRadius: 7,
          background: live ? "var(--live-glow)" : "var(--bg-3)",
          border: `1px solid ${live ? "rgba(239,68,68,.4)" : "var(--border)"}`,
          fontSize: 10.5, fontWeight: 800, letterSpacing: ".08em", textTransform: "uppercase",
          color: live ? "var(--live)" : "var(--fg-3)" }}>
          {live && <span style={{ width: 6, height: 6, borderRadius: "50%", background: "var(--live)", animation: "blink 1.2s infinite" }} />}
          {roundLabel(m)}
          {m.fifa && <span className="mono" style={{ opacity: .6, marginLeft: 4 }}>M{m.fifa}</span>}
        </div>
        <div className="mono" style={{ marginTop: 8, fontSize: 12, fontWeight: 600, color: "var(--fg-2)" }}>
          {svDayLabel(m.kickoff)} · {svTime(m.kickoff)}
        </div>
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        {teamCol(m.home, m.fromA)}
        <div style={{ flex: "0 0 auto", textAlign: "center", minWidth: 94 }}>
          {(played || live) && !tbd ? (
            <div className="mono" style={{ fontWeight: 800, fontSize: 38, color: "var(--fg)",
              lineHeight: 1, letterSpacing: "-.02em" }}>
              {m.ga}<span style={{ color: "var(--fg-4)", margin: "0 8px", fontWeight: 600 }}>:</span>{m.gb}
            </div>
          ) : (
            <div className="mono" style={{ fontWeight: 800, fontSize: 28, color: "var(--fg)", letterSpacing: "-.02em" }}>{svTime(m.kickoff)}</div>
          )}
          <div style={{ marginTop: 8, display: "flex", justifyContent: "center" }}>
            {live ? <LiveDot minute={m.minute} /> :
              played ? <span className="mono" style={{ fontSize: 11, fontWeight: 700, color: "var(--fg-3)", letterSpacing: ".06em" }}>
                FT{m.pen ? ` · STR ${m.pen[0]}-${m.pen[1]}` : ""}</span> :
              <span className="mono" style={{ fontSize: 11, fontWeight: 700, color: "var(--fg-3)" }}>AVSPARK</span>}
          </div>
        </div>
        {teamCol(m.away, m.fromB)}
      </div>
    </div>
  );

  return (
    <Sheet onClose={onClose} header={header}>
      <div style={{ paddingTop: 16 }}>
        {!tbd && <VenueRefsBlock m={m} />}
        {(played || live) && !tbd && (
          <MiniBlock title={live ? "Händelser · pågår" : "Händelser"} pad={false}><Timeline m={m} /></MiniBlock>
        )}
        {(played || live) && !tbd && <StatsBlock m={m} full={played} />}
        {!played && !live && !tbd && <FormBlock data={data} m={m} />}
        {!played && !live && !tbd && <H2HBlock m={m} />}
        {!tbd && !played && <TipsDistribution data={data} m={m} />}
        {!tbd && <PoolResultBlock data={data} m={m} />}
        {tbd && (
          <div style={{ textAlign: "center", color: "var(--fg-3)", padding: "30px 24px", fontWeight: 600 }}>
            Lagen avgörs när tidigare matcher är spelade.
          </div>
        )}
        <div style={{ height: 24 }} />
      </div>
    </Sheet>
  );
}

Object.assign(window, { MatchDetail, Sheet, MiniBlock });

  <script type="text/babel">
/* ============================================================
   standings.jsx - Ställning: pall + prispengar + spelardetalj
   ============================================================ */

function money(n) { return n.toLocaleString("sv-SE") + " kr"; }

function Crown({ size = 26 }) {
  return (
    <svg width={size} height={size * 0.72} viewBox="0 0 30 22" aria-hidden="true">
      <path d="M2.5 19 L4.4 7.5 L10 12.5 L15 3.5 L20 12.5 L25.6 7.5 L27.5 19 Z"
        fill="var(--gold)" stroke="color-mix(in oklab, var(--gold) 60%, #000 22%)" strokeWidth="1" strokeLinejoin="round" />
      <rect x="2.5" y="18.5" width="25" height="2.6" rx="1" fill="color-mix(in oklab, var(--gold) 70%, #000 14%)" />
    </svg>
  );
}

function Countdown() {
  const target = Date.UTC(2026, 5, 11, 16, 0);
  const [now, setNow] = React.useState(Date.now());
  React.useEffect(() => { const t = setInterval(() => setNow(Date.now()), 1000); return () => clearInterval(t); }, []);
  let diff = Math.max(0, target - now);
  const d = Math.floor(diff / 86400000); diff -= d * 86400000;
  const h = Math.floor(diff / 3600000); diff -= h * 3600000;
  const mi = Math.floor(diff / 60000); diff -= mi * 60000;
  const s = Math.floor(diff / 1000);
  const cell = (v, l) => (
    <div style={{ textAlign: "center", minWidth: 52 }}>
      <div className="num display" style={{ fontSize: 34, color: "var(--ink)", lineHeight: 1, fontWeight: "var(--display-weight)" }}>{String(v).padStart(2, "0")}</div>
      <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: ".1em", color: "var(--ink-soft)", marginTop: 4 }}>{l}</div>
    </div>
  );
  const sep = <span className="num" style={{ color: "var(--line-strong)", fontSize: 26, fontWeight: 300, marginTop: -6 }}>:</span>;
  return (
    <div style={{ display: "flex", gap: 10, justifyContent: "center", alignItems: "center" }}>
      {cell(d, "DGR")}{sep}{cell(h, "TIM")}{sep}{cell(mi, "MIN")}{sep}{cell(s, "SEK")}
    </div>
  );
}

function PodiumStep({ p, place, prize, isPre, h }) {
  const tint = { 1: "var(--gold)", 2: "#AEB4BE", 3: "#C77F49" }[place];
  const pts = useCountUp(isPre ? 0 : p.total, 900 + place * 100);
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", flex: 1, animation: `riseIn .5s forwards` }}>
      <div style={{ height: 26, display: "flex", alignItems: "flex-end" }}>{place === 1 ? <Crown size={28} /> : null}</div>
      <Avatar p={p} size={place === 1 ? 62 : 50} ring={place} />
      <div style={{ fontWeight: 800, fontSize: place === 1 ? 15.5 : 13.5, marginTop: 10, color: "var(--ink)" }}>{p.name}</div>
      <div className="num display" style={{ fontSize: place === 1 ? 26 : 21, color: "var(--ink)", marginTop: 1, fontWeight: "var(--display-weight)" }}>
        {pts}<span style={{ fontSize: 11, color: "var(--ink-soft)", marginLeft: 2, fontWeight: 700, fontFamily: "var(--font-body)" }}>p</span>
      </div>
      <div style={{ marginTop: 10, width: "100%", height: h, borderRadius: "10px 10px 0 0", position: "relative",
        background: `color-mix(in oklab, ${tint} 20%, var(--paper))`, border: "1px solid " + `color-mix(in oklab, ${tint} 45%, var(--line))`,
        borderBottom: "none", display: "flex", flexDirection: "column", alignItems: "center", paddingTop: 9 }}>
        <span className="num display" style={{ fontSize: place === 1 ? 30 : 24, color: `color-mix(in oklab, ${tint} 70%, #000 12%)`, fontWeight: "var(--display-weight)" }}>{place}</span>
        <span style={{ position: "absolute", bottom: 9, fontWeight: 800, fontSize: place === 1 ? 14 : 12.5, color: "var(--ink)" }}>{money(prize)}</span>
      </div>
    </div>
  );
}

function KpiCard({ label, value, sub, accent, icon, glow }){
  return (
    <div className={"glow-hover " + (glow || "")} style={{
      background: "linear-gradient(160deg, var(--bg-3), var(--bg-2))",
      border: "1px solid var(--border)", borderRadius: "var(--r-md)",
      padding: "14px 14px", position: "relative", overflow: "hidden",

        <div style={{ fontSize: 10.5, fontWeight: 800, letterSpacing: ".1em",
          textTransform: "uppercase", color: "var(--fg-3)" }}>{label}</div>
        {icon && <span style={{ fontSize: 14, opacity: .8 }}>{icon}</span>}
      </div>
      <div className="mono" style={{ marginTop: 8, fontSize: 26,
        fontWeight: 800, color: "var(--fg)", lineHeight: 1.05, letterSpacing: "-.025em" }}>{value}</div>
      {sub && <div style={{ marginTop: 5, fontSize: 11.5, fontWeight: 600, color: "var(--fg-3)" }}>{sub}</div>}
    </div>
  );
}

/* === Live-ticker: scrollar live-matcher + senaste händelser === */
function LiveTicker({ data }){
  const items = [];
  const live = (data.allMatches || []).filter(m => m.status === "live");
  live.forEach(m => {
    items.push({ kind: "live",
      text: `🔴 LIVE: ${window.VM.TEAMS[m.home] ? window.VM.TEAMS[m.home].name : m.home || "TBD"} ${m.ga != null ? m.ga + "-" + m.gb : ""} ${window.VM.TEAMS[m.away] ? window.VM.TEAMS[m.away].name : m.away || "TBD"}`,
      color: "var(--live)" });
  });
  // Senaste 6 spelade matcherna
  const recent = (data.allMatches || []).filter(m => m.status === "played" && m.ga != null).slice(-6);
  recent.forEach(m => {
    items.push({ kind: "result",
      text: `✓ ${window.VM.TEAMS[m.home] ? window.VM.TEAMS[m.home].name : m.home} ${m.ga}-${m.gb} ${window.VM.TEAMS[m.away] ? window.VM.TEAMS[m.away].name : m.away}`,
      color: "var(--fg-2)" });
  });
  // Ledare
  if(data.standings && data.standings[0]){
    items.push({ kind: "stat", text: `🏆 ${data.standings[0].name} leder med ${data.standings[0].total} p`, color: "var(--gold)" });
  }
  // Mest exakta
  if(data.standings){
    const mostExact = [...data.standings].sort((a,b) => b.exact - a.exact)[0];
    if(mostExact && mostExact.exact > 0){
      items.push({ kind: "stat", text: `🔥 ${mostExact.name} har ${mostExact.exact} exakta tips`, color: "var(--pitch)" });
    }
  }
  // Nästa avspark
  const nextM = (data.allMatches || []).find(m => m.status === "upcoming");
  if(nextM){
    items.push({ kind: "next",
      text: `⚽ Nästa: ${window.VM.TEAMS[nextM.home] ? window.VM.TEAMS[nextM.home].name : nextM.home || "TBD"} vs ${window.VM.TEAMS[nextM.away] ? window.VM.TEAMS[nextM.away].name : nextM.away || "TBD"} · ${svDayLabel(nextM.kickoff)} ${svTime(nextM.kickoff)}`,
      color: "var(--blue)" });
  }
  if(items.length === 0) {
    items.push({ kind: "info", text: "⚽ VM 2026 startar 11 juni · 48 lag · 12 grupper · 104 matcher", color: "var(--fg-3)" });
  }
  // Duplicera för seamless scroll
  const doubled = items.concat(items);
  return (
    <div style={{ position: "relative", overflow: "hidden",
      background: "linear-gradient(90deg, var(--bg-2) 0%, var(--bg-3) 50%, var(--bg-2) 100%)",
      border: "1px solid var(--border)", borderRadius: "var(--r-md)",
      marginBottom: 16, height: 38 }}>
      <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center",
        animation: `tickerScroll ${Math.max(20, items.length * 5)}s linear infinite`,
        whiteSpace: "nowrap", willChange: "transform" }}>
        {doubled.map((it, i) => (
          <span key={i} style={{ display: "inline-flex", alignItems: "center", gap: 8,
            padding: "0 22px", fontSize: 12.5, fontWeight: 700, color: it.color,
            borderRight: "1px solid var(--border)", height: "100%" }}>
            {it.text}
          </span>
        ))}
      </div>
      {/* Fade på kanterna */}
      <span style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: 50,
        background: "linear-gradient(90deg, var(--bg-2), transparent)", pointerEvents: "none" }} />
      <span style={{ position: "absolute", right: 0, top: 0, bottom: 0, width: 50,
        background: "linear-gradient(270deg, var(--bg-2), transparent)", pointerEvents: "none" }} />
    </div>
  );
}

/* === JackpotHero: stor neon-glow jackpot + countdown === */
function JackpotHero({ pot, prizes, isPre, nextUp }){
  const target = nextUp ? nextUp.kickoff.getTime() : Date.UTC(2026, 5, 11, 16, 0);

    <div style={{ position: "relative", overflow: "hidden",

      {/* Sparkle-prickar */}
      <span style={{ position: "absolute", top: 20, left: "30%", width: 4, height: 4, borderRadius: "50%",
        background: "var(--gold)", boxShadow: "0 0 8px var(--gold)", animation: "sparkle 2.5s infinite" }} />
      <span style={{ position: "absolute", top: 40, left: "70%", width: 3, height: 3, borderRadius: "50%",
        background: "var(--pitch)", boxShadow: "0 0 6px var(--pitch)", animation: "sparkle 2s 0.5s infinite" }} />
      <span style={{ position: "absolute", bottom: 30, left: "20%", width: 3, height: 3, borderRadius: "50%",
        background: "var(--blue)", boxShadow: "0 0 6px var(--blue)", animation: "sparkle 3s 1s infinite" }} />
      <span style={{ position: "absolute", bottom: 50, left: "85%", width: 4, height: 4, borderRadius: "50%",
