          color: "var(--fg-3)", marginBottom: 4 }}>Sammanlagd jackpot</div>
        <div className="mono neon-green" style={{ fontSize: "clamp(54px, 11vw, 92px)", fontWeight: 900,

          {pot.toLocaleString("sv-SE")}<span style={{ fontSize: ".4em", marginLeft: 8, color: "var(--fg-2)", textShadow: "none" }}>kr</span>
        </div>

        {/* Prize-split chips */}
        <div style={{ display: "flex", justifyContent: "center", gap: 10, marginTop: 16, flexWrap: "wrap" }}>
          {prizes.map((amt, i) => {

            const ico = ["🥇", "🥈", "🥉"][i];
            return (
              <div key={i} style={{ display: "inline-flex", alignItems: "center", gap: 6,
                padding: "6px 14px", borderRadius: 999, background: "rgba(255,255,255,.04)",
                border: "1px solid " + tint, color: tint }}>
                <span style={{ fontSize: 13 }}>{ico}</span>
                <span className="mono" style={{ fontSize: 13.5, fontWeight: 800 }}>{amt.toLocaleString("sv-SE")} kr</span>
              </div>
            );
          })}
        </div>

        {/* Countdown */}
        {isPre && diffMs > 0 && (
          <div style={{ marginTop: 22 }}>
            <div style={{ fontSize: 10.5, fontWeight: 800, letterSpacing: ".22em", textTransform: "uppercase",
              color: "var(--live)", marginBottom: 8 }}>Avspark om</div>
            <div style={{ display: "inline-flex", gap: 8 }}>
              {[[days, "DGR"], [hours, "TIM"], [mins, "MIN"], [secs, "SEK"]].map(([v, l], i) => (
                <div key={i} style={{ minWidth: 64,
                  background: "linear-gradient(180deg, var(--bg-2), var(--bg-1))",
                  border: "1px solid var(--border-strong)", borderRadius: 10, padding: "10px 4px" }}>
                  <div className="mono" style={{ fontSize: 26, fontWeight: 900, color: "var(--fg)",
                    letterSpacing: "-.02em", lineHeight: 1 }}>{String(v).padStart(2, "0")}</div>
                  <div style={{ fontSize: 9.5, fontWeight: 800, letterSpacing: ".12em",
                    color: "var(--fg-3)", marginTop: 6 }}>{l}</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function StandingsView({ data, onOpenPlayer }) {
  const isPre = data.state === "pre";
  const s = data.standings;
  const prizes = window.VM.PRIZES;
  const pot = 2700;
  const top3 = s.slice(0, 3);
  const leaderTotal = Math.max(1, s[0] ? s[0].total : 1);
  const liveMatches = (data.allMatches || []).filter(m => m.status === "live").length;
  const playedMatches = (data.allMatches || []).filter(m => m.status === "played").length;
  const totalMatches = (data.allMatches || []).length;
  const nextUp = (data.allMatches || []).find(m => m.status === "upcoming");
  const mostExact = isPre ? null : [...s].sort((a,b) => b.exact - a.exact)[0];

  return (
    <div style={{ animation: "viewIn .35s ease-out forwards" }}>
      <LiveTicker data={data} />

      <JackpotHero pot={pot} prizes={prizes} isPre={isPre} nextUp={nextUp} />

      {/* === KPI-STRIP === */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(170px, 1fr))",
        gap: 10, marginBottom: 16 }}>
        <KpiCard label={liveMatches > 0 ? "Live nu" : "Matcher"}
          value={liveMatches > 0 ? `${liveMatches} LIVE` : `${playedMatches}/${totalMatches}`}
          sub={liveMatches > 0 ? "pågår just nu" : "spelade"}
          accent={liveMatches > 0 ? "var(--live)" : "var(--pitch)"}
          icon={liveMatches > 0 ? "🔴" : "⚽"}
          glow={liveMatches > 0 ? "glow-pink" : "glow-green"} />
        <KpiCard label={isPre ? "Spelare" : "Ledare"}
          value={isPre ? `${s.length}` : (s[0] ? s[0].name : "-")}
          sub={isPre ? `${s.length * 300} kr i potten` : `${s[0] ? s[0].total : 0} poäng`}
          accent="var(--gold)" icon={isPre ? "👥" : "👑"} glow="glow-gold" />
        <KpiCard label="🔥 Hetast"
          value={mostExact && mostExact.exact > 0 ? `${mostExact.exact} exakta` : (isPre ? "-" : "0 exakta")}
          sub={mostExact && mostExact.exact > 0 ? mostExact.name : "Ingen har träffat ännu"}
          accent="var(--live)" glow="glow-pink" />
        <KpiCard label="Nästa match"
          value={nextUp ? svTime(nextUp.kickoff) : "-"}
          sub={nextUp ? svDayLabel(nextUp.kickoff) : "Alla matcher spelade"}
          accent="var(--blue)" icon="⏱"
          glow="glow-green" />
      </div>

      {/* === PODIUM === */}
      {!isPre && top3.length > 0 && (
        <div style={{ marginBottom: 18 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
            <span style={{ width: 4, height: 18, background: "var(--gold)", borderRadius: 2 }} />
            <span style={{ fontSize: 12, fontWeight: 800, letterSpacing: ".18em", textTransform: "uppercase", color: "var(--fg-2)" }}>
              Top 3 - Pristagare
            </span>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1.25fr 1fr",
            gap: 12, alignItems: "stretch" }}>
            {[top3[1], top3[0], top3[2]].filter(Boolean).map((p, ix) => {
              const place = p.rank;
              const tint = { 1: "var(--gold)", 2: "var(--silver)", 3: "var(--bronze)" }[place];
              const glow = { 1: "var(--gold-glow)", 2: "rgba(200,208,224,.30)", 3: "rgba(224,133,69,.34)" }[place];
              const isWinner = place === 1;
              return (
                <button key={p.id} onClick={() => onOpenPlayer(p.id)}
                  className={"glow-hover " + (isWinner ? "glow-gold" : "")} style={{ width: "100%", textAlign: "left",
                  background: isWinner
                    ? "linear-gradient(180deg, rgba(255,184,0,.10), var(--bg-2))"
                    : "linear-gradient(180deg, var(--bg-3), var(--bg-2))",
                  border: `1px solid ${isWinner ? tint : "var(--border)"}`,
                  borderRadius: "var(--r-lg)", padding: isWinner ? "22px 14px 18px" : "16px 14px",
                  display: "flex", flexDirection: "column", alignItems: "center", gap: 10,
                  position: "relative", overflow: "hidden",
                  boxShadow: isWinner ? `0 16px 48px -16px ${glow}` : "var(--shadow)",
                  animation: isWinner ? "goldPulse 3s ease-in-out infinite" : "none" }}>
                  <span style={{ position: "absolute", left: 0, right: 0, top: 0, height: 3, background: tint }} />
                  {isWinner && (
                    <>
                      <span style={{ position: "absolute", top: 8, left: 14, fontSize: 14, animation: "float 3s ease-in-out infinite" }}>👑</span>
                      <span style={{ position: "absolute", top: 8, right: 14, fontSize: 14, animation: "float 3s ease-in-out infinite .4s" }}>✨</span>
                    </>
                  )}
                  <Avatar p={p} size={isWinner ? 64 : 48} ring={place} />
                  <div style={{ fontSize: isWinner ? 15 : 13, fontWeight: 800 }}>{p.name}</div>
                  <div className="mono" style={{ fontSize: isWinner ? 36 : 26, fontWeight: 900,
                    color: tint, letterSpacing: "-.025em", lineHeight: 1,
                    textShadow: isWinner ? `0 0 24px ${glow}` : "none" }}>
                    {p.total}<span style={{ fontSize: ".4em", fontWeight: 600, color: "var(--fg-3)", marginLeft: 4, textShadow: "none" }}>p</span>
                  </div>
                  <div style={{ display: "inline-flex", alignItems: "center", gap: 5,
                    padding: "4px 10px", borderRadius: 999, background: "rgba(0,0,0,.25)",
                    border: `1px solid ${tint}`, color: tint, fontSize: 12, fontWeight: 800 }}>
                    <span className="mono">{money(prizes[place - 1])}</span>
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      )}

      {/* === LEADERBOARD === */}
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
        <span style={{ width: 4, height: 18, background: "var(--pitch)", borderRadius: 2 }} />
        <span style={{ fontSize: 12, fontWeight: 800, letterSpacing: ".18em", textTransform: "uppercase", color: "var(--fg-2)" }}>
          Hela ligan
        </span>
        <span style={{ fontSize: 11.5, fontWeight: 700, color: "var(--fg-3)", marginLeft: "auto" }}>
          {s.length} spelare
        </span>
      </div>
      <div style={{ background: "var(--bg-2)", border: "1px solid var(--border)",
        borderRadius: "var(--r-md)", overflow: "hidden", boxShadow: "var(--shadow)" }}>
        <div style={{ display: "grid",
          gridTemplateColumns: "44px 1fr 70px 70px 70px 80px",
          padding: "10px 16px", borderBottom: "1px solid var(--border)",
          background: "linear-gradient(180deg, var(--bg-3), var(--bg-2))",
          fontSize: 10, fontWeight: 800, letterSpacing: ".1em", textTransform: "uppercase",
          color: "var(--fg-3)" }}>
          <span>#</span>
          <span>Spelare</span>
          <span style={{ textAlign: "right" }}>Match</span>
          <span style={{ textAlign: "right" }}>Bonus</span>
          <span style={{ textAlign: "right" }}>Exakt</span>
          <span style={{ textAlign: "right" }}>Total</span>
        </div>
        {s.map((p, i) => {
          const onPodium = !isPre && p.rank <= 3;
          const medal = { 1: "var(--gold)", 2: "var(--silver)", 3: "var(--bronze)" }[p.rank];
          const barPct = isPre ? 0 : Math.round((p.total / leaderTotal) * 100);
          const hot = !isPre && p.exact >= 3;
          return (
            <button key={p.id} onClick={() => onOpenPlayer(p.id)}
              style={{ width: "100%", textAlign: "left", display: "grid",
                gridTemplateColumns: "44px 1fr 70px 70px 70px 80px", alignItems: "center",
                padding: "12px 16px",
                borderBottom: i < s.length - 1 ? "1px solid var(--border)" : "none",
                background: "transparent", position: "relative",
                transition: "background .18s ease" }}
              onMouseEnter={(e) => e.currentTarget.style.background = "rgba(0,255,135,.04)"}
              onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}>
              {onPodium && <span style={{ position: "absolute", left: 0, top: 6, bottom: 6, width: 3,
                background: medal, borderRadius: "0 2px 2px 0",
                boxShadow: `0 0 12px ${medal}` }} />}
              <span className="mono" style={{ fontSize: 15, fontWeight: 800,
                color: onPodium ? medal : "var(--fg-3)" }}>{isPre ? "-" : p.rank}</span>
              <div style={{ display: "flex", alignItems: "center", gap: 12, minWidth: 0 }}>
                <Avatar p={p} size={36} rank={onPodium ? p.rank : null} />
                <div style={{ minWidth: 0 }}>
                  <div style={{ fontSize: 14.5, fontWeight: 800, display: "flex", alignItems: "center", gap: 6 }}>
                    {p.name}
                    {hot && <span style={{ fontSize: 11 }}>🔥</span>}
                  </div>
                  {!isPre ? (
                    <div style={{ marginTop: 5, height: 4, background: "var(--bg-3)", borderRadius: 99,
                      overflow: "hidden", maxWidth: 200, position: "relative" }}>
                      <div style={{ height: "100%", width: barPct + "%",
                        background: onPodium
                          ? `linear-gradient(90deg, ${medal}, var(--pitch))`
                          : "linear-gradient(90deg, var(--pitch), var(--blue))",
                        borderRadius: 99, transition: "width .6s ease",
                        boxShadow: `0 0 8px ${onPodium ? medal : "var(--pitch-glow)"}` }} />
                    </div>
                  ) : (
                    <div style={{ fontSize: 11.5, color: "var(--fg-3)", marginTop: 3, fontWeight: 600 }}>
                      {Object.keys(p.tips).length} tips inlagda
                    </div>
                  )}
                </div>
              </div>
              <span className="mono" style={{ textAlign: "right", fontSize: 13.5, fontWeight: 700, color: "var(--fg-2)" }}>
                {isPre ? "-" : p.points}
              </span>
              <span className="mono" style={{ textAlign: "right", fontSize: 13.5, fontWeight: 700, color: "var(--fg-2)" }}>
                {isPre ? "-" : p.bonusPts}
              </span>
              <span className="mono" style={{ textAlign: "right", fontSize: 13.5, fontWeight: 800,
                color: !isPre && p.exact > 0 ? "var(--gold)" : "var(--fg-3)" }}>
                {isPre ? "-" : p.exact}
              </span>
              <span className="mono" style={{ textAlign: "right", fontSize: 22, fontWeight: 900,
                color: onPodium ? medal : "var(--fg)", letterSpacing: "-.02em",
                textShadow: onPodium ? `0 0 16px ${medal}` : "none" }}>
                {isPre ? 0 : p.total}
              </span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ---------- SPELARDETALJ ---------- */
function PlayerSheet({ data, playerId, onClose, onOpenMatch }) {
  const p = data.players.find(x => x.id === playerId);
  const st = data.standings.find(x => x.id === playerId);
  const isPre = data.state === "pre";
  const [tab, setTab] = React.useState("tips");
  if (!p) return null;
  const matches = data.matches;
  const prize = st && st.rank <= 3 ? window.VM.PRIZES[st.rank - 1] : 0;
  const bonusRows = [
    ["Turneringsvinnare", "winner", "team"], ["Silver", "silver", "team"], ["Brons", "bronze", "team"],
    ["Skyttekung", "topscorer", "player"], ["Bästa spelare", "bestplayer", "player"],
    ["Bästa unga", "youngplayer", "player"], ["Bästa målvakt", "keeper", "player"]
  ];
  const header = (
    <div style={{ background: "var(--grad)", padding: "14px 18px 16px", position: "relative", flex: "0 0 auto" }}>
      <button onClick={onClose} aria-label="Stäng" style={{ position: "absolute", top: 14, right: 16, color: "#fff", fontSize: 24, fontWeight: 700 }}>×</button>
      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
        <Avatar p={p} size={60} rank={isPre ? null : st.rank} />
        <div style={{ flex: 1 }}>
          <div className="display" style={{ fontSize: 26, color: "#fff", fontWeight: "var(--display-weight)" }}>{p.name}</div>
          <div style={{ display: "flex", gap: 7, marginTop: 7, flexWrap: "wrap" }}>
            <Chip bg="rgba(255,255,255,.2)" color="#fff">{isPre ? "0" : st.total} poäng</Chip>
            {!isPre && <Chip bg="rgba(255,255,255,.2)" color="#fff">Plats {st.rank} av 9</Chip>}
            {prize > 0 && <Chip bg="var(--gold)" color="var(--deep)">{money(prize)}</Chip>}
          </div>
        </div>
      </div>
      {!isPre && (
        <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
          {[["Exakt", p.exact, "5p"], ["Rätt utgång", p.correct, "2p"], ["Övrigt", p.other, "1p"]].map((x, i) => (
            <div key={i} style={{ flex: 1, background: "rgba(255,255,255,.14)", borderRadius: 11, padding: "9px 6px", textAlign: "center" }}>
              <div className="num display" style={{ fontSize: 22, color: "#fff", fontWeight: "var(--display-weight)" }}>{x[1]}</div>
              <div style={{ fontSize: 10, fontWeight: 700, color: "rgba(255,255,255,.85)" }}>{x[0]} · {x[2]}</div>
            </div>
          ))}
        </div>
      )}
      <div style={{ display: "flex", gap: 6, marginTop: 14 }}>
        {[["tips", "Matchtips"], ["bonus", "Bonusval"]].map(t => (
          <button key={t[0]} onClick={() => setTab(t[0])} style={{ flex: 1, padding: "9px 0", borderRadius: 9, fontWeight: 800, fontSize: 13.5,
            background: tab === t[0] ? "#fff" : "rgba(255,255,255,.16)", color: tab === t[0] ? "var(--ink)" : "#fff" }}>{t[1]}</button>
        ))}
      </div>
    </div>
  );
  return (
    <Sheet onClose={onClose} header={header}>
      <div style={{ padding: "14px 14px 30px" }}>
        {tab === "tips" ? (
          <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
            {matches.map(m => {
              const tip = p.tips[m.id]; const played = m.status === "played";
              let pts = null, col = "var(--ink-soft)";
              if (played && tip) {
                if (tip[0] === m.ga && tip[1] === m.gb) { pts = 5; col = "var(--gold)"; }
                else { const o1 = tip[0] > tip[1] ? "H" : tip[0] < tip[1] ? "B" : "X"; const o2 = m.ga > m.gb ? "H" : m.ga < m.gb ? "B" : "X";
                  if (o1 === o2) { pts = 2; col = "var(--warm)"; } else { pts = 1; } }
              }
              return (
                <button key={m.id} onClick={() => onOpenMatch && onOpenMatch(m)} style={{ width: "100%", display: "grid",
                  gridTemplateColumns: "1fr auto 1fr 28px", alignItems: "center", gap: 8, background: "var(--paper)",
                  borderRadius: 11, padding: "9px 12px", border: "1px solid var(--line)", boxShadow: "var(--shadow)" }}>
                  <span style={{ display: "flex", alignItems: "center", gap: 7, justifyContent: "flex-end", minWidth: 0 }}>
                    <TeamName code={m.home} size={12.5} /><Flag code={m.home} size={20} /></span>
                  <span style={{ textAlign: "center", minWidth: 60 }}>
                    <span className="num" style={{ fontWeight: 800, fontSize: 14 }}>
                      <span style={{ color: "var(--cool)" }}>{tip ? tip[0] : "–"}</span>
                      <span style={{ opacity: .4, margin: "0 3px" }}>–</span>
                      <span style={{ color: "var(--cool)" }}>{tip ? tip[1] : "–"}</span></span>
                    <div className="num" style={{ fontSize: 10, color: "var(--ink-soft)", fontWeight: 700 }}>{played ? "blev " + m.ga + "–" + m.gb : svTime(m.kickoff)}</div>
                  </span>
                  <span style={{ display: "flex", alignItems: "center", gap: 7, minWidth: 0 }}>
                    <Flag code={m.away} size={20} /><TeamName code={m.away} size={12.5} /></span>
                  <span className="num display" style={{ fontSize: 17, color: col, textAlign: "right", fontWeight: "var(--display-weight)" }}>{pts != null ? pts : "·"}</span>
                </button>
              );
            })}
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {bonusRows.map(([label, key, kind]) => {
              const val = p.bonus[key];
              return (
                <div key={key} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10,
                  background: "var(--paper)", borderRadius: 12, padding: "11px 14px", border: "1px solid var(--line)", boxShadow: "var(--shadow)" }}>
                  <span style={{ fontWeight: 700, fontSize: 13, color: "var(--ink-soft)" }}>{label}</span>
                  {kind === "team" ? <TeamLabel code={val} size={22} /> :
                    <span style={{ display: "flex", alignItems: "center", gap: 9 }}>
                      <StarPhoto name={val[0]} countryCode={val[1]} size={28} />
                      <span style={{ fontWeight: 800, fontSize: 13.5 }}>{val[0]}</span>
                    </span>}
                </div>
              );
            })}
            <div style={{ textAlign: "center", color: "var(--ink-soft)", fontSize: 12, fontWeight: 600, marginTop: 6 }}>
              Bonuspoäng (3–10p) räknas in när turneringen avgörs.</div>
          </div>
        )}
      </div>
    </Sheet>
  );
}

Object.assign(window, { StandingsView, PlayerSheet, money });

  </script>
  <!-- ============ groups.jsx ============ -->
  <script type="text/babel">
/* ============================================================
   groups.jsx - Grupper A–L med live-tabeller
   ============================================================ */

function GroupBadge({ letter, size = 46 }) {
  return (
    <span style={{ width: size, height: size, borderRadius: 13, flex: "0 0 auto", display: "flex",
      alignItems: "center", justifyContent: "center", background: groupColor(letter),
      boxShadow: "inset 0 -2px 6px rgba(0,0,0,.15)" }}>
      <span className="display" style={{ fontSize: size * 0.56, color: "#fff", fontWeight: "var(--display-weight)" }}>{letter}</span>
    </span>
  );
}

function GroupCard({ letter, table, isPre, onTeam, onOpenMatch, matches, index }) {
  const col = groupColor(letter);
  const liveMatches = (matches || []).filter(m => m.status === "live");
  const liveTeams = new Set();
  liveMatches.forEach(m => { if(m.home) liveTeams.add(m.home); if(m.away) liveTeams.add(m.away); });
  const allGroupMatches = (matches || []).slice().sort((a,b) => a.kickoff - b.kickoff);
  const [matchesOpen, setMatchesOpen] = React.useState(false);
  return (
    <div style={{ background: "var(--paper)", borderRadius: "var(--r-md)", overflow: "hidden",
      border: "1px solid var(--line)", boxShadow: "var(--shadow)" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px",
        borderBottom: "1px solid var(--line)" }}>
        <GroupBadge letter={letter} size={42} />
        <div className="display" style={{ fontSize: 21, color: "var(--ink)", fontWeight: "var(--display-weight)" }}>Grupp {letter}</div>
        {liveMatches.length > 0 && (
          <span style={{ marginLeft: "auto", display: "inline-flex", alignItems: "center", gap: 5, padding: "3px 9px",
            background: "var(--hot)", color: "#fff", borderRadius: 6, fontWeight: 800, fontSize: 10.5, letterSpacing: ".04em" }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#fff", animation: "blink 1.4s infinite" }} />
            LIVE NU
          </span>
        )}
      </div>

      {liveMatches.length > 0 && (
        <div style={{ background: "color-mix(in oklab, var(--hot) 8%, var(--paper))",
          borderBottom: "1px solid var(--line)" }}>
          {liveMatches.map(m => (
            <button key={m.id} onClick={() => onOpenMatch && onOpenMatch(m)}
              style={{ width: "100%", textAlign: "left", display: "grid",
                gridTemplateColumns: "1fr auto 1fr", alignItems: "center", gap: 8, padding: "8px 14px" }}>
              <span style={{ display: "flex", alignItems: "center", gap: 7, justifyContent: "flex-end", minWidth: 0 }}>
                <TeamName code={m.home} size={12.5} bold={false} /><Flag code={m.home} size={19} />
              </span>
              <span style={{ textAlign: "center", minWidth: 56 }}>
                <span className="num" style={{ fontWeight: 800, fontSize: 16, color: "var(--ink)" }}>{m.ga}<span style={{ margin: "0 4px", color: "var(--ink-soft)" }}>-</span>{m.gb}</span>
                <div style={{ marginTop: 2 }}><LiveDot minute={m.minute} small /></div>
              </span>
              <span style={{ display: "flex", alignItems: "center", gap: 7, minWidth: 0 }}>
                <Flag code={m.away} size={19} /><TeamName code={m.away} size={12.5} bold={false} />
              </span>
            </button>
          ))}
        </div>
      )}
      <div style={{ display: "grid", gridTemplateColumns: "18px 1fr 24px 24px 24px 42px 28px", gap: 4,
        padding: "7px 14px", fontSize: 10, fontWeight: 800, color: "var(--ink-soft)", letterSpacing: ".03em",
        borderBottom: "1px solid var(--line)" }}>
        <span></span><span>LAG</span>
        <span style={{ textAlign: "center" }}>S</span><span style={{ textAlign: "center" }}>V</span>
        <span style={{ textAlign: "center" }}>F</span><span style={{ textAlign: "center" }}>MÅL</span>
        <span style={{ textAlign: "center" }}>P</span>
      </div>
      {table.map((r, i) => {
        const q = i < 2, third = i === 2;
        const isPlaying = liveTeams.has(r.code);
        return (
          <button key={r.code} onClick={() => onTeam(r.code)} style={{ width: "100%", textAlign: "left", display: "grid",
            gridTemplateColumns: "18px 1fr 24px 24px 24px 42px 28px", gap: 4, alignItems: "center", padding: "9px 14px",
            borderBottom: i < 3 ? "1px solid var(--line)" : "none",
            borderLeft: q ? `3px solid ${col}` : third ? "3px solid var(--gold)" : "3px solid transparent",
            background: isPlaying ? "color-mix(in oklab, var(--hot) 6%, transparent)" : "transparent" }}>
            <span className="num" style={{ fontSize: 13, fontWeight: 800, color: q ? col : third ? "var(--gold)" : "var(--ink-soft)", textAlign: "center" }}>{isPre ? "·" : r.pos}</span>
            <span style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 0 }}>
              <Flag code={r.code} size={21} /><TeamName code={r.code} size={13} />
              {isPlaying && <span style={{ width: 6, height: 6, borderRadius: "50%", background: "var(--hot)",
                animation: "blink 1.4s infinite", flex: "0 0 auto" }} />}
            </span>
            <span className="num" style={{ textAlign: "center", fontSize: 12.5, color: "var(--ink-soft)" }}>{r.sp}</span>
            <span className="num" style={{ textAlign: "center", fontSize: 12.5, color: "var(--ink-soft)" }}>{r.v}</span>
            <span className="num" style={{ textAlign: "center", fontSize: 12.5, color: "var(--ink-soft)" }}>{r.f}</span>
            <span className="num" style={{ textAlign: "center", fontSize: 12, color: "var(--ink-soft)", fontWeight: 600 }}>{r.gm}-{r.im}</span>
            <span className="num display" style={{ textAlign: "center", fontSize: 16, color: "var(--ink)", fontWeight: "var(--display-weight)" }}>{r.p}</span>
          </button>
        );
      })}

      {allGroupMatches.length > 0 && (
        <div style={{ background: "var(--bg2)", borderTop: "1px solid var(--line)" }}>
          <button onClick={() => setMatchesOpen(o => !o)}
            style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between",
              padding: "10px 14px", textAlign: "left" }}>
            <span style={{ fontSize: 10.5, fontWeight: 800, letterSpacing: ".08em", color: "var(--ink-soft)", textTransform: "uppercase" }}>
              {matchesOpen ? "Dölj matcher" : `Visa matcher (${allGroupMatches.length})`}
            </span>
            <span style={{ fontSize: 12, color: "var(--ink-soft)", transition: "transform .25s cubic-bezier(.3,.7,.4,1)",
              transform: matchesOpen ? "rotate(180deg)" : "rotate(0deg)", display: "inline-block" }}>▾</span>
          </button>
          <div className={"smooth-collapse" + (matchesOpen ? " open" : "")}>
            <div>
          {allGroupMatches.map((m, i) => {
            const played = m.status === "played";
            const live = m.status === "live";
            const homeLost = played && m.gb > m.ga;
            const awayLost = played && m.ga > m.gb;
            return (
              <button key={m.id} onClick={() => onOpenMatch && onOpenMatch(m)} style={{ width: "100%", textAlign: "left",
                display: "grid", gridTemplateColumns: "1fr auto 1fr", alignItems: "center", gap: 8, padding: "8px 14px",
                borderTop: "1px solid var(--line)",
                background: live ? "color-mix(in oklab, var(--hot) 8%, transparent)" : "transparent" }}>
                <span style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end", minWidth: 0, fontSize: 11.5, fontWeight: 700,
                  color: homeLost ? "var(--ink-soft)" : "var(--ink)" }}>
                  <TeamName code={m.home} size={11.5} bold={false} abbrev /><Flag code={m.home} size={15} />
                </span>
                <span style={{ textAlign: "center", minWidth: 56 }}>
                  {(played || live) ? (
                    <span className="num" style={{ fontWeight: 800, fontSize: 13, color: live ? "var(--hot)" : "var(--ink)" }}>
                      {m.ga}<span style={{ margin: "0 4px", color: "var(--ink-soft)" }}>-</span>{m.gb}
                    </span>
                  ) : (
                    <span className="num" style={{ fontWeight: 700, fontSize: 11.5, color: "var(--ink-soft)" }}>{svTime(m.kickoff)}</span>
                  )}
                  <div style={{ marginTop: 2 }}>
                    {live ? <LiveDot minute={m.minute} small /> :
                      played ? <span style={{ fontSize: 9, fontWeight: 800, color: "var(--ink-soft)", letterSpacing: ".06em" }}>SLUT</span> :
                      <span style={{ fontSize: 9, fontWeight: 700, color: "var(--ink-soft)" }}>{svDayLabel(m.kickoff)}</span>}
                  </div>
                </span>
                <span style={{ display: "flex", alignItems: "center", gap: 6, minWidth: 0, fontSize: 11.5, fontWeight: 700,
                  color: awayLost ? "var(--ink-soft)" : "var(--ink)" }}>
                  <Flag code={m.away} size={15} /><TeamName code={m.away} size={11.5} bold={false} abbrev />
                </span>
              </button>
            );
          })}
            </div>
          </div>
        </div>
      )}

      <div style={{ display: "flex", gap: 14, padding: "9px 14px", fontSize: 10.5, fontWeight: 700, color: "var(--ink-soft)",
        borderTop: "1px solid var(--line)" }}>
        <span style={{ display: "flex", alignItems: "center", gap: 5 }}><span style={{ width: 8, height: 8, borderRadius: 2, background: col }} />Vidare</span>
        <span style={{ display: "flex", alignItems: "center", gap: 5 }}><span style={{ width: 8, height: 8, borderRadius: 2, background: "var(--gold)" }} />Bästa trea</span>
      </div>
    </div>
  );
}

function GroupsView({ data, onTeam, onOpenMatch }) {
  const isPre = data.state === "pre";
  const [active, setActive] = React.useState("alla");
  const letters = data.groupLetters;
  const shown = active === "alla" ? letters : [active];
  // Per-group matches map
  const matchesByGroup = React.useMemo(() => {
    const map = {};
    (data.matches || []).forEach(m => {
      if(!m.group) return;
      (map[m.group] = map[m.group] || []).push(m);
    });
    return map;
  }, [data]);
  const liveCount = (data.allMatches || []).filter(m => m.status === "live" && m.stage === "group").length;
  return (
    <div style={{ animation: "riseIn .4s forwards" }}>
      <SectionTitle kicker="Gruppspel" title="Tabeller"
        right={liveCount > 0
          ? <Chip bg="var(--hot)" color="#fff">{liveCount} live nu</Chip>
          : <Chip>{isPre ? "Före avspark" : "Spelas nu"}</Chip>} />
      <div className="app-scroll" style={{ display: "flex", gap: 7, overflowX: "auto", paddingBottom: 10, marginBottom: 14 }}>
        <button onClick={() => setActive("alla")} style={{ flex: "0 0 auto", padding: "8px 16px", borderRadius: 10, fontWeight: 800, fontSize: 13,
          background: active === "alla" ? "var(--ink)" : "var(--paper)", color: active === "alla" ? "#fff" : "var(--ink)", border: "1px solid var(--line)" }}>Alla</button>
        {letters.map(L => {
          const hasLive = (matchesByGroup[L] || []).some(m => m.status === "live");
          return (
            <button key={L} onClick={() => setActive(L)} style={{ flex: "0 0 auto", width: 38, height: 37, borderRadius: 10, fontWeight: 800,
              fontFamily: "var(--font-display)", fontSize: 16, border: "1px solid var(--line)", position: "relative",
              background: active === L ? groupColor(L) : "var(--paper)", color: active === L ? "#fff" : groupColor(L) }}>
              {L}
              {hasLive && <span style={{ position: "absolute", top: 4, right: 4, width: 6, height: 6, borderRadius: "50%",
                background: "var(--hot)", animation: "blink 1.4s infinite" }} />}
            </button>
          );
        })}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 14 }}>
        {shown.map((L, i) => <GroupCard key={L} letter={L} table={data.groupTables[L]} isPre={isPre}
          onTeam={onTeam} onOpenMatch={onOpenMatch} matches={matchesByGroup[L]} index={i} />)}
      </div>
    </div>
  );
}

Object.assign(window, { GroupsView, GroupBadge });

  </script>

  <script type="text/babel">
/* ============================================================
   schedule.jsx - Spelschema per dag + slutspelsträd
   ============================================================ */

const BRACKET_CSS = `
.bnode { display:flex; align-items:center; }
.bfeeders { display:flex; flex-direction:column; }
.bfeed { display:flex; align-items:center; position:relative; flex:1; }
.bfeed::after { content:''; position:absolute; right:-20px; top:50%; width:20px; height:2px; background:var(--line-strong); }
.bfeed-top::before { content:''; position:absolute; right:-20px; top:50%; bottom:-1px; width:2px; background:var(--line-strong); }
.bfeed-bot::before { content:''; position:absolute; right:-20px; top:-1px; bottom:50%; width:2px; background:var(--line-strong); }
.bcell { position:relative; margin-left:40px; }
.bcell::before { content:''; position:absolute; left:-20px; top:50%; width:20px; height:2px; background:var(--line-strong); }
.bleaf .bcell { margin-left:0; }
.bleaf .bcell::before { display:none; }
`;

function BracketCell({ m, champion, onOpen }) {
  // row renders one team-slot inside the bracket card.
  // - code: actual team code (after draw) -> show flag + name
  // - label: seed label (e.g. "1A", "Vinnare M73") - shown when code is null
  // - proj: projected team code based on current standings (small text under label)
  const row = (code, isWinner, label, proj) => {
    const projName = proj && window.VM.TEAMS[proj] ? window.VM.TEAMS[proj].name : null;
    return (
      <div style={{ display: "flex", alignItems: "center", gap: 7, padding: "5px 8px",
        background: isWinner ? "color-mix(in oklab, var(--gold) 18%, transparent)" : "transparent",
        borderRadius: 6, opacity: code ? 1 : .85 }}>
        {code
          ? <Flag code={code} size={17} />
          : (proj
              ? <Flag code={proj} size={17} />
              : <span style={{ width: 17, height: 17, borderRadius: "50%", background: "var(--bg2)", flex: "0 0 auto" }} />)}
        <span style={{ minWidth: 0, flex: 1, display: "flex", flexDirection: "column", lineHeight: 1.1 }}>
          <span style={{ fontSize: 11.5, fontWeight: isWinner ? 800 : 700, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
            color: code ? "var(--ink)" : "var(--ink-soft)" }}>
            {code ? window.VM.TEAMS[code].name : (label || "Vinnare")}
          </span>
          {!code && projName && (
            <span style={{ fontSize: 9.5, fontWeight: 700, color: "var(--ink)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginTop: 1 }}>
              just nu: {projName}
            </span>
          )}
        </span>
        <span className="num" style={{ fontSize: 12, fontWeight: 800, color: isWinner ? "var(--ink)" : "var(--ink-soft)", minWidth: 9, textAlign: "right" }}>
          {m.status === "played" && code ? (code === m.home ? m.ga : m.gb) : ""}
        </span>
      </div>
    );
  };
  const live = m.status === "live";
  return (
    <button onClick={() => onOpen && onOpen(m)} style={{ width: 178, background: "var(--paper)", borderRadius: 10, padding: 4,
      border: "1px solid var(--line)", boxShadow: champion ? "0 0 0 2px var(--gold), var(--shadow)" : live ? "0 0 0 1.5px var(--hot)" : "var(--shadow)", textAlign: "left" }}>
      {m.fifa ? (
        <div style={{ display: "flex", justifyContent: "space-between", padding: "2px 8px 0", fontSize: 9, fontWeight: 800, letterSpacing: ".06em", color: "var(--ink-soft)" }}>
          <span>M{m.fifa}</span>
          {m.status === "played" ? <span>SLUT</span> : m.status === "live" ? <span style={{ color: "var(--hot)" }}>LIVE</span> : <span>{svTime(m.kickoff)}</span>}
        </div>
      ) : null}
      {row(m.home, m.winner && m.winner === m.home, m.fromA, m.projHome)}
      <div style={{ height: 1, background: "var(--line)", margin: "1px 6px" }} />
      {row(m.away, m.winner && m.winner === m.away, m.fromB, m.projAway)}
      {live ? <div style={{ textAlign: "center", padding: "3px 0 1px" }}><LiveDot minute={m.minute} small /></div> : null}
    </button>
  );
}

function BracketNode({ roundsArr, ri, mi, onOpen }) {
  const m = roundsArr[ri][mi];
  if (ri === 0) return <div className="bleaf"><div className="bcell"><BracketCell m={m} onOpen={onOpen} /></div></div>;
  return (
    <div className="bnode">
      <div className="bfeeders">
        <div className="bfeed bfeed-top"><BracketNode roundsArr={roundsArr} ri={ri - 1} mi={mi * 2} onOpen={onOpen} /></div>
        <div className="bfeed bfeed-bot"><BracketNode roundsArr={roundsArr} ri={ri - 1} mi={mi * 2 + 1} onOpen={onOpen} /></div>
      </div>
      <div className="bcell"><BracketCell m={m} champion={ri === roundsArr.length - 1 && !!m.winner} onOpen={onOpen} /></div>
    </div>
  );
}

function Bracket({ data, onOpen }) {
  const ko = data.knockout;
  const roundsArr = [ko.r32, ko.r16, ko.qf, ko.sf, ko.final];
  const labels = ["Sextondelsfinal", "Åttondelsfinal", "Kvartsfinal", "Semifinal", "Final"];
  return (
    <div>
      <style>{BRACKET_CSS}</style>
      <div className="app-scroll" style={{ overflowX: "auto", paddingBottom: 12 }}>
        <div style={{ minWidth: 920 }}>
          <div style={{ display: "flex", marginBottom: 10 }}>
            {labels.map((l, i) => (
              <div key={l} style={{ flex: i === 0 ? "0 0 178px" : "1", textAlign: i === 0 ? "left" : "center",
                fontSize: 10.5, fontWeight: 800, letterSpacing: ".1em", color: "var(--hot)", textTransform: "uppercase" }}>{l}</div>
            ))}
          </div>
          <BracketNode roundsArr={roundsArr} ri={4} mi={0} onOpen={onOpen} />
        </div>
      </div>
      <div style={{ marginTop: 24, paddingTop: 22, borderTop: "1px dashed var(--line-strong)",
        display: "flex", justifyContent: "center" }}>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 10, maxWidth: 320 }}>
          <div style={{ fontSize: 10.5, fontWeight: 800, letterSpacing: ".18em",
            color: "color-mix(in oklab, var(--gold) 70%, #000 12%)", textTransform: "uppercase" }}>Bronsmatch</div>
          <BracketCell m={ko.third[0]} onOpen={onOpen} />
          <div style={{ fontSize: 11, fontWeight: 600, color: "var(--ink-soft)", textAlign: "center", lineHeight: 1.5 }}>
            Spelas mellan semifinal-förlorarna dagen före finalen.
          </div>
        </div>
      </div>
    </div>
  );
}

function ScheduleView({ data, onOpenMatch }) {
  const isPre = data.state === "pre";
  const [mode, setMode] = React.useState("matcher");
  const [filter, setFilter] = React.useState("alla");

  const filtered = data.allMatches.filter(m => {
    if (filter === "live") return m.status === "live";
    if (filter === "tippas") return m.tippas;
    if (filter === "kommande") return m.status === "upcoming";
    if (filter === "spelade") return m.status === "played";
    return true;
  });
  const days = []; const byDay = {};
  filtered.forEach(m => { const k = svDateKey(m.kickoff); if (!byDay[k]) { byDay[k] = []; days.push(k); } byDay[k].push(m); });

  const liveCount = data.allMatches.filter(m => m.status === "live").length;
  const filters = [["alla", "Alla", data.allMatches.length], ["live", "Live", liveCount],
    ["tippas", "Tippas", data.allMatches.filter(m => m.tippas).length],
    ["kommande", "Kommande", data.allMatches.filter(m => m.status === "upcoming").length],
    ["spelade", "Spelade", data.allMatches.filter(m => m.status === "played").length]];

  return (
    <div style={{ animation: "riseIn .4s forwards" }}>
      <SectionTitle kicker="104 matcher" title="Spelschema" right={<Chip>{isPre ? "11 jun – 19 jul" : "Pågår"}</Chip>} />

      <div style={{ display: "flex", gap: 4, marginBottom: 16, background: "var(--bg2)", padding: 3, borderRadius: 11 }}>
        {[["matcher", "Alla matcher"], ["slutspel", "Slutspelsträd"]].map(t => (
          <button key={t[0]} onClick={() => setMode(t[0])} style={{ flex: 1, padding: "9px 0", borderRadius: 8, fontWeight: 800, fontSize: 13.5,
            background: mode === t[0] ? "var(--paper)" : "transparent", color: mode === t[0] ? "var(--ink)" : "var(--ink-soft)",
            boxShadow: mode === t[0] ? "var(--shadow)" : "none" }}>{t[1]}</button>
        ))}
      </div>

      {mode === "slutspel" ? (
        <>
          {isPre && (
            <div style={{ marginBottom: 12, padding: "11px 14px", background: "var(--paper)", border: "1px solid var(--line)",
              borderRadius: 12, boxShadow: "var(--shadow)", display: "flex", gap: 11, alignItems: "center" }}>
              <span style={{ width: 26, height: 26, borderRadius: 7, background: "var(--cool)", display: "flex",
                alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 800, fontSize: 13, flex: "0 0 auto" }}>i</span>
              <span style={{ fontSize: 12.5, color: "var(--ink-soft)", fontWeight: 600, lineHeight: 1.4 }}>
                Slutspelsträdet visar projicerade matcher utifrån hur grupperna står just nu. Slutgiltig lottning sker
                efter gruppspelet.
              </span>
            </div>
          )}
          <Bracket data={data} onOpen={onOpenMatch} />
        </>
      ) : (
        <>
          <div className="app-scroll" style={{ display: "flex", gap: 7, overflowX: "auto", paddingBottom: 8, marginBottom: 8 }}>
            {filters.map(f => (
              <button key={f[0]} onClick={() => setFilter(f[0])} style={{ flex: "0 0 auto", display: "flex", alignItems: "center", gap: 6,
                padding: "8px 14px", borderRadius: 9, fontWeight: 800, fontSize: 13, border: "1px solid var(--line)",
                background: filter === f[0] ? "var(--ink)" : "var(--paper)", color: filter === f[0] ? "#fff" : "var(--ink)" }}>
                {f[0] === "live" && f[2] > 0 ? <span style={{ width: 6, height: 6, borderRadius: "50%", background: "var(--hot)" }} /> : null}
                {f[1]} <span className="num" style={{ opacity: .5, fontWeight: 700 }}>{f[2]}</span>
              </button>
            ))}
          </div>

          {days.length === 0 ? (
            <div style={{ textAlign: "center", color: "var(--ink-soft)", padding: 40, fontWeight: 600 }}>Inga matcher här just nu.</div>
          ) : days.map(k => {
            const list = byDay[k];
            const today = svDateKey(data.now) === k;
            return (
              <div key={k} style={{ marginBottom: 20 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, margin: "4px 2px 11px" }}>
                  <span className="display" style={{ fontSize: 16, color: "var(--ink)", fontWeight: "var(--display-weight)" }}>{svDayLabel(list[0].kickoff)}</span>
                  {today ? <Chip bg="var(--hot)" color="#fff">IDAG</Chip> : null}
                  <span style={{ flex: 1, height: 1, background: "var(--line)" }} />
                  <span className="num" style={{ fontSize: 12, fontWeight: 700, color: "var(--ink-soft)" }}>{list.length} matcher</span>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px,1fr))", gap: 9 }}>
                  {list.map(m => <MatchCard key={m.id} m={m} onOpen={onOpenMatch} showRound />)}
                </div>
              </div>
            );
          })}
        </>
      )}
    </div>
  );
}

Object.assign(window, { ScheduleView, Bracket });

  </script>

  <script type="text/babel">
/* ============================================================
   bonus.jsx - Bonus-tips + Info (regler & poäng)
   ============================================================ */

const BONUS_DEFS = [
  { key: "winner",      label: "Turneringsvinnare", pts: 10, kind: "team" },
  { key: "silver",      label: "Silver",            pts: 5,  kind: "team" },
  { key: "bronze",      label: "Brons",             pts: 3,  kind: "team" },
  { key: "topscorer",   label: "Bästa målskytt",    pts: 3,  kind: "player" },
  { key: "bestplayer",  label: "Bästa spelare",     pts: 3,  kind: "player" },
  { key: "youngplayer", label: "Bästa unga spelare",pts: 3,  kind: "player" },
  { key: "keeper",      label: "Bästa målvakt",     pts: 3,  kind: "player" }
];

function valKey(v) { return Array.isArray(v) ? v[0] : v; }

function BonusCard({ def, players, onTeam }) {
  const tally = {};
  players.forEach(p => { const v = p.bonus[def.key]; const k = valKey(v); if (!tally[k]) tally[k] = { v, who: [] }; tally[k].who.push(p); });
  const sorted = Object.values(tally).sort((a, b) => b.who.length - a.who.length);
  const fav = sorted[0];
  return (
    <div style={{ background: "var(--paper)", borderRadius: "var(--r-md)", border: "1px solid var(--line)", boxShadow: "var(--shadow)", overflow: "hidden" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 14px", borderBottom: "1px solid var(--line)" }}>
        <div className="display" style={{ fontSize: 17, color: "var(--ink)", fontWeight: "var(--display-weight)" }}>{def.label}</div>
        <Chip bg="color-mix(in oklab, var(--gold) 18%, var(--bg2))" color="color-mix(in oklab, var(--gold) 70%, #000 22%)">{def.pts}p</Chip>
      </div>
      <div style={{ padding: "13px 14px", display: "flex", alignItems: "center", gap: 11, borderBottom: "1px solid var(--line)" }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: ".08em", color: "var(--ink-soft)", marginBottom: 6 }}>FLEST TROR PÅ</div>
          {def.kind === "team"
            ? <button onClick={() => onTeam(fav.v)} style={{ display: "flex", alignItems: "center", gap: 9 }}>
                <Flag code={fav.v} size={28} /><span style={{ fontWeight: 800, fontSize: 16 }}>{window.VM.TEAMS[fav.v].name}</span></button>
            : <span style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <StarPhoto name={fav.v[0]} countryCode={fav.v[1]} size={34} />
                <span style={{ fontWeight: 800, fontSize: 15 }}>{fav.v[0]}</span></span>}
        </div>
        <div style={{ textAlign: "center" }}>
          <div className="num display" style={{ fontSize: 24, color: "var(--hot)", fontWeight: "var(--display-weight)" }}>{fav.who.length}</div>
          <div className="num" style={{ fontSize: 10, fontWeight: 700, color: "var(--ink-soft)" }}>av {players.length}</div>
        </div>
      </div>
      <div style={{ padding: "11px 14px", display: "flex", flexDirection: "column", gap: 9 }}>
        {sorted.map((r, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, width: 158, flex: "0 0 auto" }}>
              {def.kind === "team"
                ? <Flag code={r.v} size={20} />
                : <StarPhoto name={r.v[0]} countryCode={r.v[1]} size={24} />}
              <span style={{ fontSize: 12.5, fontWeight: 700, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                {def.kind === "team" ? (window.VM.TEAMS[r.v] && window.VM.TEAMS[r.v].name) : r.v[0]}</span>
            </div>
            <div style={{ display: "flex", gap: -4, flex: 1 }}>
              {r.who.map((p, j) => <span key={p.id} title={p.name} style={{ marginLeft: j === 0 ? 0 : -6 }}><Avatar p={p} size={24} /></span>)}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function BonusView({ data, onTeam }) {
  return (
    <div style={{ animation: "riseIn .4s forwards" }}>
      <SectionTitle kicker="Extrapoäng" title="Bonus-tips" right={<Chip>3–10p</Chip>} />
      <div style={{ background: "var(--paper)", border: "1px solid var(--line)", borderRadius: 13, padding: "13px 15px", marginBottom: 16,
        fontSize: 13.5, fontWeight: 600, color: "var(--ink-soft)", boxShadow: "var(--shadow)", lineHeight: 1.45 }}>
        Allas bonusval lades före avspark. Poängen räknas in när turneringen avgörs - och kan vända hela ligan på upploppet.
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px,1fr))", gap: 14 }}>
        {BONUS_DEFS.map(def => <BonusCard key={def.key} def={def} players={data.players} onTeam={onTeam} />)}
      </div>
    </div>
  );
}

/* ---------- INFO ---------- */
function InfoView() {
  const RuleRow = ({ pts, title, desc, color }) => (
    <div style={{ display: "flex", alignItems: "center", gap: 14, background: "var(--paper)", borderRadius: 13, padding: "13px 15px",
      border: "1px solid var(--line)", boxShadow: "var(--shadow)" }}>
      <div style={{ width: 50, height: 50, borderRadius: 12, flex: "0 0 auto", display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center", background: color, color: "#fff" }}>
        <span className="num display" style={{ fontSize: 23, lineHeight: 1, fontWeight: "var(--display-weight)" }}>{pts}</span>
        <span style={{ fontSize: 8.5, fontWeight: 800, letterSpacing: ".06em" }}>POÄNG</span>
      </div>
      <div><div style={{ fontWeight: 800, fontSize: 15 }}>{title}</div>
        <div style={{ fontSize: 13, color: "var(--ink-soft)", fontWeight: 600, marginTop: 2 }}>{desc}</div></div>
    </div>
  );
  return (

  <script type="text/babel">
/* ============================================================
   app.jsx - skal: navigering, växel pre/mid, sheets, Tweaks
   ============================================================ */

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "sunset",
  "font": "modern"
}/*EDITMODE-END*/;

const Icon = {
  trophy: (a) => <svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="currentColor" strokeWidth={a ? 2.3 : 1.9} strokeLinecap="round" strokeLinejoin="round"><path d="M6 4h12v3a6 6 0 0 1-12 0V4Z" /><path d="M6 5H3v2a3 3 0 0 0 3 3M18 5h3v2a3 3 0 0 1-3 3M9 18h6M10 14v4M14 14v4M8 21h8" /></svg>,
  grid: (a) => <svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="currentColor" strokeWidth={a ? 2.3 : 1.9} strokeLinecap="round" strokeLinejoin="round"><rect x="3.5" y="3.5" width="7" height="7" rx="1.5" /><rect x="13.5" y="3.5" width="7" height="7" rx="1.5" /><rect x="3.5" y="13.5" width="7" height="7" rx="1.5" /><rect x="13.5" y="13.5" width="7" height="7" rx="1.5" /></svg>,

  star: (a) => <svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="currentColor" strokeWidth={a ? 2.3 : 1.9} strokeLinecap="round" strokeLinejoin="round"><path d="M12 3.6l2.6 5.25 5.8.85-4.2 4.1 1 5.8L12 16.9l-5.2 2.75 1-5.8-4.2-4.1 5.8-.85Z" /></svg>,
  info: (a) => <svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="currentColor" strokeWidth={a ? 2.3 : 1.9} strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9" /><path d="M12 11v5M12 7.5h.01" /></svg>
};
const NAV = [
  { id: "standings", label: "Ställning", icon: "trophy" },
  { id: "groups", label: "Grupper", icon: "grid" },
  { id: "schedule", label: "Schema", icon: "cal" },
  { id: "bonus", label: "Bonus", icon: "star" },
  { id: "info", label: "Info", icon: "info" }
];

/* ---- lagdetalj ---- */
function TeamSheet({ data, code, onClose, onOpenMatch }) {
  const t = window.VM.TEAMS[code];
  if (!t) return null;
  const isPre = data.state === "pre";
  const row = data.groupTables[t.group].find(r => r.code === code);
  const matches = data.allMatches.filter(m => m.home === code || m.away === code);
  const fans = data.players.filter(p => Object.values(p.bonus).some(v => (Array.isArray(v) ? v[1] : v) === code));
  const header = (
    <div style={{ padding: "14px 18px 16px", position: "relative", background: `linear-gradient(135deg, ${t.c1}, color-mix(in oklab, ${t.c2} 80%, #000 12%))` }}>
      <button onClick={onClose} aria-label="Stäng" style={{ position: "absolute", top: 14, right: 16, color: "#fff", fontSize: 24, fontWeight: 700, textShadow: "0 1px 3px rgba(0,0,0,.4)" }}>×</button>
      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
        <Flag code={code} size={50} shape="rect" />
        <div>
          <div className="display" style={{ fontSize: 26, color: "#fff", textShadow: "0 1px 5px rgba(0,0,0,.35)", fontWeight: "var(--display-weight)" }}>{t.name}</div>
          <div style={{ display: "flex", gap: 7, marginTop: 7 }}>
            <Chip bg="rgba(255,255,255,.26)" color="#fff">Grupp {t.group}</Chip>
            {!isPre && row ? <Chip bg="rgba(255,255,255,.26)" color="#fff">{row.pos}:a · {row.p}p</Chip> : null}
            {code.indexOf("PO") === 0 ? <Chip bg="rgba(255,255,255,.26)" color="#fff">Playoff-plats</Chip> : null}
          </div>
        </div>
      </div>
    </div>
  );
  return (
    <Sheet onClose={onClose} header={header}>
      <div style={{ padding: "16px 0 28px" }}>
        {!isPre && data.forms[code] && data.forms[code].length > 0 && (
          <MiniBlock title="Form">
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <span style={{ fontSize: 13, fontWeight: 700, color: "var(--ink-soft)" }}>Senaste matcherna</span>
              <FormPills form={data.forms[code]} />
            </div>
          </MiniBlock>
        )}
        <TeamHistoryBlock code={code} />
        {fans.length > 0 && (
          <MiniBlock title={`${fans.length} har laget i sina bonustips`}>
            <div style={{ fontSize: 12, color: "var(--ink-soft)", fontWeight: 600, marginBottom: 9, lineHeight: 1.45 }}>
              Spelare i poolen som tror på {(window.VM.TEAMS[code] && window.VM.TEAMS[code].name) || code} som vinnare, silver eller brons.
            </div>
            <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
              {fans.map((p, j) => <span key={p.id} title={p.name} style={{ marginLeft: j === 0 ? 0 : -6 }}><Avatar p={p} size={30} /></span>)}
            </div>
          </MiniBlock>
        )}
        <MiniBlock title="Matcher" pad={false}>
          <div style={{ display: "flex", flexDirection: "column" }}>
            {matches.map((m, i) => (
              <div key={m.id} style={{ borderBottom: i < matches.length - 1 ? "1px solid var(--line)" : "none" }}>
                <MatchCard m={m} onOpen={onOpenMatch} showRound />
              </div>
            ))}
          </div>
        </MiniBlock>
      </div>
    </Sheet>
  );
}

function App() {
  const [view, setView] = React.useState("standings");
  const [player, setPlayer] = React.useState(null);
  const [team, setTeam] = React.useState(null);
  const [match, setMatch] = React.useState(null);
  const [tick, setTick] = React.useState(0);

  React.useEffect(() => { applyTheme("sunset", "modern"); }, []);
  React.useEffect(() => {
    const h = () => setTick(n => n + 1);
    window.addEventListener("vm-data-updated", h);
    return () => window.removeEventListener("vm-data-updated", h);
  }, []);
  const data = React.useMemo(() => window.VM.build(), [tick]);
  React.useEffect(() => { window.scrollTo({ top: 0 }); }, [view]);

  const openMatch = (m) => setMatch(m);
  const openTeam = (code) => setTeam(code);

  // Räkna live-matcher + nästa avspark för header-status
  const liveCount = (data.allMatches || []).filter(m => m.status === "live").length;
  const nextMatch = (data.allMatches || []).find(m => m.status === "upcoming");

  return (
    <div style={{ minHeight: "100vh" }}>
      <header style={{ position: "sticky", top: 0, zIndex: 40,
        background: "color-mix(in oklab, var(--bg-0) 88%, transparent)",
        backdropFilter: "blur(16px) saturate(140%)",
        WebkitBackdropFilter: "blur(16px) saturate(140%)",
        borderBottom: "1px solid var(--border)" }}>
        <div style={{ maxWidth: "var(--maxw)", margin: "0 auto",
          padding: "10px 16px", display: "flex", alignItems: "center", gap: 14 }}>
          {/* Brand */}
          <div style={{ display: "flex", alignItems: "center", gap: 10, flex: "0 0 auto" }}>
            <div style={{ width: 38, height: 38, borderRadius: 10,
              background: "linear-gradient(135deg, var(--pitch), var(--pitch-deep))",
              display: "flex", alignItems: "center", justifyContent: "center",
              boxShadow: "0 6px 18px -6px var(--pitch-glow), inset 0 1px 0 rgba(255,255,255,.18)" }}>
              <span className="display" style={{ fontSize: 14, color: "#06120E", fontWeight: 800, letterSpacing: "-.02em" }}>26</span>
            </div>
            <div style={{ minWidth: 0, display: "none" }} className="brand-text-md">
              <div style={{ fontSize: 13, fontWeight: 800, letterSpacing: ".02em" }}>VM 2026 Tippet</div>
              <div style={{ fontSize: 10.5, fontWeight: 600, color: "var(--fg-3)" }}>USA · MEX · CAN</div>
            </div>
          </div>

          {/* Top tabs - kompakt pill-rad */}
          <nav style={{ flex: 1, display: "flex", justifyContent: "center", minWidth: 0 }}>
            <div className="app-scroll" style={{ display: "flex", gap: 2, padding: 3,
              background: "var(--bg-2)", borderRadius: 11, border: "1px solid var(--border)",
              overflowX: "auto", maxWidth: "100%" }}>
              {NAV.map(n => {
                const active = view === n.id;
                return (
                  <button key={n.id} onClick={() => setView(n.id)}
                    style={{ display: "inline-flex", alignItems: "center", gap: 6,
                      padding: "7px 13px", borderRadius: 8, whiteSpace: "nowrap",
                      fontSize: 12.5, fontWeight: active ? 700 : 600,
                      color: active ? "#06120E" : "var(--fg-2)",
                      background: active ? "var(--pitch)" : "transparent",
                      transition: "background .18s ease, color .18s ease, transform .18s ease" }}>
                    <span style={{ display: "inline-flex", opacity: active ? 1 : .7 }}>{Icon[n.icon](active)}</span>
                    <span>{n.label}</span>

              })}

          </nav>

          {/* Live-status högst upp till höger */}
          <div style={{ flex: "0 0 auto", display: "flex", alignItems: "center", gap: 8 }}>
            {liveCount > 0 ? (
              <span style={{ display: "inline-flex", alignItems: "center", gap: 6,
                padding: "5px 11px", borderRadius: 999, background: "var(--live-glow)",
                border: "1px solid rgba(239,68,68,.45)", fontSize: 11.5, fontWeight: 700,
                color: "var(--live)" }}>
                <span style={{ width: 7, height: 7, borderRadius: "50%", background: "var(--live)",
                  animation: "blink 1.2s infinite" }} />
                <span className="mono">{liveCount}</span> <span style={{ letterSpacing: ".06em" }}>LIVE</span>
              </span>
            ) : nextMatch ? (
              <span style={{ display: "none", alignItems: "center", gap: 6,
                padding: "5px 11px", borderRadius: 999, background: "var(--bg-2)",
                border: "1px solid var(--border)", fontSize: 11.5, fontWeight: 600,
                color: "var(--fg-3)" }} className="next-kick-md">
                <span>Nästa</span>
                <span className="mono" style={{ color: "var(--fg-2)" }}>{svDayLabel(nextMatch.kickoff)}</span>
              </span>
            ) : null}
          </div>
        </div>
        {/* Mobile-säkring: visa brand-text + next-kick på >=640px via media */}
        <style>{`
          @media (min-width: 640px) {
            .brand-text-md { display: block !important; }
          }
          @media (min-width: 880px) {
            .next-kick-md { display: inline-flex !important; }
          }
        `}</style>
      </header>

      <main>
        <div style={{ maxWidth: "var(--maxw)", margin: "0 auto", padding: "20px 16px 80px" }}>
          {view === "standings" && <StandingsView data={data} onOpenPlayer={setPlayer} />}
          {view === "groups" && <GroupsView data={data} onTeam={openTeam} onOpenMatch={openMatch} />}
          {view === "schedule" && <ScheduleView data={data} onOpenMatch={openMatch} />}
          {view === "bonus" && <BonusView data={data} onTeam={openTeam} />}
          {view === "info" && <InfoView />}
        </div>
      </main>

      {player && <PlayerSheet data={data} playerId={player} onClose={() => setPlayer(null)} onOpenMatch={openMatch} />}
      {team && <TeamSheet data={data} code={team} onClose={() => setTeam(null)} onOpenMatch={openMatch} />}
      {match && <MatchDetail data={data} match={match} onClose={() => setMatch(null)} onTeam={openTeam} />}

    </div>
  );
}

/* ============================================================
   Boot: fetcha vår riktiga data.json + fixtures.json innan vi
   monterar React. Re-fetch var 90:e sekund för "live"-känsla.
   ============================================================ */
async function loadRealData() {
  const bust = "?t=" + Math.floor(Date.now() / 30000);
  const [dr, fr] = await Promise.allSettled([
    fetch("data.json" + bust, { cache: "no-store" }),
    fetch("fixtures.json" + bust, { cache: "no-store" })
  ]);
  const data = (dr.status === "fulfilled" && dr.value.ok) ? await dr.value.json() : null;
  const fixtures = (fr.status === "fulfilled" && fr.value.ok) ? await fr.value.json() : [];
  if (!data) throw new Error("data.json saknas");
  window.__REAL_DATA__ = { data, fixtures };
}

(async () => {
  const root = document.getElementById("root");
  root.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:60vh;color:var(--ink-soft);font-weight:700;font-size:14px">Hämtar data…</div>';
  try {
    await loadRealData();
  } catch (e) {
    root.innerHTML = '<div style="padding:40px 20px;text-align:center;color:var(--ink-soft);font-weight:700">Kunde inte ladda data. Försöker igen…</div>';
    setTimeout(() => location.reload(), 5000);
    return;
  }
  ReactDOM.createRoot(root).render(<App />);
  // Re-fetcha var 45:e sekund. data.json regenereras av Actions var 5:e minut,
  // så vi tittar lite oftare för att fånga uppdateringen så snart den landar.
  setInterval(() => {
    loadRealData().then(() => {
      window.dispatchEvent(new CustomEvent("vm-data-updated"));
    }).catch(() => {});
  }, 45 * 1000);
})();

  </script>
