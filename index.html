<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>VM 2026 · Tippningsligan</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Expanded:wght@600;700;800;900&family=Big+Shoulders+Display:wght@500;700;800;900&family=Spline+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
<style>
  /* ====== STADIONNATT · PALETT & TYPSNITT (styrs av Tweaks) ====== */
  :root {
    /* Solnedgång (default) — vibrerande mot mörker */
    --hot:   #FF2E6E;
    --warm:  #FF8A3D;
    --gold:  #FFC53D;
    --cool:  #8A6BFF;
    --deep:  #1A1026;
    --grad: linear-gradient(120deg,#7A2BFF 0%,#FF2E6E 52%,#FF8A3D 100%);
    --grad-soft: linear-gradient(120deg,#7A2BFF,#FF2E6E);

    --font-display: 'Anton', sans-serif;
    --font-body: 'Archivo', system-ui, sans-serif;
    --display-tracking: 0.006em;
    --display-transform: uppercase;
    --display-weight: 400;

    /* djup, varm midnattsbas — inte svart */
    --bg:    #14101F;
    --bg2:   #221A34;
    --paper: #201930;
    --panel: #2A2140;
    --ink:   #F7F3FF;
    --ink-soft: #A89EC4;
    --line:  rgba(255,255,255,.085);
    --line-strong: rgba(255,255,255,.20);

    --r-lg: 20px; --r-md: 14px; --r-sm: 10px;
    --shadow: 0 10px 26px -18px rgba(0,0,0,.85), 0 0 0 1px rgba(255,255,255,.03) inset;
    --shadow-lift: 0 30px 64px -30px rgba(0,0,0,.9), 0 0 0 1px rgba(255,255,255,.04) inset;
    --glow: 0 0 24px -6px;
    --nav-h: 68px;
    --maxw: 1080px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }
  /* dekorativ bakgrund: stadionglöd i hörnen + fint prickmönster (textur) */
  body::before {
    content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(60vw 44vw at 88% -8%, color-mix(in oklab, var(--hot) 30%, transparent), transparent 60%),
      radial-gradient(56vw 46vw at -10% 4%, color-mix(in oklab, var(--cool) 30%, transparent), transparent 62%),
      radial-gradient(70vw 56vw at 50% 116%, color-mix(in oklab, var(--warm) 16%, transparent), transparent 60%);
    opacity: .85;
  }
  body::after {
    content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px);
    background-size: 24px 24px;
    -webkit-mask-image: linear-gradient(180deg, #000, transparent 70%);
    mask-image: linear-gradient(180deg, #000, transparent 70%);
  }
  #root { position: relative; z-index: 1; }
  .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
  ::selection { background: var(--hot); color: #fff; }

  h1,h2,h3 { margin: 0; }
  .display {
    font-family: var(--font-display);
    text-transform: var(--display-transform);
    letter-spacing: var(--display-tracking);
    line-height: .96;
    font-weight: var(--display-weight, 800);
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  img { display: block; max-width: 100%; }

  /* skydd mot horisontell scroll */
  .app-scroll::-webkit-scrollbar { width: 0; height: 0; }

  /* fokus-tillgänglighet */
  :focus-visible { outline: 3px solid var(--cool); outline-offset: 2px; }

  @keyframes pop { 0%{transform:scale(.6);opacity:0} 60%{transform:scale(1.08)} 100%{transform:scale(1);opacity:1} }
  @keyframes riseIn { from{transform:translateY(16px)} to{transform:translateY(0)} }
  @keyframes sheetFade { from{opacity:0} to{opacity:1} }
  @keyframes sheetPop  { from{opacity:0;transform:scale(.96) translateY(8px)} to{opacity:1;transform:none} }
  @keyframes fadeRise { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  @media (prefers-reduced-motion: no-preference) {
    .can-fade { animation-name: fadeRise !important; }
  }
  @keyframes livePulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,46,110,.55)} 50%{box-shadow:0 0 0 7px rgba(255,46,110,0)} }
  @keyframes confettiFall { to { transform: translateY(115vh) rotate(720deg); } }
  @keyframes shine { from{background-position:-200% 0} to{background-position:200% 0} }
  @keyframes barGrow { from { width: 0 !important; } }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: .001ms !important; animation-iteration-count: 1 !important; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- ╔══════════════════════════════════════════════════════════════════╗ -->
  <!-- ║  DATALAGER — adapter som mappar vår riktiga data.json +          ║ -->
  <!-- ║  fixtures.json till samma window.VM-objekt-form som designens    ║ -->
  <!-- ║  mock. Data hämtas runtime via window.__REAL_DATA__.             ║ -->
  <!-- ╚══════════════════════════════════════════════════════════════════╝ -->
  <script>
/* ============================================================
   VM 2026 — Data-adapter (vanilla JS)
   window.__REAL_DATA__ sätts av boot-koden innan React renderas.
   window.VM.build()  ->  fullständig dataset i designens form.
   ============================================================ */
(function () {
  "use strict";

  // ---- prispengar (50/30/20 av 2700) ----
  const PRIZES = [1350, 810, 540];
  const GROUP_LETTERS = ["A","B","C","D","E","F","G","H","I","J","K","L"];

  // ---- TLA → ISO alpha-2 (flagcdn.com) ----
  const TLA_TO_ISO = {
    USA:"us", MEX:"mx", CAN:"ca",
    BRA:"br", ARG:"ar", URU:"uy", COL:"co", ECU:"ec", PAR:"py", CHI:"cl", PER:"pe", VEN:"ve", BOL:"bo",
    ENG:"gb-eng", SCO:"gb-sct", WAL:"gb-wls", NIR:"gb-nir", IRL:"ie",
    FRA:"fr", GER:"de", ITA:"it", ESP:"es", POR:"pt", NED:"nl", BEL:"be",
    CRO:"hr", SUI:"ch", AUT:"at", POL:"pl", DEN:"dk", SWE:"se", NOR:"no",
    FIN:"fi", ISL:"is", HUN:"hu", CZE:"cz", SVK:"sk", SVN:"si", ROU:"ro",
    GRE:"gr", BUL:"bg", SRB:"rs", UKR:"ua", BIH:"ba", ALB:"al", KOS:"xk",
    MKD:"mk", MNE:"me", TUR:"tr", LUX:"lu",
    MAR:"ma", TUN:"tn", ALG:"dz", EGY:"eg", SEN:"sn", CIV:"ci", NGA:"ng",
    CMR:"cm", GHA:"gh", RSA:"za", COD:"cd", CGO:"cg", CPV:"cv", MLI:"ml", BFA:"bf",
    ANG:"ao", ZAM:"zm", GUI:"gn", GAB:"ga", LBY:"ly", BEN:"bj", TOG:"tg",
    JPN:"jp", KOR:"kr", KSA:"sa", IRN:"ir", IRQ:"iq", QAT:"qa", UAE:"ae",
    UZB:"uz", JOR:"jo", AUS:"au", CHN:"cn", THA:"th", VIE:"vn", IDN:"id",
    CRC:"cr", PAN:"pa", JAM:"jm", HAI:"ht", HON:"hn", SLV:"sv", GUA:"gt",
    TRI:"tt", CUW:"cw", CUR:"cw", SUR:"sr", NZL:"nz",
    PO1:null, PO2:null, PO3:null
  };
  const NAME_TO_ISO = {
    "united states":"us","mexico":"mx","canada":"ca",
    "brazil":"br","argentina":"ar","uruguay":"uy","colombia":"co","ecuador":"ec",
    "paraguay":"py","chile":"cl","peru":"pe","venezuela":"ve","bolivia":"bo",
    "england":"gb-eng","scotland":"gb-sct","wales":"gb-wls","northern ireland":"gb-nir",
    "ireland":"ie","republic of ireland":"ie",
    "france":"fr","germany":"de","italy":"it","spain":"es","portugal":"pt",
    "netherlands":"nl","belgium":"be","croatia":"hr","switzerland":"ch","austria":"at",
    "poland":"pl","denmark":"dk","sweden":"se","norway":"no",
    "hungary":"hu","czech republic":"cz","czechia":"cz",
    "romania":"ro","greece":"gr","serbia":"rs","ukraine":"ua",
    "bosnia and herzegovina":"ba","bosnia-herzegovina":"ba","albania":"al",
    "north macedonia":"mk","montenegro":"me","turkey":"tr","türkiye":"tr",
    "morocco":"ma","tunisia":"tn","algeria":"dz","egypt":"eg","senegal":"sn",
    "ivory coast":"ci","côte d'ivoire":"ci","nigeria":"ng",
    "cameroon":"cm","ghana":"gh","south africa":"za","dr congo":"cd","congo dr":"cd",
    "cape verde":"cv","mali":"ml",
    "japan":"jp","south korea":"kr","korea republic":"kr","saudi arabia":"sa",
    "iran":"ir","iraq":"iq","qatar":"qa","united arab emirates":"ae",
    "uzbekistan":"uz","jordan":"jo","australia":"au",
    "costa rica":"cr","panama":"pa","jamaica":"jm","haiti":"ht","honduras":"hn",
    "el salvador":"sv","guatemala":"gt","trinidad and tobago":"tt",
    "curaçao":"cw","curacao":"cw","new zealand":"nz"
  };
  const SV_TO_TLA = {
    "argentina":"ARG","frankrike":"FRA","spanien":"ESP","england":"ENG",
    "brasilien":"BRA","portugal":"POR","nederländerna":"NED","usa":"USA",
    "mexico":"MEX","mexiko":"MEX","kanada":"CAN","tyskland":"GER","belgien":"BEL",
    "kroatien":"CRO","uruguay":"URU","colombia":"COL","japan":"JPN",
    "marocko":"MAR","senegal":"SEN","schweiz":"SUI","danmark":"DEN",
    "sydkorea":"KOR","ecuador":"ECU","österrike":"AUT","australien":"AUS",
    "norge":"NOR","sverige":"SWE","polen":"POL","serbien":"SRB",
    "turkiet":"TUR","egypten":"EGY","nigeria":"NGA","elfenbenskusten":"CIV",
    "iran":"IRN","panama":"PAN","paraguay":"PAR","ungern":"HUN",
    "nya zeeland":"NZL","saudiarabien":"KSA","ghana":"GHA","kamerun":"CMR",
    "uzbekistan":"UZB","jordanien":"JOR","sydafrika":"RSA","algeriet":"ALG",
    "honduras":"HON","peru":"PER","chile":"CHI",
    "tjeckien":"CZE","bosnien":"BIH","qatar":"QAT","irak":"IRQ",
    "haiti":"HAI","skottland":"SCO","kap verde":"CPV","tunisien":"TUN",
    "dr kongo":"COD","curacao":"CUR"
  };
  const EN_TO_SV = {
    "United States":"USA","Mexico":"Mexico","Canada":"Kanada","Brazil":"Brasilien",
    "Argentina":"Argentina","Uruguay":"Uruguay","Colombia":"Colombia","Ecuador":"Ecuador",
    "Paraguay":"Paraguay","Chile":"Chile","Peru":"Peru","Venezuela":"Venezuela",
    "England":"England","Scotland":"Skottland","Wales":"Wales",
    "France":"Frankrike","Germany":"Tyskland","Italy":"Italien","Spain":"Spanien",
    "Portugal":"Portugal","Netherlands":"Nederländerna","Belgium":"Belgien",
    "Croatia":"Kroatien","Switzerland":"Schweiz","Austria":"Österrike",
    "Poland":"Polen","Denmark":"Danmark","Sweden":"Sverige","Norway":"Norge",
    "Czech Republic":"Tjeckien","Czechia":"Tjeckien",
    "Serbia":"Serbien","Ukraine":"Ukraina",
    "Bosnia and Herzegovina":"Bosnien","Bosnia-Herzegovina":"Bosnien",
    "Turkey":"Turkiet","Türkiye":"Turkiet",
    "Morocco":"Marocko","Tunisia":"Tunisien","Algeria":"Algeriet","Egypt":"Egypten",
    "Senegal":"Senegal","Ivory Coast":"Elfenbenskusten","Côte d'Ivoire":"Elfenbenskusten",
    "Nigeria":"Nigeria","Cameroon":"Kamerun","Ghana":"Ghana","South Africa":"Sydafrika",
    "DR Congo":"DR Kongo","Congo DR":"DR Kongo","Cape Verde":"Kap Verde",
    "Japan":"Japan","South Korea":"Sydkorea","Korea Republic":"Sydkorea",
    "Saudi Arabia":"Saudiarabien","Iran":"Iran","Iraq":"Irak","Qatar":"Qatar",
    "Uzbekistan":"Uzbekistan","Jordan":"Jordanien","Australia":"Australien",
    "Costa Rica":"Costa Rica","Panama":"Panama","Jamaica":"Jamaica","Haiti":"Haiti",
    "Honduras":"Honduras","Curaçao":"Curaçao","Curacao":"Curaçao",
    "New Zealand":"Nya Zeeland"
  };

  // 9 spelare med deterministisk färg
  const PLAYER_COLORS = {
    "Albin":"#FF2E6E","Alexander":"#FF8A3D","Björn":"#1FA37A","Casper":"#7A3CF0",
    "Filip":"#0E8FE0","Isac":"#F5B301","Johan":"#E63946","Martin":"#16A0A0","Oskar":"#9B5DE5"
  };
  const PLAYER_SLUGS = {
    "Albin":"albin","Alexander":"alexander","Björn":"bjorn","Casper":"casper",
    "Filip":"filip","Isac":"isac","Johan":"johan","Martin":"martin","Oskar":"oskar"
  };
  function playerPhoto(name){
    const slug = PLAYER_SLUGS[name];
    return slug ? ("images/players/" + slug + ".jpg") : null;
  }

  function isoFor(name, tla){
    if(tla && TLA_TO_ISO[String(tla).toUpperCase()]) return TLA_TO_ISO[String(tla).toUpperCase()];
    if(name){
      const key = String(name).toLowerCase().trim();
      if(NAME_TO_ISO[key]) return NAME_TO_ISO[key];
      const simple = key.normalize("NFD").replace(/[̀-ͯ]/g,"");
      if(NAME_TO_ISO[simple]) return NAME_TO_ISO[simple];
    }
    return null;
  }
  function brandFromName(name){
    let h = 0;
    for(let i=0;i<(name||"").length;i++) h = (h*31 + name.charCodeAt(i)) | 0;
    const hue1 = ((h % 360) + 360) % 360;
    const hue2 = (hue1 + 28) % 360;
    return [`hsl(${hue1} 55% 45%)`, `hsl(${hue2} 65% 38%)`];
  }
  function codeFromName(name){
    if(!name) return "TBD";
    const lc = String(name).toLowerCase();
    if(SV_TO_TLA[lc]) return SV_TO_TLA[lc];
    const cleaned = String(name).replace(/[^a-zA-ZåäöÅÄÖ ]/g,"").trim().toUpperCase();
    return cleaned.slice(0,3) || "TBD";
  }
  function teamCodeFromPick(pick, teams){
    if(!pick) return null;
    const lc = String(pick).toLowerCase().trim();
    if(SV_TO_TLA[lc]) return SV_TO_TLA[lc];
    for(const code in teams){
      if(teams[code].name && teams[code].name.toLowerCase() === lc) return code;
    }
    if(NAME_TO_ISO[lc]){
      const iso = NAME_TO_ISO[lc];
      for(const code in teams){ if(teams[code].iso === iso) return code; }
    }
    return null;
  }

  // ---- core builder ----
  function build(){
    const real = window.__REAL_DATA__ || {};
    const D = real.data || {};
    const F = (real.fixtures || []);

    // ============= TEAMS + GROUPS =============
    const TEAMS = {};
    const GROUPS = {};
    GROUP_LETTERS.forEach(L => { GROUPS[L] = []; });

    (D.groups || []).forEach(g => {
      const L = g.code;
      (g.table || []).forEach(row => {
        const code = (row.tla && String(row.tla).toUpperCase()) || codeFromName(row.team);
        if(TEAMS[code]) return;
        const display = EN_TO_SV[row.team] || row.team;
        const brand = brandFromName(row.team || code);
        TEAMS[code] = {
          code, name: display, c1: brand[0], c2: brand[1],
          rating: 75, group: L, pot: 0, iso: isoFor(row.team, row.tla)
        };
        if(GROUPS[L] && GROUPS[L].length < 4) GROUPS[L].push(code);
      });
    });
    F.forEach(f => {
      [[f.home, f.homeTla], [f.away, f.awayTla]].forEach(([n, t]) => {
        if(!n) return;
        const code = (t && String(t).toUpperCase()) || codeFromName(n);
        if(!TEAMS[code]){
          const display = EN_TO_SV[n] || n;
          const brand = brandFromName(n);
          TEAMS[code] = { code, name: display, c1: brand[0], c2: brand[1],
            rating: 75, group: f.group || null, pot: 0, iso: isoFor(n, t) };
        }
        if(f.group && f.stage === "GROUP_STAGE" && GROUPS[f.group] && !GROUPS[f.group].includes(code) && GROUPS[f.group].length < 4){
          GROUPS[f.group].push(code);
          if(!TEAMS[code].group) TEAMS[code].group = f.group;
        }
      });
    });

    function codeOf(name, tla){
      if(!name) return null;
      if(tla){
        const t = String(tla).toUpperCase();
        if(TEAMS[t]) return t;
      }
      for(const c in TEAMS){
        if(TEAMS[c].name === (EN_TO_SV[name] || name)) return c;
      }
      const fallback = codeFromName(name);
      if(TEAMS[fallback]) return fallback;
      const brand = brandFromName(name);
      TEAMS[fallback] = { code:fallback, name: EN_TO_SV[name]||name, c1:brand[0], c2:brand[1],
        rating:75, group:null, pot:0, iso: isoFor(name, tla) };
      return fallback;
    }

    // ============= MATCHES =============
    const STAGE_MAP = {
      GROUP_STAGE:"group",
      LAST_32:"ko", LAST_16:"ko", QUARTER_FINALS:"ko",
      SEMI_FINALS:"ko", THIRD_PLACE:"ko", FINAL:"ko"
    };
    const KO_PREFIX = {
      LAST_32:"r32_", LAST_16:"r16_", QUARTER_FINALS:"qf_",
      SEMI_FINALS:"sf_", THIRD_PLACE:"third_", FINAL:"final_"
    };

    const tipsByMatchId = {};
    (D.matches || []).forEach(m => { tipsByMatchId[m.id] = m; });

    const koCounters = {};
    const allMatches = (F || []).map(f => {
      const stage = STAGE_MAP[f.stage] || "ko";
      const isGroup = stage === "group";
      let id;
      if(isGroup){
        id = "G" + f.id;
      } else {
        const pfx = KO_PREFIX[f.stage] || "ko_";
        koCounters[pfx] = koCounters[pfx] || 0;
        id = pfx + (koCounters[pfx]++);
      }
      const homeCode = f.home ? codeOf(f.home, f.homeTla) : null;
      const awayCode = f.away ? codeOf(f.away, f.awayTla) : null;
      const kickoff = new Date(f.utcDate);
      const finished = f.status === "FINISHED" || f.status === "AWARDED";
      const live = f.status === "IN_PLAY" || f.status === "PAUSED" || f.status === "LIVE" || f.status === "SUSPENDED";
      const ga = (f.score && f.score[0] != null) ? f.score[0] : null;
      const gb = (f.score && f.score[1] != null) ? f.score[1] : null;
      let winner = null;
      if(finished && ga != null && gb != null){
        if(ga > gb) winner = homeCode;
        else if(gb > ga) winner = awayCode;
      }
      const tipped = tipsByMatchId[f.id];
      const tippas = !!(tipped && tipped.tips && tipped.tips.length > 0);

      // mappa engine-goals/bookings till designens scorers/cards
      function refCode(ref){
        if(!ref) return null;
        const upper = String(ref).toUpperCase();
        return TEAMS[upper] ? upper : codeOf(ref, null);
      }
      const goalsSrc = (f.goals && f.goals.length) ? f.goals
        : (tipped && tipped.goals) ? tipped.goals : [];
      const bookingsSrc = (f.bookings && f.bookings.length) ? f.bookings
        : (tipped && tipped.bookings) ? tipped.bookings : [];
      const scorers = goalsSrc.map(g => ({
        team: refCode(g.team),
        name: g.scorer,
        minute: g.minute,
        pen: (String(g.type||"").toUpperCase() === "PENALTY")
      })).filter(x => x.team && x.name);
      const cards = bookingsSrc.map(b => {
        const c = String(b.card||"").toUpperCase();
        return {
          team: refCode(b.team), name: b.player, minute: b.minute,
          type: (c === "RED" || c === "YELLOW_RED") ? "red" : "yellow"
        };
      }).filter(x => x.team && x.name);

      return {
        id, stage, group: f.group || null,
        round: isGroup ? ("Grupp " + (f.group||"")) : "Slutspel",
        matchday: null,
        home: homeCode, away: awayCode,
        kickoff,
        ga, gb,
        status: finished ? "played" : (live ? "live" : "upcoming"),
        winner, pen: null,
        minute: (live && (f.minute != null)) ? f.minute : (live ? null : undefined),
        venue: f.venue || null,
        tippas,
        scorers, cards,
        stats: null,
        _realId: f.id
      };
    });

    allMatches.sort((a,b) => a.kickoff - b.kickoff);
    const matches = allMatches.filter(m => m.stage === "group");

    // ============= groupTables =============
    const groupTables = {};
    GROUP_LETTERS.forEach(L => {
      const g = (D.groups || []).find(x => x.code === L);
      if(g && g.table && g.table.length){
        const sorted = [...g.table].sort((a,b) =>
          (b.points - a.points) || ((b.gd||(b.gf-b.ga)) - (a.gd||(a.gf-a.ga))) || (b.gf - a.gf));
        groupTables[L] = sorted.map((row, i) => {
          const code = (row.tla && String(row.tla).toUpperCase()) || codeFromName(row.team);
          return {
            code,
            sp: row.played || 0, v: row.won || 0, o: row.draw || 0, f: row.lost || 0,
            gm: row.gf || 0, im: row.ga || 0,
            ms: (row.gd != null ? row.gd : ((row.gf||0) - (row.ga||0))),
            p:  row.points || 0,
            pos: i + 1
          };
        });
      } else {
        groupTables[L] = (GROUPS[L] || []).map((code, i) => ({
          code, sp:0, v:0, o:0, f:0, gm:0, im:0, ms:0, p:0, pos: i+1
        }));
        while(groupTables[L].length < 4){
          const tag = "TBD" + L + (groupTables[L].length+1);
          TEAMS[tag] = TEAMS[tag] || { code:tag, name:"Att lottas", c1:"#888", c2:"#666",
            rating:70, group:L, pot:0, iso:null };
          groupTables[L].push({ code:tag, sp:0,v:0,o:0,f:0,gm:0,im:0,ms:0,p:0, pos: groupTables[L].length+1 });
        }
      }
    });

    // ============= knockout struct (FIFA 2026 officiell bracket) =============
    function bestThirdFromGroups(letters){
      const cands = [];
      letters.split("").forEach(L => {
        const r = groupTables[L] && groupTables[L][2];
        if(r && r.code && r.code.indexOf("TBD") !== 0) cands.push(Object.assign({}, r, {group:L}));
      });
      cands.sort((a,b) => (b.p - a.p) || (b.ms - a.ms) || (b.gm - a.gm) || a.group.localeCompare(b.group));
      return cands[0] ? cands[0].code : null;
    }
    function slotResolve(spec){
      // { p:1|2, g:"A" } | { p:3, gs:"ABCDF" } | { winM:N } | { loseM:N }
      if(spec.winM)   return { code:null, projCode:null, label:"Vinnare M" + spec.winM };
      if(spec.loseM)  return { code:null, projCode:null, label:"Förlorare M" + spec.loseM };
      if(spec.p === 1 || spec.p === 2){
        const row = groupTables[spec.g] && groupTables[spec.g][spec.p - 1];
        const proj = row && row.code && row.code.indexOf("TBD") !== 0 ? row.code : null;
        return { code:null, projCode:proj, label:(spec.p === 1 ? "Vinnare " : "Tvåa ") + spec.g };
      }
      if(spec.p === 3 && spec.gs){
        return { code:null, projCode:bestThirdFromGroups(spec.gs),
          label:"Bästa 3:a (" + spec.gs.split("").join("/") + ")" };
      }
      return { code:null, projCode:null, label:"TBD" };
    }
    // R32: officiell FIFA 2026-lottning (tree-ordning för designens recursive feed)
    const R32_SPECS = [
      { fifa:73, a:{p:2,g:"A"}, b:{p:2,g:"B"} },
      { fifa:75, a:{p:1,g:"E"}, b:{p:3,gs:"ABCDF"} },
      { fifa:74, a:{p:1,g:"C"}, b:{p:2,g:"F"} },
      { fifa:77, a:{p:2,g:"E"}, b:{p:2,g:"I"} },
      { fifa:83, a:{p:1,g:"H"}, b:{p:2,g:"J"} },
      { fifa:84, a:{p:2,g:"K"}, b:{p:2,g:"L"} },
      { fifa:81, a:{p:1,g:"G"}, b:{p:3,gs:"AEHIJ"} },
      { fifa:82, a:{p:1,g:"D"}, b:{p:3,gs:"BEFIJ"} },
      { fifa:76, a:{p:1,g:"F"}, b:{p:2,g:"C"} },
      { fifa:78, a:{p:1,g:"I"}, b:{p:3,gs:"CDFGH"} },
      { fifa:79, a:{p:1,g:"A"}, b:{p:3,gs:"CEFHI"} },
      { fifa:80, a:{p:1,g:"L"}, b:{p:3,gs:"EHIJK"} },
      { fifa:86, a:{p:2,g:"D"}, b:{p:2,g:"G"} },
      { fifa:88, a:{p:1,g:"K"}, b:{p:3,gs:"DEIJL"} },
      { fifa:85, a:{p:1,g:"B"}, b:{p:3,gs:"EFGIJ"} },
      { fifa:87, a:{p:1,g:"J"}, b:{p:2,g:"H"} }
    ];
    const R16_FIFA = [89, 90, 93, 94, 91, 92, 95, 96];
    const QF_FIFA  = [97, 98, 99, 100];
    const SF_FIFA  = [101, 102];

    function makeKoMatch(prefix, idx, slotA, slotB, fifa){
      return {
        id: prefix + idx, stage: "ko", group: null, round: "Slutspel",
        fifa: fifa || null,
        home: slotA.code, away: slotB.code,
        projHome: slotA.projCode || null, projAway: slotB.projCode || null,
        fromA: slotA.label, fromB: slotB.label,
        kickoff: new Date(Date.UTC(2026, 6, 19, 19, 0)),
        ga: null, gb: null, status: "upcoming",
        winner: null, pen: null,
        venue: (fifa && window.VM && window.VM.KO_VENUES && window.VM.KO_VENUES[fifa]) || null,
        tippas: true
      };
    }

    const r32_built = R32_SPECS.map((spec, i) =>
      makeKoMatch("r32_", i, slotResolve(spec.a), slotResolve(spec.b), spec.fifa));
    const r16_built = []; for(let i=0;i<8;i++){
      r16_built.push(makeKoMatch("r16_", i,
        slotResolve({winM:R32_SPECS[i*2].fifa}),
        slotResolve({winM:R32_SPECS[i*2+1].fifa}),
        R16_FIFA[i]));
    }
    const qf_built = []; for(let i=0;i<4;i++){
      qf_built.push(makeKoMatch("qf_", i,
        slotResolve({winM:R16_FIFA[i*2]}),
        slotResolve({winM:R16_FIFA[i*2+1]}),
        QF_FIFA[i]));
    }
    const sf_built = []; for(let i=0;i<2;i++){
      sf_built.push(makeKoMatch("sf_", i,
        slotResolve({winM:QF_FIFA[i*2]}),
        slotResolve({winM:QF_FIFA[i*2+1]}),
        SF_FIFA[i]));
    }
    const final_built = [ makeKoMatch("final_", 0,
      slotResolve({winM:SF_FIFA[0]}), slotResolve({winM:SF_FIFA[1]}), 104) ];
    const third_built = [ makeKoMatch("third_", 0,
      slotResolve({loseM:SF_FIFA[0]}), slotResolve({loseM:SF_FIFA[1]}), 103) ];

    // Overlay verkliga KO-fixtures: behåll FIFA-num/labels men ta kickoff/team/score
    function overlayKO(structural, stagePrefix){
      const real = allMatches.filter(m => m.id.indexOf(stagePrefix) === 0)
        .sort((a,b) => a.kickoff - b.kickoff);
      real.forEach((rm, i) => {
        const s = structural[i];
        if(!s) return;
        s.id = rm.id;
        s.kickoff = rm.kickoff;
        s.status = rm.status;
        if(rm.home){ s.home = rm.home; s.fromA = null; }
        if(rm.away){ s.away = rm.away; s.fromB = null; }
        s.ga = rm.ga; s.gb = rm.gb;
        s.winner = rm.winner;
        s.scorers = rm.scorers || [];
        s.cards = rm.cards || [];
        s._realId = rm._realId;
        if(rm.venue && rm.venue.stadium) s.venue = rm.venue;
      });
    }
    overlayKO(r32_built, "r32_");
    overlayKO(r16_built, "r16_");
    overlayKO(qf_built, "qf_");
    overlayKO(sf_built, "sf_");
    overlayKO(third_built, "third_");
    overlayKO(final_built, "final_");

    const knockout = {
      r32: r32_built, r16: r16_built, qf: qf_built, sf: sf_built,
      third: third_built, final: final_built
    };

    // Ersätt KO-entries i allMatches med structural-versionerna
    const koIds = new Set();
    [r32_built, r16_built, qf_built, sf_built, third_built, final_built]
      .forEach(arr => arr.forEach(m => koIds.add(m.id)));
    const groupMatches = allMatches.filter(m => m.stage === "group");
    const allMatchesNew = groupMatches.concat(r32_built, r16_built, qf_built, sf_built, third_built, final_built);
    allMatchesNew.sort((a,b) => a.kickoff - b.kickoff);
    allMatches.length = 0;
    allMatchesNew.forEach(m => allMatches.push(m));

    const koRounds = [
      { key:"r32", label:"Sextondelsfinal", count:16 },
      { key:"r16", label:"Åttondelsfinal", count:8 },
      { key:"qf",  label:"Kvartsfinal", count:4 },
      { key:"sf",  label:"Semifinal", count:2 },
      { key:"final", label:"Final", count:1 }
    ];

    // ============= forms =============
    const forms = {};
    Object.keys(TEAMS).forEach(c => { forms[c] = []; });
    allMatches.forEach(m => {
      if(m.status !== "played" || !m.home || !m.away) return;
      const r = (g,o) => g > o ? "V" : g < o ? "F" : "O";
      forms[m.home].push({ vs:m.away, gf:m.ga, ga:m.gb, r:r(m.ga, m.gb), id:m.id });
      forms[m.away].push({ vs:m.home, gf:m.gb, ga:m.ga, r:r(m.gb, m.ga), id:m.id });
    });

    // ============= PLAYERS / STANDINGS / TIPS / BONUS =============
    const BONUS_KEY_MAP = {
      winner:"winner", silver:"silver", bronze:"bronze",
      top_scorer:"topscorer", best_player:"bestplayer",
      best_young:"youngplayer", best_keeper:"keeper"
    };
    const TEAM_BONUS = new Set(["winner","silver","bronze"]);

    const realIdToMatchId = {};
    allMatches.forEach(m => { if(m._realId != null) realIdToMatchId[m._realId] = m.id; });

    function buildPlayerTips(playerName){
      const out = {};
      (D.matches || []).forEach(rm => {
        const t = (rm.tips || []).find(x => x.name === playerName);
        if(t){
          const designId = realIdToMatchId[rm.id];
          if(designId) out[designId] = [t.tip[0], t.tip[1]];
        }
      });
      return out;
    }
    function buildBonus(detail){
      const out = {};
      Object.keys(BONUS_KEY_MAP).forEach(srcKey => {
        const dstKey = BONUS_KEY_MAP[srcKey];
        const v = detail && detail[srcKey];
        if(!v){ out[dstKey] = TEAM_BONUS.has(dstKey) ? null : ["—", null]; return; }
        if(TEAM_BONUS.has(dstKey)){
          out[dstKey] = teamCodeFromPick(v.pick, TEAMS);
        } else {
          out[dstKey] = [v.pick || "—", null];
        }
      });
      return out;
    }

    const leaderboard = D.leaderboard || [];
    const players = leaderboard.map(p => {
      const tips = buildPlayerTips(p.name);
      let exact = p.exact_count || 0;
      let correct = 0, other = 0;
      let pts = 0;
      allMatches.forEach(m => {
        if(m.status !== "played" || !m.home || !m.away) return;
        const tip = tips[m.id];
        if(!tip) return;
        if(tip[0] === m.ga && tip[1] === m.gb){ pts += 5; }
        else {
          const o1 = tip[0] > tip[1] ? "H" : tip[0] < tip[1] ? "B" : "X";
          const o2 = m.ga    > m.gb    ? "H" : m.ga    < m.gb    ? "B" : "X";
          if(o1 === o2){ pts += 2; correct++; }
          else { pts += 1; other++; }
        }
      });
      const pid = p.name.toLowerCase().replace(/[åä]/g,"a").replace(/ö/g,"o").replace(/[^a-z0-9]/g,"");
      return {
        id: pid, name: p.name,
        color: PLAYER_COLORS[p.name] || "#7A3CF0",
        photo: playerPhoto(p.name),
        tips,
        points: p.match_points || 0,
        exact, correct, other,
        bonus: buildBonus(p.bonus_detail),
        bonusPts: p.bonus_points || 0,
        rank: p.rank || 0,
        total: (p.match_points || 0) + (p.bonus_points || 0)
      };
    });

    const standings = players.slice().sort((a,b) =>
      (b.total - a.total) || (b.exact - a.exact) || a.name.localeCompare(b.name));
    let prevTot = null, rank = 0;
    standings.forEach((p, i) => {
      if(p.total !== prevTot){ rank = i + 1; prevTot = p.total; }
      p.rank = rank;
    });
    standings.forEach(s => { const p = players.find(x => x.id === s.id); if(p) p.rank = s.rank; });

    const anyPlayed = allMatches.some(m => m.status === "played");
    const state = anyPlayed ? "mid" : "pre";

    return {
      state, now: new Date(),
      teams: TEAMS, groups: GROUPS, groupLetters: GROUP_LETTERS,
      matches, allMatches, groupTables,
      knockout, koRounds, qualifiers: [],
      players, standings, forms,
      pot: { p1:[], p2:[] },
      stars: []
    };
  }

  function h2h(){ return null; }

  const TEAMS_INIT = {};
  const GROUPS_INIT = {};
  GROUP_LETTERS.forEach(L => { GROUPS_INIT[L] = []; });

  window.VM = {
    build, PLAYERS: [], PRIZES, TEAMS: TEAMS_INIT, GROUPS: GROUPS_INIT,
    GROUP_LETTERS, STARS: [], KEEPERS: [], YOUNG: [], POT: PRIZES,
    h2h, VENUES: []
  };

  const _origBuild = build;
  window.VM.build = function(){
    const data = _origBuild();
    window.VM.TEAMS = data.teams;
    window.VM.GROUPS = data.groups;
    return data;
  };
})();

  </script>

  .twk-chip[data-on="1"]{box-shadow:0 0 0 1.5px rgba(0,0,0,.85),
    0 2px 6px rgba(0,0,0,.15)}
  .twk-chip>span{position:absolute;top:0;bottom:0;right:0;width:34%;
    display:flex;flex-direction:column;box-shadow:-1px 0 0 rgba(0,0,0,.1)}
  .twk-chip>span>i{flex:1;box-shadow:0 -1px 0 rgba(0,0,0,.1)}
  .twk-chip>span>i:first-child{box-shadow:none}
  .twk-chip svg{position:absolute;top:6px;left:6px;width:13px;height:13px;
    filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}
`;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

  </script>

function useCountUp(target, dur = 800) {

    setV(0);
    const step = (ts) => {
      if (!start) start = ts;
      const p = Math.min(1, (ts - start) / dur);
      setV(Math.round(target * (1 - Math.pow(1 - p, 3))));
      if (p < 1) raf = requestAnimationFrame(step); else done = true;
    };
    raf = requestAnimationFrame(step);
    const safety = setTimeout(() => { if (!done) setV(target); }, dur + 400);
    return () => { cancelAnimationFrame(raf); clearTimeout(safety); };
  }, [target, dur]);
  return v;
}

function LiveDot({ minute, small }) {
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: small ? "2px 7px" : "3px 9px",

}

/* ---------- chip ---------- */
function Chip({ children, color = "var(--ink-soft)", bg = "var(--bg2)", style }) {

    <span style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: "3px 9px",

/* ---------- form-pärlor (V/O/F) ---------- */
function FormPills({ form, max = 5 }) {
  const list = (form || []).slice(-max);
  const col = { V: "#2BD17E", O: "#D7B23E", F: "#FF5A52" };
  if (!list.length) return <span style={{ fontSize: 11, color: "var(--ink-soft)", fontWeight: 600 }}>Ingen form än</span>;
  return (
    <span style={{ display: "inline-flex", gap: 4 }}>
      {list.map((f, i) => (
        <span key={i} title={f.gf + "–" + f.ga} style={{ width: 18, height: 18, borderRadius: 5, background: col[f.r],
          color: "#fff", fontSize: 10.5, fontWeight: 800, display: "flex", alignItems: "center", justifyContent: "center" }}>{f.r}</span>
      ))}
    </span>
  );
}

/* ---------- jämförelse-stapel ---------- */
function StatBar({ label, a, b, unit, decimals }) {
  const av = decimals ? a.toFixed(1) : a, bv = decimals ? b.toFixed(1) : b;
  const tot = (a + b) || 1;
  const ap = Math.round((a / tot) * 100);
  const aWin = a > b, bWin = b > a;
  return (
    <div style={{ marginBottom: 13 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 5 }}>
        <span style={{ fontWeight: 800, fontSize: 14, color: aWin ? "var(--ink)" : "var(--ink-soft)", fontVariantNumeric: "tabular-nums" }}>{av}{unit || ""}</span>
        <span style={{ fontSize: 11, fontWeight: 700, color: "var(--ink-soft)", letterSpacing: ".04em", textTransform: "uppercase" }}>{label}</span>
        <span style={{ fontWeight: 800, fontSize: 14, color: bWin ? "var(--ink)" : "var(--ink-soft)", fontVariantNumeric: "tabular-nums" }}>{bv}{unit || ""}</span>
      </div>
      <div style={{ display: "flex", gap: 3, height: 7 }}>
        <div style={{ flex: ap, background: aWin ? "var(--hot)" : "var(--line-strong)", borderRadius: "99px 3px 3px 99px", minWidth: 4,
          boxShadow: aWin ? "0 0 10px -2px var(--hot)" : "none" }} />
        <div style={{ flex: 100 - ap, background: bWin ? "var(--cool)" : "var(--line-strong)", borderRadius: "3px 99px 99px 3px", minWidth: 4,
          boxShadow: bWin ? "0 0 10px -2px var(--cool)" : "none" }} />
      </div>
    </div>
  );
}

function roundLabel(m) {
  if (m.stage === "group") return "Grupp " + m.group;
  const map = { r32_: "Åttondelsfinal", r16_: "Sextondelsfinal", qf_: "Kvartsfinal", sf_: "Semifinal", third_: "Bronsmatch", final_: "Final" };
  const key = Object.keys(map).find(k => m.id.startsWith(k));
  return map[key] || "Slutspel";
}

/* ---------- konfetti (sparsamt, en kort skur) ---------- */
function Confetti({ count = 40 }) {
  const colors = ["var(--hot)", "var(--warm)", "var(--gold)", "var(--cool)"];
  const items = React.useMemo(() => Array.from({ length: count }, (_, i) => ({
    left: Math.random() * 100, delay: Math.random() * 0.6, dur: 2.4 + Math.random() * 1.8,
    size: 5 + Math.random() * 6, color: colors[i % colors.length], round: Math.random() > 0.5
  })), [count]);
  return (
    <div aria-hidden="true" style={{ position: "absolute", inset: 0, overflow: "hidden", pointerEvents: "none" }}>
      {items.map((c, i) => (
        <span key={i} style={{ position: "absolute", top: "-10%", left: c.left + "%", width: c.size,
          height: c.size * (c.round ? 1 : 1.7), background: c.color, borderRadius: c.round ? "50%" : "1px",
          animation: `confettiFall ${c.dur}s linear ${c.delay}s forwards` }} />
      ))}
    </div>
  );
}

/* Team-rating för odds-beräkning */
function teamRating(code){
  const h = WC_HISTORY[code];
  let r = 70;
  if(h){
    if(h.titles)   r += 4 + h.titles * 2;
    if(h.runnerUp) r += h.runnerUp * 1.2;
    if(h.third)    r += h.third * 0.8;
    if(h.semis)    r += Math.min(8, h.semis * 0.6);
    if(h.apps)     r += Math.min(4, h.apps * 0.15);
  }
  const bumps = { ARG: 4, FRA: 4, ESP: 3, ENG: 3, BRA: 3, POR: 3, NED: 2, GER: 2, MAR: 2, CRO: 2, BEL: 1, USA: 1 };
  if(bumps[code]) r += bumps[code];
  // FIFA-ranking bonus (lägre rank = bättre)
  const fr = FIFA_RANKING[code];
  if(fr && fr <= 15) r += (16 - fr) * 0.4;
  return Math.min(95, Math.round(r));
}

/* H/D/A% från lagrating + hemmaplansbonus */
function matchOdds(homeCode, awayCode){
  if(!homeCode || !awayCode) return null;
  const rH = teamRating(homeCode) + 3;
  const rA = teamRating(awayCode);
  const diff = rH - rA;
  const pHwin = 1 / (1 + Math.exp(-diff / 7));
  const pAwin = 1 / (1 + Math.exp(diff / 7));
  const closeness = 1 - Math.abs(pHwin - pAwin);
  const pD = Math.max(0.10, Math.min(0.34, 0.18 + closeness * 0.20));
  const raw = pHwin + pAwin + pD;
  const h = pHwin / raw, d = pD / raw, a = pAwin / raw;
  const round = (x) => Math.round(x * 100);
  let H = round(h), D = round(d), A = round(a);
  const delta = 100 - (H + D + A);
  if(delta !== 0) H += delta;
  return { H, D, A };
}

function resolveWikiCandidates(name){
  if(!name) return [];
  const key = String(name).toLowerCase().trim();
  return WIKI_TITLE_MAP[key] || [name];
}
function useWikiPhoto(name){
  const candidates = React.useMemo(() => resolveWikiCandidates(name), [name]);
  const cacheKey = candidates.join("|");
  const [url, setUrl] = React.useState(() => (cacheKey in _wikiCache) ? _wikiCache[cacheKey] : null);
  React.useEffect(() => {
    if(!candidates.length) return;
    if(cacheKey in _wikiCache){ setUrl(_wikiCache[cacheKey]); return; }
    if(_wikiInflight[cacheKey]){
      _wikiInflight[cacheKey].then(u => setUrl(u));
      return;
    }
    const tryNext = async (i) => {
      if(i >= candidates.length) return null;
      try {
        const api = "https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&prop=pageimages"
                  + "&pithumbsize=400&redirects=1&titles=" + encodeURIComponent(candidates[i]);
        const res = await fetch(api);
        if(!res.ok) return tryNext(i + 1);
        const json = await res.json();
        const pages = (json && json.query && json.query.pages) || {};
        const first = Object.values(pages)[0];
        const thumb = (first && first.thumbnail && first.thumbnail.source) || null;
        if(thumb) return thumb;
        return tryNext(i + 1);
      } catch (e) { return tryNext(i + 1); }
    };
    _wikiInflight[cacheKey] = tryNext(0)
      .then(thumb => { _wikiCache[cacheKey] = thumb; _saveWikiCache(); return thumb; })
      .finally(() => { delete _wikiInflight[cacheKey]; });
    _wikiInflight[cacheKey].then(u => setUrl(u));
  }, [cacheKey]);
  return url;
}

function slugifyName(name) {
  return String(name || "").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "")
    .replace(/å|ä/g, "a").replace(/ö/g, "o").replace(/[^a-z0-9 ]/g, "")
    .trim().replace(/\s+/g, "-");
}
function StarPhoto({ name, countryCode, size = 32, showFlag = true }) {
  const wikiUrl = useWikiPhoto(name);
  const [err, setErr] = React.useState(false);

}

/* ============================================================

function money(n) { return n.toLocaleString("sv-SE") + " kr"; }

function Crown({ size = 26 }) {
  return (
    <svg width={size} height={size * 0.72} viewBox="0 0 30 22" aria-hidden="true">
      <path d="M2.5 19 L4.4 7.5 L10 12.5 L15 3.5 L20 12.5 L25.6 7.5 L27.5 19 Z"
        fill="var(--gold)" stroke="color-mix(in oklab, var(--gold) 60%, #000 22%)" strokeWidth="1" strokeLinejoin="round" />
      <rect x="2.5" y="18.5" width="25" height="2.6" rx="1" fill="color-mix(in oklab, var(--gold) 70%, #000 14%)" />
    </svg>
  );
}

function Countdown() {
  const target = Date.UTC(2026, 5, 11, 16, 0);
  const [now, setNow] = React.useState(Date.now());
  React.useEffect(() => { const t = setInterval(() => setNow(Date.now()), 1000); return () => clearInterval(t); }, []);
  let diff = Math.max(0, target - now);
  const d = Math.floor(diff / 86400000); diff -= d * 86400000;
  const h = Math.floor(diff / 3600000); diff -= h * 3600000;
  const mi = Math.floor(diff / 60000); diff -= mi * 60000;
  const s = Math.floor(diff / 1000);
  const cell = (v, l) => (
    <div style={{ textAlign: "center", minWidth: 52 }}>
      <div className="num display" style={{ fontSize: 34, color: "var(--ink)", lineHeight: 1, fontWeight: "var(--display-weight)" }}>{String(v).padStart(2, "0")}</div>
      <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: ".1em", color: "var(--ink-soft)", marginTop: 4 }}>{l}</div>
    </div>
  );
  const sep = <span className="num" style={{ color: "var(--line-strong)", fontSize: 26, fontWeight: 300, marginTop: -6 }}>:</span>;
  return (
    <div style={{ display: "flex", gap: 10, justifyContent: "center", alignItems: "center" }}>
      {cell(d, "DGR")}{sep}{cell(h, "TIM")}{sep}{cell(mi, "MIN")}{sep}{cell(s, "SEK")}
    </div>
  );
}

function PodiumStep({ p, place, prize, isPre, h }) {
  const tint = { 1: "var(--gold)", 2: "#AEB4BE", 3: "#C77F49" }[place];
  const pts = useCountUp(isPre ? 0 : p.total, 900 + place * 100);

    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", flex: 1, animation: `riseIn .5s forwards` }}>

      <Avatar p={p} size={place === 1 ? 62 : 50} ring={place} />
      <div style={{ fontWeight: 800, fontSize: place === 1 ? 15.5 : 13.5, marginTop: 10, color: "var(--ink)" }}>{p.name}</div>
      <div className="num display" style={{ fontSize: place === 1 ? 26 : 21, color: "var(--ink)", marginTop: 1, fontWeight: "var(--display-weight)" }}>
        {pts}<span style={{ fontSize: 11, color: "var(--ink-soft)", marginLeft: 2, fontWeight: 700, fontFamily: "var(--font-body)" }}>p</span>
      </div>
      <div style={{ marginTop: 10, width: "100%", height: h, borderRadius: "10px 10px 0 0", position: "relative",
        background: `linear-gradient(180deg, color-mix(in oklab, ${tint} 42%, var(--panel)), color-mix(in oklab, ${tint} 16%, var(--paper)))`,
        border: "1px solid " + `color-mix(in oklab, ${tint} 55%, var(--line))`, borderBottom: "none",
        boxShadow: place === 1 ? `0 0 30px -8px ${tint}, inset 0 1px 0 rgba(255,255,255,.18)` : "inset 0 1px 0 rgba(255,255,255,.12)",
        display: "flex", flexDirection: "column", alignItems: "center", paddingTop: 9 }}>
        <span className="num display" style={{ fontSize: place === 1 ? 30 : 24, color: tint, fontWeight: "var(--display-weight)" }}>{place}</span>
        <span className="num" style={{ position: "absolute", bottom: 9, fontWeight: 800, fontSize: place === 1 ? 14 : 12.5, color: "#fff" }}>{money(prize)}</span>
      </div>
    </div>
  );
}

                </button>

            {bonusRows.map(([label, key, kind]) => {

                <div key={key} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10,

                  <span style={{ fontWeight: 700, fontSize: 13, color: "var(--ink-soft)" }}>{label}</span>
                  {kind === "team" ? <TeamLabel code={val} size={22} /> :
                    <span style={{ display: "flex", alignItems: "center", gap: 9 }}>
                      <StarPhoto name={val[0]} countryCode={val[1]} size={28} />

        )}
      </div>
    </Sheet>
  );
}

  <script type="text/babel">
/* ============================================================
   groups.jsx — Grupper A–L med live-tabeller
   ============================================================ */

function GroupBadge({ letter, size = 46 }) {
  return (
    <span style={{ width: size, height: size, borderRadius: 13, flex: "0 0 auto", display: "flex",
      alignItems: "center", justifyContent: "center", background: groupColor(letter),

}

function GroupCard({ letter, table, isPre, onTeam, onOpenMatch, matches, index }) {
  const col = groupColor(letter);
  const [open, setOpen] = React.useState(false);
  const liveMatches = (matches || []).filter(m => m.status === "live");
  const liveTeams = new Set();
  liveMatches.forEach(m => { if(m.home) liveTeams.add(m.home); if(m.away) liveTeams.add(m.away); });
  return (
    <div style={{ background: "var(--paper)", borderRadius: "var(--r-md)", overflow: "hidden",
      border: "1px solid var(--line)", boxShadow: "var(--shadow)" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px",
        borderBottom: "1px solid var(--line)" }}>
        <GroupBadge letter={letter} size={42} />
        <div className="display" style={{ fontSize: 21, color: "var(--ink)", fontWeight: "var(--display-weight)" }}>Grupp {letter}</div>
        {liveMatches.length > 0 && (
          <span style={{ marginLeft: "auto", display: "inline-flex", alignItems: "center", gap: 5,
            padding: "3px 9px", background: "var(--hot)", color: "#fff", borderRadius: 6,
            fontWeight: 800, fontSize: 10.5 }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#fff", animation: "blink 1.4s infinite" }} />
            LIVE
          </span>
        )}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "18px 1fr 24px 24px 24px 42px 28px", gap: 4,
        padding: "7px 14px", fontSize: 10, fontWeight: 800, color: "var(--ink-soft)", letterSpacing: ".03em",
        borderBottom: "1px solid var(--line)" }}>
        <span></span><span>LAG</span>
        <span style={{ textAlign: "center" }}>S</span><span style={{ textAlign: "center" }}>V</span>
        <span style={{ textAlign: "center" }}>F</span><span style={{ textAlign: "center" }}>MÅL</span>
        <span style={{ textAlign: "center" }}>P</span>
      </div>
      {table.map((r, i) => {
        const q = i < 2, third = i === 2;
        const playing = liveTeams.has(r.code);
        return (
          <button key={r.code} onClick={() => onTeam(r.code)} style={{ width: "100%", textAlign: "left", display: "grid",
            gridTemplateColumns: "18px 1fr 24px 24px 24px 42px 28px", gap: 4, alignItems: "center", padding: "9px 14px",
            borderBottom: i < 3 ? "1px solid var(--line)" : "none",
            borderLeft: q ? `3px solid ${col}` : third ? "3px solid var(--gold)" : "3px solid transparent",
            background: playing ? "color-mix(in oklab, var(--hot) 14%, transparent)" : "transparent" }}>
            <span className="num" style={{ fontSize: 13, fontWeight: 800, color: q ? col : third ? "var(--gold)" : "var(--ink-soft)", textAlign: "center" }}>{isPre ? "·" : r.pos}</span>
            <span style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 0 }}>
              <Flag code={r.code} size={21} /><TeamName code={r.code} size={13} />
              {playing && <span style={{ width: 6, height: 6, borderRadius: "50%", background: "var(--hot)", animation: "blink 1.4s infinite", flex: "0 0 auto" }} />}
            </span>
            <span className="num" style={{ textAlign: "center", fontSize: 12.5, color: "var(--ink-soft)" }}>{r.sp}</span>
            <span className="num" style={{ textAlign: "center", fontSize: 12.5, color: "var(--ink-soft)" }}>{r.v}</span>
            <span className="num" style={{ textAlign: "center", fontSize: 12.5, color: "var(--ink-soft)" }}>{r.f}</span>
            <span className="num" style={{ textAlign: "center", fontSize: 12, color: "var(--ink-soft)", fontWeight: 600 }}>{r.gm}-{r.im}</span>
            <span className="num display" style={{ textAlign: "center", fontSize: 16, color: "var(--ink)", fontWeight: "var(--display-weight)" }}>{r.p}</span>
          </button>
        );
      })}

      {/* Gruppens matcher - kollapsbara */}
      {(matches || []).length > 0 && (
        <div style={{ borderTop: "1px solid var(--line)" }}>
          <button onClick={() => setOpen(o => !o)} style={{ width: "100%", display: "flex",
            justifyContent: "space-between", alignItems: "center", padding: "10px 14px", textAlign: "left",
            background: "var(--bg2)" }}>
            <span style={{ fontSize: 10.5, fontWeight: 800, letterSpacing: ".08em",
              color: "var(--ink-soft)", textTransform: "uppercase" }}>
              {open ? "Dölj matcher" : `Visa matcher (${matches.length})`}
            </span>
            <span style={{ fontSize: 12, color: "var(--ink-soft)",
              transition: "transform .25s", transform: open ? "rotate(180deg)" : "rotate(0deg)",
              display: "inline-block" }}>▾</span>
          </button>
          {open && matches.slice().sort((a,b) => a.kickoff - b.kickoff).map((m, i) => {
            const played = m.status === "played";
            const live = m.status === "live";
            return (
              <button key={m.id} onClick={() => onOpenMatch && onOpenMatch(m)} style={{ width: "100%",
                textAlign: "left", display: "grid", gridTemplateColumns: "1fr auto 1fr", gap: 8,

                <span style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end", fontSize: 11.5, fontWeight: 700 }}>
                  <TeamName code={m.home} size={11.5} bold={false} abbrev /><Flag code={m.home} size={16} />
                </span>
                <span style={{ textAlign: "center", minWidth: 56 }}>
                  {(played || live) ? (
                    <span className="num" style={{ fontWeight: 800, fontSize: 13, color: live ? "var(--hot)" : "var(--ink)" }}>
                      {m.ga}–{m.gb}
                    </span>
                  ) : (
                    <span className="num" style={{ fontWeight: 700, fontSize: 11.5, color: "var(--ink-soft)" }}>{svTime(m.kickoff)}</span>
                  )}
                  <div style={{ marginTop: 2, fontSize: 9, fontWeight: 800, color: "var(--ink-soft)" }}>
                    {live ? <LiveDot minute={m.minute} small /> : played ? "SLUT" : svDayLabel(m.kickoff)}
                  </div>
                </span>
                <span style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11.5, fontWeight: 700 }}>
                  <Flag code={m.away} size={16} /><TeamName code={m.away} size={11.5} bold={false} abbrev />
                </span>
              </button>
            );
          })}
        </div>
      )}

      <div style={{ display: "flex", gap: 14, padding: "9px 14px", fontSize: 10.5, fontWeight: 700, color: "var(--ink-soft)",
        borderTop: "1px solid var(--line)" }}>
        <span style={{ display: "flex", alignItems: "center", gap: 5 }}><span style={{ width: 8, height: 8, borderRadius: 2, background: col }} />Vidare</span>
        <span style={{ display: "flex", alignItems: "center", gap: 5 }}><span style={{ width: 8, height: 8, borderRadius: 2, background: "var(--gold)" }} />Bästa trea</span>
      </div>
    </div>
  );
}

function GroupsView({ data, onTeam, onOpenMatch }) {
  const isPre = data.state === "pre";
  const [active, setActive] = React.useState("alla");
  const letters = data.groupLetters;
  const shown = active === "alla" ? letters : [active];
  const matchesByGroup = React.useMemo(() => {
    const map = {};
    (data.matches || []).forEach(m => {
      if(!m.group) return;
      (map[m.group] = map[m.group] || []).push(m);
    });
    return map;
  }, [data]);
  const liveCount = (data.allMatches || []).filter(m => m.status === "live" && m.stage === "group").length;
  return (
    <div style={{ animation: "riseIn .4s forwards" }}>
      <SectionTitle kicker="Gruppspel" title="Tabeller"
        right={liveCount > 0
          ? <Chip bg="var(--hot)" color="#fff">{liveCount} live nu</Chip>
          : <Chip>{isPre ? "Före avspark" : "Spelas nu"}</Chip>} />
      <div className="app-scroll" style={{ display: "flex", gap: 7, overflowX: "auto", paddingBottom: 10, marginBottom: 14 }}>
        <button onClick={() => setActive("alla")} style={{ flex: "0 0 auto", padding: "8px 16px", borderRadius: 10, fontWeight: 800, fontSize: 13,
          background: active === "alla" ? "var(--ink)" : "var(--paper)", color: active === "alla" ? "var(--bg)" : "var(--ink)", border: "1px solid var(--line)" }}>Alla</button>
        {letters.map(L => {
          const hasLive = (matchesByGroup[L] || []).some(m => m.status === "live");
          return (
            <button key={L} onClick={() => setActive(L)} style={{ flex: "0 0 auto", width: 38, height: 37, borderRadius: 10, fontWeight: 800,
              fontFamily: "var(--font-display)", fontSize: 16, border: "1px solid var(--line)", position: "relative",
              background: active === L ? groupColor(L) : "var(--paper)", color: active === L ? "#15101F" : groupColor(L) }}>
              {L}
              {hasLive && <span style={{ position: "absolute", top: 4, right: 4, width: 6, height: 6,
                borderRadius: "50%", background: "var(--hot)", animation: "blink 1.4s infinite" }} />}
            </button>
          );
        })}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 14 }}>
        {shown.map((L, i) => <GroupCard key={L} letter={L} table={data.groupTables[L]} isPre={isPre}
          onTeam={onTeam} onOpenMatch={onOpenMatch} matches={matchesByGroup[L]} index={i} />)}
      </div>
    </div>
  );
}

Object.assign(window, { GroupsView, GroupBadge });

  </script>

  <script type="text/babel">
/* ============================================================
   schedule.jsx — Spelschema per dag + slutspelsträd
   ============================================================ */

const BRACKET_CSS = `
.bnode { display:flex; align-items:center; }
.bfeeders { display:flex; flex-direction:column; }
.bfeed { display:flex; align-items:center; position:relative; flex:1; }
.bfeed::after { content:''; position:absolute; right:-20px; top:50%; width:20px; height:2px; background:var(--line-strong); }
.bfeed-top::before { content:''; position:absolute; right:-20px; top:50%; bottom:-1px; width:2px; background:var(--line-strong); }
.bfeed-bot::before { content:''; position:absolute; right:-20px; top:-1px; bottom:50%; width:2px; background:var(--line-strong); }
.bcell { position:relative; margin-left:40px; }
.bcell::before { content:''; position:absolute; left:-20px; top:50%; width:20px; height:2px; background:var(--line-strong); }
.bleaf .bcell { margin-left:0; }
.bleaf .bcell::before { display:none; }
`;

function BracketCell({ m, champion, onOpen }) {
  // code = riktig lagkod (efter lottning), label = slot-label (Vinnare A), proj = projicerat lag just nu
  const row = (code, isWinner, label, proj) => {
    const projName = proj && window.VM.TEAMS[proj] ? window.VM.TEAMS[proj].name : null;
    return (
      <div style={{ display: "flex", alignItems: "center", gap: 7, padding: "5px 8px",
        background: isWinner ? "color-mix(in oklab, var(--gold) 18%, transparent)" : "transparent",
        borderRadius: 6 }}>
        {code ? <Flag code={code} size={17} />
          : proj ? <Flag code={proj} size={17} />
          : <span style={{ width: 17, height: 17, borderRadius: "50%", background: "var(--bg2)", flex: "0 0 auto" }} />}
        <span style={{ flex: 1, minWidth: 0, display: "flex", flexDirection: "column", lineHeight: 1.15 }}>
          <span style={{ fontSize: 11.5, fontWeight: isWinner ? 800 : 700,
            color: code ? "var(--ink)" : "var(--ink-soft)",
            overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
            {code ? window.VM.TEAMS[code].name : (label || "Vinnare")}
          </span>
          {!code && projName && (
            <span style={{ fontSize: 9.5, fontWeight: 700, color: "var(--ink)", opacity: .85,
              overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginTop: 1 }}>
              just nu: {projName}
            </span>
          )}
        </span>
        <span className="num" style={{ fontSize: 12, fontWeight: 800, color: isWinner ? "var(--ink)" : "var(--ink-soft)", minWidth: 9, textAlign: "right" }}>
          {m.status === "played" && code ? (code === m.home ? m.ga : m.gb) : ""}
        </span>
      </div>
    );
  };
  const live = m.status === "live";
  return (
    <button onClick={() => onOpen && onOpen(m)} style={{ width: 178, background: "var(--paper)", borderRadius: 10, padding: 4,
      border: "1px solid var(--line)", boxShadow: champion ? "0 0 0 2px var(--gold), var(--shadow)" : live ? "0 0 0 1.5px var(--hot)" : "var(--shadow)", textAlign: "left" }}>
      {m.fifa && (
        <div style={{ display: "flex", justifyContent: "space-between",
          padding: "2px 8px 0", fontSize: 9, fontWeight: 800, letterSpacing: ".06em", color: "var(--ink-soft)" }}>
          <span>M{m.fifa}</span>
          {m.status === "played" ? <span>SLUT</span> : m.status === "live" ? <span style={{ color: "var(--hot)" }}>LIVE</span> : <span>{svTime(m.kickoff)}</span>}
        </div>
      )}
      {row(m.home, m.winner && m.winner === m.home, m.fromA, m.projHome)}
      <div style={{ height: 1, background: "var(--line)", margin: "1px 6px" }} />
      {row(m.away, m.winner && m.winner === m.away, m.fromB, m.projAway)}
      {live ? <div style={{ textAlign: "center", padding: "3px 0 1px" }}><LiveDot minute={m.minute} small /></div> : null}
    </button>
  );
}

function BracketNode({ roundsArr, ri, mi, onOpen }) {
  const m = roundsArr[ri][mi];
  if (ri === 0) return <div className="bleaf"><div className="bcell"><BracketCell m={m} onOpen={onOpen} /></div></div>;
  return (
    <div className="bnode">
      <div className="bfeeders">
        <div className="bfeed bfeed-top"><BracketNode roundsArr={roundsArr} ri={ri - 1} mi={mi * 2} onOpen={onOpen} /></div>
        <div className="bfeed bfeed-bot"><BracketNode roundsArr={roundsArr} ri={ri - 1} mi={mi * 2 + 1} onOpen={onOpen} /></div>
      </div>
      <div className="bcell"><BracketCell m={m} champion={ri === roundsArr.length - 1 && !!m.winner} onOpen={onOpen} /></div>
    </div>
  );
}

function Bracket({ data, onOpen }) {
  const ko = data.knockout;
  const roundsArr = [ko.r32, ko.r16, ko.qf, ko.sf, ko.final];
  const labels = ["Åttondelar", "Sextondelar", "Kvarts", "Semi", "Final"];
  return (
    <div>
      <style>{BRACKET_CSS}</style>
      <div className="app-scroll" style={{ overflowX: "auto", paddingBottom: 12 }}>
        <div style={{ minWidth: 880 }}>
          <div style={{ display: "flex", marginBottom: 10 }}>
            {labels.map((l, i) => (
              <div key={l} style={{ flex: i === 0 ? "0 0 158px" : "1", textAlign: i === 0 ? "left" : "center",
                fontSize: 10.5, fontWeight: 800, letterSpacing: ".1em", color: "var(--hot)", textTransform: "uppercase" }}>{l}</div>
            ))}
          </div>
          <BracketNode roundsArr={roundsArr} ri={4} mi={0} onOpen={onOpen} />
        </div>
      </div>
      <div style={{ marginTop: 18, background: "var(--paper)", border: "1px solid " + "color-mix(in oklab, var(--gold) 40%, var(--line))",
        borderRadius: 14, padding: 14, boxShadow: "var(--shadow)", maxWidth: 340 }}>
        <div style={{ fontSize: 10.5, fontWeight: 800, letterSpacing: ".1em", color: "color-mix(in oklab, var(--gold) 70%, #000 12%)", marginBottom: 9 }}>BRONSMATCH</div>
        <BracketCell m={ko.third[0]} onOpen={onOpen} />
      </div>
    </div>
  );
}

function ScheduleView({ data, onOpenMatch }) {
  const isPre = data.state === "pre";
  const [mode, setMode] = React.useState("matcher");
  const [filter, setFilter] = React.useState("alla");

  const filtered = data.allMatches.filter(m => {
    if (filter === "live") return m.status === "live";
    if (filter === "tippas") return m.tippas;
    if (filter === "kommande") return m.status === "upcoming";
    if (filter === "spelade") return m.status === "played";
    return true;
  });
  const days = []; const byDay = {};
  filtered.forEach(m => { const k = svDateKey(m.kickoff); if (!byDay[k]) { byDay[k] = []; days.push(k); } byDay[k].push(m); });

  const liveCount = data.allMatches.filter(m => m.status === "live").length;
  const filters = [["alla", "Alla", data.allMatches.length], ["live", "Live", liveCount],
    ["tippas", "Tippas", data.allMatches.filter(m => m.tippas).length],
    ["kommande", "Kommande", data.allMatches.filter(m => m.status === "upcoming").length],
    ["spelade", "Spelade", data.allMatches.filter(m => m.status === "played").length]];

  return (
    <div style={{ animation: "riseIn .4s forwards" }}>
      <SectionTitle kicker="104 matcher" title="Spelschema" right={<Chip>{isPre ? "11 jun – 19 jul" : "Pågår"}</Chip>} />

      <div style={{ display: "flex", gap: 4, marginBottom: 16, background: "var(--bg2)", padding: 3, borderRadius: 11 }}>
        {[["matcher", "Alla matcher"], ["slutspel", "Slutspelsträd"]].map(t => (
          <button key={t[0]} onClick={() => setMode(t[0])} style={{ flex: 1, padding: "9px 0", borderRadius: 8, fontWeight: 800, fontSize: 13.5,
            background: mode === t[0] ? "var(--paper)" : "transparent", color: mode === t[0] ? "var(--ink)" : "var(--ink-soft)",
            boxShadow: mode === t[0] ? "var(--shadow)" : "none" }}>{t[1]}</button>
        ))}
      </div>

      {mode === "slutspel" ? (
        <>
          {isPre && (
            <div style={{ marginBottom: 12, padding: "11px 14px", background: "var(--paper)",
              border: "1px solid var(--line)", borderRadius: 12, boxShadow: "var(--shadow)",
              display: "flex", gap: 11, alignItems: "center" }}>
              <span style={{ width: 26, height: 26, borderRadius: 7, background: "var(--cool)", flex: "0 0 auto",
                display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 800, fontSize: 13 }}>i</span>
              <span style={{ fontSize: 12.5, color: "var(--ink-soft)", fontWeight: 600, lineHeight: 1.4 }}>
                Slutspelsträdet visar projicerade matcher (Vinnare A, Tvåa B, Bästa 3:a osv) utifrån
                hur grupperna står just nu. Slutgiltig lottning sker efter gruppspelet.
              </span>
            </div>
          )}
          <Bracket data={data} onOpen={onOpenMatch} />
        </>
      ) : (
        <>
          <div className="app-scroll" style={{ display: "flex", gap: 7, overflowX: "auto", paddingBottom: 8, marginBottom: 8 }}>
            {filters.map(f => (
              <button key={f[0]} onClick={() => setFilter(f[0])} style={{ flex: "0 0 auto", display: "flex", alignItems: "center", gap: 6,
                padding: "8px 14px", borderRadius: 9, fontWeight: 800, fontSize: 13, border: "1px solid var(--line)",
                background: filter === f[0] ? "var(--ink)" : "var(--paper)", color: filter === f[0] ? "var(--bg)" : "var(--ink)" }}>
                {f[0] === "live" && f[2] > 0 ? <span style={{ width: 6, height: 6, borderRadius: "50%", background: "var(--hot)" }} /> : null}
                {f[1]} <span className="num" style={{ opacity: .5, fontWeight: 700 }}>{f[2]}</span>
              </button>
            ))}
          </div>

          {days.length === 0 ? (
            <div style={{ textAlign: "center", color: "var(--ink-soft)", padding: 40, fontWeight: 600 }}>Inga matcher här just nu.</div>
          ) : days.map(k => {
            const list = byDay[k];
            const today = svDateKey(data.now) === k;
            return (
              <div key={k} style={{ marginBottom: 20 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, margin: "4px 2px 11px" }}>
                  <span className="display" style={{ fontSize: 16, color: "var(--ink)", fontWeight: "var(--display-weight)" }}>{svDayLabel(list[0].kickoff)}</span>
                  {today ? <Chip bg="var(--hot)" color="#fff">IDAG</Chip> : null}
                  <span style={{ flex: 1, height: 1, background: "var(--line)" }} />
                  <span className="num" style={{ fontSize: 12, fontWeight: 700, color: "var(--ink-soft)" }}>{list.length} matcher</span>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px,1fr))", gap: 9 }}>
                  {list.map(m => <MatchCard key={m.id} m={m} onOpen={onOpenMatch} showRound />)}
                </div>
              </div>
            );
          })}
        </>
      )}
    </div>
  );
}

Object.assign(window, { ScheduleView, Bracket });

  </script>

  <script type="text/babel">

const BONUS_DEFS = [
  { key: "winner",      label: "Turneringsvinnare", pts: 10, kind: "team" },
  { key: "silver",      label: "Silver",            pts: 5,  kind: "team" },
