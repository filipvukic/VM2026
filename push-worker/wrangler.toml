# Cloudflare Worker config for the VM2026 Web Push backend.
# Fill in the three REPLACE_* placeholders, then `npx wrangler deploy`.
name = "vm2026-push"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Poll ESPN once a minute and push new goals/kickoffs/full-times.
[triggers]
crons = ["* * * * *"]

# KV stores: push subscriptions (sub:*) + the last-seen goal state (goalstate).
# Create it once:  npx wrangler kv namespace create SUBS
# then paste the printed id below.
[[kv_namespaces]]
binding = "SUBS"
id = "867743eb42944c648924c31c43802113"

[vars]
# Public VAPID key (base64url) from `npx @pushforge/builder vapid` — also served
# to the frontend at GET /vapidPublicKey.
VAPID_PUBLIC_KEY = "BN1BJ4vvvscQCMN7Vq6LA2rEFyP_I_-YlgSua9zCwJ2and9v39pn2aKnRPhAQfsbBzBkQsKVYNEHaYbLGjSCtgc"
ADMIN_CONTACT = "mailto:filipvukic@outlook.com"
# The site origin allowed to call /subscribe (CORS). Your GitHub Pages domain.
ALLOW_ORIGIN = "https://vmtipp.se"

# The private VAPID key is a SECRET, not a var. Set it once with:
#   npx wrangler secret put VAPID_PRIVATE_KEY
# and paste the private JWK JSON (the {"kty":"EC",...,"d":"..."} object).

# --- Knockout betting (/ko/*) ---
# Two SECRETS (not vars). Set each once with `npx wrangler secret put NAME`:
#   KO_SECRET     — any long random string; the per-person login codes are an HMAC of
#                   this + the player's name. Changing it changes everyone's code.
#   KO_ADMIN_KEY  — any long random string; guards GET /ko/codes (list everyone's code
#                   to hand out) and GET /ko/all (the engine reads tips from here).
# After deploy:  GET https://<worker>/ko/codes?key=<KO_ADMIN_KEY>  → [{name, code}]
# Tips for the engine:  GET https://<worker>/ko/all?key=<KO_ADMIN_KEY>
